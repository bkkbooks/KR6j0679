body:
  text: 天竺沙門般剌密帝譯烏長國沙門彌伽釋迦譯語菩薩戒弟子房融筆受西京大興福寺沙門惟慤科皇宋首楞大師可度箋爾時富樓那彌多羅尼子在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言大威德世尊善為衆生敷演如來第一義諦第四了妄初源指密因文二初搜因決相文三初謙陳昧旨文五初伸儀讚演箋云了者是能了之智由世尊無漏智或了是世尊顯了之義妄初源是所了即無明創起之由指密因就此指一切衆生隱密之性此因從前因來前因世尊知會三科七大性周遍法界皆如來藏故阿難大衆悟法界理說偈讚佛由是富樓那云相懷疑謂大性若周遍時不能容水容空等世尊遂以理事雙融答彼示相之疑故有此因來富樓那彌多羅尼子唐言滿慈子偏袒右肩右膝著地皆是順義從左則逆也或可滿慈尊者是千佛之一數既聞前來會相因說三科七大性總是清淨本然周遍法界便疑云既是清淨云何忽生山河大地諸有為相次第遷流終而復始於是世尊便通兩疑初通真忽生妄疑後通四大俱遍疑今且初通真忽生妄疑文二初舊疑後新疑初舊疑是第三國殘義故云舊疑是問清淨本然云何忽生等事所以世尊說性覺是妄覺是真以答疑情又說根本妄緣七緣八執六取塵身行三惑等答通富樓那舊疑上來是舊疑了後通新疑經云富樓那言若此妙覺本妙覺明與如來心不增不減無狀忽生山河大地諸有為相乃至有為習漏何當復生於是世尊便說人迷聚落翳差華亡純金不雜灰無木等喻答通新疑上來新疑亡竟總是真忽生妄疑已竟後通四大俱遍疑經云富樓那問言又如來說地水火風本往圓融周遍法界湛然常住問世尊若地性遍云何容水水性周遍火則不生復云何明水火二性俱遍虗空不相凌滅於是世尊說一水雙烏為喻答通四大相凌滅義言水中若有雙日即許有四大相凌滅水中若無雙日即無四大可相凌滅上來一水雙烏竟又說空華結果喻云猶邀空華結為空果空本無華其誰結果若有四大即許有相凌滅四大本無無相凌滅也上來有二初真忽生妄後四大俱遍總是第四了妄初源指密因大威德世尊將欲請法且先讚歎我佛世尊有大威雄道德世尊四十五年後善能與法界內一切迷真背覺底衆生敷揚演說第一義諦是如來藏性也世尊常推說法人中我為第一二謙類聾夫箋云如法華云爾時佛告諸比丘汝等見是富樓那彌多羅尼子不我常推於說法人中最為第一又云於過去九十億諸佛所護持助宣佛之正法於彼說法人中亦最第一又云亦於七佛說法人中而得第一於賢劫中當來諸佛說法人中亦復第一今聞如來微妙法音箋云是性水真空性空真水又云如一見根遍周法界又云汝心昏迷不悟汝之見聞覺知本如來藏此皆微妙法音猶如聾人逾百步外耹於蚊蚋箋云今聞佛微妙法音大似聾人更逾越百步之外一跨曰步百步六百尺聞於蚊蚋之聲莫道是聞本所不見他身何況得聞其聲大曰蚊小曰蚋又秦人曰蚊楚人曰蚋法上而論猶如聾人況聲聞之人二空之中祇得人空未得法空一死之中祇得分段生死未得變易生死二障之中祇斷煩惱障未斷所知障本所不見何況聲聞箋云不見諸佛如來法身真理不聞諸佛大乘之教佛雖宣明令我除惑今猶未詳斯義究竟無疑惑地三聞教尚迷箋云佛雖宣說顯明令我除其疑惑前來破却三科性令無我執破却七大性令無法執故除惑也我今尚身未能審詳是此究竟到頭之義緣小乘之人見佛說性水真空性空真水見聞覺知本如來藏信之未及世尊如阿難輩雖則開悟習漏未除四難居漏位箋云前雖悟法界理習氣有漏猶未能除方得初果須陀洹斷欲界八十八使我等會中登無漏者雖盡諸漏五普陳疑悔箋云是第四果阿羅漢梵行已圓習氣已無所作已辦不受後有身諸漏即有漏欲漏無明漏也今聞如來所說法音尚紆疑悔箋云指此一經是頂三昧教法尚自榮紆疑者惡作義追往曰悔世尊若復世間一切根塵陰處界等二正敘疑情文二初怪性如生文三初本無生忽生箋云根是六根眼耳等塵是六塵色聲等陰是五陰色受想等陰覆真體也處是十二處六根六塵處者依緣義界是十八界三六一十八界界者種族義流類義等取七大性皆如來藏清淨本然云何忽生箋云皆如來藏周遍法界清淨本然本無生如今為什麼却生山河大地諸有為相二本無相今有相箋云本無相而今為什麼有相次第遷流終而復始三本常今無常箋云空界壞而復滅是終空界成而復生是始此皆是真忽生妄又如來說地水火風本性圓融周遍法界湛然常住後相疑凌遍文二初敘三明二疑不凌俱文二初牒前都演世尊若地性遍云何容水水性周遍火則不生復云何明水火二性俱遍虗空不相凌滅後述不俱容箋云世尊所說地性周遍之時何能容得水水性周遍火則不生乃歒體相違云何下正是相凌滅云何道不相凌滅世尊地性障礙空性虗通云何二俱周遍法界後色空相形智迷周現文二初述遍疑而我不知是義攸往後申迷旨箋云不知是義所歸也唯願如來宣流大慈開我迷雲及諸大衆作是語已五體投地欽渴如來無上慈誨後翅儀請決箋云宣說流布其大慈從根本智流出後得智從後得智流出大悲心從大悲心說三乘十二分教爾時世尊告富樓那及諸會中漏盡無學諸阿羅漢後許正通甄文二初勑聽告許文二初許誘三歸一文四初告如來今日普為此會宣勝義中真勝義性二許箋云世俗勝義二諦每諦有四瑜伽四十七云世俗四一假名無實諦樂塵成瓶二隨事差別諦三科三方便安立諦四說四依門顯實諦二空門又勝義有四一體用顯現諦三科二因果差別諦四諦三證得勝義諦二空門四勝義勝義諦離言絶相為猶與也宣猶說也勝為殊勝此勝義約對世俗諦立雖是真猶故對妄真勝義性乃是勝義諦不對世俗諦立是前勝義諦勝義諦也離名絶相故疏云非安立門前一勝義是安立門以真對妄以勝義對世俗此真勝義性真妄雙拂非相對而立令汝會中定性聲聞三誘異同真箋云定性聲聞者則法華會中回不定性者若是法華會上舍利弗與千二百比丘皆當授記回不定性也疏許佛在世時化定性聲聞若是五性宗不許定性成佛若定性成佛則不名定性今則不然定性性若不成佛法華經因何云更無餘乘而得滅度設諸教言不成佛但一期彈斥令彼回心免成沈滯若直言凡夫俱成佛則凡夫妄將有漏欲慕歸真若直言聲聞成佛聲聞之人沈空者衆所以褒揚不定呵有殊今到四十九年方回定性成佛金口所說凡情何疑如法華云餘諸聲聞衆亦當得如是其不在此會汝當為宣說及諸一切箋云普談凡聖未得二空箋云聲聞有學及凡夫等回向上乘阿羅漢等箋云則大權聲聞入大乘者等乃攝通緣覺皆獲一乘寂滅場地箋云則本覺性淨真體也故觀音述證云生滅既滅寂滅現前忽然超越世出世間此則證真寂滅體也梵網經云寂滅道場座道是無上覺道場是寂滅之場座則諸法空為座真阿練若箋云真簡假故如法華云或有阿練若衲衣在空間自謂行真道輕賤人間者又云是人行惡心常念世俗事假名阿練若好出我等過真阿練若亦云寂靜處有二一遠雞犬之聲二遠刀斧之聲今言真揀一分假者若假者衲衣在空間等正修行處箋云揀邪修行處若編椽臥棘等是邪也汝今諦聽當為汝說四敕聽微旨富樓那等欽佛法音默然承聽後聖衆同欽佛言富樓那如汝所言清淨本然云何忽生山河大地後正演通疑文二初通真忽生妄疑文二初通舊疑文四初明根本妄緣成三識種文二初試辨真妄文五初標前疑箋云是牒地前來問道清淨本然云何忽生山河大地諸有為相汝常不聞如來宣說性覺妙明二問昔說箋云汝乃尋常直不聞我說云云心生曰性覺則強生覺照此是無明創起之由妙明者體不離真是背體緣明此是性之明也本覺明妙箋云本覺則是本體覺性此性若起智照理故明離能所故妙外人問既是覺勞相現但言妄便體因何立為性覺之名答妄從真起妄得覺名覺勞相生責勞稱妄意謂此妄法亦不別處生如水生波故得覺名為他覺勞相現故責彼勞乃稱為妄外人又問性覺是妄本覺是真何故不以真先而以妄先也答以攝末本合居先顯妄推源故先標性性者發明之性也富樓那言唯然世尊我常聞佛宣說斯義三聞舊旨箋云唯然吔喏之辭佛言汝稱覺明四試簡箋云佛既見他答道常聞此二覺之義便令他簡真覺凝明為復性明稱名為覺為覺不明稱為明覺箋云佛便問為復將此性明妄覺名為真為復起始覺智覺此性明是妄方稱說為明覺是真不明則無性明富樓那言若此不明五甄真箋云富樓那是千佛之一數便簡得真不明是無性明名為覺者箋云既無性明便是真也則無所明箋云既此不明是覺性明便無所明所明乃性明自癡之一法佛言若無所明後明妄識興由文四初兩緣交破箋云所明無明也則無明覺箋云則無能緣強覺有所非覺箋云若有所明無明則不是真無所非明箋云若無所明無明則無能明強覺無明又非覺湛明性二雙簡二明文三初簡妄非真箋云無明是性明相又非是真覺湛寂圓明之性性覺必明二顯真明湛箋云性則體性覺是真覺必定圓明妄為明覺三責妄生明箋云因一切衆生妄心起心外別求便有性明相與強覺覺非所明三同異滅生文二初迷真立異箋云此真覺之性是前性覺必明之覺不是性明之相因明立所箋云因有性明便立性明為所所既妄立箋云是性明相生汝妄能箋云是強覺此強覺因性相而生無同異中箋云則性明相未分能所之時熾然成異箋云熾然火盛㒵性明之相無同異因強覺起來便有業轉現三細識生乃熾然成異也因強覺起來動作故名業既有動作然後便有轉識轉背故名轉轉背真體也此為見分是十二類生顛倒因既轉識生然後便有現識顯現故名現此是相分是山河大地顛倒因異彼所異二返異灘源箋云異是能異則是三細識彼所異則是無明或可異是性明相彼所異是三細識雖是同約背真看來亦是異今覺此三細識是異彼前來性明相故云云因異立同箋云因能異妄擬復無明之同或可既因此三細識是異便立前性明相為同同異發明箋云同是性明相異是三細識發起明白因此復立無同無異箋云既厭三細識是異立前性明為同既復前來性明同相不得又立性明為無同無異或可性明背真是異為對三細識便立性明為同既立為同便奪却異名異既無名同將偈故立為無同無異如是擾亂四因勞發相文三初彰勞起混箋云內心動作相待生勞箋云便有能所相對生其勞倦勞久發塵箋云既覺心勞倦久已發起妄塵汙自真體自相渾濁箋云自向性明相上生其渾濁此妄非從別處而生唯約性明相上生由是引起塵勞煩惱二明空界異同箋云因是便乃引起因塵生勞故號塵勞煩則煩怨惱則惱亂便有根本煩惱隨煩惱等起為世界箋云內心動作故有器世界生靜成虗空箋云內心無動便有虗空相現此皆約八識親變虗空為同箋云虗空是一故說同世界為異箋云有橫世界竪世界有情世界無情世界有多種名故為異彼無同異真有為法三指相分生源箋云外人問無同異是真是妄經中牒云彼無同異真有為法非無為法覺明空昧二七緣八執擊相分生文二初四輪騰布文四初風箋云覺明是第七識起來執八見分為我不是性明也既執八見分為我內心勞倦外帶得一分頑空當情故云空昧昧暗也為此頑空暗昧故相待成搖故有風輪箋云既見有昏鈍頑空當情便厭此空昏昧起心欲復前來性明同體便乃搖動外感風輪執持世界箋云世界成時亦是風輪世界壞時亦是風輪然世界將壞毗嵐風擊須彌山碎之如粉因空生搖二金箋云因頑空當情便厭空擬復明故生搖堅明立礙箋云堅愛復前性明之性便乃六礙礙者堅固為性彼金寶者箋云須彌山七寶所成七金山四寶所成皆是地攝明覺立堅箋云明妄覺之性立堅愛復前性明故有金輪箋云便有地大現保持國土箋云國土地之所攝堅覺寶成三火箋云牒前地大搖明風出箋云內心搖動發明便有風生是牒前風大風金相磨箋云風與金相研磨故有火光箋云既搖動堅欲復前性明圓體起心燥動故有火大依前一大而起為變化性箋云變生成熟又乃火假諸緣故云變化火是變化之性寶明生潤四水箋云內心堅執愛復惱明故云生潤此牒地大火光上蒸箋云蒸騰也內心騰起燥動感久大此牒火大故有水輪含十方界箋云既堅欲復彼性明起心燥動便乃心下生愛感水大現火騰水降交發立堅後大種之文三初明交遍文二初二輪騰降灘渤呈形箋云火以炎上就燥水以潤流溼火表內求心水表內愛心溼為巨海乾為洲灘箋云海上堅執心劣益潤心強風水大益潤心劣心強內感地大爾云江中沙聚人所居曰洲以是義故彼大海中火光常起彼洲灘中江河常注二引海火洲河澄通俱遍箋云華嚴云常有四大寶珠珠中出火燒涸海若無此珠世人乃被漂沒會知水中有火水勢劣火結為高山二彰勝劣文二初明火強水劣嶽峙于霄文二初明結相箋云水勢若劣於火被火乾盡然後便成土次第相積而成高山法上水大中亦有火大地大是故山石擊則成𦦨融則成水二引俱遍箋云是故山石物擊則火迸嵐蒸則水流法上地大之中亦有火大水大土勢劣水抽為草木二舉地弱水雄草槃林聳文明結相箋云水勢將多抽為草木便益潤焦枯之處乃草木發生法上堅執心既劣愛心將多乃煩惱竟生是故林藪二引俱遍箋云有水曰澤無水曰藪過燒成土箋云如山林藪澤之處被火既燒將成灰土法上愛心既劣燥心將多愛不遂心瞋心斷愛乃生堅執因絞成水箋云如絞草絞木乃成於水法上堅執心劣愛心乃盛境隨愛心潤於堅執草木是地中攝交妄發生三結外分遷流文二初結前交種箋云四大初交而發生也遞相為種箋云但一大具足一切大但地為種亦有水大等大相生如內心搖動外感風大內心燥急外感火大內心堅執外感地大內心益潤感以是因緣世界相續後結世界恆流箋云便有世界相續世界外四大內外皆心所變此約所依世界復次富樓那明妄非他三六識取塵重成類種文六初標前指過箋云明此虗妄之法非是他皆是自為也覺明為咎箋云因強覺覺他性明然後便有四大相生故為過咎所妄既立箋云立他性明為所緣境明理不逾箋云能明強覺與所立性明不相逾越意間能所二法不能超越能所相伏未忘以是因緣聽不出聲見不超色色香味觸六妄成就箋云是由所以之故聲塵所障不能脫聲若是聖人乃出於聲至色香味觸六塵等也由是分開見覺聞知二明妄識分箋云見眼覺身聞鼻耳知舌意已上是識而不言根則合攝也同業相纏合離成化三雙因發業文三初舉雙因成生四類箋云同業相纏舉愛而攝想此二為因合離成化雖舉化攝於胎卵溼卵者想多情少胎則想少情多溼則情想合化則情想離見明色發二敘因生勢簡二單雙箋云相引於見明見想成箋云色引於想異見成憎箋云想則可意不可意俱行同想成愛箋云愛則唯從可意境同想則父想母想中有想父於母生愛母於父生愛中有是男於母生愛中有是女於父生愛流愛為種三交發二因顯分根種箋云愛納在中間為種所謂情為潤因納想為胎箋云想為生使交遘發生箋云情想二法相交遘集故發生吸引同業箋云吸覽引起也俱目情想二法同業即是情想此目為因故有因緣生羯邏藍遏蒲曇等四引果酬因箋云羯邏藍唐言雜穢初七疏云翻取義向下皆然遏蒲曇唐言凝結二七蔽尸唐言凝厚三七健南唐言胞四七鉢羅奢佉唐言根五七疏云支分亦義取故有因緣是因生羯邏藍是果等取三位胎卵溼化五種類交熏文二初簡種箋云胎卵溼化但舉四生之果十二類一時影取也隨其所應箋云應猶現也合也卵唯想生箋云九分是相一分是情胎因情有箋云九分是情一分是想溼以合感箋云情想相合五分情五分想化以離應箋云情想俱離情想合離更相變易後簡熏箋云此中言合離是舉溼化影取胎卵變為改變易為移易捨生遍受名之曰變厭故從新名之曰易所有受業遂其飛沈六結成內外箋云想多情少為其飛禽情多想少為其步類沈即步類也或遂字為逐義亦通以是因緣箋云是因衆生相續箋云是果富樓那想愛同結四身行三惑為苦果根文三初單明三惑文三初淫箋云父想母想中有想中有若是男向母身上起想中有若是女向父身上起想父於母生愛母於父生愛同其結縛也愛不能離箋云指此欲之一法不能捨離既不能捨離則諸世間父母子孫相生不斷箋云子猶孳也孳恤於下凡子之子曰孫孫之子曰曾孫曾孫之子曰玄孫玄孫之子曰來孫來孫之子曰雲孫則六代也子子孫孫遞代相生無有斷絶是等則以欲貪為本箋云便指是等則以欲貪為本貪愛同滋貪不能止二殺箋云此牒前欲之一法引下殺貪之文乃同時滋益心生形著貪愛不能止息則諸世間卵化溼胎隨力彊弱遞相吞食是等則以殺貪為本箋云彊者貪於弱者以人食羊羊死為人人死為羊如是乃至十生之類三盜箋云十生之類舉其全數是十二類死死生生互來相噉箋云此界死了又死生了又生他界生了又生死了又死惡業俱生窮未來際箋云惡業種子俱時生起是等則以盜貪為本箋云偷殺於他故云盜貪此三惑皆言貪者俱是欲之一法為本合言內心有貪為因欲是果癡為因盜為果嗔為因殺為果若無貪淫餘二即無故但舉貪汝負我命二債戀相仍文三初殺盜相債箋云言汝前生殺我今生乃負我命此結殺文我還汝債以是因緣經百千劫常在生死箋云言我前生缺汝債今生還債於汝此結盜文汝愛我心我憐汝色以是因緣經百千劫常在纏縛後舉染相仍箋云結欲文唯殺盜淫三為根本以是因緣業果相續三總結三緣返推源妄文三初結前三惑箋云前乃順小乘以淫在前此中結時結歸大乘以殺在前富樓那如是三種顛倒相續皆是覺明二推惑從源箋云覺是強覺明是性明皆因能明強覺覺他性明為所便有妄法相伏而起明了知性箋云是第八識因了發相箋云因第八業轉為見分發相是現識為相分從妄見生箋云言此三惑法皆從見分上生緣為見分是十二類生顛倒因相分是山河大地顛倒因山河大地諸有為相次第遷流因此虗妄終而復始三舉外分遷流箋云此中答他前經初問真忽生妄云皆從妄見而生便有山河等遷流終而復始乃四相生滅也富樓那言若此妙覺本妙覺明後通新疑文二初乘因起難文三初顯凡聖一如箋云若此妙覺是真覺之性本來微妙真覺疑也此牒上文是因中佛性與如來心不增不減箋云此一真之性在諸佛分上不增在凡夫分上不減此果中佛性無狀忽生山河大地諸有為相次敘凡因起妄箋云則過去是真現在忽生成妄如來今得妙空明覺後難證後生迷箋云妙空是理明覺是智見佛現在證真山河大地有為習漏何當復生箋云言佛未來有為之法還更生否習漏者乃根塵識三也向三世類例問意謂既衆生性與佛無殊衆生過去是真現在成妄諸佛現在證真未來莫也成妄佛告富樓那譬如迷人於一聚落惑南為北後舉喻通疑文三初人迷聚落喻文二初喻文二初顯暫迷文二初如來立喻返問迷因文二初標迷箋云人所居曰聚落迷人喻一切凡夫向諸佛法性淨土上忽有妄生此迷為復因迷而有因悟所出後徵因箋云言此妄為復生於妄上生於真中富樓那言如是迷人亦不因迷又不因悟後滿慈正通述無因理文三初舉何以故次徵迷本無根云何因迷悟非生迷云何因悟後述佛言彼之迷人正在迷時倐有悟人指示令悟後明長悟文二初問悟生迷箋云此之衆生正在妄時倐有悟人喻諸佛示他真性令其曉了富樓那於意云何此人縱迷於此聚落更生迷不箋云縱迷於此聚落如今已是悟還更惑南為北否法上衆生悟了還更成妄不也世尊後答應生理富樓那十方如來亦復如是後合文二初總合此迷無本性畢竟空後別釋文三初敘迷無體昔本無迷似有迷覺次許妄似生箋云覺則強覺來無妄似即不有此唯答證後妄生意明前來真息生妄妄無根本覺迷迷滅覺不生迷後覺不生箋云是佛現在起始覺智覺妄當體是空此覺決定不生迷乃答他第二問證後妄生也亦如翳人見空中花翳病若除花於空滅次翳差花二喻文三初勑審待花文三初立花隨翳箋云法上如似衆生內有見分外便有相分但險見分相分自無忽有愚人於彼空花所滅空地待花更生次泛立愚賓箋云忽有衆生於證真地更待妄生汝觀是人為愚為慧後假詳愚慧箋云汝看此人為復是迷為復是悟富樓那言空元無花妄見生滅次責狂非理文二初責無花有見箋云真體無妄妄心見有花生是妄花滅非真見花滅空已是顛倒勑令更出斯實狂癡云何更名如是狂人為愚為慧後覩滅慳生箋云見有妄滅尚為顛倒更待妄生此乃不了理事實是顛狂之人佛言如汝所解後比責滿慈文二初順比答辭云何問言諸佛如來妙覺明空何當更出山河大地後乘違責問又如金礦雜於精金後礦金灰木喻文二初喻文二初純金不雜喻文二初言礦雜喻性居因箋云喻果在因其金一純更不成雜後舉純金彰果純淨箋云唯金無礦喻果不雜因如木成灰不重為木後灰無重木喻箋云聖不重凡此二喻俱答證後妄生諸佛如來菩提涅槃亦復如是後合富樓那又汝問言地水火風本性圓融周遍法界後通四大俱遍疑文二初酬前舊問文二初破水火相凌文二初總牒疑辭文二初引前俱遍疑水火性不相凌滅後承遍生疑文二初牒水火箋云牒他前來問疑水火性相凌不合言不指凌滅也又徵虗空及諸大地俱遍法界不合相容後明色空箋云又敘他前疑此不相容不合道相容富樓那譬如虗空體非群相後喻堅執文二初喻消凌相文六初操空二初顯空無相箋云如彼虗空喻真空體非群相離四大相而不拒彼諸相發揮後不拒發揮箋云揮用也真空體二雖無四大之相而不礙彼諸相發用所以雖違而藏性隨違體無違染或真如無自由之德能隨緣而成辦金無自守之德隨二巧而成辦所以者何二述相隨周文二初略徵無拒富樓那彼大虗空日照則明雲屯則暗風搖則動霽澄則清氣凝則濁土積成霾水澄成映後廣列周隨箋云日喻強覺明喻大相雲屯喻覺昧風喻求心霽澄喻智氣凝喻煩惱土積喻業果水澄喻影敘彼不相發揮之義於意云何三徵審相因文二初審如是殊方諸有為相為因彼生為復空有後徵箋云方法也指此七種殊別外法言此四大之相為因根本無明生為復從真空體上生若彼所生四結自他無性箋云牒從日生法上從無明富樓那且日照時既是日明十方世界同為日色箋云攝能變日同所變明俱作赤色更無於日法上且四大相現時一時為四大相更無無明云何空中更見圓日箋云既同為日色如何更見空中有日頭現法上既俱為四大相云何離四大相外又有無明若是空明空應自照箋云此四大相若是真空體上有真空體上須常有四大相現攝所變同能變云何中宵雲霧之時不生光耀箋云有此性明然後便有四大相何故心勞覺昧之時性明又隱四大相又無或可若是空明不約四大唯約性明從真現若從真現真合嘗有性明如何七識起時性明相又隱當知是明非日非空五指相非一異文二初非箋云此四大相不依無明有不依真體生不異空日二不異箋云是無異也若異日則無無明時應有大相今有無明又無大相大相假無明變起又離真無妄無性明時亦無四大相觀相元妄無可指陳六結彼凌疑文三初指相元無妄箋云觀此四大之相元是虗妄不實無可指注陳說猶邀空花結為空果二立妄相喻箋云空花若有便許結果空花元無何能結果云何詰其相凌滅義三責凌疑觀性元真後喻俱現相容文三初立相容理箋云明四大性元是真如彼體是真彼相別妄唯妙覺明箋云理也妙覺明心箋云智也先非水火箋云言此四大性本無四大相如水性本無波相云何復問不相容者箋云便責云有相便說不合相容蓋此四大元無相也真妙覺明亦復如是次明真體隨生文三初標真無相箋云便將真合意謂真體無妄汝以空明則有空現次單發隨生箋云內心有昏鈍相外感頑空此皆約妄心變或可是七識執八見分為我內心昏暗外便帶得一分頑空現便厭空不稱本情即有四大從空中現地水火風各各發明則各各現箋云內心各各發起搖動風生執明金現等若俱發明則有俱現後俱發俱現箋云一念違如變起見相二分俱時現也或可八萬四千塵勞俱從一念違如變起一現現前云何俱現後立喻比俱文四初牒徵俱現箋云如天上日光與水中日影俱現見分相分也富樓那如一水中現於日影兩人同觀水中之日二立一影雙觀箋云日影喻四大相天上日是真兩人喻能所二法既有能所相仗便見有四大相東西各行則各有日隨二人去一東一西三明影逐人分箋云東西喻能所能所既有四大相相隨而有不相捨離先無准的四責妄窮同異箋云天上之日喻四大性水中日影又無箇憑准的實法上此四大相脫體是空不可准的不應難言此日是一云何各行各日既雙云何現一宛轉虗妄無可憑據箋云是二宛究又不是一轉究又非是雙虗妄之法無可憑仗據驗也富樓那汝以色空相傾相奪於如來藏後答色空俱遍疑文三初明性隨違順文二初明隨違相現文三初舉色空俱遍箋云執色勝傾却空執空勝傾却色如稱頭重則傾輕相傾則輕相奪則重乃是敵體執空奪却色名執色奪却空名意間向真體土說相傾奪而如來藏隨為色空周遍法界箋云然真空不拒萬有發揮則法身流轉於五道名曰衆生如金隨器現是故於中風動空澄日明雲暗次明四相隨周箋云四相略舉皆約妄心所變衆生迷悶後指違真相箋云迷則不悟悶則不入背覺合塵故發塵勞有世間相箋云離水逐波不知真隨妄現妄約真生我以妙明不滅不生合如來藏後顯順證神通文三初明順證文二初標順合箋云妙明不生滅無分別智合如來藏是理而如來藏唯妙覺明圓照法界後顯證圓箋云而如來藏是理唯妙覺明是智是故於中一為無量無量為一次述神通文六初一多融會箋云一數之少無量數之多一為無量了一無一相無量為一了多無多相小中現大大中現小二小大通包箋云小中現大小是芥子無小相大中現小大是彌盧無大相或於一毫蟻子分上皆有法性淨土乃是小中現大也不動道場三不動應周箋云法無去來無動轉相遍十方界箋云隨緣赴感靡不周身含十方無盡虗空四質舍空大箋云法身之中能容真空之理於一毛端現寶王剎五毛端現剎箋云於一毛端是小現寶王剎是大是諸佛法性淨土香剎乳海等如大海水但了一滴是鹹四大海水一時俱了坐微塵裏六轉法居微箋云了一塵空故轉大法輪箋云向一念上說八萬四千法門滅塵合覺故發真如妙覺明性後結順真而如來藏本妙圓心次明體離即非文二初非文二初述文三初生箋云梵云乾栗唐言心即真實心如樹之心蓋真心也非心次無箋云梵云質多唐言心即緣慮妄心也非空箋云昏鈍空也非地非水非風非火後有文三初世文四初大非眼非耳鼻舌身意二根非色非聲香味觸法三塵非眼識界如是乃至非意識界四識非明後出世文四初緣覺箋云緣覺之人起四十四智觀七十七智觀為明無明明無明盡如是乃至非老非死非老死盡二聲聞箋云性明即此教無明問無明者何答則諸教無明癡為體盡是滅如是乃至行識名色六入觸受愛取有生非老死盡非苦箋云世間果非集箋云世間因非滅箋云出世果非道箋云出世因非智三菩薩箋云菩薩無能證智非得箋云無所證理非檀那唐言施非尸羅唐言戒非毗梨耶唐言忍辱非羼提唐言精進非禪那唐言靜慮非般剌若箋云正云般羅慎若那唐言智慧非波羅蜜多箋云唐言到彼岸生死大河名為此岸菩提涅槃名為彼岸六度萬行稱之為乘以此波羅蜜多貫上六如是乃至四佛箋云其中五根五力七等覺支三十七道品十八佛不共法三十二相八十種好等非恆闥阿竭箋云唐言如來倣同先跡號非阿羅訶三耶三菩箋云即是阿耨多羅三藐三菩提唐言無上正等正覺理事遍知名等覺離妄照真名正覺或斷智圓明名無上覺簡異生智名正覺簡二乘分智名等覺簡菩薩缺智名正覺下一覺字貫上也非大涅槃箋云正云彼利匿嚩南唐言圓寂非常箋云不間斷名常非樂箋云離四相名樂非我箋云得自在名我非淨箋云斷二障種習名淨以是俱非後結箋云前四俱非世出世故箋云出世後四也即如來藏元明心妙後即文二初述文三初生即心即空次無即地即水即風即火後有文二初世文四初大即眼即耳鼻舌身意二根即色即聲香味觸法三塵即眼識界如是乃至即意識界四識即明無明明無明盡如是乃至即老即死即老死盡後出世文四初緣覺即苦即集即滅即道二聲聞即智即得即檀那即尸羅即毗梨耶即羼提即禪那即般剌若即波羅蜜多三菩薩如是乃至即怛闥阿竭即阿羅訶三耶三菩即大涅槃即常即樂即我即淨四佛以是即俱世出世故後結即如來藏妙明心元後顯性離言詮喻申勸責文三初綰除雙執文三初標體箋云即者就也指如來藏性如來是四智菩提種子藏即包含塵沙萬德妙乃微妙明則凝明心即真實心元是本元離即離非後雙離箋云離即離後即離非離前非是即非即後雙收箋云又恐一向著無所以雙收是即是前離即非即是前離非如何世間三有衆生及出世間聲聞緣覺以所知心測度如來無上菩提用世言語入佛知見次責妄度真源箋云世間是所依三有者欲有色有無色有也衆生能依有情用了別之測量卜度佛果位中有為無為之果譬如琴瑟箜篌琵琶雖有妙音若無妙指終不能發後顯喻同真申明勸責文四初立琴瑟懷音音隨妙指箋云琴瑟箜篌琵琶喻凡夫雖有妙音喻真性若無妙指喻智琴者或言神農氏削桐為琴繩絲為絃以通神明琴操曰伏羲作琴以除邪僻防淫心而返天真也瑟伏羲作二十五絃箜篌者風俗通云一名坎篌漢武祀太一后土令人調依琴作坎篌言坎坎應節侯氏作故名為箜篌又云後漢靈帝好胡眼作之琵琶者風俗通云琵琶近代樂家不知所作起長三尺五寸天地人與五行四絃象四時釋名文曰琵琶者本胡中馬上所鼓推手向前曰琵引却向後曰琶為名妙音乃立音宮商角徵羽喻一切衆生一靈真性此之真性雖本圓明若無妙智不能冥合一真如理汝與衆生亦復如是寶覺真心各各圓滿二述聖凡心體一槩圓明如我按指海印發光汝暫舉心塵勞先起三顯運用不同箋云為琴等故說按指即起智也海即性海印即寂滅法印或印秪是本真如理若是諸佛如來便乃起智合理又能從理起用故云發光然發光是即體之用此指前經云我以妙明不滅不生合如來藏而如來藏唯妙覺明圓照法界汝暫舉心塵勞先起是指證後妄生疑云如來今得妙空明覺山河大地有為習漏何當復生或可衆生迷悶背覺合塵故發塵勞有世間相由不勤求無上覺道愛念小乘得少為足四責墮求欣小箋云此皆因不求無上菩提覺道愛念小乘起自生空智證一分生空涅槃以此為足秪到化城將為寶所富樓那言我與如來寶覺圓明後現破新疑文二初乘前舊起文二初問文四初述性源平等箋云此之真性可貴可重喻寶理也真妙淨心箋云智也無二圓滿箋云乃一體無別也佛亦不增我亦不滅而我昔遭無始妄想久在輪回今得聖乘猶未究竟二陳劣證未圓箋云無始無初是一念違如今得聖乘是證第四果阿羅漢起一分生空智證一分生空涅槃未到佛果究竟之地究竟到頭義世尊諸妄一切圓滅獨妙真常三顯佛果全真箋云解脫道中棄捨四事煩惱已無餘習已盡向色究竟天成自受用身根根塵塵周遍法界作佛去圓滅是斷妄圓證真圓一切皆圓也獨得微妙真實圓常也敢問如來一切衆生何因有妄自蔽妙明受此淪溺四問妄因何起箋云此妄起有因疑是前真忽生妄疑殘與前疑別前真忽生妄如水忽然波生今問波因何而有蔽者蓋覆之義佛告富樓那汝雖除疑餘惑未盡吾以世間現前諸事今復問汝後答文三初標狂問答文二初問文三初責存餘惑許喻返微箋云真忽生妄證後妄生四大俱遍此三疑已除猶有妄起有因疑是前真忽生妄疑殘汝豈不聞室羅城中演若達多次述演若生狂觀頭自怖箋云演若達多亦云風狂女喻一切衆生忽於晨朝以鏡照面箋云喻無明創起之或可一念違如覺勞相現或晨朝喻性明初起之時照面喻強覺初有無明當情愛鏡中頭眉目可見箋云愛鏡中頭喻影像相分眉目可見喻妄心有可分別或可既有此無明相當情便愛此無明強覺之體有可作用嗔責己頭不見面目箋云喻真體上無分別相或可違真失湛却嫌此真性無照用違真似嗔以為魑魅無狀狂走箋云山石之精為魑魅土木之精為魍魎己頭不見疑是何鬼怪亦無有箇因由相狀而便狂走況妄無因或無照用故名魑惑我見心名魅於意云何此人何因無故狂走後問狂因理令審生因富樓那言是人心狂更無他故後答箋云唯說心狂更無因依是自狂也佛言妙覺明圓次正破因疑文三初顯妄無因文三初顯妄不名因文二初明妄必無因箋云真性也本圓明妙既稱為妄云何有因箋云牒前性此之真性本來圓遍凝明微妙汝既稱說是妄云何有因若有所因云何名妄後述因成不妄箋云若有所因緣即不名妄謂妄脫體是空自諸妄想展轉相因次敘轉成因理文二初縱立無明為展轉因箋云縱許有因便乃展來轉去互相為因如業識以無明為因轉識以業為因現識以轉為因從迷積迷以歷塵劫雖佛發明猶不能返後傷歷劫長迷值佛無能自悟箋云既展轉為因然後便從迷積迷經歷塵劫向迷去此人佛雖為他發明猶不能返何故為妄有根本既有根本則不能返真而長妄如是迷因後顯妄無生滅縱指迷因文二初縱立妄自為因箋云妄以妄為因也因迷而有箋云縱他道依根本無明而有迷是根本無明識迷無因後釋妄無生滅箋云識者了別義如今了別此根本無明尚自無因謂此無明脫體是空妄無所依箋云能依無明尚無所依妄法何所依止此則妄及無明俱無因也尚無有生欲何為滅箋云言此妄去尚無生起何有治斷得菩提者如窹時人說夢中事次悟觀迷境文三初說夢事箋云外人問既言無滅諸佛因何又斷妄證真豈非有妄可斷答云云意謂諸佛證真見虗妄法亦爾心縱精明欲何因緣取夢中物次取夢物箋云真心也夢中無物欲何所取妄體都無將何可滅謂佛證真不見有妄可滅況復無因本無所有後結無因體如彼城中演若達多豈有因緣自怖頭走後舉喻合理文二初牒喻文三初舉無因忽然狂歇頭非外得次彰悟非外證箋云一切衆生縱遇諸佛示他真性令其曉悟此性亦非從外而得縱未歇狂亦何遺失後顯現凡真在箋云縱然輪回三界此一分真性亦未曾失富樓那妄性如是因何為在二合妄無因箋云便牒責他言此妄脫體無實因在何處何處有因汝但不隨分別世間業果衆生三種相續後息妄歸真文二初勸息狂緣箋云世間所依業果所造衆生能依三種也三緣斷故三因不生箋云三緣殺盜淫三因貪嗔癡則汝心中演若達多狂性自歇歇則菩提勝淨明心本周法界不從人得箋云妄心無處即菩提何藉劬勞肯繄修證箋云既獲勝淨明心本周法界不從人得又何假藉向三祇劫內勸劬勞苦微細修證肯繄則微細義出南華真經第二內篇譬如有人於自衣中繫如意珠不自覺知窮露他方乞食馳走雖實貧窮珠不曾失後喻迷貧悟富文二初迷窮不失珠喻群生佛性人喻行者求心衣喻妄識覆真貧喻恆居下類乞喻人天求果走喻六趣循環忽有智者指示其珠所願從心致大饒富方悟神珠非從外得後顯妄知常悟則豁證圓明富則報身受用迷則曠劫一念成真妄苦纏縈法身常淨幸諸群哲依此教門息妄歸真長超二繫箋云致大饒富喻自受用身佛根根塵塵廓周沙界然後現身現土教化衆生影取法化二身此經不出此體大相大用大即時阿難在大衆中頂禮佛足起立白佛世尊現說殺盜淫業三緣斷故三因不生心中達多狂性自歇歇即菩提不從人得斯則因緣皎然明白後對現搜疑文二初牒現陳遑文三初牒息妄成因箋云此牒世尊勸息妄歸真文云汝但不隨分別世間業果衆生三種相續三緣斷故三因不生便疑道斷妄是證真之因可許云斯則因緣皎然明白云何如來頓棄因緣我從因緣心得開悟次敘憑因可悟又二初責弃因緣自陳開悟箋云便責云何如來頓弃因緣是第三破三科大性皆云本非因緣非自然性我因佛破三科性已無我執破七大性已無法執此便開通悟解法身世尊此義何獨我等年少有學聲聞令此會中大目揵連及舍利弗須菩提等從老梵志聞佛因緣發心開悟得成無漏後引諸無學悟並承因箋云梵語奢利弗呾囉奢利唐言春鶯亦云鶖鷺弗呾囉唐言子與沒特伽羅子唐言採菽氏為親友採厭俗塵未有所明即共目連於闍耶外道所修習焉共相謂曰斯非究竟之理未能盡其苦際各求明道先嘗甘露必同其味時馬勝比丘執持應器入城乞食舍利子見其威儀間雅而即間曰汝師是誰曰釋種太子厭世出家成於正覺是我師也舍利弗曰所說何法可得聞乎曰我受教方近未達深義舍利弗曰願說所聞馬勝乃隨宜為演諸法從緣生苦集二諦也諸法從緣滅滅諦也我佛大沙門常作如是說舍利弗聞已便證初果遂與其徒衆二百五十人俱詣佛所世尊遙見指告衆曰彼所來者我弟子中智慧第一佛告善來苾芻聞是語已戒品具足佛為長老梵志說教法咸皆悟道證阿羅漢果初見馬勝後目連來見舍利弗出家與目連重述前偈聞已還證初果與徒衆二百五十人俱來佛所佛指爾衆曰此我弟子中神通第一佛言善來苾芻淨修梵行得離苦際聞是語已鬚髮自落俗裳自變戒品清淨威儀調順經一七日纏結已盡證阿羅漢果梵語須菩提正云須補底唐言空生亦云善現福德經云舍衛城中有一長者一名拘留因無子故祀天求子空中有聲應言汝福德多無堪來者天王命終應生君家後便誕身其人初生宅舍皆空父母慳之以問相師相師云現空唯善表解空第一故曰空生後長大請父延佛設會即隨佛還祇桓精舍作沙門思念人物皆空獲阿羅漢果得無諍三昧也此迷梵志未見緣起今解梵志者即馬勝是也淨修梵行孤持志操為衆中長老號老梵志今說菩提不從因緣則王舍城拘舍梨等所說自然成第一義後責問邪計請決雙疑文二初責箋云今說菩提不從因緣指第三經乃因緣不有自然不生等之一字等取六師外道執自然為第一義鶴白烏玄等惟垂大悲開發迷悶筏請佛告阿難即如城中演若達多狂性因緣後再明往答文三初雙窮二執文二初略明雙計箋云理實不是因緣且許立他狂為因緣若得滅除則不狂性自然而出箋云亦且許為自然因緣自然理窮於是箋云是猶此也言此因緣自然道理窮究於此且縱許他計也間意欲向下文破之阿難演若達多頭本自然後廣破二疑文四初標首自然破因緣執文三初責首自然何因狂走箋云再舉前妄頭本自然此標計法上真是自然真本自其然箋云自是標體然是即持有自方有然此自然是本來自然無然非自箋云若無即持又無標體何因緣故怖頭狂走箋云既本是自然便不合狂走既也狂走自義不成此乃將因破自將狂拂然法上若是本自然真便不合成於妄既成於妄何名本真乎若自然頭因緣故狂何不自然因緣故失次雙立自因責無因失箋云意牒若是自然頭因緣便成狂何不自然頭到因緣時故失意謂若頭本是自然因緣便成狂此自然頭便合失却自然頭若失便許汝計為因緣自然頭既不失計為因緣義不成法上一切衆生本來是真因狂故成妄既也成妄須失本真今乃真又不失何曾成妄本頭不失狂怖妄出曾無變易何藉因緣後結破因執箋云本頭不失以不失自然頭無變易何藉因緣故狂此一科有三意前本頭不失顯破因緣第二狂怖妄出顯自然第三曾無變易何藉因緣是結破因緣本狂自然本有狂怖未狂之際狂何所潛二立狂為自破未潛理箋云本來有狂怖便破云祇如過去未狂之時此狂又潛藏須有箇居止處所現在正狂須一向成狂未來不合更有狂歇之時法上若此妄是本來妄祇如過去未妄之時此妄法須有潛藏處所現在正在妄時須一向成妄未來又不合斷妄證真為妄本有故不狂自然頭本無妄何為狂走三立不狂自然破生狂理箋云不狂為自然便合無妄一向自然因何又狂走既有狂走何曾不狂法上真是自然便合常真不合有妄何故衆生迷時又起妄然後流浪去若悟本頭識知狂走因緣自然俱為戲論四結破雙執箋云如小兒戲論之言都無詮表是故我言三緣斷故即菩提心菩提心生生滅心滅此但生滅次就體明然文三初乘修漸破文三初牒前息妄顯自由生箋云此牒前文云汝但不隨分別世間業果衆生三種相續三緣斷故三因不生即汝心中演若達多狂性自歇歇即菩提勝淨明心不從人得等佛便斷云有一分菩提心可生一分生滅心可滅一生對一滅俱是生滅滅生俱盡無功用道二迷悟兩消自真仍妄箋云滅是無前生滅可滅生是無前菩提心可生無功用道此約八地是無功用道證不生不滅真如喻如下水舟不假揮波動掉自然流入薩婆若海若有自然箋云此八地若有自然之心如是則明自然心生箋云此時又有八地自然心生生滅心滅箋云對著七地有相有功用一分生滅心可滅此亦生滅箋云亦者同也同前生減為八地無功用道是自然心生對著七地有功用是生滅心滅此亦是一生對一滅亦未為真自然無生滅者名為自然後離前雙跡方目真然箋云無生滅者是佛果寂滅之地亦無生也無八地無功用道自然可生亦無七地生滅心可滅此無生滅者方名真自然猶如世間諸相雜和成一體者名和合性次立喻明真箋云喻重結前文以三十輻共一轂此是諸相雜和名和合性是結前第一菩提心生生滅心滅此乃一生一滅和合為性非和合者稱本然性箋云是無前菩提心生生滅心滅和合或是前二種和合或祇是前一種既非前和合者稱本然性乃八地無功用自然或佛果真自然也本然非然後顯離名言雙袪妄執箋云本然是八地無功用自然或將本然為佛果自然非然是八地非然此非為真然和合非合箋云此八地無功用也又有一分自然心生望著七地有功用又有一分生滅心滅此亦是和合此和合非合非是佛果無和合性合然俱離箋云是離前菩提心生生滅心滅俱離此和合自然也此又結八地無功用位離合俱非箋云無七地生滅心可滅亦無八地無功用自然心可合或可也無七地有功用是和合八地無功用是離和合此句方名無戲論法箋云乃指此句方名無戲論法是佛果真自然之性非前戲論之法菩提涅槃尚在遙遠後責習多聞文五初責廣習迷詮箋云前云菩提心生生滅心滅此中因何云尚在遙遠為將有漏心求乃遠非汝歷劫辛勤修證箋云前執自然因緣皆是有漏修是能修證是所證非汝能修所證而得解也雖復憶持十方如來十二部經清淨妙理箋云憶謂記憶持謂任持十二部經契經應頌諷頌授記自說本事本生緣起譬喻方廣希法論議是能詮之教清淨妙理是所詮之理如恆河沙秪益戲論箋云河沙喻多便斷云秪益戲論未為非戲論汝雖談說因緣自然決定明了人間稱汝多聞第一以此積劫多聞熏習不能免離摩登伽難何須待我佛頂神呪摩登伽心淫火頓歇得阿那含於我法中成精進林愛河乾枯令汝解脫二責不能排難箋云汝又自稱我從因緣心得開悟道決定明了摩登伽唐言倡女宿為淫女過去是婆羅門蓮華實女名曰本性阿難彼時是帝勝伽旃陀羅兒名曰師子耳五百世曾為夫婦阿那含此云不來又云不還言一往色究竟天不還欲界精進林言精進如林稠密也愛河乾枯乃摩登伽令汝解脫是得免登伽之難或不歷僧祗獲法身是故阿難汝雖歷劫憶持如來祕密妙嚴不如一日修無漏業遠離世間憎愛二苦三責多聞功少如摩登伽宿為淫女由神呪力銷其愛欲法中今名性比丘尼與羅睺母耶輸陀羅同悟宿因知歷世因貪愛為苦一念熏修無漏善故或得出纏或𫎇授記四顯修力超騰箋云羅睺此云障礙亦云障月耶輸陀羅正云耶戍達羅此云持譽形㒵美麗遠近聞知生育羅睺天人詠讚故云持譽或得出纏性比丘尼三果也或蒙授記法華經第四持品云佛告耶輸陀羅汝於來世百千萬億諸佛法中修菩薩行為大法師漸具佛道於善國中當得作佛一號具足佛壽無量阿僧祇劫如何自欺尚留觀聽五責仍存安本箋云觀則我見如來三十二相尚以纏心聽法
