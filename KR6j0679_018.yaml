body:
  text: 天竺沙門般剌密帝譯烏長國沙門彌伽釋迦譯語菩薩戒弟子房融筆受西京大興福寺沙門惟慤科皇宋首楞大師可度箋阿難世間一切所修心人次色界文四初初禪文二初述文三初梵衆天箋云則所依器世能依修心之者不假禪那無有智慧箋云梵云禪那唐言靜慮即靜而慮即當定義即慮而靜即當慧義定慧等學明見佛性今也既無定慧故曰無有智慧但能執身不行淫欲箋云則離於欲染若行若坐想念俱無愛染不生無留欲界箋云想者取象念者冥記而令取象冥記一切俱亡是人應念身為梵侶如是一類名梵衆天箋云是人應前無想無念之念梵者淨也侶則明侶梵衆天者俱舍頌云色天瑜善那十六里也初四增半半梵衆八里梵輔十六里梵王二十四里少光天三十六里此上倍倍增唯無雲減三梵衆壽量半劫身長半由旬八里修下品三禪得生其中欲習既除離欲心現次梵輔天箋云言有一分離欲之心現前於諸律儀箋云乃修六事法厭上界為苦為粗為障欣上界為淨為妙為利愛樂隨順箋云得此六事法現前生其愛樂心下隨順愛樂則能愛樂之心是人應時能行梵德如是一類名梵輔天箋云德乃道德輔則佐輔此天壽量一劫身長一由旬修中品禪得生其中身心妙圓威儀不缺後大梵天箋云則不行染也清淨禁戒加以明悟箋云作六事觀行功加前梵輔天明悟則是增勝不是理之悟是人應時能統梵衆為大梵王如是一類名大梵天箋云初禪三天二禪三天三禪三天四禪九天二九十八則色界一十八天皆歸往此天也此大梵天壽量一劫半身長一由旬半修上品中品禪得生其中阿難此三勝流後結箋云指此三禪乃殊勝之流類一切苦惱所不能逼箋云為作六事觀行離下界苦故初禪離苦也雖非正修真三摩地清淨心中諸漏不動名為初禪箋云諸漏不動則無欲愛之心也阿難其次梵天次二禪文二初述文三初少光天箋云則向下諸天也統攝梵人箋云向下梵人皆梵王之統攝也圓滿梵行箋云圓淨行也澄心不動寂湛生光箋云則修六事法久而光明也如是一類名少光天箋云舊云光音天言此天新生天子見下界火災光明生怖發其音色㸦相告報故曰光音若言少光光明少欲光光相然照耀無盡次無量光天箋云或自身他身光或能依光與所依宮殿光也映十方界遍成琉璃箋云映彼色界十方如是一類名無量光天箋云言光明漸勝無有量故吸持圓光三光音天箋云吸為吸覽持為住持圓光則彼天之觀行成就教體箋云亦以光明為教體作此觀生吐天如前云此方真教體清淨在音聞教體則生解善發化清淨應用無盡如是一類名光音天箋云發化清淨者發起教化清淨也阿難此三勝流一切憂懸所不能逼後結箋云謂此二禪天離憂純喜更無下界憂愁懸念也雖非正修真三摩地清淨心中粗漏已伏名為二禪箋云粗漏已伏者下界欲已是伏也阿難如是天人圓光成音三三禪文二初述文三初少淨天箋云言圓滿光明成就教中昔聲之體披音露妙箋云披見教音便露此天妙行發成精行箋云言教成精純之行通寂滅樂箋云約自他定或通徹意地得樂其定故如是一類名少淨天箋云謂意識離憂而純樂受徹意地樂名之為淨於自他中此淨最少故名少淨淨空現前次無量淨天箋云即定也引發無際身心輕安箋云離下界憂苦故成寂滅樂如是一類名無量淨天箋云成寂滅樂徹意地樂也世界身心一切圓淨淨德成就三遍淨天箋云世界所依天界身心能依有情勝託現前歸寂滅樂箋云則此天觀行修六事法殊勝託皈寂滅樂也如是一類名遍淨天箋云周遍適悅故也阿難此三勝流具大隨順後結箋云無苦憂二境身心安隱得無量樂箋云言此天人純樂無喜雖非正得真三摩地安隱心中歡喜畢具名為三禪箋云佛乃斷道雖非正得真三摩地云云為有憂可捨則有喜生畢猶窮具猶盡也阿難次復天人不逼身心四四禪文二初述四流又二初述又四初福生天箋云無苦樂逼迫也苦因已盡箋云出欲界苦樂非常住箋云無三禪樂久必壞生苦樂二心箋云壞猶滅也言滅生苦樂二心俱時頓捨箋云頓捨苦樂粗重相滅箋云欲界煩惱滅淨福性生箋云謂修六事法厭下界為苦為粗等如是一類名福生天箋云福生天者此結約淨福生故苦諸教則無雲天言有極殊勝之雲無下界粗雲但有定果雲無業界雲也捨心圓融二福受天箋云捨苦樂二道之心圓德融明勝解清淨箋云威被天定也福無遮中箋云無遮遍益義言得福無邊也得妙隨順箋云得福隨順窮未來際箋云言受其福樂長故如是一類名福愛天箋云此經說有淨福可受故名福受若諸教則福生天言有勝福力故生彼天阿難從是天中三廣果天箋云則福生天中也有二歧路箋云路分曰歧若於先心箋云則前捨道之心無量淨光箋云言修彼天行轉深無其邊量福德圓明箋云轉益圓滿光明修證而住箋云修彼天定如是一類名廣果天箋云言此天於色界中果報最廣大故若於先心四無想天箋云則捨道之心雙厭苦樂精研捨心箋云亦捨道之心相續不斷圓窮捨道身心俱滅箋云得彼天定心慮灰凝經五百劫箋云心捨道之心慮念慮也是人既以生滅為因不能發明不生滅性箋云佛乃斷道此人用生滅心滅前苦樂有所得心得生彼天不得不生滅性初半劫滅後半劫生若准餘文則第二念一向無相臨終想起今言半生半滅若取理言之則壽雖五百總一生滅處中而論半則屬生半唯屬滅只見無心五百寧知五百元生生必滅隨故知分半更有多釋理不如初恐繁不述箋云疏中有三解若准餘文則第二念下者為無想在因中修無想定死後無想中有迎之生彼天時見彼天人或坐或立皆無言語尋作是念此是何處便憶曾修無想定今證此涅槃處作此第二念便無想者若報盡則有想便墜若據經須言初半劫生則第二念無想也便將滅字向下云劫滅是五百大劫滅念想之時也後半劫生者欲盡時也却生是欲墜時心念生也今言下者第二解約首楞理上此徒亦是半生半滅不了生滅也只見下第三解也為伏現行不生而種子有生也如是一類名無想天阿難此四勝流一切世間諸苦樂境所不能動後結箋云苦約下地此四禪離樂故雖非無為真不動地有所得心功用純熟名為四禪箋云雖非無為是真真不動地約此四禪天人離下界苦樂二心名真不動也或二句皆言真也阿難此中復有五不還天於下界中九品習氣俱時滅盡苦樂雙亡後明五淨文三初標箋云復重也言是此四禪天中重有五不還天言不還欲界也下無卜居箋云言向下欲界等天更無卜居故於捨心箋云捨道之心衆同分中箋云同分有三然有天同分人同分地獄同分此則天同分也安立居處箋云得阿那含人在彼中安立居止處所阿難苦樂兩滅鬪心不交次述文五初無煩天箋云則無苦樂二心相形如是一類名無煩天箋云無煩天已離四諦下煩惱兩滅機括獨行次無熱天箋云心機該括一時清淨故云獨行研交無地箋云無有研磨交互對治事故如是一類名無熱天箋云無熱已離四諦下煩惱熱故或無苦樂二法研究相交之所十方世界妙見圓澄更無塵象一切沈垢三善見天箋云妙見圓澄者則善見天之定也如是一類名善見天箋云善見者色身殊勝衆所樂見也精見現前四善現天箋云天之觀行陶鑄無礙箋云謂陶擇鎔鑄苦樂二法更無相礙如是一類名善現天箋云善現者色身殊勝善能現故諸教先說善現天後說善見天此經先說善見天究竟羣幾窮色性性入無邊際五色究竟天箋云幾者動之始又幾微也謂此究竟天是色窮微之處窮盡色法上性即彼天之性下性是入無邊之性此是那含之人悟生空涅槃之性言此性無有邊際如是一類名色究竟天箋云色究竟者彼天是有色位最極究竟之處阿難此不還天彼諸四禪四位天王獨有欽聞不能知見後結文三初明同居不親箋云佛乃斷道此五不還天人彼諸初禪二禪三禪四禪天王獨獨欽聞此那含居此天雖聞則不見如今世間曠野深山聖道場地皆阿羅漢所住持故世間粗人所不能見次比不能觀箋云說喻云曠野深山聖道場地如漢土南嶽天台等山阿難是十八天後結色界箋云十八天和前初禪三天二禪三天三禪三天四禪九天二九一十八獨行無交箋云更無苦樂二境相交也未盡形纍箋云故有身在纍亦形也自此已還名為色界箋云界中有色名曰色界復次阿難從是有頂後無色界文二初述文四初空處天文二初標異路箋云色界頂也色邊際中其間復有二種歧路箋云下是色邊際是空邊際若於捨心後釋升沈文二初明發慧起塵箋云即捨道之心發明智慧箋云發起明白生空智慧慧光圓通便出塵界箋云出三界也成阿羅漢入菩薩乘如是一類名為回心大阿羅漢箋云明阿羅漢人不居此天已出離也此則一歧路若在捨心後沈空迂昧箋云則捨道之心捨厭成就箋云捨厭之心成就覺身為礙銷礙入空如是一類名為空處箋云乃覺此身質礙銷滅質礙入空此方名無色界也諸礙既銷二識處天箋云牒前銷礙無礙無滅箋云無礙是識識則不滅其中唯留阿賴耶識箋云即八識也全於末那半分微細箋云乃留第八淨分染分已無如是一類名為識處箋云但有我無身也空色既亡三無所有處天箋云牒前文識心都滅箋云則滅前半分微細是滅第八識染分淨分即不滅十方寂然逈無攸往箋云成彼天觀行如是一類名無所有處箋云則無色界與識也識性不動四非非想處天箋云七八二識不動以滅窮研箋云滅第六識言推窮研究皆六識也或是雙捨喜樂於無盡中箋云細識無盡發宣盡性箋云滅八識染分淨分不滅如存不存箋云如存則存七八不存則不存第六若盡非盡箋云若盡盡第六非盡不盡七八如是一類名為非想非非想處箋云非想無下界粗想非非想不無上界細想此等窮空不盡空理後結文六初述四空超鈍箋云便斷云此等但窮盡質礙歸於頑空不盡真空之理指四空處人從不還天聖道窮者箋云又斷云是前色界四禪五不還天聖人道路將窮或聖道將窮者言究聖人道路之者一向窮生空涅槃不回心入大此則精簡故無劣如是一類名不回心鈍阿羅漢箋云定此是不回心入大阿羅漢則未出三界唯在不還若從無想諸外道天次明無想歸輪箋云言色界四禪無想天則外道所居窮空不歸箋云言窮頑空不歸真空迷漏無聞便入輪轉箋云乃斷道此是迷有漏天作無為解如無聞比丘便入輪回始終生滅阿難是諸天上三明天衆盡凡箋云廣果已下天各各天人則是凡夫業果酬答答盡入輪箋云料簡前諸天人皆是凡夫因中所修果中招感酬答於他報答將盡宛入輪回彼之天王即是菩薩遊三摩提漸次增進回向聖倫所修行路四述天王處聖箋云指此四禪已下諸天王向彼天中是遊履進趣修行之路故於彼天為王然十信菩薩作金輪王至十地菩薩作四天王阿難是四空天身心滅盡定性現前無業果色五彰無業色箋云定性現前現定果色身無業果色身從此逮終名無色界六結界通收箋云界中無色名無色界此皆不了妙覺明心箋云此中又結答阿難前來道佛體真實云何復有地獄修羅等事積妄發生妄有三界中間妄隨七趣沈溺箋云言積其虗妄發生此七趣也補特伽羅箋云唐言數取趣為數取人天等趣業故各從其類箋云言隨其善惡業所招或生天上或在諸趣復次阿難是三界中復有四種阿修羅類三返釋修羅文二初標箋云返釋修羅者理貫三塗後釋此修羅有四種卵唯想生胎因情有溼以合感化以離應四趣所攝故於此釋不順故言返也梵語阿修羅亦云阿素洛唐言非天言雖有天報而心多諂曲故云非天若於鬼道以護法力成通入空後釋文四初鬼箋云雖為鬼趣又有慈心護佛教法成其神通之道出入在於空中此阿修羅從卵而生鬼趣所攝箋云卵生則九分想一分情若於天中降德貶墜次人箋云言降下其德貶諍墜落此修羅中其所卜居鄰於日月箋云言其所居止與天王相近此阿修羅從胎而出人趣所攝箋云胎出則五分情一分想有修羅王執持世界力洞無畏能與梵王及天帝釋四天爭權箋云此則毗摩質多阿修羅王此阿修羅因變化有天趣所攝此變化生化應離有情想離也阿難別有一分下劣修羅生大海心沈水冗口旦遊虗空暮歸水宿此阿修羅因溼氣有畜生趣攝四畜前明鬼類勢合連諭何以天絡返談修類然餘形一趣依決而言此約四生理宜居後上承天道下接二途中貫人倫散明收統三界之沈舉論七趣之迷源因果義終宜垂結勸箋云冗散也水半散之㒵水散於口也溼生情想合也諸教言六趣此經約生起義故添仙為七阿難如是地獄餓鬼畜生四勸除迷習文八初統收群妄人及神仙箋云人者思覺義陰陽不測謂之神仙遷也遷向山中故天洎修羅箋云天以光潔為義精研七趣皆是昏沈諸有為相妄想受生妄想隨業於妙圓明無作本心皆如空花元無所有但一虗妄更無根緒箋云於妙圓明等者言向真體上看如空中花無實果無根元頭緒阿難此等衆生不識本心受此輪回經無量劫不得真淨皆由隨順殺盜淫故次指業迷迷真返此三種三斷起輪回箋云為聞說殺盜淫是業故便擬捨此三業又則出生無殺盜淫箋云不了首楞嚴性上無一法可捨無一法可取有名鬼倫無名天趣箋云若有此身三則為鬼若無此身三則為天天以神用自在為義也有無相傾起輪回性箋云若有身三則傾天趣向鬼趣若無身三則傾鬼向天如重傾輕此等相傾皆是輪回科云斷起輪回則斷三業生天起三業墮獄皆輪回也若得妙發三摩提者則妙常寂有無二無四勸隨源寂箋云有此身三生鬼無此身三生天此二於本覺理上皆無無二亦滅箋云能遣之心是無二亦滅尚無不殺不偷不淫云何更隨殺盜淫事箋云意謂不作無殺偷染之執云何更隨殺盜淫事阿難不斷三業各各有私五除迷勗斷箋云是有私招地獄因各各私衆私同分箋云言私招中亦有同分非無定處箋云言有定處也自妄發生生妄無因無可尋究汝勗修行欲得菩提要除三惑箋云前問云佛體真實云何復有地獄等此中又結答云自妄發生不盡三惑縱得神通皆是世間有為功用習氣不滅落於魔道雖欲除妄倍加虗僞如來說為可哀憐者六愍學存虗箋云雖欲除妄倍加虗僞者以生滅心除生滅法虗僞可知汝妄自造非菩提咎七指法自招作是說者名為正說若他說者即魔王說八顯標雙路回談玄旨理事搜源修學靈標卓然高刊雖修門逈闡三路遐開而止觀融真二魔難辨心靈萬變定境二差識暗隨邪一飄難止法王圓照了義懸開許胃三摩應褰昧網箋云作是說者言作如是無殺盜淫等說是正說若作有殺盜染他說即邪說也疏云向談玄旨則玄妙理旨也理事搜源理搜源則五密因事搜源則三修證修學靈標則修學者靈智之標表也卓然高刊卓然分明之㒵高然刊定也三路三修證也二魔則內魔攻起是心魔外魔附著則天魔即時如來將罷法座於師子床攬七寶機回紫金山再來憑倚普告大衆及阿難言三除魔保定文二初略除心境文二初許宣勑聽文二初略陳標勑文四初述已彰修範箋云第三除魔保定流通然謂魔不顯除學流虗倦是故世尊無問自說此一分經文何故世尊而自說顯下位諸菩薩皆不能知有五十種魔事況乎二乘及凡夫輩唯佛一人能知能說一陰之中各有十種魔事五陰共成五十初從貪巧怪鬼魔終至變易遮文魔已來是除魔保定流通之旨將當也罷散也汝等有學緣覺聲聞箋云言有學簡去無學今日回心趣大菩提無上妙覺箋云首楞嚴會上會三歸一誘二歸真吾今已說真修行法箋云前五密因三修證佛說已了真修行簡外道假修行汝猶未識修奢摩他毗婆舍那次陳未識諸魔箋云言五十重魔佛未說之修謂能修奢摩他等是所修也微細魔事魔境現前汝不能識箋云此五十重魔事最微細故洗心非正落於邪見箋云言洗其身心歸於魔道非正道也或汝陰魔或復天魔或著鬼神或遭魑魅箋云未出色陰有十般陰魔未出受陰有十般天魔未出想陰有十般天魔未出行陰有六十二異計心中不明認賊為子箋云認妄作真也又復於中得少為足如第四禪無聞比丘妄言證聖天報已畢衰相現前謗阿羅漢身遭後有墮阿鼻獄三說謬證招𠎝箋云據無聞比丘在生曾修得有漏四禪定現前妄言自證第四果尋後死相來迎便言我阿羅漢不受後有今既有中有則謗阿羅漢受後有又謗佛說阿羅漢不受後有亦虗由此發得地獄業此比丘承第四禪天果已熟且生廣果天天報盡尋入地獄若言天界生謗招下界業且上界不發下界業此是中有發業也汝今諦聽吾今為汝子細分別四勑聽明旨阿難起立并其會中同有學者歡喜頂禮伏聽慈誨後頂佇微詮佛告阿難及諸大衆汝等當知有漏世界後辨定驚魔文九初顯標圓體箋云世界是所依十二類生箋云是能依有情本覺妙明箋云本來真覺微妙圓明此是標覺圓心體箋云釋上句也與十方佛無二無別箋云自智與佛智無殊自心與佛心無別前文云我與如來寶覺真心無二圓滿既也如是何故又有衆生故下文云由汝妄想迷理為咎癡愛發生次指相迷生箋云癡則根本無明愛了情愛生發遍迷故有空性箋云既有根本無明有情愛發生周遍迷妄便有第七識起來執八見分為我帶得一分頑空當情化迷不息有世界生箋云既有頑空乃依空立世界則此十方微塵國土非無漏者箋云簡去無漏皆是迷頑妄想安立箋云皆是迷妄頑嚚虗妄想相目根本無明當知虗空生汝心內猶如片雲點太清裏況諸世界在虗空耶三舉喻雙彰箋云片雲喻頑空太清喻覺性如圓通頌云空生大覺中如海一漚發此生起義汝等一人發真歸元四顯歸銷妄箋云起始覺智合本覺理此十方空皆悉銷殞云何空中所有國土而不振裂箋云前文云漚滅空本無況復諸三有此治斷義汝輩修禪飾三摩地十方菩薩及諸無漏大阿羅漢心精通㳷五述證人同湛箋云飾修飾也意謂既能飾三摩地即與十方菩薩等身心精明通達泯滅妄心一般當處湛然箋云在定中也一切魔王及與鬼神諸凡夫天六彰魔鬼驚搖箋云欲界諸天見其宮殿無故崩裂箋云謂行人在定有功故大地振坼水陸飛騰無不驚懾箋云飛即騰也凡夫昏暗不覺遷訛七凡昏不覺箋云問凡夫還知否答凡夫昏暗不覺遷改更訛彼等咸得五種神通唯除漏盡箋云問諸魔等以何知見宮殿振裂云彼等咸得五種神通唯是未得漏盡通若得漏盡即名為佛戀此塵勞如何令汝摧裂其處八明戀處塵居箋云因塵生勞故曰塵勞言諸凡夫戀此不能摧裂魔王宮殿是故神鬼及諸天魔魍魎妖精於三昧時僉來惱汝然彼諸魔雖有大怒彼塵勞內汝妙覺中如風吹光如刀斷水了不相觸九僉儀惱定文三初喻風刀斷箋云僉咸也魔王以怒為力還能惱得行人否云彼魔在塵勞內汝等行人在妙覺中來惱於行人似風吹日月之光風喻魔力光喻行人心刀喻魔力水喻行人心汝如沸湯彼如堅冰暖氣漸鄰不日銷殞次喻氷潛銷箋云言不日之間銷殞徒恃神力但為其客成就破亂由汝心中五陰主人後相成壞由心又二初總標成壞箋云若成菩提亦汝心破亂菩提亦汝心或此諸魔於行人但成就得破亂也主人若迷客得其便後別陳迷悟文二初迷文二初顯迷輸便當處禪那覺悟無惑則彼魔事無奈汝何陰銷入明後表悟無留箋云入真明則彼群邪咸受幽氣箋云指魔鬼等是幽暗之氣分明能破暗近自銷殞如何敢留擾亂禪定箋云言魔王近其人自然銷亡殞滅若不明悟被陰所迷後悟文二初顯阿難遭溺箋云則被魔所擾則汝阿難必為魔子成就魔人如摩登伽殊為眇劣彼唯呪汝破佛律儀箋云則摩登伽壞汝律儀八萬行中秪毀一戒箋云犯魔觸戒心清淨故尚未淪溺箋云不犯根本罪此乃隳汝寶覺全身如宰臣家忽逢籍沒宛轉零落無可哀救後喻顯飄零箋云籍沒滅沒也阿難當知汝坐道場銷落諸念後廣辨群魔文五則色受想行識大意有二初明外魔惑墮彰異計歸邪前文二意初表心攻致現後明妄愛招魔就理分條義門隨異且依陰相初決長科色陰文三初總標文三初指趣定門文三初勸拂迷心箋云道則無上道場則寂滅之場念者冥記為性言在定更無諸妄念疏云初明外魔惑墮是料簡前三十重魔事皆是魔鬼故後彰異計歸邪是後二十重唯是異計因非因聲聞緣覺等前文二初表心攻致現者為內心攻起為心魔後明妄愛招魔者既有內心攻起必有外魔附著間諸教中說四魔天魔陰魔煩惱魔死魔何以此經說有五十重魔事答就理分條義門隨異言就其道理八其條件也問既理義異今五十重為當以五位配之則資糧加行見道修道無學為當以五塵配之答且依陰相諸教說五種不出此經二種魔一時攝盡其念若盡次指真明現箋云則諸念盡也則諸離念一切精明箋云一念離之時也動靜不移憶忘如一箋云動則諸念靜則離念憶則思憶忘則識泯當住此處入三摩提後引人定門結文可解箋云動靜不移憶忘如一當住此處入三摩提便起得下五十重魔經貫下去至五十徹如明目人次明陰相現存箋云是悟法界理或正在定中內心清淨如明目也處大幽暗箋云未出色陰也精性妙淨箋云已悟法界理心未發光此則名為色陰區宇箋云猶在色陰未發智光若目明朗十方洞開無復幽黯名色陰盡後盡超迷本文三初顯性光舒箋云明出色陰無有幽暗黯是人則能超越劫濁次暗銷起濁箋云若有色陰便有質礙時分遷流今色陰銷則超劫濁觀其所由堅固妄想以為其本後指陰迷源然玄網妙指義可探許而密境參邪非佛日無由顯照若不慧燈高炳覺路難尋十力洪悲應懸廣指箋云觀其所由是出色陰後返觀在色陰中也疏云十力者一處非處力二業力三定力四根力五欲力六性力七至處道力八宿命力九天眼力十漏盡力阿難當在此中次別釋文十初身能出礙境文四初研心離織箋云在定中也精研妙明箋云則加行智四大不織箋云不交織少選之間次礙時銷箋云少許選退之間身能出礙箋云透牆越壁也此名精明流溢前境三目暫相應箋云是觀心也或精絶明白用加行智流溢前境者將此觀心洞著所緣境流馳法也溢者內心潤澤如水流溢斯但功用暫得如是非為聖證不作聖心名善境界若作聖解即受群邪四顯分邪正阿難復以此心精研妙明其身內徹次拾出蟯𧏺境文四初研心內徹箋云前向境上流溢此向身上內徹乃內心明徹也是人忽然於其身內拾出蟯蛔身相宛然亦無傷毀二拾出身蟲箋云蟯𧏺身中小蟲也此名精明流溢形體斯但精行暫得如是非為聖證三目暫相應箋云精純凝明溢注形體向身上也不作聖心名善境界若作聖解即受群邪四顯分邪正又以此心內外精研三聞空說法境文四初研心互涉箋云前向境上向身上此中亦境亦身內則身外則境也其時魂魄意志精神箋云天氣曰魂地氣曰魄乃第六識心念曰意是第七識在心為志明正曰精陰陽不測曰神除執受身箋云即第八識餘皆涉入㸦為賓主箋云其餘魂魄箋云相涉用一為主其餘為賓忽於空中聞說法聲或聞十方同敷密義二顯聽空聲此名精魄遞相離合成就善種暫得如是非為聖證三目暫相應箋云遞相離合㸦為賓主不作聖心名善境界若作聖解即受群邪四顯分邪正又以此心澄露皎徹四心魂現剎境文五初澄心內皎箋云澄湛披露皎皓明徹內光發明箋云智光也十方遍作閻浮檀色一切種類化為如來次色變絶真于時忽見毗盧遮那踞天光臺十佛圍繞百億國土及與蓮華俱時出現三佛控蓮臺箋云毗盧遮那唐言遍寂未入定前或聞梵網經說我今盧舍那方坐蓮華臺百億千華上復現千釋迦納得此種子在心到入定時乃發起現行臺上有光曰天光臺此名心魂靈悟所染心光研明照諸世界暫得如是非為聖證四目暫相應箋云此名心中魂魄靈明悟解染此種子在心入定發起現行不作聖心名善境界若作聖解即受群邪五顯分邪正又以此心精研妙明觀察不住抑按降伏制止超越五空呈寶色境文四初研心抑按箋云抑勒按磨降伏制止其心超過越分於時忽然十方虗空成七寶色或百寶色同時遍滿不相留礙青黃赤白各各純現次寶色交呈箋云青中現黃黃中現青不相妨礙也各各精純顯現或純現是不相妨礙諸色各別也此名抑按功力踰分暫得如是非為聖證三目暫相應箋云踰越也不作聖心名善境界若作聖解即受群邪四顯分邪正又以此心研究澄徹精光不亂六暗中瞻象境文四初究心澄注箋云研窮尋究澄湛映徹精光智光也忽於夜合在暗室內見種種物不殊白晝而暗室物亦不除滅次見物如晨箋云夜合則夜半物不除滅併然在前分明此名心細密澄其見所視洞幽暫得如是非為聖證三日暫相應箋云內心微細祕密澄湛其見也洞幽者洞達其幽暗也不作聖心名善境界若作聖解即受群邪四顯分邪正又以此心圓入虗融七併塵無患境文四初心融純箋云圓遍悟入虗通融明理也四肢忽然同於草木火燒刀斫曾無所覺又則火光不能燒爇縱割其肉猶如削木次明刀火無傷此名塵併排四大性一向入純暫得如是非為聖證三目暫相應箋云併除排遣四大姓入純頑也不作聖心名善境界若作聖解即受群邪四顯分邪正又以此心成就清淨八清淨呈境文五初淨心功極箋云現也淨心功極箋云則加行智忽見大地十方山河皆成佛國具足七寶光明遍滿次變土莊嚴箋云未入定前聞說諸佛國土七寶莊嚴生其淨想納種在心入定發起現行又見恆沙諸佛如來遍滿空界樓殿華麗下見地獄上觀天宮得無障礙三垢淨遐觀箋云又聞所說天宮快樂地獄最苦又生厭離納種在心入定已來發起現行此名欣厭凝想日深想久化成非為聖證四目暫相應箋云欣天宮決樂厭地獄最苦凝結想心有此之故不作聖心名善境界若作聖解即受群邪五顯分邪正又以此心研究深遠九見聞通障境文四初研心究遠忽於中夜遙見遠方市井街巷親族眷屬或聞其語次隔外見聞箋云中夜三更也九夫曰市因市說井直曰街曲曰巷爾雅說文云大曰街小曰巷此名迫心逼極飛出故多隔見非為聖證三目暫相應箋云言行人在定逼迫其心逼迫窮極心乃飛出不作聖心名善境界若作聖解即受群邪四顯分邪正又以此心研究精極十無端說法境文五初研心用極箋云無端說法境是內心攻起雙途內心攻起外魔附著見善知識次望見師遷箋云知因識果識法知非曰善知識形體變移少選無端種種遷改箋云或為童男或為童女多般形狀此名邪心含受魑魅三目受群邪箋云心觸客邪也或遭天魔入其心腹無端說法通達妙義非為聖證四大魔借辨箋云天魔則欲界頂上諸天魔也不作聖心名善境界若作聖解即受群邪五顯教邪正向談玄境密用窮微既總敘雙途應垂結勸阿難如是十種禪那現境皆是色陰用心交互故現斯事後結勸文三初總明交現箋云言現境者在定中現如斯之境也色者質礙義陰者陰覆真體衆生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄次錯認沈傷箋云謂言登聖者未得謂得未證言證汝等當依如來滅後於末法中宣示斯義無令天魔得其方便保持覆護成無上道後勸流真勗向陳境且約趣申明處定生狂由須廣示
