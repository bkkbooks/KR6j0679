body:
  text: 天竺沙門般剌密帝譯烏長國沙門彌伽釋迦譯語菩薩戒弟子房融筆受西京大興福寺沙門惟慤科皇宋首楞大師可度箋阿難白佛言世尊如來雖說第二義門今觀世間解結之人若不知其所結之元我信是人終不能解三敘結解同體疑文二初申迷請指文五初牒前迷結箋云如來雖說第二義門是第四經決擇雙源指密因文中二決定義第二決斷煩惱文云阿難汝觀世間解結之人不見所結云何知解不聞虗空被汝隳裂阿難今躡前文向此中問意間佛前來是垂此結解同體疑阿難既見佛垂語今向此中便請世尊我及會中有學聲聞亦復如是從無始際與諸無明俱滅俱生二況瘧陳謙箋云諸無明即根本無明也若是諸教言是癡之一法此中祇是性明相即俱生煩惱蓋無始時來與身與心俱時生起雖得如是多聞善根名為出家猶隔日瘧箋云多聞善根住持諸佛如來無漏言教也名為出家愛相出家也如隔日瘧法上聲聞之人雖斷煩惱障未斷所知障如人患瘧一日而住一日而發惟垂大慈哀愍淪溺今日身心云何是結從何名解三請指結舒亦令未來苦難衆生得免輪回不落三有四利通來業作是語已普及大衆五體投地雨淚翹誠佇佛如來無上開示五度悲待旨爾時世尊憐愍阿難後廣釋除疑文二初長行文二初他方共演文二初明釋迦摩頂塵佛舒光文二初摩頂文四初哀問首及諸會中諸有學者二愍在會亦為未來一切衆生為出世因作將來眼三備未來箋云作將來眼若是遠指俱約此五密因三修證文若近指下根塵同源之文正是今時今一切衆生因行起智照理如眼照物無惑以閻浮檀紫金光手摩阿難頂四伸金手箋云摩頂表說此頂三昧之教即時十方普佛世界六種震動後舒光文三初普搖群剎箋云長阿含說六時動一入胎二出胎三出家四成道五轉法輪六入涅槃今約轉法輪方動六動者大般若經說動涌震擊吼𪹼搖動不安名動嶙巄凹凸為涌或六方為涌隱隱為聲曰震有所扣打為擊碎磕發聲曰吼出聲驚異曰𪹼此各三名十八相謂動等動極動乃至𪹼等𪹼極𪹼倐爾小動曰動諸處遍動名等動遍八傾動名極動准上總名六動十八變中一震動如此表說頂三昧教警一切大衆微塵如來住世界者各有寶光從其頂出其光同時於彼世界來祇陀林灌如來頂次衆佛舒光箋云微塵如來言佛之多住世界者各住本國也各有寶光從其頂出表離自他之見灌如來頂灌釋迦佛之頂表此頂三昧法文表佛佛道同生生體一惟佛與佛乃能知之是諸大衆得未曾有後此會獲益於是阿難及諸大衆俱聞十方微塵如來異口同音告阿難言善哉阿難汝欲識知俱生無明使汝輪轉生死結根惟汝六根更無他物後彰外演真音通聞此會文二初陳結本箋云聲別故異口語等故同音問十方佛告意在於何答表此圓融法門也俱生則俱生煩惱也無明性明也汝復欲知無上菩提令汝速證安樂解脫寂靜妙常亦汝六根更非他物後述真源箋云如唯議無學頌云此則無漏界不思議善常安樂解脫身大牟尼名法安樂寂滅之理解脫離煩惱所知二障寂靜妙常俱約法身也阿難雖聞如是法音心猶未明稽首白佛云何令我生死輪回安樂妙常同是六根更非他物後此佛重宣文二初迷再請佛告阿難根塵同源縛脫無二識性虗妄猶如空華後愍惑重宣文四初空華比識根境同源箋云根乃六根塵乃六塵同一真源即如來藏縛乃生死結縛脫乃真如解脫無二者真妄同體波水同溼識既並華相非可得阿難由塵發知二再喻交蘆雙明互發箋云由所緣相分引能緣見分因根有相箋云因能依根發所見相相見無性同於交蘆箋云所緣相與能緣見如交蘆相倚或因前塵發起識性是知根六根也相分與見分無其體性二俱無實如蘆二束相依而立皆虗是故汝今知見立知即無明本三標雙合一箋云知本來真知見本來真見若向此上立能知能見此即無明本也知見無見斯即涅槃無漏真淨云何是中更容他物箋云苟能知能見上不立見知即是涅槃此云圓寂肇師云夫涅槃之道寂寥虗曠不可以形名得微妙無相不可以有心知超群有而幽升量大虗而永久爾時世尊欲重宣此義而說偈言四敘演伽陀箋云結前長行為偈或為樂偈者結為五字或為後來者重說梵語偈陀亦云伽陀唐言重頌重頌前長行故真性有為空後重頌文二初棄疑雙拂文三初雙破有無箋云真如體性上一切有為之法皆悉空寂無有實故緣生故如幻箋云一切許法仗因託緣而生緣無自性當體即空故如幻化無有實體經云因緣所生法我說即是空無為無起滅箋云起猶生也無為之理本自無生今亦無滅不實如空華箋云有為之法不實如空中華本無所有言妄顯諸真次兩袪真妄箋云外人問妄法既不實如今因何又有一切妄法經家答云言妄顯諸真說箇妄但是顯真而說也妄真同二妄箋云又問如今捨妄趣真又如何答妄真同二妄若有一妄可捨一真可取真亦是妄故云二妄猶非真非真箋云猶尚也上非真是真是對妄之真而今尚自非亦無對妄之真下非真是對真之妄亦無對真之妄非真是妄也此句牒上同一妄句或下一非真亦非也云何見所見箋云尚無真妄之法云何更有能見所見中間無實性後勸證同源文三初牒一明雙顯如無二箋云中間指識此識無有真實脫體是妄是故若交蘆箋云根境互依是牒前來見相二分云相見無性同於交蘆結解同所因箋云生死亦汝六根解脫亦汝六根牒前文云根塵同源縛脫無二聖凡無二路箋云一切衆生亦如也衆賢聖亦如也汝觀交中性次迷悟同體重遣二邊箋云再勸觀妄識內是根外是塵識交在中空有二俱非箋云若言是空諸佛又轉識成智是識體不空若言是有識相又無故云二非迷晦即無明箋云迷妄晦昧即是無明一切衆生迷後無真覺之明其體昏暗即此便是無明發明便解脫箋云悟妄即真此牒釋同源也解結因次第後勸擇入流懸消一六箋云若解此結乃有次第隨解如人解結解一結了又解一結六解一亦亡箋云六根既解無明亦除一即無明已上二句生六解一亡疑根選擇圓通入流成正覺箋云此二句生下圓通分隨揀一根圓通入道如觀音以耳根入證陀那微細識後再指超門文三初標陳昔演箋云八之異名賴耶唐言藏識能含藏諸法種子故若單言賴耶即翻為藏識此藏識名寬通三藏義故若言阿賴耶者即翻為執藏此名即局於三藏中唯得執藏義今約寬者而說故云藏識從因至果有三位一者我愛執藏位即一切異生并七地已前并前三果人皆有緣此等有情第七識起其我見執第八故二者善惡業果即名異熟識前世造善惡為因今世感得無記第八是果因通善惡果唯無記果異於因名為異熟異熟識名通一切異生皆有若約顯處者至捨阿賴耶識名時即顯此約法執位中說佛位即無三者相續執持位即名阿陀那識此名亦通一切位若約顯處說佛果方顯以能執持根身種子不壞散故名阿陀那唐言執持三藏者能藏所藏執藏且能藏者即八識自證分現行能持一切舊種故名能藏如庫如藏能含藏外財帛等庫藏名能藏財帛名所藏法中一切本有種子從無始已來不散失故皆由第八自證分能含藏言所藏者以自證分是所熏處故名所藏即前七識所熏得諸法種子剎那便落在第八識自證分自證分中是他前七識新熏種子所歸趣所藏之處受他前七熏故自證分所藏即此二藏唯自證分言執藏者即第八見分即第六所執之處名執本來第八非執藏故今緣被第七妄執為我故名執藏習氣成暴流箋云習氣都有三義一種子名習氣氣則氣分習謂熏習由彼現行熏習得此氣分故種子名習氣二現行亦名習氣謂即由種子能生現行現行是種子家之習氣三習氣名習氣如裹香紙而有氣分此中二習氣唯約種子說深密經七字頌云阿陀那識甚微細一切種子成暴流我於凡愚不開演恐彼分別執為我言此習氣熾盛如溪頭急暴流水次第熾盛流注而下真非真恐迷我常不開演箋云若言第八識是真一切衆生又執妄為真若言是非真又將淨分一時撥同斷滅恐一切衆生迷妄去我乃尋常不開通演暢是四十五年前不說此第八識此一節孤起之文經意具簡第八識中真妄染淨向下欲說六解一亡疑恐他將真一時撥同斷滅故或且勸他斷妄歸真云非幻尚不生幻法云何立又說非幻成幻法約妄生時令他知真識妄或向下欲破識陰此中且先簡令他知真知妄此中破染分不破淨分也自心取自心次推迷顯頓文四初推妄生箋云自之真心今更起能覺之心緣彼自心則自心取自心也非幻成幻法二子妄體箋云非幻之真成幻之妄不取無非幻三指頓了箋云但不起能取之心亦無真名可得故云無非幻非幻真法法執亡也非幻尚不生幻法云何立四顯雙除箋云便牒真尚自不生是法將亡幻妄之法云何更立是名妙蓮華後目法彰超文四初喻彰三勝箋云既無真妄二法如蓮華出凡夫淤泥離聲聞濁水出菩薩清水斗頓馨香不染煩惱金剛王寶覺箋云金剛無破壞義王者自在義寶則可貴可重覺乃真覺之智如幻三摩提箋云一切諸法如幻便是三摩鉢提唐言等至法界大定彈指超無學次一念懸超箋云彈指立速義超猶到也無學舉其證位即佛果位也此阿毗達磨三妙慧堆詮箋云梵語阿毗達磨唐言對法攝大乘論云有四一對此法對向無住涅槃能說諦菩提分解脫門名對二數於一一法數宣說訓釋言詞自於共差別名數三伏申此是足論處所等能勝他論名伏四通由此能釋通素呾覽義名遷又梵語阿毗達磨唐言論藏阿之言無毗猶比也達磨唐言法是無比之法十方薄伽梵四十方同指箋云佛地論頌云自在熾盛與端嚴名稱言祥及尊貴具足如是諸六義應當總號薄伽梵薄伽者聲梵謂具德若有為薄伽聲者能破四魔必具六德一自在永不繫屬諸煩惱故二熾盛炎猛智火所燒鍊故三端嚴三十二相所莊嚴故四名稱佛之勝名無不知故五吉祥常起方便利有情故六尊貴天上天下咸尊重故若言世尊則少前五義此讚佛德一路涅槃門箋云一路更無二路路乃三乘聖人遊履之處涅槃乃寂滅之理門者出入義三世諸佛起智合理從此門入或三世諸佛從根本智起後得智達俗從此門出一切衆生造輪回總別報業從此門出向三界受生於是阿難及諸大衆聞佛如來無上慈誨四釋六解一亡疑文二初乘標請決文五初承詮悟益箋云由前來頌云六解一亦亡所以阿難便此中請云我今聞佛無遮大悲乃至洗滌沈垢既作如是請已於是世尊取劫波羅天所奉華巾於大衆前綰成一結乃至若欲除結當於結心表大乘之人萬法皆修於心無上慈誨者則前是名妙蓮華至一路涅槃門此則無上慈悲誨喻祇夜伽陀箋云梵語祇夜唐言諷頌此不牒長行孤然而起陀那微細識向下經是也梵語伽陀唐言重頌重頌前長行是前真性有為空向下文是也雜糅精瑩箋云相雜間糅而說或理或事精純而瑩淨妙理清徹箋云讚前所頌微妙道理清明廓徹心目開明歎未曾有箋云心是理目是智起智照理如眼照物分明阿難合掌頂禮白佛我今聞佛無遮大悲性淨妙常真實法句次歎法陳疑箋云無遮遍益義世尊有同體大悲是指前經云十方薄伽梵一路涅槃門等文或指前根塵同源縛脫無二文或指結解同所因聖凡無二路之文性則體性性淨為清淨微妙圓常是所詮理真實乃無虗妄法句指前頌文是等流教法即能詮文心猶未達六解一亡舒結倫次箋云然後請釋向下六解一亡疑舒為舒開即菩提涅槃結為結縛倫即倫流次為次第惟垂大慈再愍斯會及與將來施以法音洗滌沈垢後請宣除惑即時如來於師子座整涅槃僧斂僧伽梨攬七寶機引手於機取劫波羅天所奉華巾於大衆前綰成一結示阿難言此名何等後綰疊通疑文二初立結微研文三初結問酬名文六初盤中問目箋云於向整齊斂收攬按引展也師子表無畏也涅槃僧唐言內衣即今裙也僧伽梨即大衣又云雜碎衣以條數多故從用立名名入王宮聚落衣亦云和合衣有三品從九條增至二十五條佛說法入王宮降魔時俱著此衣也世尊前有七寶為機案劫波羅樹名樹上有縷取之為巾乃北方毗沙門太子名曰那吒所奉如來也阿難大衆俱白佛言此名為結二標答結名箋云法合一切衆生無明為能變六根為所變便先有眼根取色塵境名第一結於是如來綰疊華巾又成一結重問阿難此名何等三重結重問箋云綰攝疊其華巾問是甚物阿難大衆又白佛言此亦名結四重答箋云第二便有耳根緣著聲塵如是倫次綰疊華巾總成六結一一結成皆取手中所成之結持問阿難此名何等五問箋云如是倫流次第三結四五六等皆取執持問之阿難大衆亦復如是次第酬佛此名為結六合箋云一一隨結皆答云此名為結佛告阿難我初綰巾汝名為結此疊華巾先實一條第二第三云何汝曹復名為結次徵相不齊體文二初問箋云佛便責之我初綰巾汝名為結是牒第一問結此巾先實一條意為性本一真第二第三云何汝輩總名為結但知前結其餘五結亦然大乘人若解結時一根既返源六根齊解脫阿難白佛言世尊此寶疊華緝績成巾雖本一體如我思惟如來一綰得一綰名若百綰成終名百結何況此巾秪有六結終不至七亦不停五云何如來秪許初時第二第三不名為結後答箋云緝麻謂之緝績雖本一體者巾本一條阿難順同小乘執異不通佛告阿難此寶華巾汝知此巾元止一條我六綰時名有六結汝審觀察巾體是同因結有異後研消同異文四初勸審同生異箋云此巾可貴可重如寶汝知此巾元止一條法上性本一真我六綰時名有六結元於一精明分成六和合令他審巾體是同如性體是一因結有異因妄有六根於意云何初綰結成名為第一如是乃至第六結生吾今欲將第六結名成第一不二審試互成箋云佛將第六為第一結意謂大乘之人了六根無自性一根受用遍緣諸境得其互用不也世尊六結若存斯第六名終非第一縱我歷生盡其明辨如何令是六結亂名三答執異不通箋云盡其聰明智辨不可將第六為第一然小乘人執眼不同意佛言如是六結不同循𮨇本因一巾所造四比根同異箋云六結不同牒他執異不通令他審因起之處此六結皆因一箇手巾所作法上此六知根皆因一箇無明為能變六根為所變令其雜亂終不得成箋云牒他不能互用一根遍緣諸境則汝六根亦復如是畢竟同中生畢竟異箋云以法合之畢竟同中則性本一真生畢竟異則分成六妄佛且順他小乘人祇了我執未斷法執佛告阿難汝心嫌此六結不成願樂一成復云何得後比明修解文三初徵消一異文三初問去異留同箋云汝必定是嫌此六根要不成六願此六根返歸一體且遣異留一順他小乘人雖得我空未忘法執阿難言此結若存是非鋒起於中自生此結非彼彼結非此如來今日若總解除結若不生則無彼此尚不名一六云何成次答雙銷一六箋云才有一便有六如兩陳交鋒而起此結非彼執一不是六彼結非此執六不是一佛言六解一亡亦復如是後如來合理文二初乘銷略合箋云答當於理故云如是由汝無始心性狂亂知見妄發發妄不息勞見發塵後廣敘勞因文三初述二分生由箋云因汝無始無初已來妄心妄性顛狂作亂能知能見業轉為見分現識為相分發起妄識不能止息勞見是見分發塵是相分也如勞目睛則有狂華於湛精明無因亂起次比勞睛華現箋云於湛精明真也無因亂起妄也此則本無因依忽然而起一切世間山河大地生死涅槃皆即狂勞顛倒華相後顯比勞相箋云向第一義諦上觀俱盧不實所謂真如凡聖皆是夢言生死涅槃並為增語若對世俗諦觀便有生死涅槃或染或淨阿難言此勞同結云何解除次顯解迷源文六初引勞䛦解如來以手將所結巾偏掣其左問阿難言如是解不二掣疊徵舒文四初左掣問解箋云左逆義表外道於根上修行灰身臥棘不能解脫不也世尊二答左不成旋復以手偏牽右邊又問阿難如是解不三右牽徵舒箋云右順義表聲聞不依佛教但於境上修行厭境沈空亦非解脫不也世尊四答右不解佛告阿難吾今以手左右各牽竟不能解汝設方便云何解成三返問解方阿難白佛言世尊當於結心解即分散四述除心即散箋云大乘之人凡所見法皆是見心心若不生萬法何狀但了一心無實六結自亡華嚴云三界所有法一切唯心造佛告阿難如是如是若欲除結當於結心五將修比喻阿難我說佛法從因緣生非取世間和合粗相六勸隨根入證文三初述比談因邃箋云言佛法影取世間法從因緣生者是當除結心如來發明世出世法知其本因隨所緣出次彰鏡智窮微文二初總牒雙因箋云世出世法皆從心變伏心為緣變起此心約八識若是出世法從淨智上生是真因緣若是世間法從根本無明生是妄因緣如是乃至恆沙界外一滴之雨亦知頭數後單陳世法文三初述現相窮微箋云三界唯心心外無法或諸佛淨智悉能了知現前種種松直棘曲次了無情曲直箋云一切衆生內心招感故也鵠白烏玄皆了元由後知羽族相殊是故阿難隨汝心中選擇六根根結若除塵相自滅諸妄銷亡不真何待後勸擇圓根速證阿難吾今問汝此劫波羅巾六結現前同時解縈得同除不後指根修證文三初問六結同除箋云縈結也世尊意問但一根既返源六根齊解脫不也世尊是結本以次第綰生今日當須次第而解六結同體結不同時則結解時云何同除次答如因漸解箋云阿難答時執異不通佛言六根解除亦復如是後合明修證文二初顯根同喻比不同除箋云佛雖順他小乘人道六根解除亦復如是意但解一根其餘五根一時解脫此根初解後明漸證二空獲無生地箋云六根初解也先得人空箋云我法將亡空性圓明箋云結人空圓明成法解脫箋云證法空真理解脫法已箋云結法空俱空不生箋云亦無法空亦無人空人法俱空也是名菩薩從三摩地得無生忍箋云三摩地唐言等至無生亦無滅是二空真如理忍者即認之義是二空真如智此約全證二空真理位登極果疏中又更一義和會言若論無生法忍是七地菩薩得今此中言人法俱空登極果此約全證七地乃分證也或此約果談因人法二空是果無生忍是因或圓中漸說阿難及諸大衆蒙佛開示慧覺圓通得無疑惑一時合掌頂禮雙足而白佛言我等今日身心皎然快得無礙第二明修證分文三初明慧觀圓通修證分文二初總陳通悟文三初阿難請演文八初承詮蕩惑箋云從此後明修證是顯果體圓滿名出躔號大法身就此文科分三段初慧觀圓通修證分次二力加持修證分三萬行圓修證分且初慧觀圓通修證分謂二十五聖人各說圓通觀門觀音一人猶稱最上初憍陳尊者於音聲下悟明四諦終至大勢至菩薩說念佛三昧乃至觀音菩薩云初於聞中入流亡所所入既寂動靜二相了然不生如是漸增聞所聞盡盡聞不住覺所覺空空覺極圓乃至生滅既滅寂滅現前獲二殊勝一者上合十方諸佛本妙覺心二者下合六一切衆生同一悲如乃至三十二應十四無畏四不思議等事於是世尊大慈平等不生簡擇遂勑文殊菩薩於二十四聖人中簡是何聖者契此界衆生之機宜所以文殊菩薩承受聖旨從座起來對佛說偈云覺海性登圓圓澄覺元妙元明照生所所立照性亡乃至向下便簡云色想結成塵精了不能徹如何不明徹於是獲圓通乃至二十四大勢至菩薩云諸行是無常念性元生滅因染令殊感云何獲圓通既簡云二十四聖人不契此界衆生之機遂乃獨觀音一人圓通之理深契此方衆生經云我今白世尊佛出娑婆界一方真教體清淨在音聞欲取三摩提實以聞人離苦得解脫良哉觀世音上來敘慧觀圓通修證竟蒙佛開示慧覺圓通者前文云此根初解先得人空空性圓明成法解脫等或可是故汝今選擇六根至不真何待或前五密因皆是開通指示慧是一百法別境中慧之一法此目智覺之理圓滿通達也身皎然不執我心皎然不執法雖復悟知一六亡義然猶未達圓通本根二尚昧修根箋云雖復悟知解結因次第六解一亦亡然猶未達根選擇圓通成正覺世尊我輩飄零積劫孤露三傷久沈生箋云飄則人天善道零者落也即落在三塗積謂積委劫者時分無母謂之哀無父謂之孤父母俱無謂之露言二乘無法空智六度菩薩母方便以為父何心何慮預佛天倫四愧蓮華箋云預廁也言我是何妄心是何念慮廁佛世尊先弟後天然倫流次序如失乳兒忽遇慈母五喜逢慈育箋云言我聲聞之人根機狹劣大似小兒生下失於母乳不存性命今日得遇世尊開示道眼似彼嬰孩逢於母乳若復因此際會道成六會指如無箋云言我忽於佛一一相際會得成道果所得密言箋云則此根初解先得人空祕密之言也還同本悟箋云則起始覺智合本覺理本悟即是本也則與未聞無有差別箋云悟了還同未悟時惟垂大悲惠我祕嚴成就如來最後開示七請示祕門箋云此經是四十五年後說則最後開示也或三修證是最後開示作是語已五體投地退藏密機冀佛冥授八申儀冀授箋云冀猶望也藏為藏隱密為祕密機為心機是第六不與五同緣專注一心望佛世尊冥然教授爾時世尊普告衆中諸大菩薩及諸漏盡大阿羅漢汝等菩薩及阿羅漢二勑衆談因文二初告生我法中得成無學箋云法華云從佛口生從法化生吾今問汝最初發心悟十八界後問箋云最初發心悟入六根界六塵界六識界三六一十八界誰為圓通從何方便入三摩地箋云從何根得圓遍通達從何方法巧便之門入是能入三摩地則法界大定是所入憍陳那五比丘即從座起頂禮佛足而白佛言我在鹿苑及於雞園後聖從依述文二初衆聖申因文九初拂塵圓覺證文六初因聲悟諦文四初述因聲悟諦箋云五比丘五俱輪也梵語俱輪唐言親是佛之親陳那在五人數鹿苑者世尊因地會在鹿野苑中為鹿王教化群鹿雞園者佛滅度後一百餘年中即摩伽陀國號無憂王王之子因大五比丘起諍王入寺和淨因聖衆部現大神通王乃起信造伽藍名雞園此是新雞園佛在日是舊雞園觀見如來最初成道於佛音聲悟明四諦箋云然世尊十九逾城向雪山修行六年苦行五載修禪此五人在山伏事世尊十一年斷盡結使向菩提樹下順同小乘八相成道先住鹿苑執五人之恩為他說十二行法輪說了問此五人阿若多其時陳那云阿若多唐言解義解四諦理成阿羅漢諦者實義理如實理事如實事佛問比丘我初稱解如來印我名阿若多二印解彰名妙音密圓我於音聲得阿羅漢三尅證因聲箋云微妙音聲祕密圓滿也則不順聲塵起道諦智證滅諦理佛問圓通如我所證音聲為上四結標音戶優婆尼沙陀即從座起頂禮佛足而白佛言我亦觀佛最初成道觀不淨相二沙陀諦色文二初因觀色證箋云或佛教之修不淨觀或隨佛見佛作不淨觀不淨觀門者則五停心之一也一多貪衆生作不淨觀二多思覺衆生作數息觀三著我衆生作戒分別觀四愚癡衆生作緣起觀五多嗔衆生作慈悲觀且如不淨觀有四一顯色貪多緣赤白起作青瘀想二形色貪多緣長短起作壞爛想三妙觸貪多緣細滑起作蟲蛆想四供奉貪多緣歌舞起作死尸想又不淨有四一種子父母精血二住處生熟藏中三自體三十六物四畢竟歸尸陀林是觀不淨因作不淨觀也生大厭離悟諸色性以從不淨白骨微塵歸於虗空空色二無成無學道箋云生極厭離悟前塵色性以從不淨觀此身皮肉壞爛至白骨然後白骨散壞成微塵從微塵歸頑空頑空與質礙之色悉皆無故證真空理如來印我名尼沙陀塵色既盡妙色密圓我從色相得阿羅漢佛問圓通如我所證色因為上後印號標通箋云妙色是悟色性祕密圓通乃捨無常色獲得常色我從色相悟色相也香嚴童子即從座起頂禮佛足而白佛言我聞如來教我諦觀諸有為相三香嚴了嗅文六初敘承先教箋云因香悟道故號香光莊嚴言童子不犯欲塵童真之子諸有為相乃內心外身根身器世等我時辭佛宴晦清齊見諸比丘燒沈水香香氣寂然來入鼻中二宴晦聞香箋云安心不動為宴不逐前境名晦絶諸煩惱喧撓為清洗滌心慮名齊香沈於水曰沈水香我觀此氣非木非空非煙非火去無所著來無所從由是意銷發明無漏三入觀亡心箋云非木香且無相非空嗅且有香非煙無可熏蒙非火絶諸熱焰去無所著無滅相來無所從無生相由是意銷第六不與五同緣如來印我得香嚴號四如來印號塵氣倐滅妙香密圓我從香嚴得阿羅漢五述證登果箋云妙香密圓悟香性周遍法界佛問圓通如我所證香嚴為上六標顯通問箋云六塵之中此童子向香塵作觀藥王藥上二法王子并在會中五百梵天即從座起頂禮佛足而白佛言我無始劫為世良醫四藏眼通嘗文六初述凡中習藝箋云藏眼通嘗者如藥王藥上授記經云成佛名淨藏淨眼如來藥王者了諸藥味得大自在藥上者醫治衆生世稱第一法王子則紹隆佛日即應正覺良者善也醫者意也本草云蓋善以意量得病之節口中嘗此娑婆世界草木金石名數凡有十萬八千如是悉知苦酢鹹淡甘辛等味并諸和合俱生變異是冷是熱有毒無毒悉能遍知二明藥性通間箋云凡藥宜用一君二臣五佐或一君三臣九佐養命之藥多君養性之藥多臣療病之藥多佐和合者諸味雜和俱生者苗實一味變異者苗實不同承事如來了知味性三達味心開非空非有箋云非空賴耶之性不空非有賴耶之相不有非即身心箋云身心相不可得非離身心箋云身心外無有別性或非即身心不即妄識是真非離身心離妄外別又無真分別味因從是開悟箋云知衆味根元從此開通悟解蒙佛如來印我昆季藥王藥上二菩薩名四號連昆季今於會中為法王子因味覺明位登菩薩五位登菩薩箋云因此味塵覺察明了佛問圓通如我所證味因為上六顯味通門箋云此菩薩六塵之中向味塵作觀跋陀婆羅并其同伴十六開士即從座起頂禮佛足而白佛言我等先於威音王佛聞法出家五賢護浴塵文四初出家逢佛箋云跋陀婆羅唐言賢護慈恩云具大賢德護持佛法故云賢護思益經第十一云十六賢士一跋陀婆羅二寶積三星德四諦天五水天六善力七大意八殊勝意九增意十善發十一不見空十二不休息十三不少息十四導師十五法藏十六持地於浴僧時隨例入室忽悟水因既不洗塵亦不洗體中間安然得無所有宿習無忘乃至今時從佛出家今得無學二悟浴心開箋云無記之身不能分別由第六識心分別垢淨水是大性無情亦不能言我能洗塵既不洗塵又不洗體中間識心安然宿習無忘得宿住智通彼佛名我跋陀婆羅妙觸宣明成佛子住三印號彰超箋云觸性開宣圓明紹隆佛日是佛真子住佛座下佛問圓通如我所證觸因為上四結標因指箋云此六塵之中向觸塵作觀摩訶迦葉及紫金光比丘尼等即從座起頂禮佛足而白佛言我於往劫於此界中有佛出世名日月燈我得親近聞法修學六飲光觀法文四初昔佛修行箋云於此界中者是向此堪忍世界之中今此經言日月燈明佛彼付法藏傳云昔過去九十一劫毗婆尸佛入涅槃後四部弟子咸生悲戀收取舍利起七寶塔時彼塔中有佛形像佛面金色少處缺壞時有一貧女遊行乞食得一金珠見佛像將欲修補迦葉爾時作鍛金師女即持往請令修造是時金師聞福歡喜為治用補像面因共立願願我二人常為夫婦身真金色恆受快樂常修梵行至得見佛夫婦俱成聖果佛滅度後供養舍利然燈續明以紫光金塗佛形像自爾已來世世生生身常圓滿紫金光聚二果乘先福文二初自述承修箋云梵語設利羅亦云舍利唐言骸骨續明者相續照明也此紫金光比丘尼等即我眷屬同時發心後妻因共果我觀世間六塵變壞三觀塵入證箋云六塵是法塵影象念念生滅唯以空寂箋云謂生滅證不生滅修於滅盡箋云謂滅盡定滅六兼盡七滅七染分淨分不滅色身心乃能度百千劫猶如彈指箋云度猶越也言超越百千劫事如頃刻之間我以空法成阿羅漢箋云言了法塵空寂而證果也世尊說我頭陀為最四顯志標因箋云頭陀者亦云杜多唐言抖擻亦云淘汰如水淘汰塵土以手抖擻塵土其行有十二一衲衣二三衣三乞食四不作餘食法五一坐食六摶食七阿練若八冢間九樹下十露地十一隨坐十二長坐妙法闡明箋云謂悟法塵空了法性現前開通明了銷滅漏漏佛問圓通如我所證法因為上箋云六塵之中此向法塵作觀
