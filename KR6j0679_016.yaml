body:
  text: 天竺沙門般剌密帝譯烏長國沙門彌伽釋迦譯語菩薩戒弟子房融筆受西京大興福寺沙門惟慤科皇宋首楞大師可度箋阿難如是衆生一一類中亦各各具十二顛倒後約斷申階文二初從微制漸文二初乘總立文四初生含異文三初述箋云此十二類中但向一類上便能熏得十二種類謂第七經得十二類生生起之義後立三漸次約治斷義除其妄今然後向一念上具足六十聖位六十聖位不離一念十二顛倒者卵是動顛倒乃至非無想是殺顛倒也猶如揑目亂花發生次喻箋云清淨目是真如智揑目則強生覺照亂花則十二類生顛倒妙圓真淨明心具足如斯虗妄亂想後合箋云衆生迷時菩提為煩惱便成顛倒妙圓也為此妄全真如海上漚漚即是海汝今修證佛三摩提二立漸除因文二初迷於是本因元所亂想立三漸次方得除滅箋云於無明本因為能亂想十二類生為所亂想於此能所想須起三漸次除之如淨器中除去毒蜜以諸湯水并雜灰香洗滌其器後貯甘露後喻箋云淨器喻一切衆生真體本來清淨為向人天求少有漏善業如毒蜜貯於淨器然有漏善業雖為善矣其奈能壞無漏今除之云何名為三種漸次三徵漸名箋云漸為由漸次為次序一者修習除其助因四列漸號箋云貪嗔癡為因殺盜淫為果此因食其五辛乃助之轉生染著今除之是真修習或此五辛能助貪嗔癡為發淫之因二者真修刳其正性箋云刳開也二者真正修行開其正性則持佛淨戒謹潔無犯三者增進違其現業箋云三者增進無上菩提違背其現業現業是第六與五同緣今當違背之云何助因後釋漸方文三初勸斷五辛文三初徵箋云如前文云於是本因元所亂想立三漸次此徵云何助因阿難如是世界十二類生不能自全依四食住次釋文三初明助因文四初生依食住所謂段食二廣列食名箋云舊云摶食有可摶聚故香味觸三為體變壞為相香味觸三初入腹時未有變不能資益諸根四大而無食義若入腹銷化變壞已有資益義得名食段者是一分一段三塵為體向此體上有資益諸根義用攝食義歸段體上來持業釋於三界中但唯欲界四生之中悉皆具有問上界亦有觸塵何無段食答色香二種望於自根是離中知疏遠故不能現資益故非食體問香味等對自根及對他根若為名於食體答於變壞時先資益自根然後亦能資益諸根令發識明利能為食體問定果色中三塵得為食否答亦食義如飢饉劫中定果魚米故上界既有定果色中香味觸中應有段食否答雖有香味觸三而無入腹變壞資益諸根義故觸食箋云即心中觸數為體即觸境為於有漏觸觸對可意境時能生喜樂二受及順益捨受皆有資益義能為食事此通三界故觸者心中觸為體向此體上對前境資益諸根之義用攝食用歸觸體上來持業問喜樂二受能資益身心何不名食義答取境疏遠故由前可意觸先取根本境等生喜樂食故問取何識中觸而為食義答此觸雖與諸識相應前五識者食義偏勝觸粗顯境能生喜樂及順益捨受資益勝勝故七八二識相觸數取境微細不能生喜樂二受不為食體故思食箋云即遍行五內思之一法為體故以希望為相謂有漏與欲俱希望可愛境時有資益義能為食事亦通三界及三性思之一法是遍行中思是體向此體上有希望可意境便有資益之用為食如懸沙指梅根食用歸思體上來持業釋問是何識思答是意識思謂意識有分別可意境希望勝故問何不取無漏思為食體答無漏不能資益有漏故識食箋云即八識為體以執持為相謂有漏識由前三食勢力益故識食方能增長偏能執持諸根大種為資益義說名為食識之一字是第八識是體向此體上有連持資益之用為食食是用攝食用歸識體上來持業釋問何不取餘識答前六有間斷故第七不執受故若第八識有三義故真識食一者一類無記二常不間斷三遍通三界故論云由此是知異於轉議有異識一類常遍執持身命令不斷壞世尊於此作是說一切衆生皆依食住言喜樂二受取境疏遠者有順益方有喜樂故疏遠今但取順益未入腹未有資益義云何喚作食答從因呼果是故佛說一切衆生皆依食住三述常宣阿難一切衆生食甘故生四分甘毒箋云食甘如食稻梁等或如斷其五辛食毒故死箋云食毒如食蠱妄野葛等或如食其五辛是諸衆生求三摩提當斷世間五種辛菜次簡辛令斷箋云五種者革葱蘭葱慈葱大蒜興渠音義云興渠阿魏是又云菜也是五種辛熟食發淫生啖增恚後述餐生過文二初說法文三初明發生嗔欲如是世界食辛之人縱能宣說十二部經十方天仙嫌其臭穢咸皆遠離次天仙遠棄諸餓鬼等因彼食次䑛其唇吻常與鬼住福德日銷長無利益後與鬼同居箋云餓鬼則無飲食者造上品貪嗔癡上曰唇下曰吻長無利益者言不長有利益也是食辛人修三摩提菩薩天仙十方善神不來守護後修定文四初賢聖護大力魔王得其方便現作佛身來為說法二魔王惑說箋云他化自在天魔得其行人方法巧便非毀禁戒讚淫怒癡箋云言持戒比丘為小乘道菩薩之人有何持犯將諸邪法以為傳化命終自為魔王眷屬三死為邪衆箋云眷屬則魔民魔女受魔福盡墮無間獄四福墮獄又顯可知阿難修菩提者永斷五辛是則名為第一增進修行漸次後結勸如云何正性次勗除三業文三初徵阿難如是衆生入三摩地要先嚴持清淨戒律次述又六初勸除迷業箋云入是能入三摩鉢提是所入嚴潔不犯戒者防非惡義永斷淫心不餐酒肉以火淨食無啖生氣箋云律云刀淨相火淨種言以刀指破是淨其相火上薰過是淨其種又云凡持戒人不得生食阿難是修行人若不斷淫及與殺生出三界者無有是處二彰不斷殺生箋云若乃斷淫及與殺生出三界者斯有是處當觀淫欲猶如毒蛇如見怨賊三勸厭欲對治箋云永嘉云如捉花莖不悟毒蛇唯貪女色不知死苦毒蛇殺人一死一生女色繫人千生萬劫先持聲聞四棄八棄四勸雙持二律箋云四則殺盜染大妄語并前四與觸八覆隨成八也執身不動後行菩薩清淨律儀執心不起禁戒成就箋云執身不與境交執心隔壁才聞叉釧之聲分別是男是女即犯根本罪禁戒則大小二戒圓滿則諸世間永無相生相殺之業五永無輪業箋云相生父父子子此等即以貪欲為本相殺汝說缺我命我還汝債此等即以盜貪為本偷劫不行無相負纍箋云無殺故無負命無染故無業纍亦於世間不還宿債箋云不盜故不還債是清淨人修三摩地父母肉身不須天眼自然觀見十方世界覩佛聞法親奉聖旨得大神通遊十方界宿命清淨得無艱險六現證神通箋云遊十方界者得宿住智通也是則名為第二增進修行漸次後結云何現業後息緣族淨文三初徵阿難如是清淨持禁戒人次迷文二初息緣金淨文三初奉戒心澄箋云牒前刳正性之人心無貪淫於外六塵不多流逸箋云第六識心不與五同緣向六塵境上不馳流因不流逸次根無偶境箋云躡上文入流亡所也旋元自歸箋云旋還妄識歸真如本元塵既不緣根無所偶箋云偶對也言六根無境可對返流全一後心清承箋云逆流歸本全是一真之性六用不行箋云眼受用色塵境等合六根門頭更不作用是妄識不起轉識智也十方國土皎然清淨箋云六用不行是正報十方國土是依報依正二報身土交參內身外器悉皆清淨譬如琉璃內懸明月後現證無生文五初舉喻雙明箋云真如之體元明無瑕如琉璃內懸寶月則起始覺智本覺真理根本後得悉無相故身心快然二比塵安箋云身是法身心是堅實心快樂安然妙圓平等獲大安隱箋云言行人悟此微妙圓明真心平等無二是證法身真理一切如來密圓淨妙皆現其中三佛身含現箋云一切如來法身皆於行人心中顯現行人心如鏡諸佛身如像諸佛法身入我性我性還與如來合是人即獲無生法忍四尅證修階從是漸修五漸升修位漸位如文隨所發行箋云發得十信十住乃至十地等行安立聖位箋云安立六十聖位或隨所發行是起始覺智安立聖位是合本覺理通此三漸次便得無生忍然此經向一念法界理上安立六十聖位但向此漸次心便明無生法忍到七地方得無生忍此約漸論是則名為第三增進修行漸次後結阿難是善男子欲愛乾枯後圓設修階文六初開基顯理文二初明乾慧文三初言純慧簡盡餘心箋云牒前三漸次違其現業心不貪淫是識不起也根境不偶箋云偶期也言識既不起根何所期現前殘質不復續生箋云即此父母所生之身餘殘之質後念更不生起執心虗明純是智慧箋云此妄執亡自然虗通明白當體轉識成智慧性圓明瑩十方界乾有其慧名乾慧地次欲習將乾愛情亡竭欲習初乾後陳未接顯未通真箋云釋乾慧也未與如來法流水接箋云緣未入十信初心入流亡所故向下五十位者為此經唯向一念心上入聖安布五十位非離一念心不離法界體如畫空為五十畫也不得作時分前後而言故華嚴疏云故得十身歷然而相作六位不亂而更收廣大出入於無間塵毛包納而無外炳然齊現猶彼芥瓶具足同時方之海滴又云啓明東廟智滿不異於初心寄位南求因圓不逾於毛孔是經之意也如此即以此心後明十信文十初明信心表用乾慧中中流入上中即乾慧下中入中道真理心了一真離其中相無中相內了證圓中念念流入真如理故圓妙開敷悟如蓮啓從真妙圓箋云真本來真妙本來妙即法界理體也重發真妙智顯如深箋云重重顯發真精微妙無漏智也妙信常住箋云心自信心不起緣念住信心也一切妄想滅盡無餘箋云妄盡也中道純真箋云明中道之理絶二邊故名信心住箋云依信而住名信心住真信明了二念心箋云躡前信心一切圓通箋云得圓遍通達之理陰處界三箋云明根塵識三不能為礙箋云了蘊處界等空如是乃至過去未來無數却中捨身受身一切習氣皆現在前箋云既得圓通之性現前了知無始慣習氣分顯現分明是善男子皆能憶念得無遺忘名念心住箋云念者冥記為性依念而住名念心住妙圓純真三精進心箋云真體現前真精發化箋云從體起智無始習氣通一精明箋云了習氣無實智性通達唯以精明進趣真淨名精進心箋云無名無分別心是理進趣真淨是功用然此心進趣無上菩提心精現前四慧心箋云躡前實相體也純以智慧名慧心住箋云無漏智也依慧而住名慧心住執持智明五定心箋云確觀真智周遍寂湛箋云一如理體寂妙常凝名定心住箋云定性現前名定心住定光發明六不退箋云寂而常用明性深入箋云其智轉深唯進無退名不退心箋云進趣無上菩提更無退轉心進安然七護法心箋云進趣無上菩提之心安然不動保持不失箋云常守其照不令散失十方如來氣分交接名護法心因通果體箋云前佛後佛理智無別覺明保持八回向心守照真位能以妙力不動照心回佛慈光密引源性向佛安住恆就本如猶如雙鏡光明相對本始通照其中妙影重重相入本體之妙理現始心始覺照真智通真體體中含智智住真源理現始心理生於始始生之理返顯本真本真之智智含生理理為本返顯於本智為始回現始心名回向心箋云回心趣向無上菩提回功就理心光密回九戒心箋云真照之性獲佛常凝箋云始覺智引起本覺理無上妙淨箋云始覺智安住無漏箋云本覺理得無遺失箋云既獲此理乃無遺忘散失名戒心住箋云向此理體上有防非止惡之義約性戒住戒自在十願心性戒自然能遊十方法界無礙所去隨願表遂其心箋云為諸有情若聞此十信不悟全性世尊更宜說下十住經文已上十信皆頓入法界如疏云俯十地於初心促三祇於一念名願心住阿難是善男子以真方便發此十心二鎔鍊求其文十初發心住箋云牒前十信是真方法巧便經云發心畢竟二不別是故稽首先心難乃十信心也鎔鍊求真者言此十住如將金礦向爐冶之中鎔鍊礦盡金現喻此十住妄盡真現心精發輝十用涉入箋云心精則理發輝則慧下引十住但一住具足一切住圓成一心名發心住箋云發十住初心心中發明如淨琉璃二治地住顯融圓淨內現精金轉證精明以前妙心履以成地履前圓淨之心總為觀照之地名治地住箋云平治心地曰治地住心地涉知三修行住箋云心則前妙心是智地則實際理地是理言涉知則理智冥合無二無別也俱得明了箋云皆得圓明顯了遊履十方得無留礙箋云理智既一十方世界悉皆一如故無繫礙名修行住箋云修是能修行是所行住於能住所行之處曰修行住行與佛同受佛氣分四生貴住箋云言行人所行之行與佛齊等行人乃因諸佛乃果因果同體也如中陰身自求父母箋云二有之中名曰中蘊則此身已謝未受他質在生死二有中間伺候父母緣會入識趣生陰信冥通默會玄旨入如來種體智相應名生貴住箋云生尊貴家為人子喻行人趣道之心要假理智冥合然後方入諸佛法身氣分生如來家為佛種子既遊道胎五方便具足住表契真體親奉覺胤佛子義生如胎已成記本功立人相不缺名方便具足住分證如圓箋云分證言此六十二位是漸證有分劑雖漸亦不離圓故曰如圓容貌如佛六正心住寂靜相同心相亦同理齊於一名正心住箋云彼此法身㸦相齊等身心合成七不退住箋云言身合成容貌如佛心合成心相體同日益增長任運進修名不退住箋云為學日益更不退轉名不退住十身靈相一時具足名童真住八童真住箋云十身有二一如前又勝天王般若云平等清淨無盡善修法性離尋伺不思議寂靜虗空妙智約十地說形成出胎親為佛子名法王子住九法王子住形成出胎顯其用自在親為佛子紹繼義表以成人十灌頂住堪行佛事如國大王以諸國事分委太子彼剎利王世子長成陳列灌頂名灌頂住況委任也且如剎利王子將紹王時正殿端居先陳灌頂取白牛角盛諸種子以大名象取四海水先敷吉祥草次置牛角然以海水溉灌角中潤種流身朝臣拜賀且菩薩為法王子況亦如然十方如來以悲智行願四大海水激發行人清淨本覺一切種智一時發生吉祥草者表淨行也朝臣賀拜則人天二乘莫不欽歎然行人功立理宜順佛慈悲所證所談亦合標其妙行箋云剎剎唐言田主則西土上姓是國王種向者衆色之上表國太子為人之尊百穀種表王為百穀之主以大名象表王有大力量四海水表四海來朝灌頂表王最為高上灌頂乃法天行令能潤生一切言世子者一世之子也阿難是善男子成佛子已三妙行圓資文十初歡喜行舉位將成具足無量如來妙德顯德成就箋云塵沙妙德悉皆圓滿十方隨順佛許化緣名歡喜行箋云所往十方世界隨順化一切衆生問夫行門不一何以立歡喜為初行答然創開迷衆理宜善逗人機欲誘歸真且合先行歡喜喜生則恭敬也善能利益一切衆生名饒益行二饒益行善能利益者夫開人化物必宜善行前心就習利益無施不可則菩薩四攝該括異生隨其所須故曰善能饒益箋云四攝者布施愛語利行同事自覺覺他得無違拒名無嗔恨行三無嗔恨行箋云自覺則根本覺他則後得智無嗔行者自既不嗔令他亦無嫌恨種類出生四無盡行述生因果窮未來際比現知來三世平等驗因知果十方通達舉一類餘名無盡行問何以言無盡行答然衆生無盡一一心差菩薩利人隨心豈盡故云無盡行一切合同種種法門得無差誤五離癡亂行則為善不同同歸干理名離癡亂行箋云癡則執異不通既了種種法門皆一理故即無癡亂也則於同中六善現行箋云是理顯現群異箋云是事一一異相各各現同名善現行箋云從現起行攝行歸本與華嚴經同中現異意別如是乃至十方虗空滿足微塵一一塵中現十方界七無著行小中現大箋云小無小相大無大相現塵現界不相留礙名無著行箋云此則證理大小宛然則事事無礙法界也種種現前八尊重行行門差別咸是第一波羅密多名尊重行智慧為宗同一佛心名尊重行如是圓融能成十方諸佛軌則名善法行九善法行般若妙用善應佛心建立施為皆成聖軌一一皆是清淨無漏一真無為性本然故名真實行十真實行一真圓慧妙用凝然行合真源名真實行向來十行大理通三初三對物順行次三開權恣妙後三彰其體用唯七顯證神通行門雖已克充理合回功就體箋云向來下重料簡也初三對物順行一歡喜行二饒益行三無嗔恨行次三開權恣妙四無盡行五離癡亂行六善現行後三彰其體用八尊重行九善法行卜真實行唯七無著行是神通阿難是善男子滿足神通四回功就體文十初離衆生相結前通行成佛事已舉度生功純潔精真自居真理遠諸留患不立自他當度衆生滅除度相拂子能所箋云為終日度生不見生之可度如金剛三昧經云欲化於生無生於化不化於化其化大焉回無為心回無作心箋云有作之功功歸無常無作之功功不虗棄向涅槃路亡功證理名救護一切衆生離衆生相回向壞其可壞二壞其可壞箋云壞是能壞智可壞是所壞煩惱遠離諸離名不壞回向箋云遠離則能遠離是智諸離是所離諸煩惱本覺湛然三本覺湛然箋云即本覺理覺齊佛覺名等一切佛回向箋云覺即性也言衆生性與佛性無別表因與果同精真發明四精真發明箋云是智地如佛地箋云是理則行人證理名至一切處回向箋云至是周遍義言周遍一切處不見一切處世界如來五世界如來㸦相涉入箋云世界是依報如來是正報㸦相涉入無礙體通箋云依正二報身土交參得無礙顯齊虗妙名無盡功德藏回向一珠含衆鏡衆鏡德無邊衆鏡各現珠現珠功無盡無量通無量不離一中含一體示無邊故云無盡功德藏且一心含法界塵沙諸佛一心中一一諸佛體無邊一心遍入塵沙土諸佛分我無邊體我還遍裹諸佛身自他交遍德無邊故云無盡功德藏於同佛地六於同佛地顯前同體地中各各生清淨因則性遍諸佛佛佛為因依因發揮顯平等理箋云揮猶用也依理為因然後發其智用取涅槃道證平等體箋云則寂滅之理也名隨順平等善根回向箋云理與智隨順平等無二無別真根既成七真根既成箋云真實善根已成就也十方衆生皆我本性性圓成就箋云衆生性與佛性圓滿無二不失衆生箋云乃不捨衆生界即凡心見佛心名隨順等觀一切衆生回向箋云即生佛一如平等而觀世前文云我與如來寶覺真心無二圓滿即一切法八即一切法總舉法界箋云無可捨離一切相顯性元如箋云亦無可取唯即與離二無所著性相歸一名真如相回向真得所如九真得所如箋云真實而得所如理也十方無礙一體虗融名無縛解脫回向性得圓成十性得圓成已彰前理箋云是體性性功德已圓成也法界量滅相形迹亡箋云不作法界量之見解名法界無量回向箋云已上是資糧位如相宗唯識論云乃至未起識求住唯識性於二取隨眠猶未能伏或阿難是善男子盡是清淨五消雙泯一文二初標箋云不同相宗有分限劫數伏斷令此唯是一念上安布皆離相故故言清淨清淨即無垢染也四十一心箋云前乾慧并十信十住十行十回向次成四種妙圓加行箋云妙圓亦是擇法謂非相宗未妙未圓在垢染分限故今言妙圓妙者體離能所圓者遍周法性然四加行位菩薩出觀來便認心頭凝然之空為所證之理故化佛說偈呵云現前立少物謂是唯識性以有所得故非實住唯識即以佛覺用為己心後釋文四初暖地覽前如體箋云即以佛覺是本覺理用為己以始覺智若出未出箋云若出已消能覺智未出未亡所覺理猶如鑽火舉喻況求箋云鑽喻加功火喻真性欲然其木名為暖地箋云木喻能覺智用暖地者從喻彰名如人近火之相名之為暖無漏智如火能燒惑薪此位見道火之前相曰暖又以己心二頂地箋云始覺智成佛所履箋云本覺理若依非依箋云若依猶存所覺理非依似存所覺相如登高山身入虗空下有微礙箋云如身登山四面總空猶有空相當情故有微礙如唯識論云現前立少物云云又寶性論云空亂意菩薩猶有三疑一疑空異色取色外空二疑空滅色取斷滅空三疑空是物取有為空今是第三空色覺了之心則智也名為頂地箋云頂者如人之頂是至極處此位菩薩與思我法名頭皆空到極處名頂心佛二同三忍地合二為一善得中道合二存中如忍事人況消於二箋云含忍在心不言好惡非懷非出妙泯雙蹤名為忍地箋云忍者即認為義前能空順後所空又忍者印可頂印可加行智并能取心所取境悉是空數量銷滅四世第一地一亦將除箋云一數亦亡迷覺中道二無所目真妄不立箋云迷中道亦無名目覺中道亦無名目名世第一地箋云但世間菩薩至此位中於諸世間最第一故論云異生位中此最勝故阿難是善男子於大菩提六離迹融階文二初文十三初歡喜地箋云即無上菩提善得通達箋云善得開通達會覺通如來盡佛境界箋云覺乃起始覺智通如來盡佛境界乃本覺理名歡喜地箋云論云歡喜地初獲勝性具證二空能益自他生大歡喜又云斷異生性障證位行真如異性入同二離垢地箋云異性是斷異生性執入同是入真如理海同性亦滅箋云亦忘真如之相名離垢地箋云若有同有異則是垢今離同異是離垢地仁王云遠離於染汗等種種垢具戒德清淨名為離垢地此菩薩離誤犯三業破戒故言三業者於能詮教法分粗道文字是口業分別是男是女是意業行道路誤傷毫羊蟻子是身業論中斷除邪行障證最勝真如淨極明生三發光地箋云淨極則清淨之理窮極明生則智發名發光地箋云謂發生如來三慧光故論云成就勝定大法總持能發無邊妙慧光故論中斷暗鈍障證勝流真如明極覺滿四𦦨慧地箋云智起圓滿也名𦦨慧地箋云𦦨謂火焰慧斷煩惱如𦦨燒薪論云安住最勝菩提分法燒煩惱二見柴薪慧𦦨增故論中斷微細煩惱現行障證無攝真如一切同異五難勝地箋云同即真諦異即俗諦所不能至箋云此地菩薩已無真俗二諦名難勝地箋云然真俗二起前地不如論云真俗二智行相互違合令相應極難勝故論中斷下乘般涅槃障證無染淨真如無為真如六現前地箋云是理性淨明露名現前地箋云達得此性清淨分明披露顯現在前又最勝智慧現在前故論云任緣起智作十二因緣觀引無分別智三空智最勝般若令現前故論中斷粗相現行障證無染淨真如盡真如際七遠行地箋云言此地菩薩窮盡真如理際名遠行地箋云如人行路已遠欲到其家然此菩薩取無上覺道將近蓋多劫修行過凡夫二乘道故論中斷細相現行障證無差別真如一真如心八不動地箋云是理名不動地箋云以無漏煩惱不能動故論云無分別智任運相續煩惱不能動故無分別智者生空法空俱空三智皆有根本後得而常起不由加行故云任運此地已得無相故有相不能動已得無功用故有功用不能動以常無漏故煩惱不能動論中斷無相中作加行障證不增減真如發真如用九善慧地箋云真如是理從理起用是智名善慧地箋云得三慧故聞思修也謂此菩薩得四無礙解能遍十方善得法故論中斷利他門不欲勤行障證智自在真如阿難是諸菩薩十法雲地箋云牒前諸地菩薩從此已往箋云則從下往上修習畢功箋云言前地地皆斷障證理修行學習已是畢功功德圓滿箋云塵沙萬德皆悉圓備亦目此地名修習位箋云則修行學習俱目前諸地名修習也慈陰妙雲覆涅槃海名法雲地箋云說法如雲名法雲法是智雲是喻法喻雙舉論云大法智雲含衆德水蔽塞如雲粗重充滿法界論中斷於諸法未得自在障證自在所依之真如也如來逆流十一等覺地箋云諸佛證理後起後得智却來度生名逆流如是菩薩順行而至箋云是統前十地菩薩順理而行覺際入交名為等覺箋云如來逆流菩薩順流是入交也出入齊等名等覺若相宗功行與佛齊等名等覺阿難從乾慧心至等覺已是覺始獲金剛心中初乾慧地十二乾慧地言從乾慧至等覺舉前資位始獲初乾慧地束前修位證此金乾此乾與地前名同義異一則潤生將竭二乃未證妙覺法流箋云從乾慧心是地前心金剛心中初乾慧地是金剛心舉前資位有二解一舉三漸次二唯取資糧位始獲初乾地前也束前修位二解一唯取初地至等覺為修位二通十信至等覺也問此二乾慧有何差別答一則潤生將竭地前乾慧也已除煩惱不更潤生二乃未證妙覺法流是此金乾未入如來妙莊嚴海始獲初乾是地前乾慧始起乾慧乾枯煩惱束前修位證此金乾是初地二地已來皆證此等覺後金剛乾慧此乾慧與地前名同皆云乾慧義異前唯約乾枯煩惱未與如來法流水接乾有其慧名為乾慧後乾慧前念起乾慧後念便入妙覺作佛去一則潤生將竭下牒前乾慧地已無煩惱二乃未證妙覺法流牒後乾慧地前念雖起乾慧未便入如來法流水後念方入如是重重單復十二方盡妙覺成無上道十三妙覺地明妙覺地者以乾慧心觀前及用一一同具金剛當地之位不失名單十二具有金剛名復方盡妙覺對立將融成無上道建乎真道准前標單復後列喻名則遊履觀門經文勢廣才消玄旨略贊金文義既將含理合懸留後譯箋云如是重重是指前地地也單是守此乾慧心復是諸地及等覺妙覺各各皆有此金剛乾慧也方盡妙覺之位言妙者斷障妙證理妙一切圓妙也夾衣曰復重重衣相夾也疏云觀前及用者觀前十地皆用金剛乾慧心此則一多不失是單十地皆有是復對立將融者為有可齊等今融等覺入妙覺也准前下疏主更疑此經文局恐梵本廣言此是諸佛遊履觀門才消玄旨者疏三云未有入造疏我今才方消釋玄妙之理也是種種地皆以金剛後結文三初通明一喻箋云為前地地皆有金剛無間解脫道觀察如幻箋云如幻是真似有不有如生不生十種深喻箋云幻陽𦦨夢影乾城響水中月無空花旋火奢摩他中箋云是定用諸如來毗婆舍那箋云是慧清淨修證箋云修是能修證是所證漸次深入箋云雖是行布地地皆與法界體齊阿難如是皆以三增進故又攝漸資階箋云三精進則除助刳正性現業善能成就五十五位真菩提路箋云則十信十住十行十回向四加行十地等覺成五十五此結同別教合具六十位也作是觀者名為正觀若他觀者名為邪觀後定標邪正勸依今演然修階備演頓漸雙收則法理將圓孤標了義奢摩辨境標舉未談演勢將亦合自宣微訣聖徒親稟言下趨真意化當生亦合廣彰流布箋云疏言頓漸雙收者言此六十聖位乃頓中漸說欲使頓者不昧修階履漸者漸中明頓孤標了義者孤然標此經是了義之教奢摩辨境者則除魔一分標舉未談者前雖標此中未說也約此一分合在正宗萬行圓資後說意謂既說六十聖位便合有行人依之修行既爾修行必有魔事緣為文殊菩薩起來請經題目乃隔在流通文中疏云貫理前收隨文後攝聖徒親稟言趨真乃牒前結位也意化當生下是生起向流通分爾時文殊師利法王子在大衆中即從座起頂禮佛足而白佛言當何名是經我及衆生云何奉持後流通分文分四段初請號流通次防邪護正三除魔保定四運教彌興且妙法無名人無仰趣邪迷不識正化將沈魔不除學流虗倦教無興運法乃潛流故先建真宗法幢高指次宣迷業邪見心摧妄習既停然遵妙定搜魔辨境覺路清夷異感不生順歸如海證心功畢方運能詮則慈棹飛流舟安運速二彰人立兩約經言人正法昌流通義足此初文二初文殊請目箋云流為流傳通為通達意表如來談真不扃殷勤付囑顯教功深意為迷生流傳末代簡斯了義親證佛心流傳妙理展轉無窮人授多人流通莫盡且初請號流通者是故文殊從法坐起來請經題目於是世尊廣答十一般之名云佛告文殊是經名大佛頂悉呾多鉢呾囉無上寶印乃至諸菩薩萬行首楞嚴等汝當奉持疏云且妙法無名人無仰趣者言微妙教法無其名目末代學法之人無依之修行仰慕趣向故說十一般名了便知趣向首楞嚴妙定也邪迷不誡正化將沈者邪見迷妄撥無因果作用實事墮惡趣者若不誡約真正教法將沈故說十習因六交報果令衆生知憶忘如一未出色陰有多般魔事令其不被魔之擾亂也教無興運法乃潛流者謂教法無興起運動法乃潛隱流行也世尊向下將一人作罪一人作福二人校量廣讚傳經功能流傳末代一人授與多人燈燈莫盡先建真宗法幢高指者言教法興顯如幢高然標指也次宣迷業邪見心摧者十習因六交報迷妄之業邪師邪見邪教自邪思惟撥無因果等邪見之心摧下也虗妄習氣既停然可遵乎妙定搜尋五十重魔事辨定門境界或是六十二異計十六異計悉皆歸真如法性之海也證心功畢下證自真心功能畢備傳教化人自利利他慈悲如棹如飛等流教法如舟運載衆生迅速自然流入薩婆若海佛告文殊師利是經名大佛頂後佛敘群名文二初廣明經號文五初就佛彰名文四初紫金圓頂悉呾多般呾囉二白傘流奇箋云白是衆色之本表體清淨傘則蓋覆有情無上寶印三寶印呈奇箋云無上則更無加過寶則寶覺真心印則即認無缺又一切諸佛皆依此經悟所證理如印印泥更無前後十方如來清淨海眼四青蓮顯照箋云清淨則離煩惱所知二障海是理言真理如海周遍無涯眼是智智如眼照物不殊此乃理智冥合也亦名救護親因度脫阿難四陳宗約救文二初救慶喜沈迷及此會中性比丘尼得菩提心入遍知海後引登伽密證亦名如來密因修證了義三雙標了義亦名大方廣妙蓮華王四顯淨能生文二初上比香蓮箋云大者曠兼無際方以正法自持廣以毫𨤲相融妙則體離能所蓮華則開敷芬馥況果極因圓王則自在彰名十方佛母陀羅尼呪後下彰佛母箋云佛母者出生報化也亦名灌頂章句五總持三昧文二初彰呪法箋云灌頂則如甘露亦類輪王也諸菩薩萬行首楞嚴後攝菩薩證門言標五喻三比佛身二況無情三該衆聖二明真句一約佛心文含十句理括群因文炳易知不勞繁配箋云疏云言標五喻則佛頂寶印海眼蓮華三比佛身則佛母佛頂佛眼二況無情則寶印蓮華三該衆聖則度脫阿難性比丘尼諸菩薩萬行二明真句則悉怛多灌頂章句一約佛心則如來密因文含十句者除佛心一餘有十也汝當奉持後勑捧靈詮然藥能除病迷方者返益其痾法雖運人迷法者返招其墮況時當濁劫佛日韜光垢習尤強道心微劣不能亡心會旨拂翳清神徒以漏智窺真迷中逞悟或撥無因果邪見偏增導引俱然轉遭漂墮大權靈照遠備津梁覩比遙傷寧無顯請箋云依能詮文悟所詮理雙斷二障雙證二空然後利樂一切有情令其依教修行悟無上菩提此答奉持之意疏云藥能治病者指前文皆藥治衆生心病迷方者返益其痾迷其方法乃認指為月轉增益其痾病甚曰痾已上是喻況下法合撥無因果者言今生既無異熟因來世何處得果撥道無因無果也邪見偏增者六十二異計等導引俱然者導乃師引乃資言師資俱迷大權生起下文說是語已即時阿難及諸大衆得蒙如來開示密印般怛囉義兼聞此經了義名目頓悟禪那修進聖位增上妙理心慮虗凝次防邪護正文三初假陳迷業文三初敘伸儀文二初述悟箋云然邪迷不誠正化將沈是故阿難便請云猶如寶蓮香比丘尼等於是世尊廣說一切世間六趣衆生以十習為因受六交報等事而答之斷除三界修心六品微細煩惱六品煩惱者初果已斷於三現力進除餘六此如常述餘文可知箋云六品煩惱者謂初果未入果在加行位既伏三界九地分別煩惱進伏欲界九品中俱生前三品煩惱出觀來斷今欲進斷欲界六品俱生便取第三果已超第二若上二界八地每地九品隨利鈍斷疏云初果已斷於三現力進除餘六者三界九地十使俱生煩惱分為九品上上品云云斷前三品證初果斷後六品證第三果此約三界九地八十八使分別煩惱向見道前斷更修三品俱生煩惱出觀便證初果須陀洹依前入觀斷第二三品出觀來得現聞經力加被智慧猛利又進後三品所以超第二取第三陀那含約超果即從座起頂禮佛足合掌恭敬而白佛言大威德世尊後伸儀箋云將欲請法先歎於佛慈音無遮箋云無遮遍益義善開衆生微細沈惑箋云善能開通衆生微細是俱生煩惱或是根本無明言我前已斷了令我今日身心快然得大饒益箋云身是法身心乃貞實心世尊若此妙明真淨妙心本來遍圓次申述業理文二初述疑文二初就真箋云牒前本來周遍圓滿是本覺理如是乃至大地草木箋云是所依依報蠕動含靈箋云能緣正報本元真如即是如來成佛真體箋云言此大地草木蠕動等既是本元真如在有情名佛性在無情名法性如前文云我與如來寶覺真心無二圓滿佛體真實云何復有地獄餓鬼畜生修羅人天等道箋云問既是本來云何更有虗妄輪回六道四生諸教明六道此經添仙成七世尊此道為復本來自有後約妄文二意初問法爾施為為是衆生妄習生起後問生因習起世尊如寶蓮香比丘尼持菩薩戒私行淫欲妄言行淫非殺非偷無有業報發是語已先於女根生大猛火後於節節猛火燒然墮無間獄後引事文三初引寶蓮現受箋云節節乃身分也琉璃大王善星比丘琉璃為誅瞿曇族姓次明王庶生沈箋云琉璃大王為誅瞿曇族七萬三千人是佛種也後乘船恆河被火焚燒然後生身陷無間獄善星妄說一切法空生身陷入阿鼻地獄箋云佛住王舍城城中有一尼乾名苦得常說煩惱無因無緣解脫無因無緣善星白佛苦得是真阿羅漢佛言癡人彼非阿羅漢爾時善星於苦得所乃說上事囑令作諸方便當令瞿曇墮妄語中爾時苦得斷食至第七日食黑蜜後飲冷水腹痛而終終已同學舁尸置寒林中受食吐餓鬼形善星至寒林見苦得受食吐鬼拳脊蹲地即還告佛苦得尼乾死後生三十三天佛言癡人阿羅漢無有生處今受食吐餓鬼身佛言我常為說真實法善星絶無信因近惡女起大邪見說無佛無法無有涅槃佛言大衆汝若不信善星近在尼連河可共往問佛與迦葉同往遙見佛來即生邪惡之心以惡心故墮阿鼻獄譬如有人沒圊廁中有善知識以手撓之若得首髮便欲拔出久求不得爾乃息意我亦如是求覓善星微少善根便欲拔濟終日求之不得如毛髮許是故不得拔其地獄此二與前寶蓮香比丘尼是自作業後墮地獄私招中又有同分此諸地獄為有定處後結問文二初明定處箋云是問同分地獄同分者有天同分人同分地獄同分此地獄同分同造無明業同感地獄苦為復自然後問自然彼彼發業各各私受箋云是問私招惟垂大慈發開童蒙令諸一切持戒衆生聞決定義歡喜頂戴謹潔無犯後請垂真決箋云發開童蒙者如童子蒙昧無知欲聞決定義請佛決定為說為復是私招為復是同分
