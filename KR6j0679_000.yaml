front:
  text: 箋首楞嚴經序推誠保德功臣特進行刑部尚守司事畿內河提勸農使及國九江郡開國公食邑五千三百夫善言佛者況之道乎無方善之神乎湛寂精常圓滿平等迎之不見其首隨之不見其後生生而不生化化而不化包褁萬有含吐十方資始衆緣具足萬行光明密照而非色虗通潛運而非空世界遷變而不移山嶽旋偃而常靜現前而惑者不辨日用而迷者不知易曰寂然不動感而遂通老氏曰獨立而不改周行而不殆其性之謂歟無始劫來一切衆生攀緣外境忘失本心分為四纏疊為五濁馳而為妄想結而為昏翳聚而為煩惱流而為生死纍我真源枉入諸趣如來哀之首楞嚴之所作也衆生苦於奔逸故為之述三觀滯於色相故為之指八還誤認根塵故為之辨六入妄計因緣故為之談七大至於屈伸金臂綰疊華巾極善巧之喻拂微細之惑令瞻寶光者知見精之不搖聽鐘音者悟聞性之常在若乃本明旋復靜慧發生御最上之寶乘游無邊之性海𮨇色身若微塵視太虗如雲點彼無姑輪轉之根億劫顛倒之見我人妄執壽命浮想若熾炭之燎鴻毛烈日之晞朝露不待思惟已自消釋大哉菩提妙圓本始清淨既無妄幻翳於真精豈有身心受彼生死水澄滓去漏盡法除萬行不修而自圓六通不求而自證豫於此者非至神乎然而是經撮八藏之精要窮萬化之根源譯之者務簡潤之者尚辭或使覃研泥於句讀故有僧可度為之箋分詳略有敘華梵兼該歲陽再周能事方畢後之觀者應當反夢想之緣氣遺心目之習因了識精之元還獨妙之本雲駛月運既息於諸旋木盡灰飛亦亡於幻法秋毫不立真理自冥彼求諸佛無漏勝解者幸精進於斯焉時景祐四年二月朔日序
