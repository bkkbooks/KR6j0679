body:
  text: 天竺沙門般剌密諦譯烏長國沙門彌伽釋迦譯語菩薩戒弟子房融筆受西京大興福寺沙門惟慤科皇宋首楞大師可度箋阿難白佛言世尊如來常説和合因緣一切世間種種變化皆因四大和合發明五包研識請示文三初敘昔談四大箋云包研識相者包謂包括研謂研究識則五與第六相則五大相或識則第六八識相則五大是第八識親相分為前所執四塵三科法已被如來破盡顯如來藏性我執已除皆是如來大慈門開自説了為前破中云本非因緣非自然性所以引得阿難疑便引昔設覆相教云如來常説和合因緣一切世間種種變化皆因四大和合發明云何如今盡破所以招得世尊包括研究妄性破除其執顯如來藏或可是破七大之相然謂世尊向此中包括研窮地水火風空覺識七大之相阿難等已無法執常説和合因緣等者和合是假合之義因緣乃仗因託緣而有種種變化是根塵識三等一切諸法如幻如化無有定性圓覺云一切根塵皆由幻化皆由四大地水火風而生此是佛四十五年前説此因緣和合等法阿難如今非是不會意間又七大性未破所以舉四十五年前權教未了之義欲得佛向此中一時破却顯七大性本如來藏故有此文云何如來因緣自然二俱排擯我今不知斯義所屬二引現破二邊箋云排遣擯捨屬歸也破三科皆云本非因緣非自然性言前既説因緣和合而有此中何故又破之唯垂哀愍開示衆生中道了義無戲論法三請開中道了義箋云中道了義即非和合因緣也闢二邊而顯中道無戲論法為因緣自然皆是戲論之法爾時世尊告阿難言汝先厭離聲聞緣覺諸小乘法發心勤求無上菩提吹許演文五初牒已示圓宗箋云無上菩提簡非四初信心十信二伏心資加三明心登地四出倒修道五無上佛位此片文來為阿難前初從摩登伽室歸便請云恨無始來一向多聞未全道力殷勤啓請十方如來得成菩提妙奢摩他三摩禪那此文便是厭小求大故我今時為汝開示第一義諦箋云是向第三因中為他破因緣不有自然皆虗要顯如來藏性非因緣等故第二經云當知精覺妙明非因非緣亦非自然非不自然無非不非無是非是離一切相即一切法便是第一義諦也如何復將世間戲論妄相因緣而自纏繞二責叨纏了義箋云復爾地責他前請云如來常説和合因緣一切世間種種變化皆因四大和合發明牽纏繞縛也汝雖多聞如説藥人真藥現前不能分別如來説為真可憐愍三傷患不鑒箋云説藥人喻阿難多聞真藥現前不能分別喻不了如來藏非因緣非自然北一因中破三科無自性顯如來藏是真藥現前汝却不識汝今諦聽吾當為汝分別開示四勑聽許宣文二初現亦令當來修大乘者通達實相後未箋云為令向下通達法身之理或可實相之理是向下破七大性通性水真空性空真水清淨本然周遍法界皆是如來藏是實相也阿難默然承佛聖旨五聖徒受旨阿難如汝所言四大和合發明世間種種變化後酬宣文二初總明文二初總牒前疑阿難若彼大性體非和合則不能與諸大雜和後都明能離文二初純文二初明真箋云若是體性是真其體且不和合又不能與諸大雜和或可若彼大性體非和合此目四大性雜和目四大相相和合性即無和合舉四大性不和意間要他趣向真性祇是如來藏言和意要棄因緣和合虗妄之相猶如虗空不和諸色後此喻箋云虗空喻性不和諸色不與妄相和也若和合者同於變化始終相成生滅相續生死死生生生死死後雜文二初明和生滅箋云此是四大雜和便同變化是妄初從覺勞相現終至六道輪回之相成便有生來死去相續不斷今生生死此界死生他界生死他界死生生生死死即是未來無量世生來死去也化者塵界遷而復生塵界壞而復滅如旋火輪未有休息後喻顯恆流箋云生死便如夜旋火輪不住阿難如水成冰冰還成水後別釋文分七段初地大文分四初立文三初顯彰成壞箋云極微成地如水成氷地還歸鄰如氷成水或真如水相如水汝觀地性粗為大地次勑觀色性文二初粗細為微塵後細文三初諸微至鄰虗塵扸彼極微色邊際相七分所成次極微箋云塵即是極微也扸此極微分為七片取其一片為鄰虗塵鄰者近也虗者虗空近於虗空也又瑜伽師説此極微色以假想慧刀扸至不可扸方鄰虗空更扸鄰虗即實空性後空性阿難若此鄰虗扸成虗空後立空生色文二初述扸色成空當知虗空出生色相後立空生色箋云色既成空空復成色互破也汝今問言由和合故出生世間諸變化相二破文二初牒前和問箋云牒阿難問云如來常説和合因緣一切世間種種變化皆因四大和合發明汝且觀此一鄰虗塵用幾虗空和合而有次勑觀和理文二初空和色文二初正問空和箋云為前云當知虗空出生色相此中便微云用幾虗空合成鄰虗意既將鄰虗扸成虗空亦須將空合成鄰虗互破不應鄰虗合成鄰虗後遮塵合色箋云破自然執恐他執道鄰虗塵自然成鄰虗塵故此遮破又鄰虗塵扸入空者用幾色相合成虗空後色和空箋云汝言鄰虗扸成虗空又用幾箇色相合扸便成空色相乃鄰虗塵也此文因執鄰虗成空故有此破之若色合時合色非空後色空雙破文二初正破文二初破空箋云若是色合時唯是色攝空從色又不是空空破也若空合時合空非色後破色箋云若是空合將唯是空合攝色從空又不是色色破也色猶可扸後許遮文二初許箋云若是諸教説扸色明空猶尚可扸空云何合後遮箋云若是空虗通故云何能合汝元不知如來藏中三指文四初總責迷源性色真空性空真色二指色空同體箋云性色是妙有真空性空是真空妙有互舉清淨本然周遍法界三顯周圓淨箋云離幻色故名清離頑空故名淨隨衆生心應所知量循業發現四隨妄發揮箋云循順也心是第八識心能知量是第八識所知量是地大世間無知惑為因緣及自然性皆是識心分別計度但有言説都無實義四結箋云識心是第六識計度者則三分別中計度分別也經文似倒三分別者一自性指心二隨念過去三計度三世知猶識也惑猶計也世間無識之流計為因緣及自然也阿難火性無我寄於諸緣二火大文分六初立文三初標妄假緣箋云寄伏也火性無我隨緣即發淨名云是身無我猶如火汝觀城中未食之家欲炊爨時手執陽燧日前求火次勑觀求用箋云陽燧則火鏡也崔豹古今主云以銅為之形如鏡照物則倒影面日則火生以艾炷之阿難名和合者後舉和合喻文二初牒計如我與汝一千二百五十比丘今為一衆後立喻文二初明和合箋云此中舉一千二百五十衆意明和合之義衆雖為一詰其根本各各有身皆有所生氏族名字如舍利弗婆羅門種優盧頻螺迦葉波種乃至阿難瞿曇種姓後明別理箋云詰其氏族各各不同當知又非和合舍利弗正云奢利弗呾羅此云鶖鷺子婆羅門此云梵志志事梵天西土四姓中一也優盧頻螺此云木爪言其𮌎前有癃也迦葉此言飲光阿難此云慶喜瞿曇此云日炙亦云甘蔗阿難若此火性因和合有二徵文三初牒和合因彼手執鏡於日求大次舉緣求火此火為從鏡中而出為從艾出為於日來後徵火所因阿難若日來者自能燒汝手中之艾來處林木皆應受焚三破文三初日若鏡中出自能於鏡出然于艾鏡何不鎔紆汝手執尚無熱相云何融泮次鏡箋云紆縈纏在手也又紆回也若生於艾何藉日鏡光明相接然後火生後艾汝又諦觀鏡因手執日從天來艾本地生火從何方遊歷於此四審文二初再勸觀因日鏡相遠非和非合不應火光無從自有後述因遙火現箋云日在天上鏡在手中相遠可知或日相鏡相相去遠矣汝猶不知如來藏中五指文四初總責迷源性火真空性空真火二指火同空體清淨本然周遍法界三顯周圓淨隨衆生心應所知量四隨妄發揮文二初略明阿難當知世人一處執鏡一處火生遍法界執滿世間起起遍世間寧有方所循業發現後隨廣世間無知惑為因緣及自然性皆是識心分別計度但有言説都無實義六結阿難水性不定流息無恆三水大文分六初立文三初顯性非常箋云壅之則止決之則流如室羅城迦毗羅仙斫迦羅仙及鉢頭摩訶薩多等諸大幻師求太陰精用和幻藥二明幻師求藥箋云室羅城迦毗羅俱見前注研迦羅此云輪因手中輪得名鉢頭摩是花訶薩多是手或蓮華在手或手執蓮華經中上花下手乃花手仙也或西土先所後能故先舉花後舉手求太陰精用和幻藥者用此月精和合幻藥是諸師等於白月晝手執方諸承月中水三執珠承水箋云方諸水鏡也淮南子云方諸見月而津為水高誘注云方諸陰燧海之大蛤也白月月半前黑月月半後此水為復從珠中出空中自有為從月來二徵阿難若從月來尚能遠方令珠出水所經林木皆應吐流流則何待方諸所出不流明水非從月降三破文三初月箋云既言從月來月所經之處皆應有水吐流既林木不吐流當知水亦不從月中出若從珠出則此珠中常應流水何待中宵承白月晝次珠若從空生空性無邊水當無際從人洎天皆同滔溺云何復有水陸空行後空箋云空性無邊水當無際攝所變水同能變空從人欲界人也及天欲界天也汝更諦觀四審文二初再勸觀因月從天陟珠因手持承珠水盤本人敷設水從何方流注於此月珠相遠非和非合不應水精無從自有後述因箋云涉行也月在天上珠在手中相去極遠不應水精無從自有者破外道執自然汝尚不知如來藏中五指文四初總責迷源性水真空性空真水二指水空同體清淨本然周遍法界三顯周圓淨隨衆生心應所知量四隨妄發揮文二初略明箋云心是能知量水是所知量一處執珠一處水出遍法界執滿法界生生滿世間寧有方所循業發現後隨廣箋云明性水周遍世間無知惑為因緣及自然性皆是識心分別計度但有言説都無實義六結阿難風性無體動靜不常四風大文分六初立文二初標體不恆箋云風無形無體或動或靜不得恆常汝常整衣入於大衆僧伽梨角動及傍人則有微風拂彼人面後寄緣彰現箋云僧伽梨此云和合衣惠上菩薩經云大衣名集衆時衣亦云雜碎衣以條數多故若從用名入王宮聚落衣南山鈔云作袈裟色又云破壞色乃不正色也此風為復出袈裟角發於虗空生彼人面二徵阿難此風若復出袈裟角汝乃披風其衣飛搖應離汝體三破文三初破衣文三初責披風不離箋云衣為能變風為所變攝所變同能變其衣合為如風遠飛我今説法會中垂衣汝看我衣風何所在次對衣邀審不應衣中有藏風地後結衣無若生虗空汝衣不動何因無拂次破空文六初衣靜無搖破空性常住風應常生二引空例常破箋云攝所變同能變若無風時虗空當滅三抑空同滅破箋云若生於空風既有滅空須成滅亦攝能變空同所變風如樹生葉葉枯樹死下又轉破滅風可見滅空何狀四二滅不齊破箋云風不吹物不搖是風之滅滅空有何相狀空將何滅問向下因何云十方虗空皆悉銷殞答彼是妄空此約真空若有生滅不名虗空五責滅違空破名為虗空云何風出六出有非空破箋云若有風出不名虗空何處有物從而出若風自生被拂之面後破面文三初立計從彼面生當應拂汝次敘順箋云風從他生合拂汝不應自生自拂自汝整衣云何倒拂後責倒箋云既生彼人面汝自整衣之時此衣何不倒轉來汝自家面何故又拂他人面也汝審諦觀整衣在汝面屬彼人虗空寂然不參流動風自誰方鼓動來此四審文二初再勸觀因箋云虗空不參雜風性流轉風空性隔非和非合不應風性無從自有後述因風箋云風之與空體性相隔不應風性者前水云精此風云性秪是體性也無從自有破自然汝宛不知如來藏中五指文四初總責迷源性風真空性空真風三指風空同體清淨本然周遍法界三顯周圓淨隨衆生心應所知量阿難如汝一人微動服衣有微風出四隨妄發揮文二初略明遍法界拂滿國土生周遍世間寧有方所循業發現後隨廣世間無知惑為因緣及自然性皆是識心分別計度但有言説都無實義六結阿難空性無形因色顯發五空大文分六初立文二初空因色顯箋云此是頑空從第七變起當體無形既無形須因色顯發色是質礙空乃虗通因質礙方能顯虗通之性如室羅城去河遙處諸剎利種及婆羅門毗舍首陀兼頗羅墮旃陀羅等新立安居鑿井求水出土一尺於中則有一尺虗空如是乃至出土一丈中間還得一丈虗空後寄鑿彰形箋云去河是去恆河遙即遠也剌利具足云剎帝利唐言田主即王種上姓婆羅門第二姓毗舍亦云吠舍達羅則工商等首陀則是士農此第三姓頗羅墮旃陀亦云旃茶羅唐言屠者是不律儀也又云嚴熾惡業自嚴行特標幟搖鈴持示為因屠羊養雞等虗空淺深隨出多少箋云或出土一尺得一尺空出土二尺得二尺空乃至一丈得一丈空一尺是淺一丈是深此空為當因土所出因鑿所有無因自生二微阿難若復此空無因自生未鑿土前何不無礙唯見大地迥無通達三破文三初破無因若因土出則土出時應見空入次破土文三初責空不入箋云此破從土出若因土自然便有空出則土出之時合見空從外而入若土先出無空入者云何虗空因土而出次有出無入箋云又轉破云我但鑿土出無空入難云云何虗空因鑿土而出若無出入則應空土元無異因無異則同則土出時空何不出後邀同空出箋云若無出入雙計云土又不出空又不入則應空土元無異因空又不入土又不出須見空土一般既一般出土之時空也須隨土而出若因鑿出則鑿出空應非出土後破鑿文二初出空非土破箋云若因鑿出合見空出云何土出不因鑿出鑿自出土云何見空後土出觀空破箋云若也言不因鑿出鑿自合出土云何又見有空不因與無因是執自然即同鑿與未鑿即異汝更審諦諦審諦觀鑿從人手隨方運轉土因地移如是虗空因何所出四審文二初觀審觀因箋云教他向無因自生上審諦若因土出上諦審若因鑿出上諦觀配此三執或不配之鑿空虗實不相為用非和非合不應虗空無從自出後責非和相現箋云鑿乃實空乃虗不相為用二相各別無從自出破自然若此虗空性圓周遍本不動搖當知現前地水火風均名五大性真圓融皆如來藏本無生滅五指文五初通收五大本藏無因箋云均勻也則交互一大中合諸大五現量云何亦名大既能造四大為大今所造四塵識生其中亦名為大為是第八親相分也阿難汝心昏迷不悟四大元如來藏當觀虗空為出為入為非出入二總責迷源妄觀生計汝全不知如來藏中性覺真空性空真覺三再彰迷本不了真空清淨本然周遍法界隨衆生心應所知量四顯淨周圓阿難如一井空空生一井十方虗空亦復如是圓滿十方寧有方所循業發現五隨彰發現世間無知惑為因緣及自然性皆是識心分別計度但有言説都無實義六結阿難見覺無知因色空有六五識文分六初立文二初性因塵顯箋云此舉見是眼識覺是身識舉前括後攝取中間耳鼻舌無知者謂此五現量心如鏡現像不分能所是第八識親變相八色空是眼家所緣境但舉眼攝取餘四眼若破餘四但破此中破五現量識兼第六識何不破第七舉第八謂五識是第八親變相今但破五識八識自亡文第六依第七六破七亦亡也如汝今者在祇陀林朝明夕昏設居中宵白月則光黑月便暗則明暗等因見分扸後對相明鑒此見為復與明暗相并太虗空為同一體為非一體或同非同或異非異二徵箋云此見與明暗虗空等為同一體為非一體是不同一體恐他阿難執道或同或非同或異或非異或者不定義阿難此見若復與明與暗及與虗空元一體者三破文六初破一文二初明暗相形破文三初立計則明與暗二體相亡暗時無明明時非暗次述二相相形箋云暗時明謝明時暗謝云何得為一體若與暗一明則見亡必一於明暗時當滅滅則云何見明見暗後責互亡俱箋云又單計若暗時見與暗為一體破云既與暗為一體當明境現前此見復隨暗境落謝必一於明境又恐他執與明境為一體暗特當滅義如前釋又轉破既見隨明暗落謝云何又見明見暗若暗明殊見無生滅一云何成後見一相殊破箋云執云明暗與見殊明暗生滅見無生滅破云一云何成汝既見與明暗殊云何又説云是一體若此見精與暗與明非一體者二破非一文二初立計箋云既非一體離明暗外又無見曾無無境心有境方説見無境見亦無汝離明暗及與虗空分扸見元作何形相後離相無形破文二初總述無形離明離暗及離虗空是見元同龜毛兔角後引無形喻箋云經云塵非常住若變滅時此心即同龜毛兔角明暗虗空三事俱異從何立見三破或同文二初一見隨三異破箋云執云明暗虗空三種俱各別破云三種既各別汝定從誰立見為當從暗立見從空立見從明立見明暗相背云何或同後幽明相背破箋云明來暗謝暗來明謝云何計為或同此是不同離三元無云何或異四破或異箋云離却三法外又無見云何説或異又乃不異是同也分空分見本無邊畔云何非同五破非同箋云有邊畔便待汝説非同既見在一邊明暗等在一邊見與暗等不分邊畔云何説非同此正是同也見暗見明性非遷改云何非異六破非異箋云此正是異云何道非異見明見暗之時此見不隨明暗選改云何説非異汝更細審微細審詳審諦審觀明從太陽暗隨黑月通屬虗空壅歸大地如是見精因何所出四審文二初再勸觀因箋云細審微細審詳審諦審觀將一體非一體同異非同異四種配之或教他向暗明通塞上審或配四見覺空頑見覺空頑非和非合不應見精無從自出後審無因生箋云見是覺知空頑無覺知無從自出破自然法若見聞知性圓周遍本不動搖當知無邊不動虗空名其動搖地水火風均名六大性真圓融皆如來藏本無生滅五指文六初通收藏本箋云見眼聞耳覺身知舌與鼻阿難汝性沈淪不悟汝之見聞覺知本如來藏二總責迷源汝當觀此見聞覺知為生為滅為同為異為非生滅為非同異三責生諸計箋云是指五現量心為生為滅下明此現量心非生滅等汝曾不知如來藏中性見覺明覺精明見四再責迷源清淨本然周遍法界隨衆生心應所知量五顯淨周隨如一見根見周法界聽嗅嘗觸覺觸覺知妙德瑩然遍周法界圓滿十虗寧有方所循業發現六歎隨根遍箋云意謂但眼根周遍法界餘四根亦爾覺觸覺知是第六識或重牒五現量識妙德瑩淨恆然也十虗者上皆云十方此中避下方字故云虗世間無知惑為因緣及自然性皆是識心分別計度但有言説都無實義六結阿難識性無源因於六種根塵妄出七六意識文六初立識因塵顯文三初略標箋云謂此第六識無其頭緒根源六根眼耳等六塵色聲等謂曾無無境心有境方能率動能緣心汝今遍觀此會聖衆用目循歷其目周視但如鏡中無別分扸二述五現量箋云先説五現量識然後方説第六但舉眼識其餘四種亦爾謂此五現量心對境不分能所是第八識親相分怛如鏡中現像無有分別汝識於中次第標指此是文殊此富樓那此目揵連此須菩提此舍利弗三指相分別箋云第六識與五同緣於中了別文殊等見前此識了知為生於見為生於相為生虗空為無所因突然而出二徵箋云指此第六識能了知為生於見是根相是境虗空是所依為復自然而有突然忽然也阿難若汝識性生於見中三破文四初見文三初立計箋云若汝第六識性生於眼識牒計如無明暗及與色空四種必無元無汝見二離塵無見箋云既生於見不假境牽四種即明暗色空既無境何有根也見性尚無從何發識三約無眼識破箋云能生根尚無所生識何得若汝識性生於相中不從見生二相文三初立計箋云若此第六生於境境為能生識為所生執決定從相生不從見生既不見明亦不見暗明暗不矚即無色空二離見無相箋云既言不從見生便須不見明暗等相既無色空等曾知相亦無彼相尚無識從何發三約無前相破箋云能生既無所生從何起發若生於空非相非見三空文三初立計箋云若空為能生識為所生則無有見相二分非見無辨自不能知明暗色空二雙離見箋云既言無見須無辨別色空等境非相滅緣箋云既無相即滅却所緣境見聞覺知無處安立箋云既無相何處有根見聞覺知等處此二非三責無表緣破箋云則無見與無相空非同無箋云既無見與相乃是真空非同頑空之無有非同物箋云妙有非同質礙色相等物縱發汝識欲何分別箋云既空非同無有又非同物乃是真空妙有縱發汝妄識又何能分別為有漏不能緣無漏若無所因突然而出何不日中別識明月四無因箋云破一類外道執自然汝執云此識無因突然而出汝須日中別見明月現在空中我便許汝識突然而出既日中不見明月此正是因緣之法何處是自然乃執義不成汝更細詳微細詳審見託汝睛四審文二初再勸觀因箋云是見分也相推前境箋云是相分也可狀成有箋云是色法或可若有相分可狀方有汝見不相成無箋云是空或既無相分亦無見分如是識緣因何所出箋云既無見相汝識性從何處而生或可教他向見上相上色空等境上窮此識性自何而出識動見澄非和非合聞聽覺知亦復如是後審非和箋云第六識念念生滅如猿猴得樹起惑造業是動見澄是五現量心對境不分能所澄即澄湛如水澄清非和非合等但舉一根其餘四根亦爾不應識緣無從自出箋云破自然執若此識心本無所從當知了別見聞覺知圓滿湛然性非從所兼彼虗空地水火風均名七大性真圓融皆如來藏本無生滅五指文五初通收七藏箋云若此識性不從見生亦不從明暗色空等境生當知了別是識見聞覺知乃真現量心既是真現量性湛寂凝然不從所緣境上生兼彼虗空地水火風下一大具足一切大阿難汝心粗浮不悟見聞發明了知本如來藏二總責迷源箋云粗謂粗淺浮謂浮虗汝應觀此六處識心為同為異為空為有為非同異為非空有三妄觀生計箋云意謂不是同異非同異等汝元不知如來藏中性識明知覺明真識四重責迷源箋云性識是真識明知是分別了知本覺凝明真現量識妙覺湛然遍周法界含吐十虗寧有方所循業發現五歎性含生箋云含十方則無外吐十方則無內收歸一塵是含周流法界是吐世間無知惑為因緣及自然性皆是識心分別計度但有言説都無實義六結箋云但有言説執為因緣自然以理推徵俱無實義爾時阿難及諸大衆蒙佛如來微妙開示身心蕩然得無礙後聖徒伸悟文二初廣陳悟指文二初總陳詮悟箋云阿難與諸大衆伸述悟解也前來道如一見根遍周法界等又云性水真空性空真水性火真空性空真火文云汝元不知如來藏中性識明知覺明真識妙覺湛然遍用法界含吐十虗寧有方所等此皆是微妙開示若是四十五年前覆相等不得為微妙開示如合四十五年後説此經是微妙開示或第三一因經是頓中頓説是微妙開示也身蕩然不執五蘊妄身心蕩然不執八識妄心或身蕩然無我執心蕩然無法執我執是三科法執是七大性是諸大衆各各自知心遍十方次廣喻融真文二初會觀心廣文四初知心廣大箋云未悟之前妄執此心或在色身之內不知色身外洎山河虗空大地咸是妙明真心中物今既悟見相二分無自性乃心遍十方也見十方空如觀掌中所持葉物二掌葉觀空箋云未悟之時見此頌空廣遠既悟真空周遍法界覩此頑空大似手掌之中執持樹葉一見見盡一切世間諸所有物皆即菩提妙明元心三會相同真箋云迷時菩提為煩惱悟了煩惱為菩提又菩提菩提斷俱名為菩提説智及智處俱名為般若又青青翠竹盡是真如黃華無非般若心精遍圓含裹十方四性含周界反觀父母所生之身猶彼十方虗空之中吹一微塵若存若亡後返視身微文二初塵搖空界箋云既悟然後却觀世間已前未悟時事反觀父精母血假合成身大似十方虗空之中吹一微塵十方虗空喻法身吹一微塵喻五蘊身若存者非無不捨一法若亡者非有不取一法又不離妄身有法身曰若存不即妄身是法身曰若亡又似有則不有當體是空似無則不無當體是有如湛巨海流一浮漚起滅無從後湛海䙲漚箋云悟了是法身淨土有何涯岸觀此妄身大似海中流一浮漚或起或滅無有蹤迹意謂不離波外別有水不離妄身外有法身了然自知獲本妙心常住不滅後伸儀欲讚文二初了心常住箋云知則覺知又悟也得其本來微妙真淨心乃堅實心此之真心本自不生今亦無滅禮佛合掌得未曾有於如來前説偈讚佛後作禮伸儀箋云得未曾有乃不並餘筵也偈者不正梵梵語偈陀又云伽陀唐言重頌或云偈者竭也竭理而談非也妙湛總持不動尊後讚請酬思文三初讚文二初一行讚佛德箋云離言絶相故稱為妙湛者湛寂是體大目法身總者總相持者任持總相任持九十種不共法是相大目報身不動尊體相一如體即相相即體也首楞嚴王世希有箋云首楞嚴唐言一切事畢竟或言健行定約化身讚之則是用大有自在之義名王希有二字是歎也又此化身從定而起非但世希有亦乃出世希有總歎三身銷我億劫顛倒想二一行滅惑證真箋云十萬為一億秖是塵沙大劫且略而言之但説億劫顛倒者頂墮義想即虗妄相想根塵識三等法不歷僧祇獲法身箋云歷為經歷向一念之中頓悟法身之理不歷三僧祇劫五位修行見道已去修道已還是一僧祇初地已往八地已還是二僧祇八地已往到佛果位是三僧祇梵云僧祇唐言無數得法身之理也願今得果成寶王次願文二初願速成廣度將報佛恩箋云願使令我得果成自受用身佛根根塵塵周遍法界此是自利目根本智還度如是恆沙衆箋云還學諸佛救度恆沙衆生此目後得智將此深心奉塵剎箋云阿難發願我將度恆沙衆之心奉報塵剎如來之恩又將此悟理之後之心供養勤奉塵剎如來是則名為報佛恩箋云既能自利利他此乃方名報佛恩又若不傳教度迷情是則無由報佛恩伏請世尊為證明後五濁披蓮生窮取寂箋云唯佛與佛乃知之五濁惡土誓先入箋云五濁者劫濁煩惱濁衆生濁見濁命濁誓願入彼教化衆生此是悲如一衆生未成佛箋云如法界之內有一衆生來成無上菩提終不於此取泥洹箋云亦云泥圓梵語訛略不同是喻也此自圓寂之理終不取涅槃願入微塵剎土教化然後便請下三修證大雄大力大慈悲後請文三初再請宣微懸乘後演箋云雄老雄猛之義法華云大雄猛世尊力者難屈伏義慈能與樂悲能拔苦希更審除微細惑箋云阿難理雖頓悟事未頓除要假進修用除微惑此下修證文也又希願世尊為我審實除却此第八識中細微煩惱或可俱生煩惱未斷此中悟如升堂向下證如入室下文云我今雖蒙天王賜與華屋至要因門入等今我早登無上覺於十方界坐道場二速成圓果周運羣方箋云坐者安住之義道者無上覺道場者寂滅之場又向十方世界坐得道之場此目大乘漸教中妙覺如來三身四智悉皆圓滿五眼六通無不圓備舜若多性可銷亡三妄性長銷真心永寂箋云舜若多是空神祇是頑之性已銷亡如前長行云十方虗空如觀堂中所持葉物故可銷亡爍迦囉心無動轉箋云束心準義則攝八歸一則收束八識妄心俱為一真心未見唐言今釋迦因陀羅音訛也唐言主或天主輪幢則是真心能為三界之主輪則摧壞煩惱幢則不可摧壞義表此真心能摧煩惱不被煩惱所摧或云舜若多性還銷亡否意謂不銷亡寧可道銷亡我此心亦無則盡我願無盡此義未可取之謂此空是第七識變底頑空須是銷亡
