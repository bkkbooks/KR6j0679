body:
  text: 天竺沙門般剌密帝譯烏長國沙門彌伽釋迦譯語菩薩戒弟子房融筆受西京大興福寺沙門惟慤科皇宋首楞大師可度箋佛告阿難快哉此問次勑歎許宣箋云利樂有情問為賓請益問令諸衆生不入邪見箋云則撥無因果墮惡趣空汝今諦聽當為汝説阿難一切衆生實本真淨因彼妄見有妄習生因此分開內分外分後廣明因果文二初雙因略演文二初總標箋云內分則情外分則想阿難內分即是衆生分內後別釋文二初單釋二因文二初內畜情因文三初標因諸愛染次述文二初述愛生流箋云則染之一法發起妄情箋云發起虗妄之情情積不休憶云今日明日情愛無有休息能生愛水箋云愛人心下故感水流是故衆生心憶珍羞口中水出後廣明聞潤文四初心憶珍羞箋云皆是愛心也心憶前人或憐或恨目中淚盈二心憶前人箋云所憶前人或憐惜或嫌恨俱淚流也貪求財寶心發愛涎舉體光潤三貪求財寶心著行淫男女二根自然流液四心著行淫阿難諸愛雖別後結箋云則心憶珍羞貪求財寶等流結是同箋云俱從根本無明變起或可情之一法潤溼不升自然從墜此名內分箋云然情之一法重濁不能將升故沈於下阿難外分即是衆生分外後外凌虗想文三初標因諸渴仰次述文二初述想生由箋云取著前境如思醋梅口中水出如人渴思水身心仰變發明虗想箋云然想輕於情故虗通光明想積不休箋云今日想明日想無有休息能生勝氣箋云能生殊勝氣分則想也是故衆生心持禁戒舉身輕清後廣述同升文五初心持禁戒心持呪印顧雄毅二心持呪印箋云呪則天蓬黑殺等呪印則結印存想或正𮨇或邪視雄則威雄毅則剛毅心欲生天夢想飛舉三心欲生天心存佛國聖境冥現四心存佛國事善知識自輕身命五事善知識阿難諸想雖別後結箋云前來一一不同輕舉是同箋云皆是想之一法飛動不沈自然超越箋云則輕舉也此名外分箋云想則取象故外情內可知阿難一切世間後雙明十果文三初總明交現箋云是所依生死相續箋云蘊起名生蘊滅名死是能依有情生從順習則生為順果乘業廣為三業恆行順生身意死從變流則乘生所習業果冥成果熟酬因心隨業轉變無形之念成有相之資乘業遷形故曰流變臨命終時箋云生有謝死有至未捨暖觸箋云五六七識一時先去唯有心暖則執受八識猶在一生善惡俱時頓現箋云向此時間生平苟造善業即見樓臺殿閣諸佛境界苟造惡業即見蒺梨叉棒牛頭獄卒等事死逆生順次別釋文七初天文二初純想生天箋云所受異報逆其在生所造順身意之業也二習相交箋云則生有滅死有現純想即飛必生天上箋云此約純是想即生為天人天以光潔自在為義若飛心中兼福兼慧及與淨願自然心開見十方佛一切淨土隨願往生後兼因淨土情少想多輕舉非遠即為飛仙次仙文二初單文四初仙箋云九分想一分情也大力鬼王次鬼王箋云八分想二分情飛行夜叉三叉箋云七分想三分情地行羅剎四剎箋云六分想四分情遊於四天所去無礙其中若有善願善心護持我法或護禁戒隨持戒人或護神呪隨持呪者或護禪定保綏法忍是等親住如來座下後助善願恆思廣益善心慈念無傷護法菩薩大心護戒七支清淨隨戒則不違他志或咨受依從護呪則依法誦持隨呪則稟依他教護禪自護乃恆居淨所護他則令不驚狂淨業尅充蓮臺暗就據因明果義有兩重舉一而言意可通悉箋云疏言暗就則親近佛也據因明果者據此因中曾在人間或發善心乃至護禪定故果感在仙在羅剎等亦有此心義有兩重舉一而言者義兩重人中至仙趣等舉一則且言仙等情想均等不飛不墜生於人間三人道文二初均生人道箋云五分情五分想也想明斯聰情幽斯鈍後明根聰鈍情多想少流入橫生四畜文二初本箋云前是情少想多此中明情多想少六分情四分想為畜生類重為毛群後兼箋云業重者豬羊馬等輕為羽族箋云業輕者空中飛禽羽族也七情三想沈下水輪生於火際受氣猛火身為餓鬼五鬼文二初本箋云沈下水輪水在火上也生於火際在水之下火之上火邊際也受氣猛火氣分猛𦦨一時俱火常被焚燒水能害己無食無飲經百千劫後兼箋云餓鬼飲水化為膿血故害於己九情一想下洞火輪身入風火二交過地輕生有間六無間文二初輕箋云在火輪之下風輪之上上火下風風火相交過地獄居其中重生無間二種地獄後重純情即沈入阿鼻獄七阿鼻文二初本箋云梵語阿鼻唐言無間此舉梵語是罪重者前無間又輕若沈心中有謗大乘毀佛禁戒誑妄説法虗貪信施濫膺恭敬五逆十重更生十方阿鼻地獄後兼箋云言十方阿鼻地獄又重於前循造惡業雖則自招後結同分文二初述私招箋云此答私招衆同分中兼有元地後明同受兼有元地者器界立同分有定處也然想為興運發業功強愛念滋煩能成潤種此則總名都目綰敘雙因別業千差形分萬類若不盡搜迷習對果酬因何以知佛智窮微凡愚勗進箋云此答亦有同分也阿難此等皆是彼諸衆生自業所感後垢淨遐明文二初明垢因招墜文二初現習垢因文二初雙標二目文二初則指前招果造十習因後明所習元因文三初舉因受六交報次顯果云何十因後徵因阿難一者淫習交接發於相摩研摩不休如是故有大猛火光於中發動後別釋因差文十初淫文五初乘因發相箋云習慣習也二根相交接能所相研摩從劫至劫不休也如人以手自相摩觸暖相現前次立喻雙明箋云言如人以兩手相摩既久暖現今既以染為因地獄之中即見大火光現二習相然故有鐵床銅柱諸事三感苦彰因箋云二習相燒然故有如是感果鐵床銅柱皆是於火是故十方一切如來色目行淫同名欲火四佛名因相箋云色目稱謂也同名欲愛之火菩薩見欲如避火坑五行人觀厭二者貪習交計二貪文五初乘因發相箋云則相交計度也發於相吸吸攬不止箋云吸內息也攬手取也如是故有積寒堅冰於中凍冽箋云貪人心下感水有益潤果中招積寒等如人以口吸縮風氣有冷觸生次立喻雙明二習相凌故有吒吒波波囉囉三感苦彰因箋云波波下攝取噓噓此四從聲立名受凍之聲也青赤白蓮寒冰等事箋云攝取一紅蓮此四取色為名凍身作此色也是故十方一切如來色目多求同名貪水四佛名因相菩薩見貪如避瘴海五行人觀厭箋云大海之中有瘴癘氣三者慢習交凌三慢文五初乘因發相箋云交相凌滅發於相恃箋云倚恃自家能解馳流不息箋云馳騁流逸不曾止息如是故有騰逸奔波積波為水箋云如是指因故有感果騰身流逸奔波在業海之中被水淹浸如人口舌自相綿味因而水發次立喻雙明二習相鼓故有血河灰河熱砂毒海融銅灌吞諸事三感苦彰因箋云毒海者言受罪之人落此海中多毒龍毒獸毒魚等是故十方一切如來色目我慢名飲癡水四佛名因相箋云慢有多種皆不出我慢為總執我能知能解輕慢於人此乃舉總攝別菩薩見慢如避巨溺五行人觀厭四者嗔習交衝四嗔文五初乘因發相文二初略箋云大曰嗔小曰恚能所惡氣交衝而起發於相忤忤結不息箋云相抵忤也心熱發火鑄氣為金箋云為金則堅言執是嗔心堅強也如是故有刀山鐵橛劒樹劒輪斧鉞鎗鋸後廣如人䘖冤殺氣飛動次立喻雙明二習相擊故有宮割箋云宮割則古者五刑墨刻額也劓截鼻也剕刖足也宮淫刑也大辟死也斬斫銼刺槌擊諸事箋云槌則槌陰擊則擊脅是故十方一切如來色目嗔恚名利刀劒四佛名因相菩薩見嗔如避誅戮五行人觀厭箋云誅自己戮六親也五者詐習交誘五詐文五初乘因發相箋云詐者謂罔冒他故矯設異儀諂曲為性也誘則誘引於他發於相調箋云調弄於他引起不住箋云延引也如是故有繩木絞校箋云以繩為絞以木為校周易云荷校滅耳如水浸田草木生長次立喻雙明二習相延故有杻械枷鎖鞭杖檛棒諸事三感苦彰因箋云在手曰杻在足曰械在項曰枷是故十方一切如來色目姧偽同名讒賊四佛名因相菩薩見詐如畏豺狼五行人觀厭箋云豺亦狼屬説文云似犬鋭頸而白頰六者誑習交欺六誑文五初乘因發相箋云誑者謂獲利譽矯現有德詭詐為性或欺慢於人發於相罔誣罔不止箋云罔則欺罔飛心造姧箋云飛心起心也如是故有塵土屎尿穢汙不淨箋云故有塵土是誑生罔冒故招如晴明空忽生塵土如正真心妄志詭譎也如塵隨風各無所見二立喻雙明二習相加故有沒溺騰擲飛墜漂淪諸事三感苦彰因是故十方一切如來色目欺誑同名劫殺四佛名因相菩薩見誑如踐蛇虺五行人觀厭箋云虺者南中蛇也爾雅釋魚篇云蝮虺博三寸首大如臂注云身長三寸首如臂指此白種蛇為蝮虺也七者怨習交嫌發于銜恨七怨文五初乘因發相箋云怨者含恨不休為性如是故有飛石投礰箋云礰釋名小石也匣貯車檻甕盛囊幞箋云車檻未見餘經所述王法或有之昔有王作車八十八輻無輞相如匱有四面四面各竄其釘置罪人向中以牛駕走如陰毒人懷抱畜惡二立喻雙明箋云陰隱也隱毒在心畜惡可知二習相吞故有投擲擒捉擊射拋撮諸事三感苦彰因箋云吞猶含恨也是故十方一切如來色目怨家名違害鬼四佛名因相箋云違害鬼則損舍利弗之鬼也菩薩見怨如飲鴆酒五行人觀厭箋云廣志云其鳥大如鶚紫緑色有毒頭長七八寸食蛇蝮以其毛歷飲食則殺人八者見習交明八見文五初乘因發相箋云妄見交相明白也如薩迦耶箋云則身見是總為妄執身為我解也見禁戒取箋云見則邊見但見一邊如見斷一向斷見常一向常禁戒則戒禁作雞狗二戒也取是見取見是能見取則所取之境邪悟諸業箋云則邪見也發於違拒箋云於諸佛正見相違拒也出生相返箋云邪見出生一切惡法正見出生一切善法故相返也如是故有王使主吏證執文籍箋云王則閻羅王使則使者主獄主吏典吏如行路人來往相見次立喻雙明二習相交故有勘問權詐考訊推鞠察訪披究照明善惡童子手執文簿詞辨諸事三感苦彰因箋云權用權道誘引詐乃詐問於他考則窮考訊則問訊是故十方一切如來色目惡見同名見坑四佛名因相菩薩見諸虗妄遍執如入毒壑五行人觀厭箋云壑中有毒蛇毒龍等謂之毒壑九者抂習交加發於誣謗九抂文五初乘因發相箋云抂者抑壓良善加諸非過為性如是故有合山合石碾磑耕磨箋云磑小磨也如讒賊人逼抂良善次立喻雙明二習相排故有壓捺捶按蹙漉衡度諸事二感苦彰因箋云相排則排比也壓將物壓之捺以木捺住之衡度則釘人之具以木為衡似門木隨人身手為度是故十方一切如來色目怨謗同名讒虎四佛名因相箋云讒虎未見餘文昔魏國君使於龐恭入趙恭懼有讒人臨行謂魏君曰今有一人言市中有虎君信之乎答言不信恭曰二人言之君信之乎答言疑之恭曰三人言之君信之乎答曰信恭曰夫市無虎明矣三人言誠有虎趙魏相去遠於市矣而讒臣者非止三人願君察之於是辭行未及還而乃讒言先至果不得見於魏君矣菩薩見抂如遭霹𮦷五行人觀厭十者訟習交喧發於藏覆如是故有鑒見照燭十訟文五初乘因發相箋云訟辭訟於人也發於藏覆者發他人陰私之事也如於日中不能藏影次立喻雙明故有惡友業鏡火珠披露宿業對驗諸事三感苦彰因箋云惡友則證於人業鏡火珠則照於人是故十方一切如來色目覆藏同名陰賊四佛名因相箋云陰賊則心下陰隱如賊菩薩觀覆如戴高山履於巨海五行人觀厭然群生造業業乃恆沙舉簳收枝總言於十三為根本慢亦俱生怨抂訟嗔上傍生誑詐二貪邊附起五利使迷真妄度癡族同收淫亦貪收慢為癡攝貪因癡起嗔約貪生推本窮源無明殖始迷一真為二分失一寂為四生分一妄八萬四千塵勞縱一迷彌輪六趣略陳因義果相標名勗進迷徒宜令廣辨云何六報後當乘業果文二初明異熟文三初總標文三初徵招果箋云六交報有二説或眼根交耳鼻等根六根各相交也或因與果交阿難一切衆生六識造業次識造根流箋云眼識乃至意識各各造業不同因中為能造地獄中為所造然前五識造業地獄中果相現前受別報六識是總報何不言第七與第八唯言六識謂第六識對境強盛分別第七唯內緣不對境第八白淨無記所招惡報從六根出箋云因地獄中果相現云何惡報從六根出後徵根塵報然增上果則異熟等流皆有思之可解或一具三此陳偏勝箋云夫言三果異熟等流皆有思之可解者如地獄中種種苦具增上此是異熟增上如地獄受苦與生時六根所造等齊而有增上苦具亦等流增上或一具三者或地獄中果異時而熟是異熟或與生時等齊流類故言等流或有種種苦具增上殊勝故故言增上一者見報招引惡果次別釋文六初眼根文五初標因引果箋云因中眼緣前境果感招引惡果因中為能招引果中為所招引此見業交則臨終時先見猛火滿十方界次業相先呈箋云則臨終時招報之時也亡者神識飛墜乘煙入無間獄三中陰乘生箋云神識中陰身識也地獄居下則亡者飛上然後倒頭從下入地獄此順諸教所論發明二相四覩前幽顯文三初標一者明見則能遍見種種惡物生無量畏次明箋云毒龍蛇等種種惡物然五識有對境有不對境之時二者暗見寂然不見生無量恐後暗箋云暗見則無見此是不對境時如是見火五業流交報文五初燒聽箋云此句下少一句經應云燒見能為熱砂熱灰在眼合有此句恐文失落燒聽能為鑊湯洋銅箋云為耳為坎坎屬水水遭火燒故成鑊湯燒息能為黑煙紫𦦨次燒息燒味能為焦丸鐵糜三燒味箋云焦丸熱鐵為丸也糜粥也以鐵粥灌罪人口燒觸能為熱灰爐炭四燒觸燒心能生星火迸灑煽鼓空界五燒心箋云謂輕安一種欲界全無一切衆生第六識心攀緣逐境喧囂動掉果中招感星火迸灑空界二者聞報招引惡果二耳根文五初標因引果此聞業交則臨終時先見波濤沒溺天地次業相先呈亡者神識降注乘流入無間獄三中陰乘生箋云降注從水中下乘流頭車入無間獄發明二相四覩前幽顯文三初標一者開聽聽種種閙精神愗亂次開箋云愗悶也開聽則聞於前境二者閉聽寂無所聞幽魄沈沒後閉箋云閉聽不聞前境沈沒者深沈沒溺也如是聞波注聞則能為責為詰五業流交報文六初注聞箋云注聞乃耳根也責則勘責詰則詰問注見則能為雷為吼為惡毒氣次注見箋云毒龍毒蛇等氣注息則能為雨為霧灑諸毒蟲周遍身體三注息注味則能為膿為血種種雜穢四注味注觸則能為畜為鬼為糞為尿五注觸箋云為畜為畜形為鬼為鬼形注意則能為電為雹摧碎心魄六注意箋云為雹為天上降下之雹三者嗅報招引惡果三鼻根文五初標因引果此嗅業交則臨終時先見毒氣充塞遠近次業相先呈箋云為因中聞香貪好之氣果中業感先聞惡毒之氣亡者神識從地踊出入無間獄三中陰乘生箋云地獄或地中踊出或空而現俱約隨業而感發明二相四覩前幽顯文三初標一者通聞被諸惡氣熏極心擾次通箋云言惡毒之氣熏人極多令心擾亂二者塞聞氣掩不通悶絶於地後塞如是嗅氣衝息則能為質為履五業流交報文六初衝息為質感受地獄異熟質為履則所趣之處凡根本業則果感處所及能受異熟身餘為所受餘並如文衝見則能為火為炬次衝見衝聽則能為沒為溺為洋為沸三衝聽箋云為洋銅灌罪人口為沸湯煮罪人身衝味則能為餒為爽四衝味箋云餒者餓也爽者差也道德經云五味令人口爽衝觸則能為綻為爛為大肉山有百千眼無量咂食五衝觸箋云為綻為泡綻也為爛為壞爛也為大肉山身作大肉山肉山有百千眼無量蟲於中咂食衝思則能為灰為瘴為飛砂礰擊碎身體六衝思箋云為灰灰土也為瘴山嵐瘴氣也四者味報招引惡果四舌根文五初標因引果此味業交則臨終時先見鐵網猛焰熾烈周覆世界次業相先呈亡者神識下透鐵網倒懸其頭入無間獄三中陰乘生發明二相四覩前幽顯文三初標一者吸氣結成寒冰凍冽身肉次吸二者吐氣飛為猛火燋爛骨髓後吐箋云餓鬼吐氣成火燋猶燒也如是嘗味歷嘗則能為承為忍五業流交報文五初歷嘗箋云承忍者皆罪身承受忍耐也歷見則能為然金石二歷見箋云為然金石擊於罪人歷聽則能為利兵刃三歷聽歷息則能為大鐵籠彌覆國土四歷息歷觸則能為弓為箭為弩為射五歷觸歷思則能為飛熱鐵從空而下六歷思五者觸報招引惡果五身根文五初標因引果此觸業交則臨終時先見大山四面來合無復出路次業相先呈箋云生時貪觸細滑等境死時乃見來山四面合罪人身亡者神識見大鐵城火蛇火狗虎狼師子牛頭獄卒馬頭羅剎手執鎗矟驅入城門向無間獄三中陰乘生箋云矟木作或即戟矟發明二相四覩前幽顯文三初標一者合觸合山逼體骨肉血潰次合箋云潰散也二者離觸刀劒觸身心肝屠裂後離箋云屠裂者如屠物命分裂也如是合觸歷觸則能為道為觀為廳為案五業流交報文六初歷觸箋云為道則為所遊之路為觀則誑現花林異相廳案則冥司推鞠之所也歷見則能為燒為爇次歷見歷聽則能為撞為擊為剚為射三歷聽箋云剚則刀入肉聲歷息則能為括為袋為考為縛四歷息箋云括結也言為袋結之為考推考也歷嘗則能為耕為鉗為斬為截五歷嘗箋云鉗取罪人舌以牛耕之歷思則能為墜為飛為煎為炙六歷思箋云以湯煎之以火炙之六者思報招引惡果六意根文五初標因引果此思業交則臨終時先見惡風吹壞國土次業相先呈箋云第六識因中喧囂動掉果中先感風輪似識不定亡者神識被吹上空旋落乘風墮無間獄三中陰乘生箋云旋落者回旋墮落也發明二相四覩前幽顯文三初標一者不覺迷極則荒奔走不息次不覺箋云於生六識有不與五同緣於死亦所不覺荒忙奔走或東或西二者不迷覺知則苦無量煎燒痛深難忍後覺如是邪思結思則能為方為所五業流交報文六初結思箋云為方道處行結見則能為鑒為證次結見箋云善惡二童之所鑒證結聽則能為大合石為冰為霜為土為霿三結聽箋云霿爾雅釋名亡天氣下地不應曰雺也與霿同結息則能為大火車火船火檻四結息箋云車以乘之船以載之檻以檻之此中三物炎炎皆火焚燒罪人結嘗則能為大叫喚為悔為泣五結嘗箋云悔悔恨也結觸則能為大為小為一日中萬生萬死為偃為仰六結觸然依根造業果則雖齊或業等差寧同一揆理宜疏簡識本通論使報不虗彰勗除因妄箋云為大大身也為小小身也萬生萬死者此則悶絶假死假生非實死實生也偃覆也覆仰皆受業之身疏云依根造業者依六根造六交報也果則雖齊者一因酬一果齊地業有等差者或有六根總造業或有但向眼根作業餘根不造有其平等差別輕重也揆猶度也言不可將一度量等之就他根本作業根通論使一因酬一果戒勗衆生修行也阿難是名地獄十因六果皆是衆生迷妄所造後通結文三初指迷通結箋云因中為能造地獄中則為所造若諸衆生惡業同造次述報分差文五初阿鼻箋云則十惡同造入阿鼻獄受無量苦經無量劫箋云言地獄受苦無邊劫數長遠六根各造次無間箋云是能造及彼所作箋云是能造兼境兼根是人則入八無間獄箋云境上作罪根上亦作罪是兼境兼根八獄者八寒八熱也身口意三作殺盜淫是人則入十八地獄三十八箋云身口意三都是十惡身三意三口四今但造身三口意不造則入十八地獄三業不兼中間或為一殺一盜是人則入三十六地獄四三十六箋云三業不兼者不兼三業也但行殺不盜或但行盜不行殺前之十八二分分開為三十六是越一倍也見見一根五一百八箋云是能見所見也能見是根所見是境單犯一業箋云或眼根但犯色塵耳根但分別聲塵此則但犯一根諸根不造是人則入一百八地獄箋云前之三十六獄三分分開為一百八獄譬夫一擔分之為十於其輕重罪亦明矣由是衆生別作別造於世界中入同分地妄想發生非本來有後總明無實然浮生寄壽石火流飇不悟空花恆思五欲斯須造業未及歡娛業浪吞舟四山冥合刀輪粉骨熾𦦨焚肌鐵網籠圍金丸射腹一沈純苦拂石殃形正罪治終仍生鬼畜箋云由是衆生別作別造者結答阿難前問為當彼彼發業各各私受則私招地獄言善星作業而善星受於世界中入同分地者則同分地獄結答前問為有定處為復自然意謂私招之中亦有同分二種地獄也妄想發生非本來有者則根本無明結答前問為復本來自有為復衆生妄習生起復次阿難是諸衆生非破律儀犯菩薩戒後述等流文二初鬼畜酬因文二初乘因受鬼文二初明罪畢乘生箋云非叱也此則大小二乘戒俱犯也科云述等流者因等果流故曰等流言因中造成諸業果中受罪便乃齊等故毀佛涅槃箋云謗方等也諸餘雜業箋云則十惡五逆等歷劫燒然後還罪畢受諸鬼形箋云言地獄之中歷劫被火焚燒也若於本因貪物為罪是人罪畢遇物成形名為怪鬼次酬因列報文十初怪鬼箋云本因貪物託物成形乘因稱果貪色為罪是人罪畢遇風成形名為魃鬼二魃鬼貪色遇風則或覩屈伸言笑動止音聲發起迷情致生貪欲當來受果託動成形想亂人心報成魃鬼貪惑為罪是人罪畢遇畜成形名為魅鬼三魅鬼貪惑則好生疑慮又惑亂他心遇畜疑生果成於魅箋云遇畜疑生則遇畜生因中疑惑便生其類貪恨為罪是人罪畢遇蟲成形名蠱毒鬼四蠱毒鬼貪恨則怨恨蟲乃毒蟲果毒因嗔如文可解貪憶為罪是人罪畢遇衰成形名為癘鬼五癘鬼憶則繫想傷形遇衰或遇其衰禍果招癘鬼或癘鬼傷人或云癩鬼未見文説貪慠為罪是人罪畢遇氣成形名為餓鬼六餓鬼貪慠則常生憍慢負氣凌他託氣乘因摧憍處餓如文可解箋云氣則風雲氣候也貪罔為罪是人罪畢遇幽為形名為魘鬼七魘鬼貪罔則罔冒他人遇幽則酬因暗計魘鬼魘人乘因可解貪明為罪是人罪畢遇精為形名魍魎鬼八魍魎鬼貪明或仰觀天宿或樂顯色為緣遇精還明魍魎精類箋云或樂顯色為緣則煙雲塵霧也貪成為罪是人罪畢遇則為形名使鬼九使鬼貪成則媒牙結媾或樂成就世間諸事遇明心顯平直無私伇使之流酬因可當箋云使者被大力鬼王之所使貪黨為罪是人罪畢遇人為形名傳送鬼十傳送鬼貪黨則好附明黨遇人乃託附乘因傳送附人如文可解阿難是人皆以純情墜落業火燒乾上出為鬼後指因令悟文三初指鬼乘因箋云人之魂魄所歸曰鬼也此等皆是自妄想業之所招引次指元妄箋云前問佛體真實云何復有地獄餓鬼六道等佛令結答此等皆是自妄想業之所招引妄想則根本無明或第六識若悟菩提則妙圓明本無所有後指真令悟如文可解鬼形乘業果盡因窮殘報相仍更居傍類復次阿難鬼業既盡則情與想二俱成空後畜報儻私文三初業窮儻債文二初明因果俱窮箋云二俱成空則情想二因造業向鬼業則盡畜生猶存方於世間與元負人怨對相值身為畜生酬其宿債後對怨償債物怪之鬼物銷報盡生於世間多為梟類次列果酬因文十初梟類箋云此文皆約三重因果如為鬼則遇物成形後向畜生之中又為土梟類附塊為兒及得人身情性頑鈍於物無異風魃之鬼風銷報盡生於世間多為咎徵一切異類二咎徵類箋云咎徵者咎則過咎徵則徵兆或咎徵則虎狼之類畜魅之鬼畜死報盡生於世間多為狐類三狐類蟲蠱之鬼蟲滅報盡生於世間多為毒類四毒類毒則蚖蝮等衰癘之鬼衰窮報盡生於世間多為蛔類五蛔類蛔則身中諸蟲也受氣之鬼氣銷報盡生於世間多為食類六食類食類則雞豬羊鹿等此償殺食債綿幽之鬼幽銷報盡生於世間多為服類七服類服類則蠶蟲等亦酬宿債準此合明驢馬牛等償債不言通悉和精之鬼和銷報盡生於世間多為應類八應類應類則平常所應如水惡商羊石燕等箋云水惡則江豚白鱀等商羊家語云童謠曰天將大雨商羊鼓舞明靈之鬼明滅報盡生於世間多為休徵一切諸類九休徵類休徵則麟鳳龜鶴等依人之鬼人亡報盡生於世間多為循類十循類循類則貓犬等傍生雖衆舉類通收一一言恐煩耳目阿難是等皆以業火乾枯酬其宿債傍為畜生此等亦皆自虗妄業之所招引若悟菩提則此妄緣本無所有後指因令悟文二初指因令悟如汝所言寶蓮香等及琉璃王善星比丘如是惡業本自發明非從天降亦非地出亦非人與自妄所招還自來受菩提心中皆為淨虗妄想凝結後牒問明虗然一念為非治𠎝歷劫三塗苦畢合復人流箋云如汝所言下一科經方結答阿難問云世尊若此妙明真淨妙心本來遍圓如是乃至大地草木蠕動含露本元真如即是如來成佛真體佛體真實云何復有地獄等如寶蓮香琉璃大王善星比丘云何墮地獄等復次阿難從是畜生酬償先債若彼酬者分越所酬此等衆生還復為人返徵其剩後復形人路文三初剩債相仍文四初返徵過分箋云如其驢馬等唯酬彼人分足其人分外力則招他却為人還徵分外之力也如彼有力兼有福德則於人中不捨人身酬還彼力次隨業施酬文二初約福人還箋云若有力則是齋戒力及福德力則向人身便還也若無福者還為畜生償彼餘直後無飲畜償阿難當知若用錢物或其力償足自停三殺食怨深文三初明財力易停如其中間殺彼身命或食其肉如是乃至經微塵劫相食相誅猶如轉輪互為高下無有休息後述命怨難解除奢摩他及佛出世不可停寢四勝緣方息汝今應知彼梟倫者酬足復形生人道中參合頑類次歸人復類文十初頑類頑則觸途懵鈍彼咎徵者酬足復形生人道中參合愚類二愚類愚乃不達玄門彼狐倫者酬足復形生人道中參於佷類三佷類佷則𢤱悷違人彼毒倫者酬足復形生人道中參合庸類四庸類庸乃心虧妙智彼蛔倫者酬足復形生人道中參合微類五微類微則人非齒録彼食倫者酬足復形生人道中參合柔類六柔類柔乃怯弱無剛彼服倫者酬足復形生人道中參合勞類七勞類勞則力艱驅彼應倫者酬足復形生人道中參於文類八文類文乃華詞麗藻彼休徵者酬足復形生人道中參合明類九明類明則博通時務彼諸循倫酬足復形生人道中參於達類十達類達乃洞曉玄猷中果酬因如經可悉阿難是等皆以宿債酬畢復形人道後歎苦傷迷文二初明復本歸人皆無始來業計顛倒相生相殺不遇如來不聞正法於塵勞中法爾輪轉此輩名為可憐愍者後歎苦傷迷然我等沈生曠劫屢受羣殃佛出世飄落三途遇人身哀逢像末雖翹誠聖旨不那境劣心迷若不懇志堅求倐忽還漂巨海喜逢圓教誓化群生點大夜之明燈闢昏途之覺戶遞相咨勸速運三摩永謝塵勞同升妙覺向論因果舉罪循酬淨業修資由宜別演阿難復有從人不依正覺修三摩地別修妄念存想固形遊於山林人不及處有十仙種後演淨業高升文四初人中謬習文三初總標仙錯箋云言存想者存想一聚心心所也阿難彼諸衆生堅固服餌而不休息食道圓成名地行仙次別釋殊修文十初地行仙箋云服餌則大還丹雄黃朱砂雲母等食者資益義道乃仙道堅固草木而不休息藥道圓成名飛行仙二飛行仙箋云草木則赤松黃菁曹蒲等堅固是能堅固草木是所堅固堅固金石而不休息化道圓成名遊行仙三遊行仙箋云堅固金石者點鐵為金點石為玉金鼎之術白石之方化道則變化則道也堅固動止而不休息氣精圓成名空行仙四空行仙箋云氣精者則仙家一百二十般案磨之法言氣精純也堅固精液而不休息潤德圓成名天行仙五天行仙箋云堅固精液則是扣齒為天鼓咽津為醴泉潤德者潤益道德也堅固精色而不休息吸粹圓成名通行仙六通行仙箋云精色則是不行染法吸粹者見日出日入望吸太陽之氣三口也此則通達之仙堅固呪禁而不休息術法圓成名道行仙七道行仙箋云呪禁如天蓬黑殺等呪道道法也堅固思念而不休息思憶圓成名照行仙八照行仙箋云思念則仙家調氣息之術思念前境也照行者言是仙身有光照而行也堅固交遘而不休息感應圓成名精行仙九精行仙箋云交遘則房中之術交接之方以象陰陽交接也精行仙則獨行也堅固變化而不休息覺悟圓成名絶行仙十絶行仙箋云變化則欒巴噀酒等覺悟則存想也如長房縮地存遠為近絶行乃絶迹而行阿難是等皆於人中鍊心不修正覺別得生理壽千萬歲休止深山或大海島絶於人境斯亦輪回妄想流轉不修三昧報盡還來散入諸趣後結常輪轉夫諸佛出世歷劫難逢小智居人寧窺妙證既迷真理豈悟無生還欲固想存形志超煩纍或餐霞吸日意取延齡玉液瓊漿持顏永駐維山駕鶴暫別千年九轉金丹雲中犬吠蓬鼇宴寂幾變桑田樵父瞻碁俄然爛斧因窮果極宛入輪回不了真源而成妄計阿難諸世間人不求常住未能捨諸妻妾恩愛二天界修超文三初欲界文二初明六天浮厭文六初四天王天箋云妻者齊也與夫齊體故妾者接也與妻相接於邪淫中心不流逸澄鎣生明箋云此人不向外馳流蕩逸身心乃澄湛精鎣生其清明命終之後鄰於日月如是一類名四天王天箋云此天居一晝夜當人間五十年壽五百歲身長半里修十善法得生其中於己妻房淫愛微薄二忉利天箋云雖不與境交亦非一向無心但微薄故於靜居時不得全味箋云於安精間居之時命終之後超日月明居人間頂如是一類名忉利天箋云超過前四天王天居須彌山之頂然帝釋所居宮殿𪫟榻皆七寶所成此天欲事與人間同以化生為異但以母膝上雲生兒即乘雲生一日一夜當人間一百年壽命一千歲身長一里亦修十善勝故得生其中逢欲暫交去無思憶於人間事動少靜多三須𦦨摩天箋云動少與境相交靜多不與境相交也命終之後於虗空中朗然安住日月光明上照不及是諸人等自有光明如是一類名須𦦨摩天箋云此空居亦七寶為宮殿一日一夜當人間二百年壽命二千歲身長一里半一切時靜有應觸來未能違戾四兜率陀天箋云未能違拒越戾也命終之後上升精微箋云精微者乃空也不接下界諸人天境箋云不接須彌𦦨摩等天乃至劫壞三災不及如是一類名兜率陀天箋云問下三上二菩薩何不居之答下二放逸上二暗鈍菩薩不居問色無色界菩薩何不居中答有色著深禪味不利生故無色無形不得説法故此天一晝夜當人間四百年壽四千歲身長二里執手以為欲事修六事二因禮佛發願行慈得生其中我無欲心應汝行事於橫陳時味如嚼蠟五樂變化天箋云有外橫陳設之時使他行非雖行但如嚼蠟言無味或橫陳則同被也命終之後生越化地如是一類名樂變化天箋云越過前來兜率天則彌勒菩薩後得智上化起內外宮殿也約天王説此天於自己神通變起五塵受用一晝夜當人間八百年壽八千歲身長二里半無世間心同世行事六他化自在天箋云同世人行事也於行事交了然超越箋云了然超越則不與境交也命終之後遍能出超化無化境如是一類名他化自在天箋云化則樂變化天無化則兜率陀天超此二天也然此他化自在天樂於他人化起五塵境天王於中受用一晝夜當人間一千六百年壽一萬六千歲身長三里阿難如是六天形雖出動心迹尚交自此已還名為欲界後總結欲流箋云形雖出動不與境交也心迹尚交終有心在也此約欲事漸輕而論也界有欲故曰欲界然此六天前二地居欲事同於人間後四空雲等居欲事或笑或視或執手等
