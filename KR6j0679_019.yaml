body:
  text: 天竺沙門般剌密諦譯烏長國沙門彌伽釋迦譯語菩薩戒弟子房融筆受西京大興福寺沙門惟慤科皇宋首楞大師可度箋阿難彼善男子修三摩提奢摩他中色陰盡者二受陰文三初總標文三初明色陰盡相箋云奢摩他唐言止言心注一境似水止而不流者則五蘊假者見諸佛心如明鏡中顯現其像次明受陰存相文三初明用未自在箋云言行人心如鏡諸佛心如像鏡明則像像炳然智顯則心心交映此約出色陰悟理也若有所得箋云出色陰也而未能用箋云猶在受陰猶如魘人次喻魘客邪箋云未出受陰手足宛然見聞不惑箋云在受陰中一分真性分明心觸客邪而不能動箋云未出受陰不能作用此則名為受陰區宇後目成受相若魘咎歇其心離身返觀其面去住自由後明陰盡超源文四初心遊離繫箋云既無領納心即離身此約真無復留礙名受陰盡次指陰消除是人則能超越見濁三顯彰超越箋云為領納在心則有見濁既無領納便超見濁者見質礙根塵失一真清淨觀其所由虗明妄想以為其本四指陰迷源箋云出陰來返觀受陰以虗疑明了領納故虗以納境明以顯知阿難彼善男子當在此中得大光耀次別釋文十初悲魔文四初定光全耀箋云在定也其心發明次越用興悲箋云內心發起光明內抑過分忽於其處發無窮悲如是乃至觀見蚊䗈猶如赤子心生憐愍不覺流淚箋云內心抑勒太過分忽於其處者在定中也發無窮悲也此名功用抑摧過越悟則無咎非為聖證覺了不迷久自銷歇三顯錯令銷箋云抑勒摧折太過越分也若作聖解則有悲魔入其心腑見人則悲啼泣無限失於正受當從淪墜四認招魔墜箋云諸佛有同體大悲則悲智雙行智能任持如今但悲無智故天魔所附則邪也阿難又彼定中諸善男子見色陰銷受陰明白勝相現前感激過分忽於其中生無限勇其心猛利志齊諸佛謂三僧祇一念能越二狂魔文三初越分狂超箋云梵語僧祇唐言無數資粮加行一僧祇從漸入類此三僧祇是大乘漸教此便言向一念而能超越也此名功用凌率過越悟則無咎非為聖證覺了不迷久自銷歇次令銷用卛箋云功用加行智也若作聖解則有狂魔入其心腑見人則誇我慢無比後認招魔墜箋云我者主宰義慢乃恃己於他高舉為性其心乃至上不見佛箋云謗無佛想下不見人箋云謗無眾生想失於正受當從淪墜箋云既言無佛與眾生是不明果因又彼定中諸善男子見色陰銷受陰明白三憶魔文三初憂無尅證箋云受陰分明絜白也前無新證箋云未出受陰歸失故居箋云已出色陰智力衰微箋云為在定智力微劣衰薄入中隳地迥無所見箋云隳壞也未出受陰已出色陰入此二中無依止處故云隳地心中忽然生大枯渴箋云生大枯稿渴仰也於一切時沈憶不散箋云深沈追憶也將此以為勤精進相箋云將此一日十二時深沈追憶之心以為勤精進相此名修心無慧自失悟則無咎非為聖證次指錯令悛若作聖解則有憶魔入其心腑旦夕撮心懸在一處失於正受當從淪墜後認招魔墜箋云憶魔則追憶之魔也如人將心撮聚懸掛在一處所又彼定中諸善男子見色陰銷受陰明白慧力過定四劣魔文三初心疑已證箋云慧力太多則過定失於猛利箋云因猛利故失猛利則智也以諸勝性懷於心中箋云用諸殊勝之性是慧自心已疑是盧舍那箋云盧舍那唐言光明徧照疑己智慧是真佛得少為足箋云得少許智慧言滿足也此名用心亡失恒審溺於知見悟則無咎非為聖證次指錯令悛箋云言亡失因其恒審溺於知見之中是慧則沒溺在於慧也若作聖解則有下劣易知足魔入其心腑見人自言我得無上第一義諦失於正受當從淪墜後認招魔墜又彼定中諸善男子見色陰銷受陰明白新證未獲五憂魔文三初迷憂害質箋云未出受陰故心已亡箋云已出受陰歷覧二際自生艱險箋云涉歷取覧色相二際歷覽不及故自生艱難險阻於心忽然生無盡憂如坐鉄床如飲毒藥心不欲活常求於人令害其命早取解脫箋云心便生憂如坐火床如飲惡毒之藥此名修行失於方便悟則無咎非為聖證次指錯令悛箋云在定之中無慧力任持失於方法巧便若作聖解則有一分常憂愁魔入其心腑手執刀劒自割其肉欣其捨壽或常憂愁走入山林不耐見人失於正受當從淪墜後認招魔墜箋云耐忍又訓欲也又彼定中諸善男子見色陰銷受陰明白處清淨中心安隱後忽然自有無限喜生心中歡悅不能自止六喜魔文三初迷輕妄悅箋云處清淨中乃是中也定中調暢適悅安隱可知此名輕安無慧自禁悟則無咎非為聖證次指錯令悛箋云定中輕清安樂無慧力禁約定過多故若作聖解則有一分好喜樂魔入其心腑見人則笑於衢路傍自歌自舞自謂已得無礙解脫失於正受當從淪墜後認招魔墜箋云樂然後笑人不厭其笑時然後言人不厭其言自歌自舞魔所附也又彼定中諸善男子見色陰銷受陰明白自謂已足忽有無端大我慢起如是乃至慢與過慢及慢過慢或增上慢或卑劣慢一時俱發心中尚輕十方如來何況下位聲聞緣覺七慢魔文三初迷生大慢箋云一時俱發攝取邪慢此名見勝無慧自救悟則無咎非為聖證次指錯令悛箋云謂見一分殊勝無慧力任持若作聖解則有一分大我慢魔入其心腑後認遭魔墜箋云外人問諸教說七慢九慢何以此唯說六慢少於邪慢答慢少於邪義有通攝初慢於中下二處起謂於己劣計己勝於己等計己等問對劣言勝於齊言等是其稱理而談然由稱量起故故是慢次於中品上品起於過慢於己等計己勝於己勝計己等此慢過前慢故云過慢次上品起慢過慢於己勝計己勝此慢過前慢名慢過慢又於上品起第四果慢謂於上品人多分勝己少分不及於己慢己少勝起慢為卑慢第五於我蘊上起我慢但計身為我高舉六於德上起增上慢德謂何德乃增勝殊常之德通有為無為於此起慢名增上慢又於德上起第七邪慢謂於德上計起邪見云我已得而生勝問邪慢之於德上起與增上慢何別答若增上少得謂多得若邪慢全未得言已得又增上慢通凡聖若邪慢唯凡夫外道今經大我慢乃至或卑劣慢唯少邪慢緣經言一時俱起通收在中若顯聖教論說皆色處能生於七九種慢若九慢者則我勝我等我劣有勝有等有劣無勝無等無劣不禮塔廟摧毀經像謂檀越言此是金銅或是土木經是樹葉或是疊花肉身真常不自恭敬却崇土木實為顛倒其深信者從其毀碎埋棄地中疑誤眾生入無間獄失於正受當從淪墜箋云經是樹葉貝多葉也或是疊花白疊布也其深信者乃無知之者又彼定中諸善男子見色陰銷受陰明白於精明中八輕清魔文三初迷悟輕安箋云於精明中則定中也圓悟精理得大隨順其心忽生無量輕安己言成聖得大自在箋云輕安則遠離麤重調暢身心堪任為性此名因慧獲諸輕清悟則無咎非為聖證二懸標示錯箋云若前未有慧今此有慧慧以揀擇為性則輕清安樂也若作聖解則有一分好輕清魔入其心腑自謂滿足更不求進此等多作無聞比丘疑謗後生墮阿鼻獄失於正受當從淪墜後認遭魔墜箋云無聞比丘因中不聞大乘教法未得謂得者又彼定中諸善男子見色陰銷受陰明白於明悟中九空魔文三初乘虗悟滅箋云於定中也得虗明性箋云得虗通凝明理性其中忽然歸向永滅箋云於其中間忽然歸向斷滅墮惡趣空撥無因果箋云言今生既無異熟因來生何處有異熟果一向入空箋云不知此是頑空執為真空空心現前乃至心生長斷滅解箋云言無佛無祖無因無果悟則無咎非為聖證次指錯令蠲若作聖解則有空魔入其心腑乃謗持戒名為小乘菩薩悟空有何持犯後認招雙墜箋云言何有止持作犯其人常於信心檀越飲酒噉肉廣行婬穢因魔力故攝其前人不生疑謗鬼心久入或食屎尿與酒肉等一種俱空破佛律儀誤人入罪失於正受當從淪墜箋云前人則是柦越或食屎尿是穢手酒肉等是淨忽有人問因何食此不淨等乃云一切皆空有何淨穢賺誤信心之人入罪令其招愆又彼定中諸善男子見色陰銷受陰明白味其虗明十欲魔文三初乘虗發愛箋云則味其虗明理也深入心骨箋云言深味其理太過分也其心忽有無限愛生愛極發狂便為貪欲箋云既有愛心便為貪欲此名定境安順入心次顯錯令悛箋云安樂隨順入其心也無慧自持誤入諸欲悟則無咎非為聖證箋云無慧任持誤賺入諸欲境若作聖解則有欲魔入其心腑一向說欲為菩提道化諸白衣平等行欲其行婬者名持法子後認招雙墜文五初化人行欲神鬼力故於末世中攝其凡愚其數至百如是乃至一百二百或五六百多滿千萬次魔助攝入魔心生厭離其身體威德既無陷於王難三身陷王刑箋云魔既生厭其人乃無威德則罹其王法疑誤眾生入無間獄四誤生淪獄失於正受當從淪墜五長漂失定阿難如是十種禪那現境皆是受陰用心交互故現斯事後結勸文三初結前交惑箋云用心交互者為能緣心於所緣境互相執著眾生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄次顯墜彰迷箋云眾生頑迷不了理事大妄語成未得謂得未證言證汝等亦當將如來語於我滅後傳示末法徧令眾生開悟斯義無令天魔得其方便保持覆護成無上道後勸流標指然色受圓銷已超形繫三摩泯浪想念仍搖忽隙妄生求暗遭邪轉如來圓慧逆照迷情恐覆禪舟必垂飛棹箋云疏言已超形繫形則色陰繫則受陰三摩泯浪者無色受二陰也忽隙妄生求者內心纔有孔隙便被魔影射入如屋壁之隙日影射入逆照迷情則須知也阿難彼善男子修三摩提受陰盡者雖未漏盡三想陰文三初總標文三初明前受滅文三初標漏在箋云若初地轉六七二識其五八二識猶是有漏故有想行識三陰未出心離其形如鳥出籠次述超形箋云既出受陰無領納則心離其形質如鳥出籠言其自在已能成就從是凡身上歷菩薩六十聖位後證意生箋云即凡入聖也六十聖位三漸次乾慧心四加行十信十住十行十迴向十地金乾等覺得意生身隨往無礙箋云有三種意生身如楞伽第三初云佛告大慧云何為三所謂三昧樂正受意生身覺法自性性意生身種類俱生無作行意生身修行者了知初地上增進相得三種身譬如有人熟寐寱言是人雖則無別所知其言已成音韻倫次次彰想陰仍存文三初立喻顯理箋云其言已成音韻倫次者詩聲賦聲乃音乃韻法上譬如有人熟寐寱言在想陰中是人雖則無別所知已出受陰更無別所知其言已成音韻倫次正在想陰取象令不寐者咸悟其語箋云喻諸佛知其在想陰中取象此則名為想陰區宇後目陰區宇若動念盡後想滅超源文三初目盡箋云無想陰取象浮想銷除於覺明心如去塵垢箋云真覺疑明之心已出想陰一倫生死首尾圓照名想陰盡箋云倫為倫次也蘊起名生蘊滅名死首乃生尾乃死將生攝死以無生相將死生以無死相既無生死當體則圓照之慧也是人則能超煩惱濁次彰超箋云為想以取象為行相有象可取則有煩惱濁今既無象可取即超煩惱濁觀其所由融通妄想以為其本後標呈陰本箋云融則萬象含心通乃傍隨眾境阿難彼善男子受陰虗妙不遭邪慮圓定發明次別釋文十初貪巧恠鬼魔文三初標求文二初心貪善巧箋云出色受二陰也三摩地中箋云在想陰定門之中心愛圓明箋云心愛圓徧凝明之理銳其精思箋云銳利其精純之思則加行智也貪求善巧箋云謂行人未入定前心中愛諸佛如來四七智辨才納得種子在心定中乃發起現行爾時天魔候得其便飛精附人口說經法後魔伺飛精箋云天中之魔曰天魔飛精附人乃借通逸智換行人心在定則真魔附成妄其人不覺是其魔著自言謂得無上涅槃次受惑文五初妄認成功箋云未得言得未證言證來彼求巧善男子處敷座說法次為他宣化箋云是此定門行人於求巧弟子處其形斯須或作比丘令彼人見或為帝釋或為婦女或比丘尼或寢暗室身有光明三形遷眾相箋云其本師身變作比丘等相或為欲界主或為婦女等是人愚迷惑為菩薩信其教化搖蕩其心破佛律儀潛行貪欲四愚惑隨搖箋云搖動蕩逸其心破佛法律威儀暗行染之一法口中好言災祥變異或言如來某處出世或言劫火或說刀兵恐怖於人令其家資無故耗散五好說祥災箋云口中好說災怪祥瑞之事家資則家舍資財也此名怪鬼年老成魔惱亂是人厭足心生去彼人體後結墮文三初顯彰魔力箋云前來遇物成形怪異之鬼世久成魔弟子與師俱陷王難次身陷王誅箋云所化弟子與能化之師也汝當先覺不入輪迴迷惑不知墮無間獄後惑沈純苦箋云叮囑阿難也無間獄者言苦苦相連無有間歇阿難又善男子受陰虗妙不遭邪慮二經歷鬼魔文三初標求文二初心貪涉歷箋云虗通微妙圓定發明箋云圓則圓滿定乃所入之定三摩地中箋云在想陰之中心愛遊蕩箋云則經遊蕩逸其心也飛其精思箋云起其精純之思貪求經歷箋云或愛遊歷諸佛國土此人未入定前納種在心定中乃發起現行爾時天魔候得其便飛精附人口說經法後魔伺飛精其人亦不覺知魔著亦言自得無上涅槃次受惑文六初妄認成功來彼求遊善男子處敷座說法次為他自宣自形無變其聽法者忽自見身坐寶蓮華全體化成紫金光聚一眾聽人各各如是得未曾有三聽徒欣相箋云師不變弟子形乃變也是人愚迷惑為菩薩婬逸其心破佛律儀潛行貪欲四惑破淨儀箋云味前境婬蕩流逸能緣之心口中好言諸佛應世某處某人當是某佛化身來此某人即是某菩薩等來化人間五好說過人其人見故心生傾渴邪見密興種智銷滅六銷他正見箋云入定是真魔著成邪種智者一切智一切種智道種智三一時銷滅此名鬼年老成魔惱亂是人厭足心生去彼人體後結墜文三初彰魔惑亂箋云魅之鬼也弟子與師俱陷王難次顯陷王刑汝當先覺不入輪迴迷惑不知墮無間獄後惑沈純苦又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛緜㳷澄其精思貪求契合三契合魅鬼魔文三初標求文二初心貪泯契箋云心愛緜密㳷滅之境也爾時天魔候得其便飛精附人口說經法後魔伺飛精其人實不覺知魔著亦言自得無上涅槃次受惑文六初妄認成功來彼求合善男子處敷座說法次為宣說其形及彼聽法之人外無遷變令其聽者未聞法前心自開悟念念移易或得宿命或有他心或見地獄或知人間好惡諸事或口說偈或自誦經各各歡娛得未曾有三聽徒懸悟箋云說偈誦經皆彼邪教是人愚迷惑為菩薩緜受其心破佛律儀潛行貪欲四惑破尸羅口中好言佛有大小某佛先佛某佛後佛其中亦有真佛假佛男佛女佛菩薩亦然五好述非言箋云言菩薩亦有先後真假其人見故洗滌本心易入邪悟六引他邪見此名魅鬼年老成魔惱亂是人厭足心生去彼人體後結墜文三初彰魔亂學弟子與師俱陷王難次賺溺王刑汝當先覺不入輪迴迷惑不知墮無間獄後惑沈純苦又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛根本四辨扸鬼魔文三初標求文二初心貪智辨箋云心愛根本則愛諸法根本也窮覽物化性之終始箋云為此行人欲得窮盡歷覽萬物變化性之初終精爽其心箋云既貪前境便精明爽利其心貪求辨扸箋云貪求辨說剖扸等事爾時天魔候得其便飛精附人口說經法後魔伺飛精其人先不覺知魔著亦言自得無上涅槃次受惑文六初妄認成功來彼求元善男子處敷座說法次為他宣說身有威神摧伏求者令其座下雖未聞法自然心伏三聽徒懸伏是諸人等將佛涅槃菩提法身即是現前我肉身上父父子子𮞏代相生即是法身常住不絕都指現在即為佛國無別淨居及金色相其人信受亡失先心身命歸依得未曾有四非真說妄箋云言即此父父子子相生之身便是法身却非其真說妄為真是等愚迷惑為菩薩推究其心破佛律儀潛行貪欲五惑破尸羅口中好言眼耳鼻舌皆為淨土男女二根即是菩提涅槃真處彼無智者信是穢言六演穢化人此名蠱毒魘勝惡鬼年老成魔惱亂是人厭足心生去彼人體後結墜文三初彰魔惑賺弟子與師俱陷王難次賺遭王難汝當先覺不入輪迴迷惑不知墮無間獄後惑沈純苦又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛懸應周流精研貪求冥感五冥感癘鬼魔文三初標求文二初心貪密應爾時天魔候得其便飛精附人口說經法後魔伺飛精其人元不覺知魔著亦言自得無上涅槃次受惑文五初妄認成功來彼求應善男子處敷座說法四為他宣化能令聽眾暫見其身如百千歲心生愛染不能捨離身為奴僕四事供養不覺疲勞各各令其座下人心知是先師本善知識別生法愛黏如膠漆得未曾有三聽徒遭攝箋云四事飲食衣服臥具醫藥是人愚迷惑為菩薩親近其心破佛律儀潛行貪欲四惑毀尸羅口中好言我於前世於某生中先度某人當時是我妻妾兄弟今來相度與汝相隨歸某世界供養某佛或言別有大光明天佛於中住一切如來所休居地彼無知者信是虗誑遺失本心五誘化無知此名癘鬼年老成魔惱亂是人厭足心生去彼人體後結墜文三初顯彰魔惑弟子與師俱陷王難次王難汝當先覺不入輪迴迷惑不知墮無間獄後死溺純殃又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛深入六靜謐大力鬼魔文二初標求文二初心貪靜謐箋云要起始覺智入本覺理尅己辛勤箋云決尅自己辛苦勤勞樂處陰寂箋云樂處陰隱寂靜之理貪求靜謐箋云貪求寂靜寧謐之處爾時天魔候得其便飛精附人口說經法後魔伺飛精其人本不覺知魔著亦言自得無上涅槃次受惑文八初妄認成功來彼求陰善男子處敷座說法次為他宣說令其聽人各知本業三今他悟業箋云令其弟子各各知其前世或有善業惡業或於其處語一人言汝今未死已作畜生四逆記傍生勑使一人於後蹋尾頓令其人起不能得五蹋尾摧人箋云為邪法令人蹋其衫後弟子見之是尾於是一眾傾心欽伏箋云一眾之人傾下其心欽敬歸伏有人起心已知其兆箋云若有人疑悞不信蹋尾之事此行人已知其脫兆佛律儀外重加精苦六精勤越分箋云諸佛法律威儀之外無利勤苦伺諸外道誹謗比丘罵詈徒眾訐露人事不避譏嫌七談人覆過箋云訐謂發人之私過也口中好言未然禍福及至其時毫髮無失八遙述災祥此大力鬼年老成魔惱亂是人厭足心生去彼人體弟子與師多陷王難後結墜文二初彰鬼陷人汝當先覺不入輪迴迷惑不知墮無間獄後惑沈純苦又善男子受陰虗玅不遭邪慮圓定發明三摩地中心愛知見七宿命川無魔文三初標求文二初心貪宿命箋云愛諸佛本後二知見也知是後得見則根本惑知見則智也勤苦研尋貪求宿命箋云要諸宿命宿乃宿住智命乃微細則要知宿昔微細之事也爾時天魔候得其便飛精附人口說經法後魔伺飛精其人殊不覺知魔著亦言自得無上涅槃次受惑文六初妄認成功來彼求知善男子處敷座說法次為他宣說是人無端於說法處得大寶珠其魔或時化為畜生口衘其珠三藏珠獻寶箋云其魔則天魔畜生則麒麟師子等及雜珠寶簡䇿符牘諸奇異物箋云及雜殊異之寶竹曰簡書方曰筞書契曰符書版曰牘書先授彼人箋云是彼聽法之人後著其體箋云後著自己之體或誘聽人藏於地下有明月珠照耀其處是諸聽者得未曾有箋云有明月珠即地下燈也多食藥草不餐嘉膳或時日餐一麻一麥四越分精勤箋云欲如佛修行得道也其形肥充魔力持故箋云其形體肥滿充盛問何故如此答魔力任持故誹謗比丘罵詈徒眾不避譏嫌五暴語傷人口中好言他方寶藏十方聖賢潛匿之處六好談靈隱箋云則潛隱藏匿之處隨其後者往往見有奇異之人箋云所有人不信往往有見奇異人物此名山林土地城隍川嶽鬼神年老成魔或有宣婬破佛戒律與承事者潛行五欲或有精進純食草木無定行事惱亂是人厭足心生去彼人體弟子與師俱陷王難後結墜文二初顯魔四陷箋云五欲包聲香等或有精進者有一種魔純食草木也無定行事者或食不食也汝當先覺不入輪迴迷惑不知墮無間獄後或墮泥犁又善男子受陰虗玅不遭邪慮圓定發明三摩地中心愛神通種種變化研究化元貪取神力八神通山文二初標求文二初心募神通箋云陰陽不測曰神往來無礙曰神通謂愛諸佛如來神通作用也研究化元是智智是變化之元爾時天魔候得其便飛精附人口說經法後魔精附便其人誠不覺知魔著亦言自得無上涅槃次受惑文十一初迷功妄認來彼求通善男子處敷座說法次轉化群生是人或復手執火光手撮其光分於所聽四眾頭上是諸聽人頂上火光皆長數尺亦無熱性曾不焚燒三撮火分光箋云皆長數尺或三或五有熱性否曾無熱性皆魔力所化也或上水行如履平地或於空中安坐不動四遊空履水或入瓶內或處囊中越牗透垣曾無障礙五藏瓶透壁唯於刀兵不得自在六怯悍刀鋒箋云或刀或兵國之令也法乎天行邪不丁止怯悍可知自言是佛身著白衣受比丘禮七白屋摧緇箋云西土僧衣黑俗衣白誹謗禪律罵詈徒眾訐露人事不避譏嫌八暴音談過箋云誹謗坐禪持律之人口中常說神通自在九常談神變或復令人旁見佛土鬼力惑人非有真實十傍指淨土讚歎行婬不毀麤行將諸猥媒以為傳法十一讚欲傳真箋云鄙猥媒慢是行染法此名天地大力山精海精風精河精土精一切草木積劫精魅或復龍魅或壽終仙再活為魅或仙期終計年應死其形不化他怪所附年老成魔惱亂是人厭足心生去彼人體後結文三初顯標精號箋云或仙壽命將終再活為魅也或仙期到百年千載計其年月合死其形不壞弟子與師俱陷王難次賺遭王難汝當先覺不入輪迴迷惑不知墮無間獄後惑墮泥犁又善男子受陰虗玅不遭邪慮圓定發明三摩地中心愛入滅研究化性貪求深空九求空麟鳳魔文三初標求文二初樂滅歸空箋云心愛入其寂滅則求其真空之理化性則智也爾時天魔候得其便飛精附人口說經法後魔精伺附其人終不覺知魔著亦言自得無上涅槃次受惑文六初迷功妄認來彼求空善男子處敷座說法次轉化迷徒於大眾內其形忽空眾無所見還從虗空突然而出存沒自在三存沒虗空箋云其形忽空類須菩提或現其身洞如琉璃或垂手足作旃檀氣或大小便如厚石蜜四現身奇相箋云厚石言其石堅厚或云黑石其石色黑蜂在其中成蜜誹毀戒律輕賤出家口中常說無因無果一死永滅無復後身及諸凡聖五撥無因果箋云無因無果者言今生無異熟因來生無異熟果雖得空寂箋云是惡趣空潛行貪欲受其欲者亦得空心撥無因果箋云所受欲人亦得此空殊不知此異熟既盡復生餘異熟此名日月愽蝕精氣六潛法傷人箋云日月之蝕如虫之食言精氣者日太陽精月太陰精又日月博蝕之精氣也金玉芝草麟鳳龜鶴經千萬年不死為靈出生國土年老成魔惱亂是人厭足心生去彼人體箋云金玉乃金玉之精芝草草之精麟鳳等四瑞皆為精弟子與師俱陷王難後結墜文二初顯賺遭刑汝當先覺不入輪迴迷惑不知墮無間獄後惑沈無間又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛長壽辛苦研幾貪求永歲一變易遮文魔文三初標求文二初心貪變易箋云行人見諸佛向色究竟天自受用身常受廣大法樂身得長壽便乃愛辛苦研究其心幾也棄分段生箋云愛捨一分一段生死之身頓希變易細相常住箋云斗頓望其變麤身為細質易短命作長年爾時天魔候得其便飛精附人口說經法後魔伺飛精其人竟不覺知魔著亦言自得無上涅槃次受惑文六初妄認成功來彼求生善男子處敷座說法次為他揚化好言他方往還無滯或經萬里瞬息再來皆於彼方取得其物三俄遊萬里箋云眼瞬鼻息之間言來往急速也或於一處在一宅中數步之間令其從東詣至西壁是人急行累年不到四促步經年因此心信疑佛現前五眾發疑心口中常說十方眾生皆是吾子我生諸佛我出世界我是元佛出世自然不因修得六指稱元佛此名住世自在天魔後結墜文三初目遮文吸食箋云即他化自在天天魔也使其眷屬箋云言此天魔自在不來使其眷屬附著其人故如遮文茶及四天王毗舍童子未發心者利其虗明食彼精氣箋云喻如遮文茶此方怒神是羅剎女也毗舍童子是噉人精氣鬼已卜皆佛邊護法之人此等未發大乘心之時被其魔鬼發利其虗明之心然後食彼精氣便同於魔如今發心則不如此也或可只是遮文茶等起其銳利虗明之智欲發菩提心內心攻起外魔附著便乃食其精氣或不因師其修行人親自觀見稱執金剛與汝長命次親招欲害箋云或不因魔師說法其弟子自見其魔師稱道我是執金剛神與汝長命現美女身盛行貪欲未逾年歲肝腦枯竭箋云為行染法肝腦自然枯竭口兼獨言聽若妖魅前人未詳多陷王難未及遇刑先以乾死惱亂彼人以至殂殞箋云魔師尋常口獨言說其弟子聞之疑似妖魅雖如是疑獨未審詳弟子與師俱陷王法未遇誅戮乾枯先死汝當先覺不入輪迴迷惑不知墯無間獄後惑墮泥犁阿難當知是十種魔於末世時在我法中出家修道後結勸文二初述魔叨像未勸勑流經文二初述魔叨化文六初魔叨法服箋云初貪巧怪鬼魔終至變易遮文魔出末世時世尊在世諸魔隱伏及像法中四依治世亦不能動或附人體或自現形次潛附傷人皆言已成正徧知覺三自號天師箋云正知根本徧知得後得智更有等覺方成三知覺也讚歎婬欲破佛律儀先惡魔師與魔弟子婬婬相傳四讚婬傳化箋云魔師魔祖師也如是邪精魅其心腑近則九生多踰百世令真修行總為魔眷五多生攝化箋云生亦世也近傳得九人在世多傳百人在世命終之後必為魔民失正徧知墮無間獄六盡墮泥犁汝今未須先取寂滅縱得無學留願入彼末法之中後勸敕流延文三初勸常居世箋云留眾生無邊誓願度之願如阿難前云如一界生未成佛終不於此取泥洹世尊今躡他前請付囑起大慈悲救度正心深信眾生令不著魔得正知見次勸起沐悲我今度汝已出生死汝遵佛語名報佛恩後令遵佛勑箋云阿難來悟法身真理故出生死遵猶斆也阿難如是十種禪那現境皆是想陰用心交互故現斯事後結境交呈勸真教文三初彰前互箋云心與境相交互用或本是真心相交之成妄眾生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄次錯認沈殃汝等必須將如來語於我滅後傳示末法徧令眾生開悟斯義無令天魔得其方便保持覆護成無上道後勸示真樽然法王以心融妙鏡三際懸鑒遙記諸魔潛移正法或昆叨釋服迹混密誘群生令抱幻綱近則九生在世多乃百代居人該化愚童盡沈生叱所以殷勤告示令慶喜不入泥洹恒居像末之比傳茲正教余恨生逢像末不覿金顏覩此靈又想同瞻佛是以竭誠庸志誓闡深深經學者親披同欣捧惟願牟尼大覺聖力冥加使我速達真詮水揚微旨向陳三陰魔惑搜窮異計邪途次宜遐辨箋云疏言心融妙鏡則妙觀察智大圓鏡智也問色受二陰但一結文此中何故結耶答為此想陰諸魔其力大故所以大覺重結囑也冥加者世尊在世則顯加被令入滅後乃冥加被也梵語牟尼唐言寂滅謂證寂滅之理也
