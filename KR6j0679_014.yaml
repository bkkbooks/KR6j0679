body:
  text: 天竺沙門般剌密帝譯烏長國沙門彌伽釋迦譯語菩薩戒弟子房融筆受西京大興福寺沙門惟慤科皇宋首楞大師可度箋阿難汝問攝心我今先說入三摩地二敘道場儀軌文二初略明持證文六初標前奉戒文二初明奉戒箋云此是躡請云何令其安立道場遠諸魔事修學妙門箋云微妙之門庭也求菩薩道要先持此四種律儀箋云律是法律儀是儀則四種乃殺盜染大妄語也皎如冰霜自不能生一切枝葉心三口四生必無因箋云皎如冰霜清潔玉潤無瑕四根本戒為本其餘戒是枝葉也心三則貪嗔癡口四妄言綺語等和前身三是十要除大妄語也阿難如是四事若不失遺心尚不緣色香味觸一切魔事云何發生後顯無魔若有宿習不能滅除次勸誦真言文二初彰宿習汝教是人一心誦我佛頂光明摩訶薩怛多般怛囉後勸誦持箋云摩訶大也薩怛多白也般怛囉蓋也表此法法性含融非對於小體唯潔白能覆一切有情故無上神呪箋云言此佛頂真言無有過上斯是如來無見頂相箋云自不見表離自相他不見表離他相無為心佛從頂發輝箋云從此頂上化佛是無為佛對著木樹下草座是有為佛無為當體是佛坐寶蓮華所說心呪箋云如人一身心為主為要喻此呪為衆呪之主為衆陀羅尼之要且汝宿世與摩登伽歷劫因緣恩愛習氣非是一生及與一劫我一宣揚愛心永脫成阿羅漢三舉冥資速證箋云摩登伽應云阿死多摩登祗摩登祇女之總名阿死多女之別名此女由卑賤故常以掃市為業用供衣食恩愛習氣者乃染之一法慣習氣分也彼尚淫女無心修行神力冥資速證無學四例決銷𠎝文二初引無心克果箋云彼尚無心下是冥然承真力資益於他得無上覺云何汝等在會聲聞求最上乘決定成佛次彰決慕上乘箋云此有心求決定成佛也譬如以塵揚于順風有何艱險後立喻銷迷箋云承此呪力一切煩惱愛習猶如順風揚塵無有不盡若有末世欲坐道場先持比丘清淨禁戒五勸擇戒師文三初勸奉戒要當選擇戒清淨者第一沙門以為其師次簡淨師若其不遇真清淨僧汝戒律儀必不成就後明師穢不成箋云持戒謹潔無犯者戒成已後著新淨衣然香間居誦此心佛所說神呪一百八遍然後結界建立道場求於十方現住國土無上如來放大悲光來灌其頂六依持佛現文二初略明持現箋云或得戒成就後須著新淨未觸之衣誦呪一百八遍表斷一百八煩惱也阿難如是末世清淨比丘及比丘尼白衣檀越心滅貪淫持佛淨戒於道場中發菩薩願後重敘加持箋云梵語檀越華言布施檀則檀波羅蜜是布施運載布施須以三輪體空七般殊勝又以法布施運載令他越生死此岸到菩提彼岸言檀越則唐梵雙舉也出入澡浴六時行道箋云出時洗淨入時洗穢六時則寅辰午申戌子六時也如是不寐經三七日我自現身至其人前摩頂安慰令其開悟箋云釋迦佛自現身也阿難白佛言世尊我蒙如來無上悲誨心已開悟次廣演壇儀文三初承宣再請箋云前文云要先持此四種律儀皎如氷霜自不能生一切枝葉皆是慈悲誨喻也自知修證無學道成箋云則自知無上菩提決定成就也末法修行建立道場云何結界合佛世尊清淨軌則箋云阿難便請云何結界云云有自然界方隅界日出為界手指為界前文佛說其中文含阿難恐末代衆生不知欲得世尊細說軌儀法則佛告阿難若末世人願立道場先取雪山大力白牛食其山中肥膩香草此牛唯飲雪山清水其糞微細可取其糞和合旃檀以泥其地二廣敘壇儀文二初布施壇儀文四初塗壇淨法文四初唯取雪山若非雪山其牛臭穢不堪塗地決非牛不可箋云問不是雪山其牛還得不經答云云別於平原穿去地皮五尺已下取其黃土和上旃檀沈水蘇合熏陸金白膠青木零陵甘松及雞舌香以此十種細羅為粉合土成泥以塗場地三和香飾地箋云問或若邊方無此雪山之牛若何為壇經答云云廣平原言穿去地皮五尺是不淨土取下淨者香於水波曰水香白膠則乳香雞舌則母丁香也方圓丈六為八角壇四定壇方相箋云一角闊二尺二八一十六也壇心置一金銀銅木所造蓮華二安布香花文七初壇心蓮華箋云或金作蓮華或銀銅并木等華中安鉢失華中安鉢鉢中先盛八月露水三先盛露水箋云天地氣清白露之節方有露水水中隨安所有華葉四隨安化葉箋云所有花葉如西方適意花東方牡丹花等取八圓鏡各安其方圍繞華鉢五圍鏡繞花箋云取八鏡繞鉢如壇八角鏡向外也鏡外建立十六蓮華六蓮花鏡外箋云十六蓮花每一鏡前安其二十六香爐間花鋪設七香爐間設箋云十六香爐與花相間置十六器食間於香爐一蓮花二鉢三露水四花葉五鏡六鏡外蓮花七香爐莊嚴香爐純燒沈水無令見火取白牛乳置十六器乳為煎餅并諸砂糖油餅乳糜蘇合蜜薑純蘇純蜜於蓮華外各各十六圍繞華外以奉諸佛及大菩薩三獻佛珍羞文二初周施總獻箋云乳糜者將乳煮粥也蘇合蜜薑者用蘇和合蜜之與薑每以食時若在中夜取蜜半升用蘇三合壇前別安一小火爐以兜樓婆香煎取香水沐浴其炭然令猛熾投是蘇蜜於炎爐內燒令煙盡享佛菩薩後列供標時箋云每以食時中夜三更也取蜜半斤用蘇三合者意謂令安器中向爐上煎令煙氣盡後將器盛供養佛或可溫向火中令烟盡獻佛兜樓婆香即白苑也令其四外遍懸幡花四周懸供像文三初幡於壇室中四壁敷設十方如來及諸菩薩所有形像次像應於當陽箋云室中心也張盧舍那箋云華言光明遍照報佛也釋迦箋云華言能仁化佛也彌勒箋云華言慈氏補處佛阿閦箋云華言動東方佛彌陀箋云應云阿彌陀華言無量壽西方佛諸大變化觀音形像箋云言觀音或作白衣或作自在天或千手千眼等兼金剛藏安其左右箋云則二金剛帝釋箋云欲天王梵王箋云色天王烏芻瑟摩箋云華言火頭并藍地迦箋云是青面神諸軍茶利箋云五目八臂金剛與毗俱胝箋云五目四臂金剛四天王等箋云東方治國南方增長西方醜目北方多聞等取下記落鬼頻那箋云是猪頭夜叉夜迦箋云是象鼻夜叉張於門側左右安置箋云問何不安法身佛但舉報化二身答法身當體佛也此中具多像承法門無盡重重互相涉入又取八鏡覆懸虗空與壇場中所安之鏡方面相對使其形影重重相涉後鏡箋云為壇上八鏡則仰此八則覆貴得影現重之表一多無礙彼此不妨如因陀羅網一室千燈等於初七中至誠頂禮十方如來諸大菩薩阿羅漢號恆於六時誦呪圍壇至心行道一時常行一百八遍後專持尅證文四初三七專持文三初六時持禮第二七中一向專心發菩薩願心無間斷我毗奈耶先有願教次願力冥資箋云我毗奈耶先有願教則律藏曾說四弘誓願煩惱斷法門學佛道成衆生度第三七中於十二時一向持佛般怛囉呪後運心無間至第七日十方如來一時出現鏡交光處承佛摩頂即於道場修三摩地能令如是末世修學身心明淨猶如琉璃二佛摩加證箋云至第七日是三七日第七日也鏡交光處則鏡相對光乃相交也承佛摩頂此行人但於道場之中便修三摩地即首楞嚴大定是大乘心也阿難若此比丘本受戒師及同會中十比丘等其中有一不清淨者如是道場多不成就三由師不克箋云十比丘則三師七證也從三七後端坐安居經一百日有利根者不起于座得須陀洹四自力隨升文二初利根成果箋云問前修三摩地是大乘心此中因何言得須陀洹答此約初地菩薩初地亦為須陀洹華言預流為初地菩薩頂入聖流也縱其身心聖果未成決定自知成佛不謬後定信菩提箋云為真言力冥資故也汝問道場建立如是後通前總結箋云便都答云汝問道場其事如是為前請云云何結界合佛世尊清淨軌則此中結答也阿難頂禮佛足而白佛言自我出家恃佛憍愛三演真言密句文三初謙迷再請文三初敘前冥救未領真言箋云恃賴於佛憍憐愛念於我求多聞故箋云雖有多聞任持三世諸佛言教未證無為遭彼梵天邪術所禁箋云敘未悟已前遭他幻術所攝時之事也心雖明了力不自由賴遇文殊令我解脫雖蒙如來佛頂神呪冥獲其力尚未親聞箋云言文殊當時去摩登伽寶乃是默念暗得其呪力也唯願大慈重為宣說悲救此會諸修行輩末及當來在輪回者承佛密音身意解脫次請佛垂悲重宣祕旨于時會中一切大衆普皆作禮佇聞如來祕密章句後同伸請禮佇聽真音爾時世尊從肉髻中湧百寶光次頂示威靈文八初肉髻騰輝箋云肉中自然湧起如髻曰肉髻光中湧出千葉寶蓮二華敷百寶箋云千葉寶蓮表當來千佛下生有化如來坐寶花中三花承化佛頂放十道百寶光明四頂放千光箋云為十道光每光有百寶色十百為千光明是化佛光也一一光明皆遍示現十恆河沙金剛密迹五焰起金剛箋云金剛王菩薩示現金剛之身也密則祕密迹乃示現其身迹也擎山持杵遍虗空界六擎山降杵大衆仰觀畏愛兼抱求佛哀祐七聽徒求怙畏則怖其威力愛則遭此嘉筵箋云畏與愛二心相兼在懷抱之中哀祐者乃哀念恃祐或恃附祐賴也無父則無可倚附無母則無可倚賴今佛為父母故求佛恃祐也一心聽佛無見頂相放光如來宣說神呪八斂聽真言箋云放光如來者是光中化佛所說神呪呪具四義南無薩怛他蘇伽多耶阿囉訶帝三藐三菩陀寫後化宣真句箋云五不翻中此祕密不翻也若造五逆十重之愆誦此呪已悉皆銷滅縱其自身不作福業諸佛功德悉與此人於此父母所生之身不得心通十方如來便為妄語然而頂上小化佛說此呪下面坐草座真佛便讚此呪功德薩怛他佛陀俱知瑟尼釤二南無薩婆勃陀勃地薩跢斃三毗迦反南無薩多南三藐三菩陀俱知南四娑舍囉婆迦僧伽喃五南無盧雞阿囉漢跢喃六南無蘇盧多波那喃七南無娑羯唎陀伽彌喃八南無盧雞三藐伽跢喃九三藐伽波囉底波多那喃十南無提婆離瑟𧹞十一南無悉陀耶毗地耶陀囉離瑟𧹞十二舍波奴揭囉訶娑訶娑囉摩他喃十三南無跋囉訶摩泥十四南無因陀囉耶十五南無婆伽婆帝十六嚧陀囉耶十七烏摩般帝十八娑夜耶十九南無婆伽婆帝二十那囉野拏耶二十一槃遮摩訶三慕陀囉二十二南無悉羯唎多耶二十三南無婆伽婆帝二十四摩訶迦羅耶二十五地唎般剌那伽囉二十六毗陀囉波拏迦囉耶二十七阿地目帝二十八尸摩舍那泥婆悉泥二十九摩怛唎伽拏三十南無悉羯唎多耶三十一南無婆伽婆帝三十二多他伽跢俱囉耶三十三南無般頭摩俱囉耶三十四南無跋闍囉俱囉耶三十五南無摩尼俱囉耶三十六南無伽闍俱囉耶三十七南無婆伽婆帝三十八帝唎茶輸囉西那三十九波囉訶囉拏囉闍耶四十跢他伽多耶四十一南無婆伽婆帝四十二南無阿彌多婆耶四十三跢他伽多耶四十四阿囉訶帝四十五三藐三菩陀耶四十六南無婆伽婆帝四十七阿芻耶四十八跢他伽多耶四十九阿囉訶帝五十三藐三菩陀耶五十一南無婆伽婆帝五十二沙闍耶俱嚧吠柱唎耶五十三般囉婆囉闍耶五十四跢他伽多耶五十五南無婆伽婆帝五十六三補師毖多五十七薩憐捺囉剌闍耶五十八跢他伽多耶五十九阿囉訶帝六十三藐三菩陀耶六十一南無婆伽婆帝六十二舍雞野母那曳六十三跢他伽多耶六十四阿囉訶帝六十五三藐三菩陀耶六十六南無婆伽婆帝六十七剌怛那雞都囉闍耶六十八跢他伽多耶六十九阿囉訶帝七十三藐三菩陀耶七十一帝瓢南無薩羯唎多七十二翳曇婆伽多七十三薩怛他伽都瑟尼釤七十四薩怛多般怛㘕七十五南無