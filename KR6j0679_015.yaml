body:
  text: 天竺沙門般剌密帝譯烏長國沙門彌伽釋迦譯語菩薩戒弟子房融筆受西京大興福寺沙門惟慤科皇宋首楞大師可度箋阿難是佛頂光聚悉怛多般怛囉四歎呪神功文四初克證連悲文三初明克證文六初總歎能生箋云悉怛多是也白為衆色之本表此呪是陀羅尼之尊也般阻羅是蓋蓋有陰覆之義表此呪覆一切有情故祕密伽陀微妙章句箋云伽陀華言重頌出生十方一切諸佛箋云言此呪詮法身之理法身能生報化二身又此呪目智經云智為諸佛母亦為菩薩母如金剛經亦詮於智乃云一切諸佛皆從此經出十方如來因此呪心得成無上正遍知覺二乘因克果箋云正知是根本遍知是後得具正遍二知名無上覺十方如來執此呪心降伏諸魔制諸外道三摧魔制異箋云執是定力確觀也梵語魔羅華言殺者言殺一切修行行人慧命故外道者向三乘教外修行五熱炙身無利勤苦十方如來乘此呪心坐寶蓮華應微塵國四應塵方箋云乘運也呪是法心是喻坐寶蓮華者梵網云我今盧舍那方坐蓮華臺此是自受用報身佛應微塵國是化身佛十方如來含此呪心於微塵國轉大法輪正轉大法輪十方如來持此呪心能於十方摩頂授記自果未成亦於十方蒙佛授記六自他蒙記箋云摩頂授記者是授他所化弟子記也或自未證乃承別佛授記自也十方如來依此呪心能於十方拔濟群苦次述運悲文初悲除苦難所謂地獄箋云地下有獄名曰地獄餓鬼畜生箋云腹大咽小者人家畜美而生名畜生盲聾瘖啞箋云無根之者怨憎會苦箋云為殺我父母或兄弟朋友既今相會其苦可知愛別離苦箋云正好相歡又且別離求不得苦箋云或求財或求色不得皆苦五陰熾盛箋云色受想行識此五陰熾盛更苦是名八苦大小諸橫同時解脫箋云大橫乃至死亡小橫落於公途賊難兵難王難獄難風火水難飢渴貧窮應念銷散箋云應念則當念也十方如來隨此呪心能於十方事善知識四威儀中供養如意二歷事隨心箋云四威儀者飲食衣服臥具醫藥也供乃四事養乃侍養為佛侍者故曰如意恆沙如來會中推為大法王子三助化恆沙箋云推此持呪行人也十方如來行此呪心能於十方攝受親因四攝持觀眷箋云攝受則度脫義如佛度阿難如阿難度脫登伽同時見佛令諸小乘聞祕密藏不生驚怖五小容大箋云祕密是大乘教法謂小乘人聞大乘警怕令持此呪於大乘法亦不警怕十方如來誦此呪心成無上覺六誦證菩提坐菩提樹入大涅槃七證寂俱能箋云自受用身佛向菩提樹作佛去化緣將畢歸圓寂體皆因誦此呪心也十方如來傳此呪心於滅度後付佛法事究竟住持嚴淨戒律悉得清淨八付持遺化箋云傳受也於滅度後付佛弟子傳此呪心究竟到頭義住為行住持為住持嚴潔清淨是法戒者防非止惡又云嚴淨曰戒若我說是佛頂光聚悉怛多般怛囉呪從旦至暮音聲相聯字句中間亦不重疊經恆沙劫終不能盡後結勸持文三初歎宣無盡箋云佛又讚此呪功能意表法身之理談而不盡亦說此呪名如來頂次目呪真名汝等有學未盡輪回發心至誠取阿羅漢不持此呪而坐道場令其身心遠諸魔事無有是處後勸持令證箋云未盡輪回者俱生煩惱未除輪回三界也返關云汝等有學未盡輪回發心至誠取阿羅漢若持此呪而坐道場令其身心遠諸魔事斯有是處言阿羅漢者約大乘目八地菩薩若論小乘則不稱也阿難若諸世界隨所國土所有衆生隨國所生樺皮貝葉紙素白疊書寫此呪貯於香囊三滅𠎝除毒文四初善除諸毒文六初帶除諸毒箋云樺皮則樺樹皮也貝葉西土貝多葉向上橫書者紙蔡倫所造素絹也疊則白疊布也是人心昏未能誦憶或帶身上或書宅中當知是人盡其生年一切諸毒所不能害箋云心昏者昏昧無記憶性也背文曰誦盡其生年則或八十九十年也阿難我今為汝更說此呪救護世間得大無畏成就衆生出世間智二誦況諸災箋云出世間智菩提涅槃等若我滅後末世衆生有能自誦若教他誦當知如是誦持衆生火不能燒水不能溺大毒小毒所不能害箋云火則色火水則愛水大者蠱毒小者草木之毒如是乃至龍天鬼神精祇魔魅所有惡呪皆不能著三耶法不如箋云魔魄所歸曰鬼陰陽不測曰神天神曰祇人神曰鬼精祇魔魅者乃精靈神祗邪魔魑魅也惡呪者天黑等呪心得正受四心遊正定箋云梵語三昧華言正受定之異名一切呪詛厭蠱毒藥金毒銀毒草木蟲蛇萬物毒氣入此人口成甘露味五化成甘露箋云呪詛則厭也金銀亦皆有毒也或毒作金銀之色謂金銀毒一切惡星并諸鬼神𥕺心毒人於如是人不能起惡六潛伏惡心箋云惡星者勃妖等爾雅云中砂謂之𥕺言人心有毒如中有𥕺也毗那夜迦諸惡鬼王并其眷屬皆領深恩常加守護後密迹潛加文四初都陳眷族箋云皆領佛之深恩或領真言深恩常加守護於行人也阿難當知是呪常有八萬四千那由他恆河沙俱胝金剛藏王菩薩種族一一皆有諸金剛衆而為眷屬晝夜隨侍箋云那由他是經之數俱胝是億之數十萬為億設有衆生於散亂心非三摩地心憶口持是金剛王常隨從彼諸善男子二散意蒙加箋云無定力故心散亂非三摩地者未得定力也何況決定菩提心者此諸金剛菩薩藏王精心陰速發彼神識三決志心通箋云言陰隱疾速發彼行人神識也是人應時心能記憶八萬四千恆河沙劫周遍了知得無疑惑箋云得宿住智通也從第一劫乃至後身四常離惡報箋云則過去劫中第一劫也言後身者則最後邊身成佛則文殊普賢觀音是也生生不生箋云從生至生也藥叉箋云華言勇建羅剎箋云華言可長及富單那箋云華言臭迦吒富單那箋云華言奇臭則奇異之臭也鳩槃茶箋云華言卵形毗舍遮等箋云是噉人精氣并諸餓鬼箋云無飲食者有形無形有想無想箋云有形是有形鬼無形是無形鬼有想有想天也無想無想天也如是惡處是善男子若讀若誦若書若寫若帶若藏諸色供養劫劫不生貧窮下賤不可樂處三福善隨成文三初永超貧賤箋云如是惡處皆不受生因持此呪故也此諸衆生縱其自身不作福業十方如來所有功德悉與此人由是得於恆河沙阿僧祇不可說不可說劫常與諸佛同生一處無量功德如惡叉聚同處薰修永無分散二借福同生箋云如惡叉聚同蒂而生不相離將喻持呪之人第一經云業種自然如惡叉聚疏云此但指妾不指真是故能令破戒之人戒根清淨未得戒者令其得戒未精進者令其精進無智慧者令得智慧不清淨者速得清淨不持齊戒自成齊戒後善業隨成阿難是善男子持此呪時設犯禁戒於未受時持呪之後衆破戒罪無問輕重一時銷滅四盡除𠎝業文五初圓銷衆罪箋云於未受時未受真言時也衆破戒罪則多種罪也輕則遮罪重則四根本罪也縱經飲酒食噉五辛種種不淨一切諸佛菩薩金剛天仙鬼神不將為過二恕過冥隨箋云種種不淨則種種不淨之行也設著不淨破弊衣服一行一住悉同清淨三淨穢同功箋云前云著新淨衣如今持呪設使著不淨之衣還同清淨也縱不作壇不入道場亦不行道誦持此呪還同入壇行道功德無有異也箋云前云作八角壇等若造五逆無間重罪及諸比丘比丘尼四棄八棄誦此呪已如是重業猶如猛風吹散沙聚悉皆滅除更無毫髮四能除重罪箋云五逆殺母破和合僧等八棄者四分律云梵語波羅夷華言棄若犯此罪擯出衆外譬如大海不宿死臰僧四殺盜染妄尼八一不與染心男子身相摩觸二比丘尼知染汙心男子不得共行共坐語等三知比丘尼犯波羅夷不白大衆與覆藏重罪四知比丘僧為作舉出三諫不捨犯隨故舉阿難若有衆生從無量無數劫來所有一切輕重罪障從前世來未及懺悔若能讀誦書寫此呪身上帶持若安住處莊宅園館如是積業猶湯銷雪不久皆得悟無生忍五遐銷遠業箋云懺悔者華梵雙舉也懺是梵語應云懺摩則洗淨義是華言則退悔段悔也復次阿難若有女人未生男女欲求孕者若能志心憶念斯呪或能身上帶此悉怛多般怛囉者便生福德智慧男女三護世隨求文三初隨求獲報文一初隨求現報箋云生男有智慧生女有福德也求長命者即得長命欲求果報速圓滿者速得圓滿身命色力亦復如是箋云或求現生報或求當來報土自然成就世間果報則國王宰官等出世間乃佛也色為顏色力為氣力命終之後隨願往生十方國土必定不生邊地下賤何況雜形後妙土隨生箋云雜形則黃門二根或異類也阿難若諸國土州縣聚落飢荒疫癘或復刀兵賊難鬬爭兼餘一切厄難之地寫此神呪安城四門并諸支提或脫闍上令其國土所有衆生奉迎斯呪禮拜恭敬一心供養令其人民各各身佩或各各安所居宅地一切災厄悉皆銷滅次置供除災文四初三災永殊箋云廣雅云人所居曰聚衆所居曰落疫癘則災癘也支提者塔也脫闍音都爾雅謂之臺今即塔也阿難在在處處國土衆生隨有此呪天龍歡喜風雨順時五穀豐殷兆庶安樂二五穀豐殷箋云風雨順時則十風五雨也五穀則果麥稻黍菽也穀者續也言稱子相續不斷故敦庶衆也亦復能鎮一切惡星隨方變怪災障不起人無橫夭杻械枷鎖不著其身晝夜安眠常無惡夢三災橫不生箋云惡星則彗妖惑等橫則抂落公途夭則少年死喪在手曰杻在足曰械在項曰枷在身曰鎖常無惡夢法華云常有是好夢等阿難是娑婆界有八萬四千災變惡星二十八大惡星而為上首復有八大惡星以為其主四惡星離界箋云八大惡星者日月及熒惑辰歲并太白鎮及羅此皆名執曜合日月為一也作種種形出現世時箋云或作沙門或作童子婦女等形能生衆生種種災異箋云種種災祥怪異有此呪地悉皆銷滅十二由旬成結界地諸惡災祥永不能入箋云一由旬十六里有一百九十二里為一界分是故如來宣示此呪於未來世保護初學諸修行者入三摩地身心泰然得大安穩後結勸修持文二初保安修定箋云身不被災疫所侵心不被邪魔所撓故泰然也更無一切諸魔鬼神及無始來冤橫宿殃箋云冤家災橫宿昔之殃舊業陳債來相惱害箋云前世之業冤家陳覓其債今更不來汝及衆中諸有學人及未來世諸修行者依我壇場如法持戒所受戒主逢清淨僧於此呪心不生疑悔是善男子於此父母所生之身不得心通十方如來便為妄語後志勸依持說是語已會中無量百千金剛一時佛前合掌頂禮而白佛言如佛所說我當誡心保護如是修菩提者四衆靈潛衛文六初力士陳隨箋云問金剛因何先起白佛答然金剛護法常在佛邊乃先起也爾時梵王并天帝釋四天大王亦於佛前同時頂禮而白佛言審有如是修學善人我當盡心至誠保護令其一生所作如願次天王保願箋云審誠也復有無量藥叉大將諸羅剎王富單那王鳩槃茶王毗舍遮王頻那夜迦諸大鬼王及諸鬼帥亦於佛前合掌頂禮我亦誓願護持是人令菩提心速得圓滿三叉剎竟衛復有無量日月天子風師雨師雲師雷師并電伯等年歲巡官諸星眷屬亦於會中頂禮佛足而白佛言我亦保護是修行人安立道場得無所畏四曜宿潛依箋云年歲則蘭歲巡官乃歲鎮曰巡也復有無量山神海神一切土地水陸空行萬物精祇并風神王無色界天於如來前同時稽首而白佛言我亦保護是修行人得成菩提永無魔事五神精捧持箋云并風神王前有風師此言風神應是空神前文云既為風質其體元無無色界天四蘊成身言無色陰唯現定果色身無業果色身也爾時八萬四千那由他恆河沙俱胝金剛藏王菩薩在大會中即從座起頂禮佛足而白佛言世尊如我等輩所修功業久成菩提不取涅槃常隨此呪救護末世修三摩提正修行者六大威護文四初因陳願箋云不取涅槃者從涅槃鄉起救護衆生也世尊如是修心求正定人若在道場及餘經行乃至散心遊戲聚落我等徒衆常當隨從侍衛此人二散定恆隨縱令魔王大自在天求其方便終不可得諸小鬼神去此善人十由旬外三遠辟魔神箋云魔王在欲界頂上他化自在天求其行人方法巧便終不能得也除彼發心樂修禪者箋云外人問有樂修禪者還許他否答除非樂修禪者方得近此行人世尊如是惡魔若魔眷屬欲來侵擾是善人者我以寶杵殞碎其首猶如微塵恆令此人所作如願四除怨賜願箋云問菩薩具大悲心言以寶杵殞碎其首如何答破魔顯正是大悲也阿難即從座起頂禮佛足而白佛言我輩愚鈍好為多聞於諸漏心未求出離蒙佛慈誨得正熏修身心快然獲大饒益後萬行圓資修證分文三初標列請文三初謙愚荷法箋云世尊說法不逾二門一頓門二漸門此頓中明漸謂世尊向一念排布六十聖位六十聖位不離一念要悟頓者不昧於漸門履漸者便明於頓理此是三周之中頓漸和融一體周若是六十聖位是行布法門一念頓證是圓融法門世尊要此圓融不離於行布乃融通隱隱行布不離於圓融故涉入重重上來是萬行圓資上來有三初慧觀圓通修證分次一力加持修證分三萬行圓資修證分三段不同總是修證顯果體周圓上來有二初釋密因後明修證二段不同總是敘正宗分已竟世尊如是修證次列品咨階箋云修為能修證為果證佛三摩提箋云則法界大定未到涅槃箋云乃佛果位中有為無為二轉依果云何名為乾慧之地箋云此乾慧是三漸次前一乾慧言起智來乾枯煩惱也四十四心箋云則十信十住十行十回向四加行至何漸次得修行目箋云漸為由漸次為次第目則名目詣何方所名入地中箋云詣猶到也言到何方道處所名入地中則初地至法雲地也云何名為等覺菩薩箋云等謂齊等言理事齊等也作是語已五體投地大衆一心佇佛慈音瞪矒瞻仰後佛儀待旨箋云瞪矒則目睛不瞬瞻佛蓋請此萬行圓資修證一分經也爾時世尊讚阿難言善哉善哉汝等乃能普為大衆及諸末世一切衆生修三摩提次許演酬咨文三初歎能懸門求大乘者從於凡夫終大涅槃懸示無上正修行路箋云從凡夫地面上起始覺智終大涅槃合本覺理懸遠而示為今時一切衆生正修行路是此萬行一分乃頓中漸識一念二安排六十聖位六十聖位不離一念如畫空為像舉一門而衆門俱談一品而衆品齊耀如因陀羅網交相涉入若是諸小乘論其次第乃未為正修此中一位具足一切位乃正也又正修簡去耶修外道五燕炙身等汝今諦聽當為汝說次敕聽酬咨阿難大衆合掌刳心默然受教後皮儀佇旨箋云刳開也佛言阿難當知妙性圓明後廣宣修次文二初搜妄本一二初總明修證文二初了妄證真文三初性源無相箋云妙者體離能所性是體性圓性遍凝明則圓成實性也離諸名相箋云名乃遍計是第六識遍生計度相是依他則地水火風四大相本來無有世界衆生箋云世界是所依國土衆生是能依有情因妄有生次述妄生因箋云外人問本來既無衆生世界如今因何却有答因妄有生妄是性明相乃根本無明因有無明便有世界衆生生起因生有滅箋云才有生便有滅則妄識生滅也生滅名妄滅妄名真是稱如來無上菩提及大涅槃二轉依號後了因圓證箋云菩提轉染涅槃轉迷阿難汝今欲修真三摩地直詣如來大涅槃者先當識此衆生世界二顛倒因後勸除雙倒箋云詣猶到也業轉二識是十二類生顛倒因現識則器世界顛倒因顛倒因則無明也顛倒不生斯則如來真三摩地箋云妄心無處即菩提阿難云何名為衆生顛倒後釋雙因文二初述衆生妄本文二初徵阿難由性明心後釋文二初述妄生源文三初指妄無因箋云心生曰性明乃帶相明背體外求是智家功用性明圓故箋云牒前性明圓則未分能所帶相圓也因明發性箋云因性明便發業識性動作故名業性妄見生箋云是轉識轉背故名轉從畢竟無箋云此無明畢竟無體也成畢竟有箋云迷生實業便有無明生故此有所有次了迷無體箋云此有是無明所有是業果煩惱非因所因箋云因者依也無明無依即無因無明無體即無所因住所住相箋云無明無依則無住無明無體即無所住了無根本箋云言無明無其根本也本此無住建立世界及諸衆生後依述建法箋云無明為無住本建立一切法所謂建立及受用皆從八識生迷本圓明後迷一切發文六初述妄無依箋云迷一真圓明也是生虗妄箋云則無明也妄性無體箋云言此無明無自性當體即空非有所依箋云無體則何依將欲復真欲真已非次迷生棄向箋云起能復之心復被真體欲真已非何也蓋有真可取有妄可捨乃非真心真真如性非真求復三真無復理箋云上真則真智下真則真理乃一真如性故非真求復也宛成非相非生非住四因後生非箋云若起能復之心欲復所復之真見妄有相乃執真非相見妄有生乃執真非生見妄有住乃執真非住非心非法箋云見妄有八識妄心執真無心見妄有軌生物解執真非軌生物解展轉發生五展轉熏生箋云展來轉去發生也生力發明箋云妄識緣塵熏以成業箋云見相二分相熏便成三界九地總別報業同業相感因有感業箋云此是情影取想乃情想二法則卵唯想生胎因情有溼以合感化以離應相滅相生箋云因有淫則有愛便有相生因有殺便有惡則相滅盜居二境之中由是故有衆生顛倒六結成生例箋云雖舉四生影取十二類生阿難云何名為世界顛倒後明世界生因文二初總明三變文二初徵箋云第一無明為能變世界為所變第二世界為能變根塵為所變第三根塵為能變十二類生為所變世界顛倒則現識也是有所有分段妄生後釋文二初從迷假立箋云言有一分一段四大之相生起因此界立非因所因無住所住遷流不住因此世成箋云世者遷流義過去遷至現在現在遷至未來三世四方和合相涉後變次相乘文二初舉方明類箋云則第一變能變是無明所變是世界如第四經云世為遷流界為方位乃至一十百千今此將方涉世亦成十二將世涉方亦成十二其中含攝第二變世界為能變根塵為所變六根六塵成十二今除意根隱而不知法塵細而難覩唯取五根五塵為過去東方亦有五根五塵南西北方亦如是未來現在亦爾三四十二成一千二百變化衆生成十二類箋云則第三變根塵為能變十二類生為所變胎卵濕化等十二中除無色則空散銷沈無想則土木金石唯取其十過去世界方五根五塵十類生每一根塵上成十類都成一百未來東方亦一百現在東方亦一百南西北方亦如是三四十二都成一千二百也三世四方和合相涉是第一變變化衆生成十二類是第三變舉第一與第三攝取中間第二變也是故世界因動有聲因聲有色因色有香因香有觸因觸有味因味知法後別釋根塵箋云內心搖動便有風大光起故有聲乃至因味知法是六根塵也六亂妄想成業性故箋云則六識也業者招感為義既有六識取塵便乃成三界九地總別報業十二區分由此輪轉箋云由因也六根六識為十二區分識塵各別因此六識隨塵輪轉也是故世間聲香味觸窮十二變為一旋復箋云世間是所依則都舉六根六塵言此六根六塵皆是一度變起此是世界為能變六根六塵為所變約第二變引第三變乘此輪轉顛倒相故是有世界卵生胎生濕生化生有色無色有想無想若非有色若非無色若非有想若非無想後重明生類疏曰澄神靜志氣寂心凝一念違如誠為妄動箋云則氣分鼓發之用也本來寂靜心凝是真心也疏曰動勞神昧色相乘主箋云言動轉背體勞生覺照神識昏昧便有色相當情周覆圓明乘此而生便有卵生卵唯想生也疏曰及對諸塵次興情欲箋云為有塵可對當情便有情欲興起胎因情有也疏曰情生愛盛遇合便俱箋云若此情之一法生起愛心煩盛遇合便俱者蓋濕以情想合如濕地治塵便著也疏曰欣必厭隨方開化類箋云為有情想可欣欣久生厭厭便隨欣情想離者化以離應也疏曰對塵鑒了顯發心靈箋云有色塵可對生鑒了引起愛便成有色也疏曰色謝迷空轉興陰隱箋云謂雖有能愛之心而無當情色境唯是暗生亂想便有無色類也疏曰意緣虗影思可潛懷箋云謂雖色相當情而有想心緣於虗影潛懷在心故有有想類也疏曰所對將無理成枯槁箋云無想如荒夫欒木等也疏曰境雖期會表籍因依箋云為前塵境像有則有也為難期須仗因依緣境方乃稱情便乃染成非有色是不有色類如水母等也疏曰事有不隨故生呼召箋云為前境可意不可得遂心乃假呪詛呼召為緣故有非無色類非者不也不無色塵也疏曰正因難偶互託相資箋云為當因依則難相對偶須假展轉回互相成遂偶其心便有非有想類生非有想者不有想也疏曰欺罔少生致招冤害箋云為前色境求之不遂翻成怨害便有非無相類是不無其想也疏曰因雖十二箋云則十二類也疏曰究本唯雙箋云則是想為生使情為潤因也疏曰就二研之起由於想箋云言就此情想二因而言起皆有想此想遍於可意不可意境也疏曰想為生本三四通標箋云然想為種後時趣生亦假其想是生本也然十二類生通有想也疏曰情為潤因局該欣理箋云愛唯從可意境也疏曰若雙分並攝折中而言箋云情多想少攝想從情若情少想多攝情從想是雙分並攝折中則情多想少想多情少也疏曰合體互成實難搜析箋云則情想合為濕生離為化生故云互成為此情想十二類生雖熏如是而該羅一切誠難搜析也疏曰初二標種箋云卵唯想生胎因情有也疏曰次二合明箋云濕以合感化以離應也疏曰餘或間起岐枝箋云為後八類是前四三餘間雜而起如路之岐如樹之枝則是有色有想非有色非有想無色無想非無色非無想也疏曰或重分疊卵箋云則是有色無色非有色非無色有想無想非有想非無想等也疏曰後通舉違文且五位雖胎何因遍列箋云問意言此五位初七羯邏藍等此是寶積胎藏會說唯是在胎何故此下經十二類生遍有也疏曰局言歸一遍約種論箋云答謂寶積唯局在胎位今此經十二類生皆遍列者為約熏種而論唯約一念違如而變大都此經意謂阿難遭摩登伽染法所逼因示溺淫舍說此一經所說熏種多因染法熏成也疏曰類數雖加何以收不盡箋云又問如金剛經言十類胎生卵生濕生化生若有色若無色若有想若無想若非有想若非無想何以此經便加二也疏曰彼論修級此約迷塵詳意不同豈勞和會箋云是答指金剛及別教言修趣安布而說此經依約迷塵生起義說故不同故云豈勞和會此答當了下又進退答疏曰或有色精曜上可通收箋云如下經八萬四千精曜亂想休咎精明為星辰等亦通收欲界也疏曰無色銷沉通該四定箋云如下經八萬四千陰隱亂想流轉國土空散銷沉亦可通收空處識處無所有處非想非非想處也疏曰然此經初譯文實未全待後廣文自有分判箋云又答如藏內有重譯單譯今此是單譯來文未足後文必有然此因六根六塵便有十二類生生起也阿難由因世界虗妄輪回動顛倒故和合氣成八萬四千飛沉亂想後釋類生文二初卵文二初因箋云應云由因世界無明能變世界所變六根能變六塵所變六根六塵而為能變十二類生而為所變今經但舉第二變攝取第一第三也動則風生當體是顛倒也氣則氣分也疏曰且器界初立風大為先緣相繫心感成於氣箋云緣彼性明相繫於心想彼明相故有想生也疏曰想為生使運氣含心箋云想乃先引趣生也運氣含心即想也疏曰想立因成創形於卵箋云想著彼明相便周覆圓明之休或於卵也疏曰八萬之言約三毒增數箋云經中云八萬四千飛沈亂想苦八萬四千煩惱門者依華嚴經五蘊五塵成十每一蘊塵皆有十使鈍使五貪嗔癡慢疑利使五身見邊見邪見見取戒禁取此十法每一為頭十十相廣成千更向七識每一識上具千過去有千現在有千未來有千七識每一識有三千三七二十一成二萬一千更句貪上二萬一千及嗔癡等分皆有二萬一千四箇二萬一千成八萬四千也如是故有卵羯邏藍流轉國土魚鳥龜蛇其類充塞後果箋云如是乃舉因故有感果也由因世界雜染輪回欲顛倒故二胎文二初因箋云欲情也則情想二法和合能緣心所緣境也和合滋成八萬四千橫竪亂想箋云滋益而成如水能滋潤於萌芽前能滋潤能緣心竪直也人仙乃直想其身則直龍等橫想其身乃橫如是故有胎遏蒲曇流轉國土人畜龍仙其類充塞後果箋云遏部曇此云凝結是二七日也由因世界執著輪回趣顛倒故三濕類文二初因箋云執著謂執前境不捨也濕生如濕地沾塵便著故云趣顛倒和合暖成八萬四千翻覆亂想箋云愛感水生燥感火生水火相和故云暖也翻則棄好取醜覆則捨醜求妍如是故有濕相蔽尸流轉國土含蠢蠕動其類充塞後果箋云蔽尸此云凝厚三七日也含蠢動也蠕蟲名動者大都而言總有足無足蜈蚣蚰蜒等則情想合也由因世界變易輪回假顛倒故四化類文二初因箋云變則前心異後易則捨故從新也假則假想緣心也和合觸成八萬四千新故亂想箋云或捨故從新或捨新從故如是故有化相羯南流轉國土後果箋云羯南此云胞四七日也轉蛻飛行其類充塞箋云轉則捨故成新蛻則蟲蛻舊殼飛則蟬行則蠐螬疏云螬蟬復蠐者螬蠐蟲也此蟲化為蟬復蠐者論衡云蟬未化者為因中熏種棄舊取新果亦招捨舊蛻而受新質則情想離也由因世界留礙輪回障顛倒故五有色文二初因箋云謂性不通有所障乘此障顛倒故和合著成八萬四千精曜亂想箋云為於前境生愛著故因能緣心向前境上精明炷耀耽著故如是故有色相羯南流轉國土後果箋云謂有前塵色相可當情故休咎精明其類充塞箋云言因中既有境生其精明炫耀果招休咎休者美也如老人星景星德星咎則惡星如飛流彗孛等星也疏言准此餘類生通上界者為前問類數雖加何以收生不盡此答云准此有色星辰亦可通上色界此只通收未為正理緣星辰只收欲界故但言生起熏種即得由因世界銷散輪回六無色文二初因箋云為於前境稱心而前境滅無心便追想故曰銷散惑顛倒故箋云內心惑亂一向顛倒和合暗成八萬四千陰隱亂想箋云內心和合暗生追想無前境空追想故陰隱乃識也如是故有無色羯南流轉國土空散銷沈其類充塞後果箋云由因生銷散果招空散銷沈無有色相如舜若多神則情銷識散然此空散通收無色界由因世界罔象輪回七有想文二初因箋云罔者無也象則想象也影顛倒故和合憶成八萬四千潛結亂想箋云為罔象無形似有似無但起有想之心緣彼影象便生思憶故云和合憶成也潛結亂想為前境或有或無雖緣影象便潛隱結構成於亂想當體輪回如是故有想相羯南流轉國土神鬼精靈其類充塞後果箋云為因中緣於罔象果招神鬼精靈或有或無罔象之間也在天曰神在地曰祇在人曰鬼土木山石曰精靈由因世界愚鈍輪回癡顛倒故八無想文二初因箋云為於前境不了無黠慧之能不了色無常但加執著追想故云癡顛倒和合頑成八萬四千枯槁亂想箋云為前境謝但懷喧囂追想便成枯槁即情枯念槁也如是故有無想羯南流轉國土精神化為土木金石其類充塞後果箋云為追想前境想久精神變為土木金石也昔黃帝之女化為荒夫之草人行觸之則夫貞志山海經云昔有婦望夫不見化為欒木樹也亦如武昌山北有望夫石云昔有婦其夫從役赴國難婦𢹂弱子餞送此山立望夫而死化為立石也疏主云外典雖明內教未見無由引證或通收相分言雖說化為土木金石但通收相分或許類生言或許有情化無情如外道成石那立義期吼也疏主又云待後有全本不可言定由因世界相待輪回僞顛倒故和合染成八萬四千因依亂想九非有色文二初因箋云謂前境難會因依互相仔待皆成虗僞不正或得相偶便生愛染故云和合染成也如是故有非有色相成色羯南流轉國土諸水母等以蝦為目其類充塞後果箋云謂無端的色相是無色假仗因依然後便有色境當情既有色當情乃生染著或有色難為期會乃是無色果水母亦名蛇敕嫁反似盤以蝦為目海水鹹因雨滴水風擊結成也由因世界相引輪回性顛倒故和合呪成八萬四千呼召亂想十非無色文二初因箋云為前境相牽引也性顛倒故者引起能緣心性也呪成呼召者呪呾呼召也由是故有非無色相無色羯南流轉國土呪咀厭生其類充塞後果箋云非無色者不無色也厭生則是厭禱生人也或書他人名字向山林石壁之上星辰日月之下呪咀厭禱也由因世界合妄輪回罔顛倒故和合異成八萬四千回互亂想十一非有想文二初因箋云言彼此皆妄相合也罔無也言彼前物無心被他顛倒呪成却成他子也如是故有非有想相成想羯南流轉國土彼蒲盧等異質相成其類充塞後果箋云非有想者不有想也為前境不有想也蒲盧者爾雅釋蟲云果裸蒲盧注云即細腰蜂俗呼之為蠮螉或採菜蟲蜘蛛為子疏云彼冀回他者為能緣心欲回他故果招呪青蟲為兒也此懷私託者為因中無心合會只伏私託界亦招私託為兒也子無想成想乃母有想將舌關扇道似我似我則別異之質成形如青蟲之質却成細腰蜂也由因世界怨害輪回殺顛倒故十二非無想文二初因箋云或財或色互相殺害結成怨對有此殺顛倒故和合怪成八萬四千食父母想箋云因有怨害便成怪異為親以子殺父是怪故非無想者謂父母不無想也如是故有非無想相無想羯南流轉國土如土梟等附塊為兒及破鏡鳥以毒樹果抱為其子子成父母皆遭其食其類充塞後果箋云無想羯南謂土塊樹子則無想疏云破銷害嚴賢王絶類者出山海經云軒轅帝時破鏡獸出林帝見之問是何物臣謂是破鏡獸緣眼似破鏡害父方出林帝便害之獸鳥二名疏主言未審也是名衆生十二種類後箋云問阿難前來既請六十聖位何故言十二類生答意謂因有十二類生起虗妄舉生起合位妄然後修行也
