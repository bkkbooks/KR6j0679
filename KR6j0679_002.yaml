body:
  text: 天竺沙門般剌密帝譯烏長國沙門彌伽釋迦譯語菩薩戒弟子房融筆受西京大興福寺沙門惟慤科皇宋首楞大師可度箋大初釋經題大分六段初法喻雙彰對箋云梵語摩訶華言大大者謂所詮法也體具含融理極無方非對小故當體得名故下文云吾今為汝建大法幢是也二詮之中表詮所攝佛箋云梵語沒馱佛陀華言覺者今經但存佛不言餘字蓋秦人好略又𮨇此方有情樂欲意趣使聞佛者念善而生勝解故不翻之頂箋云梵語烏瑟尼沙華言頂喻也言此首楞嚴所詮理旨十地菩薩之所莫測喻於佛頂離可見相世尊自不見表離自相無遍身菩薩不見表離他相六十二喻中是第一頂無能見喻也如來二就果明因對箋云梵語耶他華言如來金剛經云無所從來亦無所去故名如來約法身又諸師解云乘如實道還本覺源約報身如成實道來成正覺約化身又慤師云如來者順本之玄稱此約本始義解密箋云梵語哇呬耶華言密堅密也隱覆也雖有塵勞曾無漏失故因箋云梵語醯都華言因因者性義是衆生之本性如來之覺源為在塵勞未得顯現假説為因如來果號密因因名修三明修顯證對箋云梵語乞叉他華言修修謂進修然諸菩薩起如覺心無作妙力為修證箋云梵語娑縛母他華言證謂果證則親獲圓明體證用具足為證故下文云得元明覺無生滅性為因地心然後圓成果地修證了義四詮旨雙陳對箋云梵語薩訶華言了義了謂顯了直指真源表此一經決了談真名之為了聲名句文四法為體下文云吾今已説真修行法義猶理也言此首楞嚴所詮至極之理尋伺跨絶言議道斷下文云妙性圓明離諸名相諸五能行所行對箋云梵語薩囉縛華言諸不一為義菩薩箋云梵語菩提薩埵華言覺有情菩薩略也欲令聞者生善不言覺有情得稱菩薩此是能求能行首楞嚴三昧之人也萬行箋云梵語拶哩華言萬行萬者數義行謂功行然諸菩薩因中皆行六度萬行令求證本須約行論下文云首楞嚴王具足萬行先指能求之人後明所行之行首楞嚴六理深教深對箋云梵語戍楞嚴摩今言首楞嚴略也總指翻就一切事畢竟經箋云梵語素呾覽翻就經義又翻線義古梵語云欲底修多羅亦云修妬露此翻為契謂契理契機故今時經論多就新梵云素呾覽不言修多羅修妬露但言經不言線謂順此方五經九經萬代常行百王不易此經大體以首楞嚴大定為宗頓悟漸修為趣如是將釋此經大分三段初後如是下至承受聖旨名為序分次從佛告至下第八名為邪觀為正宗分後從爾時至下作禮而去為流通分且初序分文分二初通序後別序通序文六初指所聞法箋云如者過去未來現在諸佛所證如如之理也是者是我佛世尊開金口動紅蓮華舌所談我聞次敘能聞人箋云耳根發耳識緣世尊無漏之音今廢耳與意去別就總而言我聞又如是五密因三修證正因正果我慶喜尊者親從佛邊聞得來緣謂當時佛滅度後阿難尊者在七葉岩間結集法藏時身如諸佛具諸相好下座之時還復本形當時衆有三疑一疑佛大悲從涅槃界起更説妙法二疑復有佛從他方來此説法三疑彼阿難轉識成佛為衆説法阿難乃頌出如是我聞大衆三疑頓息一時三陳説教時箋云非一日十二時六時但是衆生根緣成熟冥契佛心理事將終假立一時之號又佛説法無時故云一時佛四標垂主箋云梵語佛陀華言覺者意存梵音令生善故二千年前丈六教主釋迦文是在室羅筏城五彰演法處箋云梵語室羅筏悉底舊云舍衛訛也華一豐德城一足財二好欲境三饒多聞四豐解脫具此四德故曰豐德則中印土國也祇桓精舍箋云亦云祇陀是舊梵新云浙多華言戰勝則波斯匿王太子生時鄰國怨至戰而得勝故曰戰勝樹是太子所捨精舍是須達所建舊梵云須達新云蘇達多華言善施亦云給孤獨善施者仁而且睿積而能散賑濟貧乏哀恤孤老時人讚美其德號給孤獨長者是鉢犀那恃特王之臣舊云波斯匿王今君臣雙舉故曰祇桓精舍祇桓是君精舍乃臣問須達側金功多何故居後祇桓太子捨樹功少何以居前答捨樹功少為君理合居先布金功多為臣義須處後與大比丘衆六述同聞衆文三初聲聞文四初標類箋云與者兼并義師資合舉大者應化大權之稱六位之中是慧俱解脫阿羅漢梵云比丘華言乞士上求諸佛乞法以資神下求檀信乞食以資命五不翻中含多義不翻三人已上盡得衆名千二百五十人俱次舉箋云經家問其時有多少衆頌教出云云律及因果經説佛初成道度憍陳如等五人次度迦葉兄弟三人并門徒一千人次度舍利弗目連等并門徒二百人次度耶舍長者子五十人總一千二百五十五人疏云準此會中憍陳復在既非前數剩五不疑或經舉全數如十類爾俱者處不相離皆是無漏大阿羅漢一歎德文二初總箋云問此千二百五十人有何道德頌出云云皆者總也咸也是者指持義漏則煩惱之異名如人漏舍漏船等深可厭離欲漏六十一法為體有漏九十二法為體無明漏十五法為體如今無此三漏故曰無漏六者六位之中不動位也一退法二思法三護法四住法五堪達法六不動法梵語阿羅漢華言應具三應義應可斷煩惱賊應不受後有身應可堪受人天應供佛子住持後別箋云是佛之子故稱佛子問菩薩之人乃稱佛子聲聞何故亦名佛子答佛有大悲三乘皆子住謂住於無漏持謂住持不失住持生空涅槃令無散失目定之一法善超諸有箋云目解脫也超謂超越諸有則欲有色有無色有欲有分別煩惱無色有俱生煩惱或二十五有如頌云四洲四惡趣梵王六欲天無想與淨居四空及四禪能於國土成就威儀箋云自縛既解不懼輪回能現身於十方國土教化衆生成就圓滿義有威可畏曰威有儀可像曰儀又在貌曰威在身曰儀目慧之一法從佛轉輪箋云如馬勝比丘從佛邊受法説與舍利弗舍利弗得法又説與目連流轉不絶如輪能摧碾一切無明煩惱復能轉邪歸正自辨妙堪遺囑箋云目智言智量深密微妙堪可將遺法付囑於他嚴淨毗尼箋云梵語毗尼華言調伏調謂調練三業伏謂制伏過非言聲聞之人能嚴潔清淨世尊二百五十條戒玉潤氷清即是律藏詮於戒學弘範三界箋云弘大也範法也言能弘大法於三界內利樂有情也應身無量箋云聲聞人欲化衆生先且入定觀他根機然後隨機設化無有限量此人無果位大乘應身此則感應之身向空中現十八變等事目慈之一法度脫衆生箋云令一切衆生離煩惱縛不於三界受生濟未來箋云在手曰拔濟謂濟度正法一千年是佛揚化像法一千年四依菩薩末法一萬多聲聞出目悲越諸塵纍箋云越謂超越諸者不一義塵謂塵勞纍謂業纍自越塵纍是根本智越他塵纍是後得智如今根本後得悉皆超越都歎目戒慧辨解脫慈悲智其名曰四列名箋云問諸大阿羅漢有何名稱答聖人無名向無名體上強立其名大智舍利弗箋云梵語舍利弗呾羅華言春鶯亦云鶖鷺弗呾囉華言子是彼春鶯之子從母立名今言舍利弗者略也其母未懷子前言辭不堪每共弟摩訶俱絺羅論義常不如弟懷子已來酬答聰俊乃勝於弟以母多辨喻曰春鶯是彼所生故乃稱子嘗與目連為友同事闍耶外道十大弟子中大智第一標為上首十方諸佛皆以智為首也摩訶目犍連箋云舊梵語訛也新云摩訶沒特伽羅華言大採菽氏摩訶是大沒特伽羅是採菽氏菽者豆之總名上古有仙在山修道但採豆苗而食此尊者是彼之種十大弟子中神通第一摩訶拘絺羅箋云大膝蓋尊者言其膝蓋大故舍利弗舅氏富樓那彌多羅尼子箋云此訛梵也正梵應云補剌拏梅呾羅華言滿慈子滿是其名慈是母性母未懷子前性多惡戾懷子之後其性甚慈是彼之子或從滿江神乞得此子名滿慈子或滿與慈皆是母號曰滿慈子須菩提箋云復名須補底華言善現亦云空生緣此尊者生下之時其家中所有器皿一時皆空相師相曰此子若也出家當解諸法空相優婆尼沙陀等而為上首箋云亦云烏波尼殺曇華言近少分烏波尼是近殺曇是少分然此尊者初作觀時向身上取一莖毛假想慧刀竪析為四分四分之中取一分析為十六分十六分中取一分析為二十五分二十五分中取一分析為百分百分之中取一分析為千分至不可析處欲近於空末後一分名鄰虗塵謂鄰近虗空更不下刀才下刀便歸於空留此一分攝一聚心所令無散失等謂等前五人仍為最上頭首彼此尊者作析色明空觀為第一又五陰之中析色為首復有無量二緣覺并初心箋云復謂重復有者不無義無量則數廣難陳辟支無學箋云梵語辟支迦華言獨覺亦云麟角此人斷自成煩惱證生空涅槃作七十七智觀四十四智觀觀無明即空達諸行無作有二種一利根者出增劫種無佛因出無佛世作佛燈後焰才見佛出世來故大慈光爍陀覩光將謂劫減便向盤陀石上內化智火焚身身與智一時撥喪無餘同太虗空二鈍根者種有佛因出有佛世是部行者有部類而行或五十或一百經舉鈍根無學者證無學位簡聲聞居有學位并其初心同來佛所箋云或發大乘初心是十信或發緣覺初心緣謂四十五年後説此頂三昧法二時奔驟來到祇園屬諸比丘後列菩薩文三初舉時求法箋云屬值也遇也休夏自恣箋云休夏七月十六日也西土衆僧夏滿或有見聞疑罪當衆目不諱短恣他舉愆十方菩薩咨決心疑箋云東西南北四維上下大心有情咨請世尊為其決擇猶豫不決曰疑若約菩薩之人無疑疑唯分別入到見道門中已斷然此人雖無分別煩惱猶有第七識一分法執未忘假説名疑或可下地不了上地欽奉慈嚴箋云欽謂欽敬奉謂奉重佛有誨子之能雖慈又且嚴厲將求密義箋云將當也求覓也言當欲求覓世尊祕密甚深之理向下説五密因三修證即時如來敷座宴安次酬請普霑箋云即者不捨之義衆人所請將求密義之時如則一如之理起智來合理故曰如來是化身如來也敷設法座巍巍堂堂宴寂安詳是首楞嚴三昧之宗目法界大定亦如法華經入無量義處三昧或云敷尼師壇靜然安坐義通為諸會中宣示深奧箋云阿難尊者頌出敷座宴安言此是佛宣揚顯示甚深祕奧之理法筵清衆得未曾有箋云一會三十六類文殊普賢諸阿羅漢可量清淨之衆盡獲利殊勝然四十五年後説此佛頂三昧不並餘筵迦陵仙音遍十方界箋云梵語迦陵頻伽華言共命鳥六十四音一妙音也此鳥音聲柔軟清亮哀雅堪比佛音恆沙菩薩來聚道場後列名上首箋云梵語恆河亦云殑伽河華言天堂來河言此河來處遠如天堂而來周圍四十里其中沙細如與水混流菩薩如河沙之多菩謂菩提此謂之覺則上求佛果也薩謂薩埵此曰衆生則下度有情也皆從十方而來聚集在於祇園一會得道之場或道則所證之道場及寂滅之場文殊師利而為上首箋云經家問未審誰為上首頌出云云梵語文殊師利亦云曼殊室利華言妙吉祥此菩薩生時有十種吉祥從此為名是北方梵德王太子也通序已竟時波斯匿王從此時波斯匿王下至承受聖旨是別序文十初明波斯設供奉請如來箋云前通序通諸教共有六種成就義後別序唯此教別別而談故時者當前酬請之時也梵語波斯匿此語訛略也具足應云鉢羅斯那恃多華言勝軍一象軍二車軍三馬軍四步軍四軍皆勝故萬方歸往曰王為其父王諱日營齋箋云為與也其者屬下之辭父王先皇也言先皇正當七月十六日崩今當忌諱之晨所子營辦齋羞也忌諱者忌舉吉事諱避其名也請佛宮掖自迎如來箋云屋內之屋曰室室內之室曰宮宮外兩廓曰掖十六日國王自出城往祇陀迎佛或三處迎一往祇陀園二中路三出宮門廣設珍羞無上妙味箋云廣大鋪設珍妙羞饌熟食曰羞國王設齋一切微妙食無能過者在口曰味食有三德一輕軟二淨潔三如法也兼復親延諸大菩薩箋云兼并也復語辭也問未審只請佛為復別命諸大菩薩經家答云云城中復有長者居士二明同請既多敕徒分應箋云復又也城盛也言盛貯一切人故是長之者年耆室富德重推尊居家內治育道怡神之士同時僧佇佛來應箋云同向七月十六日解夏之時家家僧佇待我佛世尊來為他應赴也佛勑文殊分領菩薩及阿羅漢應諸齋主箋云世尊出語曰敕佛既受國王所謂不可違王悅庶所以敕文殊分頭領諸大心有情及三應上士越城中長者居士家齋與其長福田故唯有阿難先受別請遠遊未還不遑僧次三阿難別請無供獨歸箋云唯者遮簡為義有者不與之義遑猶及也梵語阿難陀華言慶喜世尊初成道日外奏淨王悉達多太子已得成道內宮又奏解王生下太子以此相慶賀故曰慶喜七月十五日先受別施主所請遠遠遊行未得歸還既然未還所以不及兩頭僧次也既無上座及阿闍梨途中獨歸其日無供箋云坐居人上謂之上座梵語阿闍梨華言軌範師又云悅衆阿難途中獨自歸來其日又無後供懸給於他即時阿難執持應器於所遊城四執器求餐學行平等箋云即當齋不遑僧次之時執持世尊應量之鉢器應身量心量故於向也阿難具能遊之人城是所遊之境次第循乞箋云循順也次第一家至一家順教中去四邪命食一仰口食仰觀星象二下口耕種等事三方口致使通傳四尖口和合醫藥唯以乞食為上或可循環諸家遍乞食心中初求最後檀越以為齋主箋云第六識心中思惟初求施與最後施及滿鉢底檀越俱是齋主梵語檀波羅蜜華言布施既行布施然後越生死此岸到菩提彼岸名越此則唐梵雙舉無問淨穢剎利尊姓及旃陀羅箋云西天有淨行婆羅門穢行婆羅門梵語剎利帝華言田主是國王種西土有四姓此為上姓梵語旃陀羅華言嚴熾惡業復云不律儀者則畋獵漁捕屠兒等阿難如今也不問淨之與穢一向乞食無取捨心方行等慈不擇微賤發意圓成箋云方比也言方比世尊行平等之慈或方便行其平等之慈不簡擇微下貧賤發起心意圓滿成就行其平等也一切衆生無量功德箋云能求之人心既無量所施之者福亦無量阿難已知如來世尊呵須菩提及大迦葉五意超雙意嚴服入城箋云已既也呵責也如來倣同先迹號世尊出世獨尊號梵語迦葉波華言飲光上古有仙身有光明蔽日月之光迦葉是彼之種須菩提從富乞迦葉從貧乞為阿羅漢心不均平箋云為是也均等也世尊曾呵責此二人是三應上士無平等心皆是取捨也欽仰如來開闡無遮箋云欽敬仰效於佛開闢闡揚無其遮障不簡怨親無遮偏益之義度諸疑謗箋云度謂度脫疑則一切凡夫疑心生其譏嫌謗則要免外道生其毀謗經彼城隍徐步郭門箋云經謂經歷有水曰池無水曰隍人取土之處徐庠其步城郭之門郭猶廓也謂廓落在外故嚴整威儀肅恭齋法箋云莊嚴整頓其威儀肅肅睦睦恭謹其齋法實兩經第八卷云乞食六處不能往一不應往惡狗處二不應往新産犢處三不應住惡種類處四不應往男女起煩惱處五不應往人所譏嫌處六不應往外道處爾時阿難因乞食次經歷淫室遭大幻術六遭遇惡緣毀尸羅行箋云遭遇也當乞食之時因執鉢之次經行歷涉敗風之染室遇大幻惑法術是先梵天呪也摩登伽女以娑毗迦羅先梵天呪攝入淫席箋云華言本姓安則女之別名以用也娑毗迦羅華言黃頭仙亦云黃赤色仙言其鬚髮作黃赤色誦呪作法拖華塗壇攝其阿難入彼淫舍淫躬撫摩將毀戒體箋云將當也在手曰撫摩被女身手摩觸也當毀損彼阿難戒體犯摩觸戒八萬行中只毀一戒犯僧殘罪二十大僧中懺彼罪當得清淨可中犯根本罪則不能懺如針鼻缺不復再用如斷多羅樹不能還生如斷人頭不復再活如析石不復更合問戒以何為體答或云無表思為戒體非也只如無表思爭解毀得今但以受戒之體約五蘊身下經云持犯但束身非身無所東如來知彼淫術所加齋畢旋歸七大覺知溺旋歸給園箋云加交也被也畢罷也旋還也言佛以正遍知知彼阿難被他幻法所交齋罷還歸祗陀林中王及大臣長者居士俱來隨佛願聞法要箋云及乘并之義王即勝軍王大臣即朝廷百官疏云準前王宮却還有長者居士等指此文于時世尊頂放百寶無畏光明入化演真言敕提趨會箋云于時倐忽之端頂衣無如過者烏瑟尼沙之頂百寶金銀琉璃等無畏自在義光中出生千葉寶蓮箋云向頂門上放光光中出一朵寶蓮華有五千葉表當來千佛下生有佛化身結跏趺坐宣説神呪箋云又向寶蓮之內化一小化身佛跏交也若是左腳按右曰降魔坐右腳按左曰吉祥坐如今不是此二種是結跏趺坐兩腳相交腳跟俱上神呪即白傘蓋真言四百二十六句勑文殊師利將呪往護惡呪銷滅箋云真佛勑將此呪往彼救護阿難令其惡呪銷滅明來暗謝智起惑亡也提獎阿難及摩登伽歸來佛所箋云提拔獎勸慶喜并本姓女同歸時來佛説法所阿難見佛頂禮悲泣九責躬悲懇求佛妙門箋云阿難從摩登伽室內歸來祗園會上觀見世尊以最高之頂禮佛至卑之足表其鄭重有聲無淚曰悲無聲有淚曰泣恨無始來一向多聞未全道力箋云恨其無始無初已來蓋空王佛時同發大心一向多聞為性住持諸佛無漏言教然且多聞不能敵業乾慧未免苦輪將聞持佛佛何不自聞聞又多間增智慧是不知實相未全首楞嚴大定之力力者難尼伏義既未全其力便被邪法所攝殷勤啓請十方如來得成菩提箋云殷勤再三請法之辭菩提是有為果其中含取無為果妙奢摩他三摩禪那最初方便箋云梵語奢摩他華言止如水止住不流是靜觀即體之智智有了境之能三摩鉢提華言等至等謂齊等離沈掉故至謂至到生勝定故是幻觀乃同體大悲悲有利他之事禪那華言靜慮即慮而靜故無散動即當定義即靜而慮故非無記即當慧義定慧同等故曰禪那是寂滅之理佛位定名此三雖有二名而無三體俱不出首楞嚴大定言果位聖人得成有為無為二轉依果因何便得所以道妙奢摩他三摩禪那皆因此三觀大定之門為果位最初方法巧便亦為諸佛如來入道之因也於時復有恆沙菩薩及諸十方大阿羅漢辟支佛等十處會欣聞同希佛演箋云於向也向阿難請三觀之時恆沙言其無數俱願樂聞退坐默然承受聖旨箋云俱總也總願愛樂聞佛無漏言音身心寂默不緣外境承覽領受世尊微妙理旨序分已竟從此下是正宗分二解正宗分箋云正者簡邪為義宗者主義當部所崇曰宗宗之不謬曰正又正顯寶覺真心正破有情妄執宗法界妙定故曰正宗大科分二初釋密因後明修證兩段且釋密因中又分五段初簡妄二見相三會相四了妄五決擇且初簡妄明真指密因分二初破妄識處後通指密因初破妄識處科分為十段初先窮內執次質外徵三潛根再詰四就暗通搜五究研隨合六內外兼袪七後徵無著八黃河清濁九奪有呵迷十披砂簡金且初先窮內執似服神湯謂阿難被邪法所禁文殊提獎歸來不問犯戒之由且間辭榮之意於是世尊便問經云佛告阿難汝我同氣情均天倫當初發心於我法中見何勝相頓捨世間深重恩愛阿難遂陳入道之因經云阿難白佛言世尊我見如來三十二相勝妙殊絶乃至是以渴仰從佛剃落於是乎世尊知道阿難愛相出家正是無明病本遂便未破之且以軟語讚歎阿難言善哉阿難汝等當知一切衆生從無始來生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉有何所以之故世尊便作如是讚歎阿歎故疏云法王大悲意垂詮曉歎呼今其欣悅使辨真源是故世尊便徵云我今問汝當汝發心緣於如來三十二相將何所見誰為愛樂於是阿難便乃顯答心云如是愛樂用我心目由目觀見如來勝相心生愛樂故我發心願捨生死是故世尊便確徵心目云吾今問汝唯心與目今何所在答阿難白佛言世尊一切世間十種異生同將識心居在身內世尊乃泛舉一人在堂不見如來云亦有衆生在此堂中不見如來見堂外者阿難便答云在堂不見如來能見林泉無有是處所以慶喜但積餘迷寧知密員世尊便破云阿難汝亦如是汝之心靈一切明了若汝現前所明了心實在身內爾時先合了知內身乃至心肝脾胃爪生髮長筋轉脈搖誠合明了若不知者云何在內上敘破內竟佛告阿難汝我同氣情均天倫當初發心於我法中見何勝相頓捨世間深重恩愛初神湯內瀉徵文五初寄問密徵文六初問辭榮意箋云汝指阿難我佛自稱八自在我同陰陽之一氣佛是淨王子阿難是斛王子情性均平天然倫流著其次第兄先弟後也問阿難汝當初發心出家之時向我法中見何殊勝相狀使乃斗頓中間棄捨世間深恩無過父母重愛無過媚妃女等阿難白佛我見如來三十二相二陳入道因箋云慶喜口陳辭句咨白我佛世尊阿難稱世流布我三十二大人相出般若經三百八十一卷廣明勝妙殊絶形體映徹猶如琉璃箋云勝簡劣妙簡粗殊簡尋常絶稱無對形容身體映淨明徹云寶之中喻琉璃寶光明炳煥內外無瑕常自思惟此相非是欲愛所生箋云尋常自家心思惟度此之相狀不是父精母血情愛所生世尊此相乃戒定慧解脫解脫知見所生何以故欲氣粗濁腥臊交遘膿血雜亂箋云自徵不能生理欲氣則父想母想子想假合成身粗淺重濁魚臰曰腥膠臰曰臊交者猿猴等相交遘集父精母血和合而成雜亂可知不能發生勝淨妙明紫金光聚箋云不能發生殊勝清淨微妙光明佛身如似五箇紫金聚緣於一處是以渴仰從佛剃落箋云從依也是由所以之故便乃渴切如人渴求水下望上曰仰仰慕於佛依佛世尊剃除鬚髮出家剃音剔除髮之貌佛言善哉三雙顯二源箋云阿難見佛三十二相是愛相出家便有能愛之心所愛之境淨名云無利無功德是真出家佛大慈故未便責他且權歎令其歡悅向後破之阿難汝等當知一切衆生箋云普告會中須知要知使令知其真妄二本一切總包都象責法界內背覺合塵底衆生也從無始來生死相續箋云從無始無初已來生死相續連環真樂本有失而不知妄苦本空得而不覺皆由不知常住真心性淨明體箋云由因也梵語乾栗馱華言真實心問此等還知真否答皆因不知有恆常不動轉故本來真常之心終日圓覺未嘗圓覺也性是體性性本來性淨謂清淨明謂圓明體是真體下文云雖終日行而不自覺用諸妄想箋云問一切衆生既不自知日用如何答用諸虗妄相想此想不真故有輪轉箋云言此妄想不是真實當體是妄苦也用此虗妄之法如車之輪輪回三界流浪四生汝今欲研無上菩提四勗端心體箋云汝指阿難今者不捨之義欲謂希欲研謂研究五菩提中簡餘四是無上菩提若是三菩提亦是無上菩提五菩提者一發心十信二伏心資加三明心初地四出倒八地五無上佛位真發明性箋云真實發起明白之性下文云得圓明覺為因地心然後圓成果地修證應當直心酬我所問箋云當合端直其心酬答我之所問十方如來同一道故出離生死箋云道者出生義遊履義同一真道出離三界皆以直心心言直故箋云皆咸也以用也心既直言亦直如是乃至終始地位中間永無諸委曲相箋云如是指法之辭乃至起越中間終是佛果位中二身四智悉皆圓滿始是從凡夫地面上發起十信初心地則十地位則五位於其中間因既直果亦直因中以不直心果中亦招迂曲之相狀也阿難我今問汝當汝發心緣於如來三十二相將何所見誰為愛樂五密徵因本箋云我今以事問汝阿難初發心時豈不是用第六識心緣佛之相問第六識心是有漏佛三十二相是無漏莫犯有漏緣真過否莫成心外取法唯識義不成否答然阿難第六識心雖是有漏緣謂仗佛三十二相為本質然後自變一重影像假第六識心緣不犯心外取法乃唯識義成佛意欲得陀阿難彰其妄本阿難白佛言世尊如是愛樂用我心目六顯答心箋云心是第六識心或八識心目是浮根四塵也由目觀見如來勝相心生愛樂故我發心願捨生死箋云目既浮根四塵故不能見見唯是心疏云慶喜和明聊伸兩用目有一用心有一用若言目有見死人有眼因何不見是知唯是心也佛告阿難如汝所説真所愛樂因于心目二寄喻密審文二初審問文三初牒酬策智箋云如汝前來所説真實愛樂因于心之與目此牒前計阿難是能愛樂之人佛是所愛之境若不識知心目所在則不能得降伏塵勞箋云若不識知無明為能變心目為所變所在是根本無明所起之處則不能降伏一切塵勞業纍因塵生勞故曰塵勞譬如國王為賊所侵發兵討除是兵要當知賊所在次舉喻令觀箋云王喻法性身居法性土得其自在賊侵喻被根本無明根本無明名不覺塵沙煩惱最初因發兵喻始覺淨智須知根本無明所起之處然後萬能棄末歸本棄無明趣前法性身居法性土也使汝流轉心目為咎吾今問汝唯心與目今何所在三確徵心目箋云使汝阿難流轉三界皆因心目為其過咎我今詢問汝阿難唯心之與目今在何處阿難白佛言世尊一切世間後局答箋云一切總包都象世者遷流義過去遷至現在現在遷至未來間者一切衆生造業墮在其間也十種異生同將識心居在身內箋云十種此舉全數有十二類一胎二卵三溼四化五有色六無色七有想八無想九若非有色十若非無色十一若非有想十二若非無想疏云或經舉全數如十類耳指此文異則別異生者起也凡夫位內由分別障故見解各別造業不同後蘊起亦各有異名曰異生縱觀如來青蓮華眼亦在佛面箋云淨名云目淨修廣如青蓮亦秪在佛面前是答心所在此是答目所在也我今觀此浮根四塵秪在我面如是識心實居身內箋云色香味觸地水火風此浮根皆是四塵假合而成何故不舉聲言聲是虗不舉佛告阿難汝今現坐如來講堂觀祇陀林今何所在三寄事密破文三初問境所在文三初問箋云講堂是佛演妙義之舍觀祇陀太子園林今在何處所世尊此大重閣清淨講堂在給孤園今祇陀林實在堂外後答箋云屋上之屋曰樓閣離囂塵曰清淨是佛開金口縱四七智辨之處在給孤獨長者須達之園阿難汝今堂中光何所見次審見先後文二初審世尊我在堂中先見如來次觀大衆如是外望方矚林園後答阿難汝矚林園因何有見後徵見所因文二初徵世尊此大講堂戶牖開豁故我在堂得遠瞻見後答箋云盤見因何高談戶牗前來言眼見如今却説戶牖開豁得遠瞻見與前相違爾時世尊在大衆中舒金色臂摩阿難頂四安慰顯插文四初舒慰揚權箋云舒開也展也世尊身如紫金臺手作真金色摩頂表此是頂三昧之教又令他向下悟此頂三昧之詮告示阿難及諸大衆有三摩提名大佛頂首楞嚴王具足萬行二告開真路箋云告白指示慶喜并三十六類大衆十方如來一門超出妙莊嚴路箋云門者出入義三乘聖人起智證理從此門入六趣凡夫起惑造業從此門出又三乘聖人起根本智冥合真如時從此門入然後起後得智入俗利生從此門出超謂超越出猶到也妙謂微妙離能所故莊謂莊校嚴謂端嚴路是三乘聖人遊履之處則首楞嚴大定也汝今諦聽三勑聽微旨阿難頂禮伏受慈旨四慶喜伸儀箋云伏第六誠心不緣諸境領受世尊慈悲理旨也佛告阿難如汝所言身在講堂戶牖開豁遠矚林園五舉喻顯破文四初舉前返問文二初牒前辭亦有衆生在此堂中不見如來見堂外者後泛指假徵箋云泛舉一人要定陀妄執阿難若言有此人便乃救得前來執心在內之義阿難答言世尊在堂不見如來能見林泉無有是處二順答彰非箋云阿難答意在堂須見疏云但積餘迷寧知密負阿難汝亦如是汝之心靈一切明了若汝現前所明了心實在身內三斥責不知文六初顯過牒計爾時先合了知內身二惟理鑒內頗有衆生先見身中後觀外物三引世異生誰先覩內箋云頗者還也可也縱不能見心肝脾胃四縱不辨內箋云更添肺成五藏細相縱汝不見爪生髮長筋轉脈搖誠合明了如何不知五責不知外箋云爪生髮長等粗相因何不見必不內知云何知外六內外俱破箋云云何知外粗相以內例外俱破是故應知汝言覺了能知之心住在身內無有是處四舉成虗執第二質外徵搜如膏返愶箋云然謂阿難前來執心在內已被世尊破却又向此中執心在外故疏主云阿難被詰執內理亡巧引燈光以成居外何以得知故經云阿難稽首而白佛言我聞如來如是法音悟知我心實居身外便説室外存燈喻云譬如燈光然於室中是燈必能光照室內從其室門後及庭際一切衆生不見身中獨見身外亦如燈光居在室外不能照室佛便舉一食餘充喻破阿難執心在外云佛告阿難是諸比丘適來從我室羅筏城循乞摶食歸祗陀林我已宿齋汝觀比丘一人食時諸人飽否阿難遂答異形乖理以墮執外之心答云不也世尊自徵有何所以之故是諸比丘雖阿羅漢軀命不同云何一人能令衆飽世尊又舉手徵心問阿難云我今示汝兜羅綿手汝眼見時心分別否阿難便言分別經云如是世尊便破云若相知者云何在外然後總破是故應知汝言覺了能知之心住在身外無有是處上敘破外竟阿難稽首而白佛言我聞如來如是法音悟知我心實居身外二靈膏返愶徵文二初立文三初迷因除舊執生現計心箋云言我聞前來破心不在內之法音悟解知我此心實居在此五蘊身外下便説室外存燈喻所以者何譬如燈光然於室中是燈必能先照室內從其室門後及庭際次徵立燈筌附成新理箋云燈光在室如心在身便合見心肝脾胃等事然後方見山河大地似燈照室然後從其室門後及庭際一切衆生不見身中獨見身外亦如燈光居在室外不能照室箋云心居身外不見身內亦如燈光居在室外不能照室是義必明將無所惑同佛了義得無妄耶後陳無惑抑類謙辭箋云是此也將當也言此義必定分明當無所疑惑得無妄耶者諫疑之辭也佛告阿難是諸丘適來從我室羅筏城後破文二初寄事密破文三初問一食餘充箋云從往也是諸千二百阿羅漢等通來指説法前遊城乞食之時循乞摶食箋云古本翻為摶食蓋西土施僧食多以手摶施之此則收法不盡為水漿溼物等摶之不得後奘法師翻為段食食有一分一段故然食以四法為體色香味觸也歸祗陀林箋云歸祗桓精舍也疏云汝與比丘歸祇陀林證此非異指此文我已宿齋箋云隔宿受請佛為三界大師植福者咸請如來汝觀比丘一人食時諸人飽否箋云一人既食之時諸餘等人還飽不飽阿難若道飽便救得前執心在外義成阿難答言不也世尊次答異形乖理何以故是諸比丘雖阿羅漢軀命不同云何一人能令衆飽後因徵違事箋云阿難自交鋒鏑便道云何一人能令衆飽此尸密員也佛告阿難若汝覺了知見之心實在身外後對徵顯破文四初試并兜羅文四初牒計箋云若汝能覺能了知見第六識心決定居身之外身心相去聲外自不相干二總述箋云心在身外身在心外身之與心不相干涉如水與火了不相涉且定他計則心所知身不能覺三互表相離文二初舉心顯身離覺在身際心不能知後標形彰性外箋云覺在身際之時心亦不能知身覺謂心在外故向下破之我今示汝兜羅綿手四標境窮心文二初告他顯指箋云佛將手為境定他阿難汝眼見時心分別否後問矚徵心箋云若言不分別救得前執心在外義成阿難答言如是世尊二正酬隨別箋云阿難不知答云如是佛告阿難若相知者云何在外三責外心非箋云宛然在內是離質相知過是故應知汝言覺了能知之心住在身外無有是處四結成難執第三潛根再詰況下金針箋云阿難前來執心在外已被世尊破之此中又轉計執心在潛根之內所以便説琉璃籠眼喻云猶如有人取琉璃碗合其兩眼雖有物合而不留礙乃至無障礙者潛根內故世尊便問詰阿難云彼人當以琉璃籠眼當見山河見琉璃否阿難言我若言見又有何過若言不見又有何過所以且言見云如是世尊是人當以琉璃籠眼實見琉璃佛便破云汝心若同琉璃合者當見山河何不見眼此又是眼即同境過若言不見又有何過佛云若不能見云何説言此了知心潛在根內如琉璃合此又是見遠迷近過然後總破云是故應知汝言覺了至無有是處疏云慶喜引琉璃之喻唯思不礙之邊法王破中此眼不齊於物見上破潛根竟阿難白佛言世尊如佛所言不見內故不居身內身心相知不相離故不在身外我今思惟知在一處三針治內障徵文二初立文五初含述心居箋云知在一處者阿難且庵含而執也佛言處今何在二確徵居理阿難言此了知心既不知內而能見外如我思忖潛伏根裏三爰陳審計箋云此了知心既不知內牒前不見心肝等事而能見外又分明見於外境我今尋思忖度潛伏藏在眼根之裏將舉琉璃籠眼喻猶如有人取琉璃碗合其兩眼雖有物合而不留礙彼根隨見隨即分別四舉喻彰成箋云七寶之中有琉璃之實喻如人取琉璃碗籠其兩眼雖有物合而不羈留罣礙而法見於外境我心在根裏而能見外亦如是令將琉璃喻如眼將眼喻如心彼眼隨境即有見隨即分別眼既見心即分別然我覺了能知之心不見內者為在根故分明矚外無障礙者潛根內故五結陳潛理佛告阿難如汝所言潛根內者猶如琉璃彼人當以琉璃籠眼當見山河見琉璃不後破文六初雙收隻詰箋云如汝所言牒他計也彼人當用琉璃籠眼之時當見山河還見琉璃不見琉璃阿難若言見即成見根同境過若言不見又成見遠迷近過如是世尊是人當以琉璃籠眼實見琉璃二奉對俱瞻箋云阿難不知言見又如何佛下責云佛告阿難汝心若同琉璃合者當見山河何不見眼三責不瞻根箋云眼喻如心琉璃喻如眼眼既見琉璃又見山河心因何不見眼若言見與不見皆成過俱救不得若見眼者眼即同境不得成隨四破根重境箋云理實不見此語縱他見眼眼根即同前境不得成隨汝身便成外物既成外物將何為汝眼乃境無隨見過若不能見云何説言此了知心潛在根內如琉璃合五責理不齊箋云若不能見法喻乃不齊前來説見琉璃此中應見眼是故應知汝言覺了能知之心潛伏根裏如琉璃合無有是處六結成非理箋云此則法喻俱破第四就暗通搜如加火𧣌箋云然謂阿難前來執心在潛根已被世尊破却又向此中執心在腑藏之中便云我今對佛開眼見明名為見外閇眼見暗名為見內是義云何要救前內外二過所以世尊便問汝當閇眼見暗之時此暗境界為與眼對為不對眼若與眼對暗在眼前云何成內正破若成內者居暗室中無日月燈此暗室中皆汝焦腑縱外空破若不對者云何成見正破便有質外不成居內破自他交亂破二知兩佛雙心破等然後總破云是故應知汝言見暗名見內者無有是處故疏主云俄思竅藏之謀對述昧明之理一敘就暗文竟阿難白佛言世尊我今又作如是思惟是衆生身腑藏在中核穴居外有藏則暗有竅則明令我對佛開眼見明名為見外閇眼見暗名為見內是義云何四火𧣌返搜徵文二初立箋云腑是三焦六腑藏是五藏居在身中身有九竅眼二目二鼻二是六更口是七前後二密處成九心肝等五藏在內則暗有竅在外則光明阿難雙計云開眼見前明境名為見外此義若成救得前來執心在外義閇却一雙眼見暗之時名為見內此義若成便救得前來執心在內問佛此義又如何表意不自專也佛告阿難汝當閇眼見暗之時此暗境界為與眼對為不對眼後破文二初順文二初雙徵對否箋云此暗境界為與眼相對不與眼相對是牒計雙問阿難外來若道對又有何過若言不對又有何過二俱有過其過者何若與眼對暗在眼前云何成內後就別傍袪文二初對文二初暗居身外破箋云若言與眼對佛便牒他計道若與眼對如物在面前相對此又是在外何成在內正破若成內者居暗室中無日月燈此室暗中皆汝焦腑後外空焦腑破箋云若面前暗境成於內者居在暗室之中無日月燈三光之時此暗室之中莫一時成你三焦六腑今但言不對又有何過下便牒若不對者云何成見後不對箋云若暗境不與眼對者又云何成見夫見者須有物在眼前方説見無物何見則無對立見過若離外見內對所成後返破文六初返顧不能瞻面破文三初縱箋云若離却開眼見明名為見外閇眼見暗名為見內此是牒計合眼見暗名為身中開眼見明何不見面次責箋云合眼返見內暗之時且許你見內開却一雙眼見明何不見你自家面若不見面內對不成後結箋云開眼見明若見面閇眸瞻暗內義成開眼見明不見面閇眸瞻暗內不成見面若成二質外不成居內破文三初許箋云忽若見面又如何理不合見且縱他見明亦見自己面此了知心及與眼根乃在虗空次成箋云此能了能知第六識心及與眼根須懸在空中始得何成在內後破箋云既在外何成內是心眼居空過若在虗空三自他交亂破文二初立箋云理實不在空且縱他自非汝體後破文二初引性成他破箋云言不是汝自家身體乃別人體是自成他質過即應如來今見汝面亦是汝身後引他成己破箋云即合佛今覩汝面亦是你自家身阿難前來道我心在虗空又見自己面既也如此汝身既成他身他身亦成你身即教主如來亦合是汝阿難便成他身同己過汝眼已知四身眼不合分知破文二初立箋云又轉破汝眼已知之時身合非覺後破箋云汝眼既在虗空已有覺知汝此四大之身合同枯木石頭無情之物如今又有覺知必汝執言身眼兩覺五二知兩佛雙心破文三初定執箋云必定也我令但云身也有一覺眼也有一覺便牒云定汝阿難執言眼在虗空有一覺知身亦有一覺知便成身眼分心過是計或遮破應有二知次縱立箋云應合也合眼有一知身有一知即汝一身應成兩佛後破箋云即汝阿難一身斷障證理須成兩箇佛乖世宜便是一身兩性過是故應知汝言見暗名見內者無有是處六結破第五究研隨合神呪鞭治箋云然謂阿難前來執心在腑藏之內已被世尊破了又向此中執第七識云隨所合處心即隨有七識是恆審思量為體疏主云準理即六隨文或七是破即六五八可知經云我今思惟即思惟體實我心性世尊以亦有亦無句破之世尊便問有體隨合無體隨合此且雙徵然後單破阿難言若有體無體有何過今且言無體佛便破云若無有體而能合者則十九界因七塵合外人問阿難計無合有何將一無破之答體非自有即是計無苦言是有又有何過世尊便破云若有體者如汝以手自挃其體汝所知心為復內出為從外入若復內出還見身中若從外來先合見面阿難便起難世尊云見是其眼心知非眼為見非義世尊將門比目顯死無觀以重袪救執便問云若眼能見汝在室中門能見否又問則諸已死尚有眼存應皆見物疏主云且將門比目理則昭然顯死無觀了心為主然後重破有邊一體多體遍體不遍等上敘破隨合文竟阿難言我常聞佛開示四衆由心生故種種法生五神呪鞭治魍魎文二初立文三初敘昔演箋云開攝悟示攝入乃開示悟入由因也指八識初迷真生二倒即一念違如覺勞相現便有業轉現三細識此現識是第八識體為一切法所依然建立及受用皆從八識生八識為能生法即根身器界等由法生故種種心生箋云因由法塵影像生故便有第六識依仗法塵生住異滅而起第六識如病人非杖不能行故下文云塵非常住若變滅時此心即同龜毛兔角此識非塵境事動即不能起何不便舉第七識謂舉第六識計第七識或阿難留第七識為計我今思惟即思惟體實我心性次彰自審箋云第七識以恆審思量為性第八恆非審七亦恆審六非審非恆五非恆非審思惟體即是第七識恆以內審不能外緣即此第七識實是我之心性也隨所合處心則隨有亦非內外中間三處後指隨顯箋云識隨境合若言隨合即第六識亦非內外是前內外問中間未到何故言之答阿難向下欲計中間今向此中舉也佛告阿難汝今説言由法生故種種心生後破文四初雙破有無文二初破無文二初牒計正破文三初牒引箋云種種心生此是六識舉第六引到第七計隨所合處心隨有者次立箋云是牒計此亦是第六識是心無體後破文二初定執箋云為復有體説合無體説合阿難但言無體又如何牒云是心無體則無所合後破箋云破云則無所合夫物合須有二方説合今和會雖有三名俱是一妄識未審無合有境又如何下牒若無有體而能合者後縱立窮非文三初立許則十九界因七塵合次引例箋云若將無合有既得即須將無合無無合無義且不成無合有義然彰壞世間秪有十八界六根六塵六識三六一十八界言十九是一無表心無秪有六塵色聲香味觸法言七是一無表境無是義不然後結破箋云汝言合者是義不如此何處無體而合有境犯將無合有過若有體者後遣有文四初定執箋云我今但道有體合又如何下牒破如汝以手自挃其體二引觸彰體箋云如汝阿難用手自家挃觸其體汝所知心為復內出為從外入三雙徵箋云所知心是第七識恆內知為從內出去為從外入來內出又如何下文牒若復內出還見身中四各破箋云若復內出還見汝自家身中心肝等三十六物如前執內文若從外來先合見面箋云佛道而來先須見汝自家頭面此內外俱迷過阿難言見是其眼心知非眼為見非義二乘違再救箋云阿難却救云我前腑藏文世尊破云開眼見明何不見面今此隨合文中心知不是其眼世尊因何抑令見面將心知作眼見非其義然阿難乃大權之人無此執蓋為凡夫執眼能見故有此救文愧得佛破之佛言若眼能見汝在室中門能見不三先祛救執文三初抑門能見箋云定他確執眼能見破云汝在屋室之中門能見不阿難若道能見便救得眼能見門既不能見説眼能見義不成緣眼如門人如心大意破他眼不能見見唯是心則諸已死尚有眼存應皆見物次死目邀觀箋云人死無心有眼存在合皆見物因何不見我今但道見物又如何下破若見物者云何名死後縱觀非死箋云死若見物則不名死阿難又汝覺了能知之心若必有體四重破有邊文三初總徵文二初立箋云若如也必定也言如定是有體為復一體為有多體今在汝身為復遍體為不遍體後徵箋云言一體又如何下牒若一體者則汝以手挃一肢時四肢應覺次別破文四初破一文三初正破箋云若言識是一體即遍一身則汝用左一手觸右邊一手四肢須一時覺若言四肢總覺便説得一體義成若觸一肢四肢不覺便犯餘肢不覺過四肢即兩手兩足也今但言咸覺又如何下牒若咸覺者挃應無在次轉破箋云若一時覺何肢受挃故挃無在即犯同知失觸過今但道挃有處所又如何下牒若挃有所則汝一體自不能成後結破箋云若挃有處所則有分劑則汝前來一體義又不成若有處則經手之時足又不知何名一體便犯受挃稱無過但言多體又如何下牒若多體者則成多人何體為汝二破多箋云若言識有多體即成多人既成多人其體乃別定何身是汝阿難即犯一質多心過今但言遍體又如何下牒若遍體者同前所挃二破遍箋云若識周遍其體又同前執一體但道不遍又如何下牒若不遍者當汝觸頭亦觸其足頭有所覺足應無知四破不遍箋云若言識體不遍一身當汝將手挃觸其頭又觸其足頭須有覺足合無知因何頭足俱知此則犯頭足俱知過今汝不然後結非文二初總責箋云説一體多體遍與不遍俱非是故應知隨所合處心則隨有無有是處後結非第六內外兼袪銛刀劈腦箋云阿難前執心在隨合中已被世尊破了又向此中執心在中間是第六識阿難便執云如我思惟內無所見外不相知在內不成身心相知在外非義今相知故復內無見當在中間世尊以有句無句破之便問阿難云汝言中間中必不迷非無所在今汝推中中何為在為復在處為當在身且兩處徵然後破之阿難言我若言在身又有何過世尊破云若在身者在邊非中又轉在中破云在中同內身義不成阿難言若在處又如何破云若在處者為有所表為無所表無表同無表則無定何以故如人有表表為中時東看則西南觀成北表體既混心應雜亂處義不成阿難又救言我所説中非此二種當在根塵之中佛以兼二不兼二破之上敘破中間竟經二千四百五十五箋一萬一千六百一十字香溪院住持沙門在蒙募衆緣一十八人共開此經一卷
