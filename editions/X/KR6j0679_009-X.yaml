body:
  text: 天竺沙門般剌密帝譯烏長國沙門彌伽釋迦譯語菩薩戒弟子房融筆受西京大興福寺沙門惟慤科皇宋首楞大師可度箋阿難及諸大眾聞佛示誨疑惑銷除心悟實相身意輕安得未曾有第五決擇雙源指密因文二初請文六初聽徒悟旨箋云決擇者是能決尅揀擇即世尊無漏後得智雙源者若真源則順後修證若妄源則疎前密因後演文二初正擇雙因後重疑廣釋且初正擇雙因先決證菩提後決斷煩惱初決證菩提順後修證先順表體圓滿所以世尊便問云汝等決定發菩提心於佛如來妙三摩地不生疲倦應當先明發覺初心二決定義云何初心二義決定阿難第一義者汝等若欲捐捨聲聞修菩薩乘入佛知見應當審觀因地發心與果地覺為同為異阿難若於因地以生滅心為本修因而求佛乘不生不滅無有是處阿難汝觀世間可作之誰為不壞然終不聞爛壞虗空何以故空非可作由是終始無壞滅故又說五濁等義而答故決證菩提之義足上來是決證菩提順後修證竟後決斷煩惱疎前密因經云阿難汝等應當審詳煩惱根本此無始來發業潤生誰作誰受阿難汝修菩提若不審觀煩惱根本則不能知虗妄根塵何處顛倒處尚不知云何降伏取如來位又說二顛倒義一眾生顛倒二世界顛倒上來有二初決證菩提後決斷煩惱兩段不同總是正擇雙因已了聞佛示誨者指示也前示云離合俱非此句方名無戲論法誨責也誨云如何自欺尚留觀聽疑惑銷除者不執自然因緣也心悟實相者無相不相是真實相也身輕安不執我意輕安者不執法也重復悲淚頂禮佛足長跪合掌而白佛言二慶喜悲讚箋云緣第一經云阿難見佛頂禮悲泣恨無始來一向多聞未全道力等今復悲淚無上大悲清淨寶王箋云將欲請法且先讚佛云無有過上者佛有同體大悲乃以悲為力清淨離垢義離煩惱障名清離所知障名淨寶則可貴可重王者得自在義善開我心能以如是種種因緣方便提獎引諸沈冥出於苦海箋云佛前第一因第二因乃至因因之中皆是方法巧便提拔獎勸於我令我出三苦五苦分段變易等苦苦者迫逼之義海則生死之海世尊我今雖承如是法音知如來藏妙覺明心徧十方界三乘音悟體箋云領解前順證神通文云我以妙明不滅不生合如來藏而如來藏唯妙覺明圓照法界知此心徧十方界或指第三經節節皆有此文含育如來十方國土箋云含謂包含育養育如來是能依正報果自受用身十方國土是所依依報依正二報身土交參因果兩門互相涉入清淨寶嚴妙覺王剎箋云是法性淨土緣諸佛國土皆以香水海喻旋轉七寶莊嚴也如來復責多聞無功不逮修習四引責謙迷箋云前文云汝雖歷劫憶持如來秘密妙嚴不如一日修無漏業無漏業即大定也逮猶及也不及修習我今猶如旅泊之人忽蒙天王賜與華屋雖獲大宅要因門入箋云請下三修證猶如旅人止泊在於洲渚之中五帝之後皆稱天王喻佛賜與箇華麗屋宅雖得此宅不知從何處為門而入親自受用法上我今生死寄居何殊逆旅忽蒙天王賜與華屋雖獲大宅喻佛賜與我不歷僧祇獲法身似得其大宅不知從何門修行然後作佛去惟願如來不捨大悲示我在會諸蒙暗者捐捨小乘畢獲如來無餘涅槃本發心路五請指修門箋云小乘以北起生空智證生空埋猶有餘殘苦依身名有餘依涅槃若化火焚身同太虗空名無餘依今大乘先無餘後有餘棄捨四事煩惱已除習氣已盡解脫道名無餘捨無常色獲得常色受想行識亦復如是名有餘依令有學者從何攝伏疇昔攀緣箋云疇昔則根本第八識無始時來為界一切法之所依攀則第七攀第八見分緣則第六與五同緣得陀羅尼箋云陀羅尼不同有四文義呪忍總持等持文不失則文總持持義不忘則義總持由念故持惡不生是呪由智故持善不滅是忍入佛知見箋云出法華經方便品云諸佛世尊欲令眾生開佛知見使得清淨故出現於世欲示眾生佛之知見故出現於世欲令眾生悟佛知見故出現於世欲令眾生入佛知見道故出現於世慈恩釋云佛知見者如來能證如實知彼義故一開者出生顯證之義出菩薩證涅槃故二示者同義以三乘人法身平等無差別故三悟者不知義以一切聲聞緣覺不知彼真實故不知唯一佛乘故四入者為令證得不退轉地示現無量智業作是語已五體投地在會一心佇佛慈旨六虗儀待演爾時世尊哀愍會中緣覺聲聞於菩提心未自在者後演文二初正擇雙因文二初愍告雙擇文三初愍眾許宣文二初備在會二乘箋云向無上菩提未得自在雖斷煩惱未斷所知此約為現在也及為當來佛滅度後末法眾生發菩提心開無上乘妙修行路後為當來末品箋云當來正是今時五菩提中是發心菩提開顯無上覺道妙修行路乃首楞嚴頂三昧教或向下修證門也宣示阿難及諸大眾次勸發標名箋云宣為宣說示為指示汝等決定發菩提心箋云為佗前第一經從摩登伽室中歸便請妙奢摩佗三摩禪那等三觀門曾知是佗決定發菩提心於佛如來妙三摩提不生疲倦箋云便囑不得生疲勞懈倦應當先明發覺初心二決定義箋云是發始覺淨智決定義者規則不移也云何初心二義決定後自徵雙因箋云此是標向後說阿難第一義者後開因別釋文二初顯明修證文三初類果甄真文三初勸審修因箋云二種之義今當第一且先約決證菩提順後修證汝等若欲捐捨聲聞箋云捐亦捨也緣為阿難初從摩登伽室中歸來便請三觀門曾知是厭小欣大修菩薩乘箋云發大乘心入佛知見箋云知約後得見目根本應當審觀因地發心箋云合當審實觀察從凡夫地面上發大乘心與果地覺箋云即佛果也為同為異箋云此經因與果同向一念上排六十聖位六十聖位不離一念一念之中具六十聖位阿難若於因地以生滅心為本修因而求佛乘不生不滅無有是處次顯非真不可箋云若於因地以八識妄心為本來修行之因而求佛乘不生不滅無有是處此中有一返顯道若於因地以不生滅心而求佛乘不生滅理斯有是處意謂若將妄心求無上菩提大似方木合於圓孔了無交涉因覺云未出輪迴而辯圓覺彼圓覺性即同流轉若免輪迴無有是處以是義故汝當照明諸器世間可作之法皆從變滅後舉相雙明文三初顯作非真箋云汝當照了明白諸器世間可作之法是根塵識三等誰為不壞若見妄法終從變滅阿難汝觀世間可作之法誰為不壞然終不聞爛壞虗空次明空不壞箋云可作喻妄虗空喻真無變壞也何以故空非可作由是始終無壞滅故後徵述常真則汝身中堅相為地潤濕為水煖觸為火動搖為風由此四纏次科明妄濁文二初明身四大分識長渾箋云髮毛爪齒大小等皆屬地大涕涶涎液皆水大有煖氣是炎皆火大進退屈伸皆風大由此四種相纏縛也金光明經云猶如四虵同處一篋蓋喻四大也分汝湛圓妙覺明心為視為聽為覺為察箋云元於一精明分成六和合為視眼根為聽耳根為覺身根為察意根影取舌與鼻此中何不言六塵與六識但舉根攝取從始入終五疊渾濁箋云始從一念如終至六道輪迴便有見命等五種濁相狀重重疊疊而起云何為濁後喻土混清流此心同濁文三初徵阿難譬如清水清潔本然即彼塵土灰沙之倫本質留礙二體法爾性不相循次喻文二初明未混箋云循猶順也如似一盆清水此水清淨潔白本然而然即與彼尋常地上塵土灰沙等倫流本質留礙水土二體法爾時來性不相順蓋土為質礙水則清潔法上本來一真之性本然而然逈無瑕點一切虗妄根塵識三等法各別本不相順有世間人取彼土塵投於淨水土失留礙水亡清潔容貌汩然名之為濁後明濁相箋云汩然水流貌忽有一人偶然將前沙土等乃投清水之中土本留礙既被投於水中失留礙之體水本清潔既被沙土所渾無清潔之法上有世間人喻一切眾生取彼土塵投於淨水喻將妄渾真土失留礙妄既渾真即失妄性水土清潔真性既被妄法相渾乃失真性塵與水相渾而流名之為濁汝濁五重亦復如是後比箋云法合也今說此五濁意謂此文是決證菩提所以且說妄生起然後令佗斷妄修行阿難汝見虗空徧十方界空見不分後廣明五濁文五初劫濁箋云空是相分見是見分乃能所不分也何故不分為空與見俱是妄也有空無體有見無覺箋云有頑空又無真體有能見妄心又無真覺相織妄成是第一重名為劫濁箋云見與相二法相織空如經見如緯二法相織而如人織是第一重名為劫濁梵語劫﨟波唐言時分或長時短時也身見摶四大為體二見濁箋云摶者摶聚也一切眾生積聚地水火風成身見聞覺知壅令留礙箋云六識壅令留礙是身水火風土旋令覺知箋云旋乃旋轉令是使令覺如是識此識須假身為所依然後方能發用無身根則不能發識空有身無識又且不得相織妄成是第二重名為見濁箋云識託身根而生二法相織而成名為見濁見乃質礙根塵失一真清淨故云見濁又汝心中憶識誦習三煩惱濁箋云憶是思憶過去識是了別見在背文曰誦習則慣也性發知見箋云此妄識能知能見容現六塵箋云容是含容第六與五同緣現是影現此目法塵仗前五塵為本質然後第六自變一重影象緣前五塵較親故云現離塵無相箋云離五塵又無第六之相或可離五又無法塵之相離覺無性箋云離妄識外又無真性緣一切眾生執此妄識若離却妄識不能認其真性也相織妄成是第三重名煩惱濁箋云塵依識立識復緣塵二妄交依故云相織又汝朝夕生滅不停四眾生濁箋云妄識知見每欲留於世間箋云此妄識欲留妄身久在於世業運每常遷於國土箋云自隨妄業運轉遷流常於此方佗界相織妄成是第四重名眾生濁箋云心含其妄住於妄業復轉妄身名為眾生濁眾緣而生曰眾生汝等見聞五命濁箋云妄識也元無異性箋云即真也眾塵隔越箋云眾生迷故被於眾塵相隔越六根不得互無狀異生箋云無狀是真異生乃元於一精明分成六和合性中相知用中相背箋云一切眾生性與諸佛無別如波與水性無別用不同也蓋諸佛乃真眾生乃妄前文云如我按指海印發光汝暫舉心塵勞先起同異失准箋云一切眾生不能六根同時互用與諸佛別此則同失准也若言是異又同一真性此乃同異二法無箇憑准相織妄成是第五重名為命濁箋云同異二法相織名為命濁命則第八識中連持不斷之義阿難汝今欲令見聞覺知後勸息妄旋真文二初勸擇妄旋真妙融因果文二初舉果擇因箋云此六識是妄遠契如來常樂我淨箋云不間斷曰常離四句曰樂得自在曰我斷二障曰淨今從凡夫地面上遠遠契合諸佛如來涅槃四德應當先擇生死根本箋云擇為簡擇生死根本目根本無明依不生滅後憑真克證箋云此根本無明依真體而有是真也圓湛性成以湛旋其虗妄滅生伏還元覺箋云攝波歸水攝末歸本伏是伏煩惱妄心還其真心也得元明覺無生滅性為因地心箋云是不生滅心因地是從凡夫地面上起始覺智然後圓成果地修證箋云是本覺理如澄濁水貯於靜器後立喻簡息使澄純源文三初澄渾比伏箋云喻始覺淨智靜深不動箋云喻第六識不入色香等境安然靜慮沙土自沈清水現前箋云喻伏惑顯真名為初伏客塵煩惱箋云此約資粮加行二位菩薩但能伏惑未能斷惑此乃比伏也與聲聞人伏第六識不與五同緣又不同聲聞人雖伏第六識不與五同緣但如不壓草逢春必生雖不起現行種子猶在遇緣則起資粮二位伏惑種子更不起也去泥純水名為永斷根本無明次去泥比斷箋云去泥去煩惱也純水是純真之性也此則名為永斷根本無明如大乘漸教中成自受用身佛明相精純後彰純淨箋云明乃真明之相精妙純一無雜如似真金去彼雜鑛一切變現箋云此是化身現大化小化身等或神通變現現身現土教化眾生也不為煩惱箋云運而常寂應用全真皆合涅槃清淨妙德箋云是佛位無為果清淨微妙之道德也第二義者後尅擇迷源文四初勗觀惑本文四初顯去詳因文二初顯志箋云二種決定此第二是決斷煩惱踈前密因汝等必欲發菩提心箋云五菩提中是發心菩提簡去發聲聞緣覺小乘之心於菩薩乘生大勇猛箋云向菩薩乘是發大心也生大勇猛無退轉故決定棄捐諸有為相箋云棄即捐也諸有為相者五濁虗妄皆是有為非無為也或可根塵識等法應當審詳煩惱根本此無始來發業潤生後詳因箋云煩惱根本是根本無明此根本無明無始時來發業業者招感為義是分別煩惱無始時來造得總別報業潤生潤益而生是俱生煩惱與身與心俱時而生低微難斷也誰作誰受箋云意明作受俱是第六識心阿難汝修菩提若不審觀煩惱根本則不能知虗妄根塵二迷因失果箋云汝若也修菩提須了煩惱起處煩惱根本即是無明之一法何處顛倒箋云言此虗妄根塵從何所起處秪是無明顛倒處尚不知云何降伏取如來位箋云言無明汝尚不知云何降伏根塵識三取佛果位阿難汝觀世間解結之人不見所結云何知解三舉喻明妄箋云此喻顯根本又生起向下六解一亡疑不聞虗空被汝隳裂箋云妄法便有可解可結若真空之體即無解結隳猶壞也裂破裂也言真體不可破壞何以故空無相形無結解故箋云明其真體則汝現前眼耳鼻舌及與身心六為賊媒四顯比結根箋云身是六根心是六識六根在外如同外賊六識在內如似媒人然無識根乃無用自劫家寶箋云賊非外來喻一切眾生虗妄惡業皆從心起所有一切法財功德皆被劫盡由此無始眾生世界生纏縛故於器世間不能超越箋云眾生是能依世界是所依自相纏縛不能捨離阿難云何名為眾生世界二明二倒變流文六初總徵雙因箋云前來道由此無始眾生世界生纏縛故於器世間不能超越此中便問起云云世為遷流二略釋二殊箋云且先明世界過去遷至現在現在遷至未來界為方位箋云若是界便有東西南北東南西南東北西北有方所位次汝今當知東西南北東南西南東北西北上下為界過去未來現在為世三廣述二邊方位有十箋云十方也流數有三箋云三世也世者遷流為義故云流數一切眾生織妄相成箋云將方涉妄於世涉方相織而成故云相成身中貿遷世界相涉箋云由妄將貿易遷改故有世界相涉也而此界性設雖十方定位可明世間秪目東西南北四克明實數箋云施設則有十方也上下無位箋云上方更有上下方更有下於上方看又是下故無位也中無定方箋云若是中隨處立得中東看即西南觀成北四數必明與世相涉箋云東西南北此四數必定分明則世與界相涉界與世相涉三四四三宛轉十二五舉陳三變箋云三是三世四是四方且將世涉方也有十二過去一方各具三三四也成十二宛來轉去宛是將世涉方轉是將方涉世流變三疊箋云流則遷易變為變少成多三疊是三重第一是無明為能變世界為所變第二世界為能變根塵為所變第三根塵為能變十二類生為所變故三疊是三重變也一十百千箋云一十此是第一無明為能變世界為所變將方涉世也有十二將世涉方也有十二合言十二此中言十舉其全數舍取二成十二百是第二變世界為能變根塵為所變此中六根除却法塵與第六此二隱不顯但取五根五塵是十將此十向前世界十二上配一世一界各具十便成一百二十合言二十千是第三變根塵為能變十二類生為所變今十二類中隱却無色空散銷沈無想土木金石不實之法但取十數將此十類向前百二十上配一箇具十便成一千二百經舉全數含取二百也總括始終六根之中各各功德有千二百六略結根功箋云總相包括始是第一變終是第三變此中言六根之中各各功德有千二百者約熏種而論此六根皆約根本無明熏起後言功德不同約對境而論便有勝劣阿難汝復於中尅定優劣三顯六根優劣文六初眼根闕箋云言汝復於此六根之中決尅定當優是根有長劣乃根有短如耳舌意此三根各具千二百功德是長餘三根秪具八百是短如眼觀見箋云如眼且約面前而觀後暗前明前方全明後方全暗箋云前是面前南方全明具三百功德後是背後北方全暗三百不見左右傍觀三分之二箋云面前三百全明背後三百全暗東邊三百更有東北一隅不見是五十西邊三百更有西北一隅不見亦五十成一百貼背後三百成四百今言三分之二者三四十二是一千二百今但有二分功德是八百闕却一分四百功德背後與東北西北二隅也統論所作箋云統攝論量所作是六根對境不同功德不全箋云眼根秪得八百功德故不全也三分言功箋云三分方得千二百是有功一分無德當知眼唯八百功德箋云得二分一分則不得故無德則無功如耳周聽十方無遺二耳根圓箋云無遺則無遺失也動若邇遙箋云若聲動之時近之與遠皆聞靜無邊際當知耳根圓滿一千二百功德箋云若聽靜之時更無邊涯際畔也如鼻齅聞三鼻根闕箋云齅聞是鼻家所緣境通出入息箋云通出息入息氣在鼻中曰息而闕中交箋云於出息入息二中間氣不相交也驗於鼻根三分闕一當知鼻唯八百功德箋云闕却中間一分四百秪有入出二分成八百功德如舌宣揚盡諸世間出世間智四舌根圓箋云如舌宣說顯揚盡諸世間是說世間法出世間智是出世間法言有方分箋云梵語唐言不同便有方道分段如梵語烏瑟尼沙唐之言無見頂梵語摩訶唐言大理無窮盡當知舌根圓滿一千二百功德箋云言雖不同其理是一言別意同如身覺觸識於違順五身根闕箋云三和生觸根和境和識和識是分別於違順二境是身家所緣違境則鞭杖楚痛順境則細滑調適或可寒則寒則違也暖是順熱則熱是違冷是順合時能覺箋云有違順二境之時便有覺知離中不知箋云右違順二境離之時故不知也離一合雙箋云離一之時無違順二境唯是身根合雙則違順二境合時也驗於身根三分闕一當知身唯八百功德箋云三分闕一分是離中不知二分約合雙也如意默容十方三世一切世間出世間法六意根圓箋云如意根寂默包容寂默則思覧十方三世又能心中包容一切世間出世間菩提涅槃等法唯聖與凡無不包容盡其涯際當知意根圓滿一千二百功德箋云此意根唯聖是出世間法與凡是世間法無不包括含容盡其諸法涯岸邊際阿難汝今欲逆生死欲流返窮流根四勸返妄圓真文五初勸總觀根用箋云一切眾生乃順流如人被水流從下去如今要佗返本還元逆生返窮根本到其流根流根秪是無明至不生滅箋云至猶到也到諸佛如來不生滅地本自不生今亦無滅但了無明無自性當體是不生滅性此即是如來藏性也當驗此等六受用根箋云眼根受用色塵境乃至意根受用法塵境誰合誰離誰深誰淺誰為圓通誰不圓滿箋云意誰身舌則合中知眼耳鼻則離中知意則幽深耳則圓通餘五則不圓若能於此悟圓通根逆彼無始織妄業流得循圓通二明速證圓通箋云意間令佗悟得一耳根圓通逆彼無始時來根本無明相織妄業此乃無明為能變六根為所變如人織絹相織而成然此無明是妄之始但能逆彼無明知其根本萬乃了得一切妄法便乃得順圓徧通達之理也與不圓根日劫相倍箋云若向此圓通根一日修行勝彼不得圓通根者一劫修行也我今備顯六湛圓明三指顯任詳箋云我今備具顯此六湛圓明若了得此六根圓通便乃湛寂圓明本所功德數量如是箋云本所功能德業此約染功德法華約持經功德耳意舌根圓滿一千二百功德眼鼻身三根秪得八百功德故云數量如是隨汝詳擇其可入者吾當發明令汝增進箋云隨汝審詳簡擇愛從何根而入意令佗但擇一根我當為汝顯發明白令汝阿難等增修進趣十方如來於十八界一一修行皆得圓滿無上菩提四明佛無優劣箋云三六一十八界一一於中修行皆得圓滿無上菩提是佛果位也於其中間亦無優劣箋云若是諸佛諸根一時具足無有長短何故如此得互用故但汝下劣未能於中圓自在慧五矜迷勸一箋云小乘之人天能於六根之中圓滿自在之慧自在慧乃無漏智也故我宣揚令汝但於一門深入入一無妄彼六知根一時清淨箋云故我宣示顯揚但於一門是耳根教佗但悟一根圓通其餘五根一時清淨一根既返元六根成解脫此約大乘人阿難白佛言世尊云何逆流深入一門能令六根一時清淨後重疑廣釋文四初釋證一六圓疑文二初先陳一六箋云前文云汝今欲逆生死欲流返窮流根又云但於一門深入入一無妄彼六知根一時清淨阿難如今躡被前文問云何逆流深入一門能令六根一時清淨世尊欲破阿難六一之執所以便問云汝今且觀現前六根為一為六阿難若言一者耳何不見目何不聞等事若此六根決定成六如我今會與汝宣揚微妙法門汝之六根誰來領受阿難言我用耳聞佛問汝耳自聞何關身口口來問義身起欽承乃至終不汝根元一元六又引阿那律䟦難陀殑伽神女矯梵鉢提舜若多迦葉等六人無根亦能了別然阿難大權之人非是不會且順同小乘執異不通圖得世尊向下破之佛告阿難汝今已得須陀洹果已滅三界眾生世間後承諮廣破文三初破一六執文二初責智麤修淺文四初明慶喜斷見箋云須陀洹唐言預流預者親也親入聖流已滅欲界色界無色界眾生是能依世間是所依見所斷惑箋云見道中八十八使分別煩惱已是斷也然猶未知根中積生無始虗習二彰根習未知箋云然者如是之辭猶尚也言尚自未知第八識中積集而生無始無初已來虗妄習氣彼習要因修所斷得三明習要修除箋云此八識中虗妄習氣是俱生煩惱到修道門中方能斷無始時來與身與心俱時而生名曰俱生到阿那含人方斷何況此中生住異滅分劑頭數四顯混迷四相箋云生表此法先非有住表此法暫有用異表此法非凝然滅表此法可破壞此是大乘細四相一分一劑一頭一數此極微細也或可分劑等是塵沙惑今汝且觀現前六根為一為六後除六一深疑文六初雙標兩執箋云阿難因世尊說但於一門深入彼六知根一時清淨故所以生疑云此六不同云何得一根無妄六根俱解脫是世尊答彼云云阿難若言一者耳何不見目何不聞頭奚不履足奚無語二先難一疑若此六根決定成六如我今會與汝宣揚微妙法門三立六徵聞箋云微妙法門是此首楞嚴經也汝之六根誰來領受箋云若是各別何根領受令佗定阿難言我用耳聞四答唯耳領佛言汝耳自聞何關身口口來問義身起欽承五責運身口是故應知非一終六非六終一終不汝根元一元六六結破雙迷箋云非始是一終至六道輪迴是六非始是六終至六道輪迴是一終不汝此六根元來是一元來是六一則無明六則六根此約真體上破阿難當知是根非一非六次門迷一六生文二初破一執文三初總敘雙生箋云當知此六知根亦非是一亦非是六為真體上無一無六可得也由無始來顛倒淪替箋云因由汝之無始時來是根本無明淪則淪沒苦海替則換真成妄故於圓湛一六義生箋云故於圓明湛寂是真背真起妄便有一箇無明為能變六根為所變汝須陀洹雖得六銷猶未亡一次別彰存一箋云初果須陀洹人雖得六根門頭不入色香等境是我執已無根本無明未亡法執猶在如太虗空參合群器後立喻破一文二初立喻顯呈一六箋云如似太虗空參雜和合長短方圓等器由器形異名之異空箋云隨其眾器有別遇方器曰方空遇圓器曰圓空法上如太虗空喻真體參雜群器六根分別各各不同如空隨器名有多般六根隨別其性是同眾器隨別空體是同除器觀空說空為一箋云若除眾器後便言空是一體如六根亡後說真是一此正是無明法執也彼太虗空云何為汝成同不同何況更名是一非一箋云彼太虗空何甞便隨汝執成同是執一不同是執異法上真如體上何處受汝執為一為異何況更名是一非一是非相對也則汝了知六受用根亦復如是後比根同喻箋云眼受用色塵境意受用法塵境故云受用此六知根亦不是一非一是同不同也為此六根無有實體不可執有多般由明暗等二種相形後明六生文六初眼智文六初因塵發見箋云明暗是眼家所緣境二種相形對於妙圓中黏湛發見箋云向妙圓真體之中黏約愛湛約性明相或黏湛愛心發得眼根眼識見精映色結色成根二覽色成根箋云見精則眼識現量心映帶色塵結猶結縛被色塵結縛成其眼根根元目為清淨四大三目大相箋云清淨四大是真則四大性根元目為者妄即真也因名眼體四立根名箋云便有眼根如蒲萄朵五象同蒲朵箋云其果外作紫色內唯似水喻眼根無實浮根四塵流逸奔色六順流奔色箋云假浮根四塵色香味觸成其眼根流為奔流逸為蕩逸奔波於色塵境也下四根准此可知由動靜等二種相擊於妙圓中黏湛發聽二耳根文六初因塵發聽箋云相敲擊也聽精映聲卷聲成根二覧聲成根箋云卷猶覽取也根元目為清淨四大三目大相因名耳體四立根名如新卷葉五象同卷葉箋云如新秋葉落一邊而卷浮根四塵流逸奔聲六順流奔聲由通塞等二種相發於妙圓中黏湛發齅三鼻根文六初因塵發齅箋云相發者則顯發也齅精映香納香成根二覽香成根箋云納則領納香塵也根元目為清淨四大二目大相因名鼻體四立根名如雙垂爪五象同雙爪箋云如雙垂手爪從下而來亦云如懸針筒浮根四塵流逸奔香六順流奔香由恬變等二種相參於妙圓中黏湛發甞四舌根文六初因塵發甞箋云參猶參雜也甞精映味絞味成根二覧味成根箋云絞謂絞歷其味塵根元目為清淨四大三目大相因名舌體四立根名如初偃月五象同偃月箋云偃仰也如初生月仰在天之上浮根四塵流逸奔味六順流奔味由離合等二種相摩於妙圓中黏湛發覺五身根文六初因塵發覺箋云摩相摩觸也發覺是身之識覺精映觸摶觸成根二覽觸成根根元目為清淨四大三目大相因名身體四立根名如腰鼓顙五象同鼓顙箋云如腰鼓顙兩頭大中間尖如人腰小又云如立戟槊鏘槊也中心小兩頭開浮根四塵流逸奔觸六順流奔觸由生滅等二種相續於妙圓中黏湛發知六意根文六初因塵發知箋云生滅是意家所緣境法廣也謂六識依法廣而住無法塵亦無六識二種相續乃連環不斷念念生滅發知則意識知精映法覧法成根二覧法成根箋云映法是映帶法塵境覽法是領覧法塵境成其意根根元目為清淨四大三目大相因名意思四立根名箋云此中言意思又以第七識意是六識思是七識或可說七識亦得謂第六憑第七而住七是六之根也如幽室見五象同幽室箋云言識隱如夜暗室所見浮根四塵流逸奔法六順流奔法阿難如是六根由彼覺明有明明覺失彼精了黏妄發光後引證勸修文三所觀修文三初指六迷因箋云覺是強覺明是性明有明是性明明覺是強覺既有性明便有能明強覺既有強覺起來強生覺照便失却精明了別之性是真黏妄是愛心發光是背體照外是智家功用是以汝今離暗離明無有見體離動離靜元無聽質無通無塞齅性不生非變非恬甞無所出不離不合覺觸本無無滅無生了知安寄次明離相無見箋云汝今指阿難也離却明暗是眼家所緣境即無眼識現量心盖識如羸人非杖不起向下五根亦爾了知安寄者了知是意識若無法塵亦無意識謂凡夫須假境牽心便有心曾無無境心也汝但不循動靜合離恬變通塞生滅明暗後勸遺塵速證箋云循順也勸佗不隨順根塵即是真現量心如是十二箋云六根六塵也或一根各具二六根便成十二諸有為相箋云有為有造作是前根塵等法隨拔一根箋云意間教佗但向耳根悟得圓通一根既返元六根齊解脫脫黏內伏箋云脫黏者一切眾生不了六根無自性被佗根塵所黏如今悟圓通根便乃脫黏不被根塵所縛也內伏則轉識成智也伏歸元真箋云轉識成智是牒前文發本明耀箋云始覺淨智發現本來圓明光耀耀性發明箋云躡前文諸餘五黏應拔圓脫箋云應時圓徧解脫不由前塵引起知見箋云真性不假前塵靈靈不昧了了常知明不循根箋云真明之性不順根塵靈源獨耀寄根明發箋云寄伏其根顯發此真性此約勝義根謂一切眾生執根能見不知根不能見見唯是心由是六根互相為用箋云既不由前塵所起知見六根便得互用一根發識徧緣諸境阿難汝豈不知今此會中阿那律陀無目而見二引現證文二初引現證人箋云梵語阿泥律陀唐言無滅亦云如意為過去曾供養獨覺招感福緣至今不滅如意者如作如意也又是佛弟白王之子若言阿㝹樓駄訛也如意無目能見修得半頭天眼觀三千大千世界如觀掌中菴摩羅果䟦難陀龍無耳而聽箋云梵語䟦難陀龍唐言賢喜於諸眾生發愛樂心賢而且喜賢喜無耳能聽殑伽神女非鼻聞香箋云即恒河神女為畢陵伽婆蹉所罵者非鼻乃聞香氣驕梵鉢提異舌知味箋云憍梵應言牛類梵語笈房鉢底唐言牛相憍梵鉢底訛也過去因偷摘一莖禾果報墮地獄五百生中作牛償佗今雖人身尚作牛蹄牛呞之相因號為牛相比丘異舌是牛舌又且知味舜若多神無身有觸箋云多即空神也此空神無身能受觸如來光中映令蹔現箋云經家問既無身將何受觸塵答云云此現是現定果身也既為風質其體元無箋云既為風質即無形也其體元無牒無身文諸滅盡定得寂聲聞箋云亦云滅受想定言滅六兼盡七染分淨分即不滅得寂者得空寂之理也如此會中摩訶迦葉久滅意根箋云梵語迦葉唐言飲光是婆羅門姓飲光乃仙人之種以姓標名又云自身光飲日月光故意根則第六識圓明了知箋云是真性不因心念箋云是第六識心念也念者則冥記義已上俱約無浮塵根阿難今汝諸根後勸融迷速證箋云諸根則六根也若圓已箋云一根既返元六根齊解脫內瑩發光箋云始覺淨智發起光明如是浮塵箋云六根及器世間箋云所依諸變化相箋云是前根塵等皆無實故云變化相也如湯銷冰應念化成無上知覺箋云真智如湯銷佗妄執如冰應念則少念少念則無念無念則無分別智與理相應之時當體便成無有過上真如靈知覺性此性是諸佛如來本覺之理阿難如彼世人聚見於眼後會妄融真文二初閇根旋異箋云如世間人聚種種之見皆言在於眼若令急合暗相現前六根黯然頭足相類箋云若使令佗將總急掩兩眼不觀前境便觀暗相當情一根既如此六根亦一時急合黯黯然不與境對大似頭之與足一般彼人以手循體外繞彼雖不見頭足一辨知覺是同箋云彼急合之人將一隻手順體外從眼耳鼻等六根之上來統一徧彼眼雖然不見諸根一時黯然頭足一一辨別一靈知覺之性咸知又何假諸根為一切眾生執眼決定能見便成主宰緣見因明暗成無見後發照圓明箋云一切眾生緣此見須假明境方能見既言須得明方說見見暗之須不見始得何故又見暗不明自發則諸暗相永不能昏箋云言此真見性不假明境自然而發即了了分明不被煩惱所昏根塵既銷箋云六根六塵一時銷亡云何覺明箋云始覺智不成圓妙箋云本覺理阿難白佛言世尊如佛說言因地覺心欲求常住要與果位名目相應六通現識斷滅疑文二初牒前建演起難文八初牒前建箋云為前勸中云汝但不循動靜通塞等法隨拔一根脫黏內伏伏歸元真等由是阿難便難云若此見聞離於明暗猶如念心離於前塵本無所有云何將此畢竟斷滅以為修因於是世尊說撞鐘試倒重寐聆音而答通現識未曾斷滅遂勑羅睺羅擊鍾問阿難言汝今聞否阿難大眾俱言我聞乃至汝尚顛倒惑聲為聞何怪昏迷以常為斷阿難白佛如佛說言乃至名目相應此是躡前文此中難佛前文云若於因地以生滅心為本修因而求佛乘不生不滅無有是處因中須得不生不滅心方能合得不生不滅理佗便躡此語來難云何佛說言因地覺心是始覺之智欲求常住是本覺之理若要與果位名目相應須是不生滅心合不生滅理若將生滅心合即不得下便說果中七種名目來難世尊世尊如果位中二述果群名箋云佛界位中三身四智五眼六通悉皆具足菩提涅槃箋云梵語菩提此飜為覺或飜為道五菩提中是無上菩提或菩提是有為果轉染得淨是生德如今為什麼不生二障障不生梵語波利匿縛喃唐言圓寂五中唯大般涅槃或涅槃是無為果轉迷成悟是顯德此二是佛果位中二轉依果真如佛性箋云真如出十地經初地徧行二地最勝三地勝流四地無攝受五地無差別六地無染淨七地法無差別八地無增減九地智自在十地業自在所依此約佛果位真如是無垢淨真如也佛性四句因理行果今唯果佛性除因也或在有情名佛性在無情名法性菴摩羅識箋云此云無垢識則第八識淨分空如來藏箋云亦唯果位空則二空之理如來則四智現行藏則包滅世出世法大圓鏡智箋云是佛果位轉八識成大圓鏡智轉名不轉體也是七種名稱謂雖別箋云此七種名稱說雖別其體是一清淨圓滿體性堅凝如金剛王常住不壞箋云清淨離垢染義圓為圓明滿為滿足體是真如性是體性性堅固凝明如金剛寶不可沮壞然此果位七種名目常住不變壞故若此見聽離於明暗動靜通塞畢竟無體三克明妄體箋云若此見聽唯是眼耳二根攝取鼻舌身意也明暗眼根動靜耳根欠恬變舌通塞鼻離合身生滅意經意此見聞等離却前境心乃無體猶如念心離於前塵本無所有四引六比五箋云冥記曰念言此第六念心離於前塵第五本無所有為第六若離五無所仗立云何將此畢竟斷滅以為修因欲獲如來七常住果五顯因不稱果箋云如何將此離塵無體之心為本修因欲獲如來下是果欲希欲也世尊若離明暗見畢竟空如無前塵念自性滅進退循環微細推求本無我心及我心所將誰立因求無上覺六再審因虗箋云進則前五無體退則第六無依我心則八識心也心所五十一法言若無法塵六識亦無如來先說湛精圓常違越誠言終成戲論云何如來真實語者七責自違前說箋云如來先說乃前文云若於因地以生滅心為本修因等湛寂精明圓滿常住此真心也若求佛果須用此不生滅心世尊前來又違越却誠實之言終成戲論無所詮表如來是真語者惟垂大慈開我蒙恡八諸會雙途箋云蒙則蒙昧法則恡惜此心不捨佛告阿難汝學多聞未盡諸漏心中徒知顛倒所因真倒現前實未能識恐汝誠心猶未信伏吾今試將塵俗諸事當除汝疑後對事消疑文二初撞鐘試倒文二初正垂問答文三初責多聞強惑許對除疑箋云徒空也空將顛倒之言道云何將此畢竟斷滅以為修因欲獲如來七常住果真實顛倒現前汝却不識誠猶實也信猶解也伏能伏也言恐汝實未能信解能伏此妄心或未能信真心伏妄心即時如來勑羅睺羅擊鐘一聲問阿難言汝今聞不次勑羅睺擊鐘問聲無有文六初問箋云梵語羅睺唐言執日又云障蔽非也是佛之子此問密指五現量識為親聞阿難大眾俱言我聞次答鐘歇無聲佛又問言汝今聞不三問阿難大眾俱言不聞四答時羅睺羅又擊一聲佛又問言汝今聞不五問阿難大眾又言俱聞六答箋云問答三重經意就聞性上問佛問阿難汝云何聞云何不聞後雙徵有無文二初問阿難大眾俱白佛言鐘聲若擊則我得聞擊久聲銷音響雙絕則名無聞後答箋云音乃鐘音響則應山谷作聲響如來又勑羅睺擊鐘問阿難言爾今聲不後立惑彰迷文二初隨聲問答文六初問箋云就塵上問欲破妄執且將塵惑性看其還能簡得性之與塵二法阿難大眾俱言有聲次答少選聲銷佛又問言爾今聲不三問箋云選猶退也阿難大眾答言無聲四答有頃羅睺更來撞鐘佛又問言爾今聲不五問箋云頃尅之問也阿難大眾俱言有聲六答佛問阿難汝云何聲云何無聲後牒諸有無文二初問阿難大眾俱白佛言鐘聲若擊則名有聲擊久聲銷音響雙絕則名無聲後答佛語阿難及諸大眾汝今云何自語矯亂後顯塵諸心常文三初對簡斷常文二初責隨心惑文三初標責箋云矯誑作亂也此責佗將聲惑聞不塵聲塵謝聞聲常存大眾阿難俱時問佛我今云何名為矯亂次推過佛言我問汝聞汝則言聞又問汝聲汝則言聲唯聞與聲報答無定如是云何不名矯亂後顯述箋云報答無定謂問性是常聲塵答謝聞雜聲塵此乃自心不定隨塵有無正是矯亂云何言不矯亂阿難聲銷無響汝說無聞若實無聞聞性已滅同于枯木鐘聲更擊汝云何知後正簡心常文六同類滅同枯責聞重響箋云聲銷無響便說無聞聞性已滅喻同枯木無情之物知有知無二顯塵生滅簡性常在文三初顯性雙知箋云聞性有聲無聲皆知自是聲塵或無或有次表塵生滅箋云聲塵或有或無故不足豈彼聞性為汝有無後指體常如箋云聞性不隨有無聞實云無誰知無者三再責知無箋云汝若言聞性實是言無知無者誰是故阿難聲於聞中自有生滅非為汝聞聲生聲滅令汝聞性為有為無四顯不隨無有箋云非是汝之聞性隨佗聲塵生滅今汝聞性為有為無聞聲乃有乃無不定聞性恒常因何將惑聞說聞性與聲塵一般汝尚顛倒惑聲為聞何怪昏迷以常為斷五牒前迷響責昧心常箋云是何鬼怪如此昏暗迷妄以常性為斷聲終不應言離諸動靜閉塞開通說聞無性六重結心恒使袪塵惑箋云閉塞鼻家所緣境開通眼家所緣境言終不應說離却前塵便無性也如重睡人眠熟牀枕其家有人於彼睡時擣練舂米其人夢中聞舂擣聲別作佗物或為擊鼓或為撞鐘即於夢時自怪其鐘為木石響次重明寂喻文三初重聆音箋云寤時是第六識與五同緣此一靈之性了了分明此是明了意識重寐乃是第六識歸種此一分真性亦乃不昏木則舂米音擣是擣練音為夢中取境不正故別作佗物於時忽寤遄知杵音自告家人我正夢時惑此舂音將為鼓響次寤陳聞惑箋云遄速也惑疑惑也舂米擣練皆杵阿難是人夢中豈憶靜搖開閇通塞其形雖寐聞性不昏縱汝形銷命光遷謝此性云何為汝銷滅後顯性無遷箋云開閇是眼不但睡時假饒此身滅時縱汝形銷死去此一分真性也在命光身命也以諸眾生從無始來循諸色聲逐念流轉曾不開悟性靜妙常不循所常逐諸生滅由是生生雜染流轉後勸離塵圓證文二初愍述心逐境箋云順色是眼見色塵耳聽聲塵此約夢中意識苦諦名流集諦名轉念是第六識流為遷流轉為改轉汝曾無少許開通悟解性是體性性淨是清淨妙即微妙常乃真常又不能順此所常真理妄識一向逐其前塵生滅因由此界生佗界生或可生了又生雜染乃虗妄之法逐妄遷流改轉若棄生滅守於真常常光現前塵根識心應時銷落想相為塵識情為垢二俱遠離則汝法眼應時清明云何不成無上知覺後勸拂垢圓真箋云守者得也或守確觀義常光智也智光顯發因相生想名為想相是三能變識也見相二分一時棄捨悟法如眼見物或法眼觀真是根本智應時清明是後得智無上知覺是本覺理問前文佗此五心此因何又教佗離却此妄識耶答為前見佗執此現識斷滅所以佛且撥却塵恒間性無滅乃是就量心指此令離妄識是相真現量心也
