body:
  text: 天竺沙門般剌密諦譯烏長國沙門彌伽釋迦譯語菩薩戒弟子房融筆受西京大興福寺沙門惟慤科皇宋首楞大師可度箋復次阿難云何六入本如來藏妙真如性二窮根顯體文二初總標真性箋云是破六入法門謂窮盡六根顯現真體六入者通生識道受入愛憎為此六根是識之道路為識之所依然受著順境生愛違境生嗔如來藏則四智菩提種子四智者大圓鏡智平等性智妙觀察智成所作智藏者包含義妙即微妙真乃真實如則一如性是體性性阿難即彼目睛瞪發勞者兼目與勞同是菩提後別破浮根文六初眼入文三初立文二初會妄通真箋云目喻真知照用瞪發勞者妄覺也內有根本無明為能變變起六根六塵為所變兼目此目是眼根不同目睛喻智與勞是根本無明是能變同是菩提者同収一果也瞪發勞相因于明暗二種妄塵發見居中吸此塵象名為見性後因塵顯妄箋云既是菩提何故便有六根六塵瞪發勞相因根本無明為能變然後便有根塵為所變勞相是能變無明明暗是眼家所緣境二種即明暗等發得眼識居在根塵之中吸覽也覧此塵象即是明暗等境一切眾生執此妄識為自性此見離彼明暗二塵畢竟無體次破文二初總破文二初影無實體箋云識如羸人非杖不起曾無無境心須假前塵明暗等相若無明暗等相牽動能緣之心此心即無其體如是阿難當知是見非明暗來非於根出不於空生後了相無因箋云指此眼識不從明境暗境上來不依眼根上出不於空中而生是破自然何以故後別破文三初幽明㸦破文三初徵若從明來暗即隨滅應非見暗次明若從暗來明即隨滅應無見明後暗若從根生必無明暗如是見精本無自性次離相鑒六箋云既從根生是根自有生又何假明暗二境牽心然後方有識即無有自性曾無無境心若於空出前矚塵象歸當見根後空不生觀文二初邀歸見根箋云若言從空中生眼識然後便依著眼根此識向前對觀前塵之時然後却歸眼根應須見眼為識從空來又空自觀何關汝入後縱許成佗箋云設爾是空見何過破若言從空生識空須有見既有見是空自觀無情成有情又何關汝阿難之事是故當知眼入虗妄後結文二初結破本非因緣非自然性後雙非阿難譬如有人以兩手指急塞其耳耳根勞故頭中作聲二耳入文二初立文三初舉彰勞喻箋云用兩手母指急塞却兩耳孔既久耳根勞倦頭中作聲法上來耳根發識喻真智用兩手指喻背體外求便有根本無明然後有強覺起來向真體上執我執法兼耳與勞同是菩提次會妄同真箋云兼耳是所變根與勞是能變無明瞪發勞相因于動靜二種妄塵發聞居中吸此塵象名聽聞性後因塵顯箋云依前舉色陰中喻如人瞪目觀空既久然後發生勞倦見種種相此喻內有根本無明為能便有五根五塵為所生動靜則耳家所緣境有聲是動無聲是靜聞則耳識居在根塵之中此聞離彼動靜二塵畢竟無體次破文二初總破文二初彰無實體箋云向下四境上徵如是阿難當知是聞非動靜來非於根出不於空生後了相無因何以故後別破文三初塵文三初徵無因若從靜來動即隨滅應非聞動次靜若從動來靜即隨滅應無覺靜後動若從根生必無動靜如是聞體本無自性次根若於空出有聞成性即非虗空後空文二初縱箋云縱空為能生生得耳識為所生空若生識空乃有聞須成人去故云成性既也成性乃奪空名為空出識故又空自聞何關汝入後空是故當知耳入虗妄後結文二初結破本非因緣非自然性後雙非阿難譬如有人急畜其鼻畜久成勞則於鼻中聞有冷觸因觸分別通塞虗實如是乃至諸香臭氣三鼻入文三初立文三初舉彰勞喻箋云既畜既久覺有冷氣從外而來觸其鼻端因觸分別通即是虗塞即是實通即聞香臭等塞乃不聞兼鼻與勞同是菩提次會妄同真瞪發勞相因于通塞二種妄塵發聞居中吸此塵象名齅聞性後因處顯妄此聞離彼通塞二塵畢竟無體次破文二初總破文二初彰無實體當知是聞非通塞來非於根出不於空生後了相無因何以故後別破文三初塵文三初徵若從通來塞則聞滅云何知塞次通如因塞有通則無聞云何發明香臭等觸後塞若從根生必無通塞如是聞機本無自性文根若從空出是聞自當迴齅汝鼻後空文二初縱空自有聞何關汝入後正是故當知鼻入虗妄後結文二初結破本非因緣非自然性後雙非阿難譬如有人以舌䑛吻熟䑛令勞其人若病則有苦味無病之人徵有甜觸由甜與苦顯此舌根不動之時澹性常在四舌入文三初立文三初舉彰勞喻箋云上曰唇下曰吻熟䑛則頻䑛使令勞倦因由甜之與苦是味乃舌家所緣境便顯得舌根不䑛吻之時唯是一味澹性常存在兼舌與勞同是菩提次會妄同真瞪發勞相因甜苦澹二種妄塵發知居中吸此塵象名知味性後因塵顯妄箋云甜苦是味為一塵澹是無味為一塵發知是舌識居在根塵之中此知味性離彼甜苦及澹二塵畢竟無體次破文二初總破文二初彰無實體如是阿難當知如是甞苦澹知非甜苦來非因澹有又非根出不於空生後了相無因何以故後別破文三初塵文三初徵若甜苦來澹即知滅云何知澹次甜苦箋云知是識也云何知澹此是知有澹與上知別若從澹出甜即知亡復云何知甜苦二相後因澹箋云甜即知亡知亦是識復云何知甜苦二相此知甜苦亦與前知別若從舌生必無甜澹及與苦塵斯知味根本無自性次根若於空出虗空自味非汝口知後空文二初縱又空自知何關汝入後正是故當知舌入虗妄本非因緣非自然性後雙非阿難譬如有人以一冷手觸於熱手若冷勢多熱者從冷五身入文三初立文三初舉彰勞喻箋云攝少熱從多冷若熱功勝冷者成熱箋云攝少冷從多熱如是以此合覺之觸顯於離知箋云有冷有熱前塵觸身便有覺也非覺觸之時無冷熱二相觸體故離知也或可合時則有覺觸冷熱顯得離時之心知於離時不知也涉勢若成箋云將熱涉冷冷者從熱將冷涉熱熱者從冷因于勞觸箋云因無明為能變方有根塵為所變兼身與勞同是菩提次會妄同真瞪發勞相因于離合二種妄塵發覺居中吸此塵象名知覺性後因塵顯妄此知覺體離彼離合違順二塵畢竟無體次破文二初總破文二初彰無實體箋云離合為一違順為一成二皆是身家所緣境或離是違須是合也如夏天向火是違臨風乃順如寒自臨風是違向火乃順如是阿難當知是覺非離合來非違順有不於根出又非空生後了相無因何以故後別破文三初塵文三初徵若合時來離當已滅云何覺離二合離違順二相亦復如是後違順箋云若違時來順則隨滅云何知順若從根出必無離合違順四相則汝身知元無自性次根必於空出空自知覺何關汝入後空是故當知身入虗妄後結文二初結破本非因緣非自然性後雙非阿難譬如有人勞倦則眠睡熟便寤六意入文三初立文三初舉喻彰勞箋云睡熟是八識歸種便寤謂有等無間緣乃能醒寤苟無此緣則不寤也覽塵斯憶箋云斯猶此也言從此向識中思量記憶前事失憶為忘是其顛倒箋云既失記憶便作於忘佛說此人實是神昏識昧有此顛倒若是諸佛如來轉識成智無此顛倒也生住異滅箋云生表此法先非有住表此法暫有用異表此法非凝然滅表此法可破壞吸習中歸箋云吸則吸覧習乃串習中歸者一切習氣虗妄皆歸識中也不相逾越稱意知根箋云念念生滅無有間斷是意知根兼意與勞同是菩提二會妄同真箋云兼意是所變與勞是能變無明瞪發勞相因于生滅二種妄塵集知居中吸撮內塵後因塵顯妄箋云集知居中是第六與五同緣覽外塵相吸則覧攝前境撮則憶而不忘內塵則一向內緣也見聞逆流流不及地箋云見聞是前五識逆流者為順前境緣五塵則得若逆前境返緣第六則不得則指第六意識返緣不得之地地者依止為義名覺知性箋云是第六識也此覺知性離彼寤寐生滅二塵畢竟無體次破文二初總破文二初彰無實體箋云寤配生寐配滅如是阿難當知如是覺知之根非寤寐來非生滅有不於根出亦非空生後了相無因何以故後別破文三初塵文四初徵若從寤來寐即隨滅將何為寐二寤箋云若寤時生識寤為能生識為所生則寐時所依之寤既亡所託將無則識為能託寤為所託所託之寤既無更誰取其寐時之境寐中飜寤更有一節文應云若從寐來寤即隨滅將何為寤恐文含不述或飜譯與梵本失落必生時有滅即同無令誰受滅三生箋云令誰受滅密舉意根已破生滅意謂令誰受滅秪如生滅者誰此意舉第七是第六意根第六隨前生滅已破生滅二塵若從滅有生即滅無誰知生者四滅箋云俱無則永滅所變同能變能變既亡所變永滅滅則無識隨生已滅滅則識無一謝無生識隨生謝若從根出寤寐二相隨身開合次根箋云寤則第六識不內緣是開寐則第六內緣為合或開或合皆是意家所緣離斯二體此覺知者同於空華畢竟無性箋云二體即寤寐二境也意間若從根生便不假寤寐二境牽心既無二境此識乃同空華五無之中是畢竟無識如羸人非杖不能起若從空生自是空知何關汝入後空是故當知意入虗妄後結文二初結破本非因緣非自然性後雙非復次阿難云何十二處本如來藏妙真如性三交融處執文分二初總徵源體箋云交融處執者則隱識句但將根破境將境破根交互和融十二處然謂世尊將六根六塵㸦相交破要融十二處之情執六根是識所依六塵是所緣處者依緣義生長義此六根六塵是識之生長處所阿難汝且觀此祇陀樹林及諸泉池後別破浮迷文六初眼等二處文分四初勑觀空象箋云祇陀樹林等是境今且立境破根泉池是彼林中泉水池水也於意云何此等為是色生眼見眼生色相次審已徵生箋云此等指根境也為復色為能生生得眼根為所生為當眼為能生生得色塵為所生阿難若復眼根生色相者三廣破相生文二初根生相文二初色箋云此是牒見空非色色性應銷箋云汝既言根為能生色為所生當見空時故非是色所生色既無能生根隨謝色性應銷者攝能變同所變銷則顯發一切都無箋云色性既無將何顯發根為能顯發能生根又無所生色又無色相既無誰明空質箋云阿誰又辨明空之質曾知根亦不隨色落謝也空亦如是後空箋云故經指云空亦如是後色塵為能生眼為所生誰明空色將空色合言應更云若復空塵生眼見者觀色非空見則銷亡亡則都無誰明色相若復色塵生眼見者後色生根箋云是牒此乃色塵為能生生得眼根為所生觀空非色箋云見空之時又非色見即銷亡箋云色既為能生見為所生能生既滅所生亦亡攝所變同能變亡則都無誰明空色箋云既亡則都無見又誰辨明空之與色也是故當知見與色空但無處所四結袪雙執文二初總除二處即色與見二處虗妄後結妄雙非文二初總結妄本非因緣非自然性後雙非阿難汝更聽此祇陀園中食辦擊鼓眾集撞鍾鍾鼓音聲前後相續二耳等二處文分四初勑觀塵象於意云何此等為是聲來耳邊耳往聲處二審已徵生阿難若復此聲來於耳邊三廣破相生文三初破聲來文三初許交聲來箋云阿難道聲來耳邊又如何若復此聲來汝耳邊是牒如我乞食室羅筏城在祇陀林則無有我次比身遊往箋云喻鼓秪有一聲來阿難耳其聲既往則別人耳不合更聞如世尊秪有一身入城乞食祇陀林中則無世尊此聲必來阿難耳處目連迦葉應不俱聞後責眾俱聞文二初舉少箋云秪有一聲來阿難耳佗處別人不合總聞何況其中一千二百五十沙門一聞鍾聲同來食處後明多箋云如今一千二百餘眾又且俱時聞鐘同來食處曾知聲亦不來阿難耳邊若復汝耳往彼聲邊次破耳往文三初許箋云但言耳往聲邊又如何阿難秪有一耳往彼鼓聲之邊如我歸住祇陀林中在室羅城則無有我次喻箋云阿難秪有一耳往鼓聲邊似佛秪有一身歸祇陀林別處則無身汝聞鼓聲其耳已往擊鼓之處鍾聲齊出應不俱聞後破文二初少箋云阿難秪有一耳在鼓聲處第二鍾聲應合不聞如今又聞曾知耳亦不往鼓邊何況其中象馬牛羊種種音響後多若無來往亦復無聞後雙破箋云無來無去密指真體無聞或可耳也不往聲邊聲亦不來耳處須見不聞秪破雙執是故當知聽與音聲俱無處所四結祛雙執文二初總除二處即聽與聲二處虗妄後結妄雙非文二初結妄本非因緣非自然性後雙非阿難汝又齅此爐中旃檀此香若復然於一銖室羅筏城四十里內同時聞氣二鼻等二處文分四初勑觀塵象箋云梵云旃檀唐云藥白者治風瘇赤者治熱病六十四黍為一圭四圭為一撮十二撮為一分十二分為一銖二十四銖為一兩於意云何此香為復出旃檀木生於汝鼻為生於空二審已徵生箋云三處徵阿難若復此香生於汝鼻稱鼻所生當從鼻出三廣破相生文三初根文三初縱鼻生香箋云但言生鼻又如何若四此香生於汝鼻是牒鼻為能生香為所生須有香氣從鼻根出鼻非旃檀云何鼻中有旃檀氣次難非香質箋云若鼻是旃檀便有香氣從鼻中出汝鼻又非旃檀因何有此香氣也稱汝聞香當於鼻入鼻中出香說聞非義後責聞非出箋云汝既稱聞香既從鼻出不合聞香若也返聞說聞乖理若生於空空性常恒香應常在何藉爐中爇此枯木次空箋云變所變香同能變空香既常在又何假爐中燒此枯木若生於木則此香質因爇成煙後木文三初敘木藉燒因箋云阿難云香生於木頭又如何難云若生於木須不假燒便有香從木而出則此香質又因爇後成煙方聞若鼻得聞合蒙煙氣次立蒙煙接齅箋云又轉云我言香生於煙氣便難云若生於煙便令把汝鼻根蒙煙氣始可聞香其煙騰空未及遙遠四十里內云何已聞後責未及俱聞箋云若言生煙祇如燒香之時煙騰空中方一二里又無煙到四十里外因何四十里內一時聞香室羅筏城周圍闊四十里是故當知香鼻與聞俱無處所四結袪雙執文二初總除二處即齅與香二處虗妄後結妄雙非又二初結妄本非因緣非自然性後雙非阿難汝常二時眾中持鉢其間或遇酥酪醍醐名為上味四舌等二處文分四初勑觀塵象箋云西天辰時出求粥日午求是二時也乳煎為生穌生穌煑為熟穌熟穌煑成酪酪煑成醍醐西土以為上味於意云何此味為復生於空中生於舌中為生食中二審已徵生箋云三處徵阿難若復此味生於汝舌在汝口中秪有一舌其舌爾時已成穌味遇黑石蜜應不推移三廣破相生文二初根文二初難一舌多知箋云蜂窠黑石中取之名黑石蜜若復此味生於汝舌者牒舌為能生味為所生在汝阿難口中秪有一箇舌其舌爾時已成穌味攝能變舌同所變味既成穌味第二更過黑石蜜不合知其蜜味為舌已成穌去若不變移不名知味次責不移知味箋云夫知味者眾味皆知獨知一味不名知也若變移者舌非多體云何多味一舌之知後縱移乖一箋云今但推移總知又如何若變移者是牒秪有一舌故非多體不可一舌齊知眾味若生於食食非有識云何自知次塵文二初無識能知箋云食為能生知為所生言知生於食然後知味食無情識云何自知其味也又食自知即同佗食何預於汝名味之知後有心非己箋云預者關涉為義縱食有知即同佗食食有一知人有一知須成佗人又何關涉於汝阿難名味之知若生於空汝噉虗空當作何味後空文三初邀噉虗空必其虗空若作鹹味既鹹汝舌亦鹹汝面則此界人同於海魚次縱同魚類既常受鹹了不知澹若不識澹亦不覺鹹必無所知云何名味後雙味不知箋云必無所知是鹹澹之味云何知味有鹹澹方知味既無將何知之是故當知味舌與甞俱無處所四結祛雙執文二初總除二處即甞與味二俱虗妄後結妄雙非文二初結妄本非因緣非自然性後雙非阿難汝常晨朝以手摩頭五身等二處文分四初立箋云晨朝用手摩觸己頭於意云何此摩所知誰為能觸能為在手為復在頭二審箋云能觸是識意間將何為識能為在手表境在頭表根言此識為當在根為當在塵若在於手頭則無知云何成觸三破文三初顯一非成破文二初手箋云若言識實在塵根須不知既也文不知云何名觸夫三和成觸則根和境和識和也若在於頭手則無用云何名觸後頭箋云若在於頭是根手則無用不假於境無境云何名觸若各各有則汝阿難應有二身次各有雙身破箋云若根亦有知境亦有知須成二身若頭與手一觸所生則手與頭當為一體後一觸單雙破文三初縱雙立一理箋云頭與手根境秪是一知乃根境能所不分合成一體若一體者觸則無成次一體不成破箋云三和成觸縱為一體觸則無成若二體者觸誰為在在能非所在所非能不應虗空與汝成觸後能所分居破箋云但言二體又如何即根境二體也觸誰為在者言此知當在何處也在能是根非所乃境在所又非能意間在能之時所須不知在所之時能又不知能所㸦亡既無能所將何成觸不可虗空便與汝阿難成觸也是故當知覺觸與身俱無處所四結袪雙執文二初總除二處即身與觸二俱虗妄後結妄雙非文二初結妄本非因緣非自然性後雙非阿難汝常意中所緣善惡無記三性生成法則六意等二處文分四初標緣立法箋云善者於善境上順善為性惡者於惡境上返逆為性無記琴碁等非善惡數皆是意識所緣之境有此善惡等生成意識所緣法則此法為復即心所生二徵法生因文二初即箋云善惡三性等是所緣境言此境為復心為能生生得所緣法塵為所生為當離心別有方所後離箋云言此三性法為復離却第六識心之外別有方道處所阿難若即心者三廣破生迷文二初即箋云言若此三性所緣之法即是第六識心者法即非塵非心所緣箋云此法便是第六識心則不是法塵亦不是心之所緣云何成處箋云若是塵即心所緣既不是即不是心所緣云何又成處處者須是心緣其法方得為處也若離於心別有方所後離文三初牒離雙徵文二初上牒箋云牒計云若離心外別有所緣法塵即法自性為知非知後下徵箋云便徵云此離却第六識心三性之法別有方所此三性法各有自性善惡無記定是有知定是無知知則名心異汝非塵同佗心量次破知文二初許知佗量破箋云言此三性既有知不成法塵便是心法既是心則異於阿難為有知故便成佗人之心量不成汝之心量或異者離也既有知便離却汝阿難非為第六法塵即成別人非汝阿難心量即汝即心云何汝心更二於汝後許二雙心破箋云即汝是阿難也有一心即心是法塵境亦有一心云何汝阿難心法便有兩箇心根上一心所緣境一心也若非知者此塵既非色聲香味離合冷煖及虗空相當於何在後破非知文二初離五影無箋云色是眼聲是耳香是鼻味是舌離合冷煖是身已上是前五識及虗空相是所依意謂既離却前五當於何在為第六須假前五同緣方能覧五塵境色影象相分變一重相分親緣令既離前五相當於何在今於色空都無表示不應人間更有空外心非所緣處從誰立後責無表示箋云色是五識空是所依若第六須假五同緣今既離五則無所緣今色空都無箇標表顯示不合人間有其空外此空是頑空空無盡不可有外若是真識則是空外即空外便是真如則心緣不得故云心非所緣亦不立處所是故當知法則與心俱無處所四結袪雙計文二初總除二處則意與法二俱虗妄後結妄雙非文二初結妄本非因緣非自然性後雙非復次阿難云何十八界本如來藏妙真如性四殄界通真文分二初總標真體箋云殄者滅也界者因義分義因者根能照境識生其中名之曰因依也分者類義若族類也依根發識覧境滋根故有眼根界眼識界色境界也下五如上若分類則六塵為一類六根為一類六識為一類然如來藏凡聖通名密嚴云如來清淨藏世間阿賴耶如金與指環展轉無差別又勝鬘云在纏名如來藏出躔號大法身六根界六塵界六識界三六一十八界也然謂世尊廣向此殄滅十八界之執心要通歸真如之體也阿難如汝所明眼色為緣生於眼識此識為復因眼所生以眼為界因色所生以色為界後別破群疑又分六初眼等三界文三初徵因箋云眼是所依緣色是牽心緣識是了別緣此識指第六意識為復因眼所生眼為能生識為所生以眼為界取能生處為界分阿難若因眼生既無色空無可分別縱有汝識欲將何用次破界文三初根文二初離塵無用破汝見又非青黃赤白無所表示從何立界後體無形表破箋云既無法可標表顯示從何立界若因色生空無色時汝識應滅云何識知是虗空性次塵文四初責識知空破箋云色為能生生得汝識為所生無色時是見空之時無色當情汝妄識須從色境落謝攝所變識同能變色若色變時汝亦識其色相遷變汝識不遷界從何立二達依不變破箋云道我識因色為能生識為所生若色謝時我識不遷便難云若色變了汝識須隨變可名眼識今既不遷因從何立從變則變界相自無三順讚全無破箋云能變之色既謝所變之識隨亡則無因也或可從變是識則變是色既無色與識亦無界不變則恒既從色生應不識知虗空所在四常不知空破箋云不變則恒常一向見色不合更見空若見空須長時見空若兼二種眼色共生合則中離離則兩合體性雜亂云何成界後箋云二種則眼根與色塵若根境合則此識一半離向根一半離向塵若根境離時一半隨根一半隨境根是無情識是有情塵是無情此識體性有情無情相亂云何成界是故當知眼色為緣生眼識界三處都無後結非文二初總除三界則眼與色及色界三後結文二初結妄箋云眼是眼根界與色塵界及色界三再牒色界含取眼識界本非因緣非自然性後雙非阿難又汝所明耳聲為緣生於耳識此識為復因耳所生以耳為界因聲所生以聲為界二耳等三界文三初徵因阿難若因耳生動靜二相既不現前根不成知必無所知知尚無成識何形貌次破界文二初根文二初離塵無知破箋云耳為能生識為所生動靜二相是耳家所緣境境既不在前此耳根則不成知必定無知知尚不成此所生識又作何形狀相貌此破勝義根或可耳既生識須不假所緣境有動靜境之時根便有知既無動靜二塵則不成知必無所知是境所知境尚無何處有識此破浮塵根若取耳聞無動靜故聞無所成云何耳形雜色觸塵名為識界則耳識界復從誰立後根塵雜一破箋云若取浮塵耳根為能生生得所生識又無動靜之境此便雜亂色塵是眼家所緣觸塵是身家所緣則非耳家所緣也或可若取耳聞是勝義根若言根為能生識為所生耳既生識須不假動靜二塵有境方說聞無境說聞非義既無動靜二境聞無所成根既不聞便須喚作耳形耳成形不成聞既成形便雜色境同眼根又觸塵同身根耳識界又不成故云復從誰立此破根也若生於聲識因聲有則不關聞後塵文四初轉聲成識破文四初立聲除耳箋云若能生是聲塵所生是識此識便因聲塵而有是聲有聞便破云則不關涉於聞根無聞則亡聲相所在二離目聲亡箋云若也無聞相則無聲相所在為根能照境今既無根則聲亦無根塵俱無也識從聲生許聲因聞而有聲相二立境因根箋云前不許識從聲生又不關聞今縱許汝識從聲生又許聲因聞根聞得所緣聲相聞應聞識四結聲成識箋云此聞根須返聞佗識為識從聲上生故或可既許根聞能生之聲未著於聲且先聞識何故為聲為能生識為所生識在聲前根既去聞須先聞識後方到聲不聞非界二不聞無界破箋云若也識從聲生不能返聞於識又不得成界或可不聞於聲又非界也為聲為能生以聲為界聞則同聲三轉識成聲破文三初立識成聲箋云若此識從聲生又能聞識能聞之識已同所聞之聲識已被聞次定彰成境箋云將根去聞也誰知聞識後責識成塵誰能聞識箋云言識已被聲聞誰知其能聞之識或可誰知聞識則無能知之識為能知之識已同聲也此破聞若無知者終如草木四無知草木破文三初類無情箋云根亦不知聲亦不知又如何破云終如草木既根境二俱無知便同無情之物不應聲聞雜成中界次責雜成箋云既成無情去不合說聲是境聞是根根與境相雜便成汝中聞識性此則乖理既同草木根境各無知將何物合為中間界無中位則內外相復從何成後舉中雙破箋云又云我不雜成中界又如何便難云界無中位是無識既無識則內根外塵二相復從誰立若無識根境亦不立也是故當知耳聲為緣生耳識界三處都無後結非文二初總除三界則耳與聲及聲界三後結文二初結妄本非因緣非自然性後雙非阿難又汝所明鼻香為緣生於鼻識此識為復因鼻所生以鼻為界因香所生以香為界三鼻等三界文三初徵因阿難若因鼻生則汝心中以何為鼻次破界文二初根文二初徵文二初總箋云教佗思量定二種鼻也為取肉形雙爪之相為取齅知動搖之性後別箋云肉形雙爪之相是浮塵根齅知動搖之性者是勝義根也若取肉形肉質乃身身知即觸名身非鼻名觸即塵鼻尚無名云何立界後破文二初破質文以總攝別箋云若是肉形此質是身身即觸境名之曰身不是於鼻若也名觸觸便是身家所緣之塵即不聞此鼻尚無名目因何立得界或鼻眼等根是別身是總攝別歸總既歸總則成身唯觸塵既是觸塵是身所緣境鼻尚無名何立界若取齅知又汝心中以何為知後知文三初肉知觸同身破文二初徵箋云若取齅知是勝義根便徵以何為知此肉團不合有覺或可是審佗以肉為知則肉之知元觸非鼻後破箋云若言是肉團之心為知則是肉團心不離身是攝別從總以空為知空則自知內應非覺次空文三初難肉非知箋云既勝義根與浮塵根俱破却莫是空為能生生得識為所生空既能生識空須自知便成人去空既自知又何假汝肉團心覺察如是則應虗空是汝次虗空成質箋云如是空合是汝阿難此破空汝身非知今日阿難應無所在後指身無在箋云既是虗空能知則阿難不能有知今日阿難對我則無所在以香為知知自屬香何預於汝後香文二初攝識從塵破箋云若以香為識有所知知便由香則不關涉汝阿難也若香臭氣必生汝鼻則彼香臭二種流氣不生伊蘭及旃檀木後攝塵從根破文三初香臭不並破文三初難非雙木箋云若香臭氣定生於汝鼻中則香氣之材名栴檀臭氣之木名伊蘭此二種流布氣息不生此二種由汝鼻生二物不來汝自齅鼻為香為臭次抑齅自根箋云若二種不來汝鼻時汝試自齅鼻作何氣息為是香為是臭何以如此為汝言香臭生鼻故或可二物不來是伊蘭等鼻既自生香臭此二物則不來臭則非香香應非臭後香臭互破箋云若臭則不成香香則不成臭二物相形互破或可臭則非香無香香應非臭無臭若香臭二俱能聞者次二氣雙聞破文三初許立俱聞箋云若香臭二俱時得聞者牒也或雙許若香氣臭一時聞又如何則汝一人應有兩鼻次難成雙鼻箋云不可一鼻生二種氣如旃檀不生伊蘭伊蘭不生旃檀氣也對我問道有二阿難誰為汝體後難分雙質若鼻是一香臭無二後二氣同根一體破文二初立根成一難氣同根箋云若鼻是一香氣與臭氣無體臭既為香香復成臭二性不有界從誰立後難氣互成雙亡失界箋云臭則成香香則成臭乃香臭不分各無性界從何立緣謂鼻為能生香為所生如今既無所生香臭何處有能生界分若因香生識因香有後塵文二初破識文二初總文三初立因箋云且牒許香為能生識為所生既因香生則不合聞香香不可自聞如眼有見不能觀眼次比量箋云喻如眼不自見其眼也因香有故應不知香後結不知香箋云言識因香有不合更知香知則非生後別文二初責違因箋云若也知其香塵則不是香塵能生知香說生義不成不知非識次責違體箋云若不了知香塵又非識夫識者了知為性既不了知云何名識香非知有香界不成後破界文三初破香界箋云若不知香此香未有所因香界不成能變之香不知所變之識識不如香因界則非從香建立次破識界箋云夫建立義者須鼻根照香識生其中今識不知香此因不從香建立是能所互破香不知識識不知香也既無中間不成內外彼諸聞性畢竟虗妄後舉雙破箋云既無中間是識亦無內外根境則香臭等聞性畢竟虗妄無可安立或可前香非知有是破香識不知香是破識故云既無中間是識何成內外內是根外是塵識既將亡根塵何有是故當知鼻香為緣生鼻識界三處都無後結非文三初總除三界則鼻與香及香界三後結文二初結妄本非因緣非自然性後雙非阿難又汝所明舌味為緣生於舌識此識為復因舌所生以舌為界因味所生以味為界四舌等三界文三初徵因箋云舌為能生識為所生阿難若因舌生則諸世間甘蔗烏梅黃連石鹽細辛薑桂都無有味汝自甞舌為甜為苦次破界文二初總別文二初根文二初根塵立奪抑自甞根箋云則諸世間甘蔗是甜烏梅是酸黃連是苦石鹽是鹹細辛薑桂是辣都無有味為根為自生必合自甞若舌性苦誰來甞舌舌不自甞孰為知覺次責根不自甞誰知舌苦箋云舉一例諸舉若餘五味同舌有味舌不自甞舌性非苦味自不生云何立界後縱根非味塵謝界亡箋云若識從舌生其舌又無苦味味既不生因義不成若因味生識自為味後塵文三初比識同塵照知破文三初許立成因箋云若此識因味為能生識自己便成味味不可更能識味攝所變識同能變味同於舌根應不自甞次比量同根箋云若味為能生識為所生識已成味味不可更了味味同舌不自甞云何識知是味非味後責知諸味箋云前既不自甞又云何知得是味非味又一切味非一物生次抑識例塵多體文二初舉味多體箋云若識從味生夫味須假鹹澹等不一之未味既多生識應多體後類識同多箋云引所變識同能變味識體若一體必味生後味同識一體破文三初立識一理箋云言識體若是一又從多種味生下便難鹹澹甘辛和合俱生諸變異相次抑味同心箋云舉四味合有六味和合已上諸味從苗至實皆苦及甘為俱生諸戀異相或苗甘實成苦或苗苦實成甘同為一味應無分別箋云味為能變識為所變識體又是一必從味生如上諸味既有多般同識為一若也為一諸般之味合無分別分別既無則不名識後結破箋云識者了別義今多味為一則無分別識義不成云何復名舌味識界後總破文三初總責無三箋云結不成根境識三不應虗空生汝心識次責無因生識箋云既不從根境生虗空則不合生心識此心則緣慮解心八識皆名心舌味和合即於是中元無自性云何界生後牒破根塵箋云舌根與味塵和合於其中亦無識體為根與境既不生縱和合亦不能生根與塵元來無自性既無有體界義不成是故當知舌味為緣生舌識界三處都無後結非文二初總除三界則舌與味及舌界三後結文二初結妄本非因緣非自然性後雙非阿難又汝所明身觸為緣生於身識此識為復因身所生以身為界因觸所生以觸為界五身等三界文分三初徵因箋云身生是根觸生是塵觸為能生識為所生或身為能生識為所生阿難若因身生次破界文二初單文二初根文二初立箋云若因身生許身為能生識為所生必無合離二覺觀緣身何所識後破箋云若身為能生便須不假合離合則冷熱等境離亦是冷熱等境分離無此二覺觀矚身則無識若因觸生後塵文二初立箋云許觸為能生識為所生必無汝身誰有非身知合離者後破箋云前從根生已破今言從塵生識既從塵生即不假根誰有無身能知合離阿難物不觸知後雙文六初顯物無知彰身交觸箋云顯境不能生觸身知有觸箋云顯知觸是身三和生觸知身即觸二根塵互立箋云攝身根從於觸塵知觸即身箋云攝觸成身身是無記物亦無記即觸非身即身非觸三身境互亡箋云若是塵即不是根若是根即不是塵或可即觸非身無身即身非觸無觸身觸二相元無處所四雙非二所箋云根塵互破也合身即為身自體性離身即是虗空等相五合體離空箋云若將塵合身即是根離根即是空等相或合身即為身自體性謂若將物合成身則為身自體性為物是無記身亦無記此是合破也離身即是虗空等相物既離身身亦離塵根塵即是虗空等相根塵二法俱無也等取佗人既無自根塵便成佗人內外不成中云何立中不復立內外性空即汝識生從誰立界六邊中總破箋云內外不成無根塵也中云何立無中間識也內是根本是塵其性又空是汝所生之識從誰立界分也是故當知身觸為緣生身識界三處都無後結非文二初總除三界則身與觸及身界三後結文二初結妄本非因緣非自然性後雙非阿難又汝所明意法為緣生於意識此識為復因意所生以意為界因法所生以法為界六意等三界文三初徵因箋云意法是法塵生於意識是第六識此識為復此牒第六因意所生以意為界此指第六因法所生以法為界指法塵或可意法為緣意是第七識是所依緣是第六識所依法是法塵影象是牽心緣生於意識是第六是了別緣此識指此第六為復向二處徵阿難若因意生次破界文二初根文二初離塵無用破文三初許立根因箋云意生第二識也於汝意中必有所思發明汝意次敘生依法箋云於汝第七意中定有所思量之法發起明白第六識若無前法意無所生後離塵無用箋云此第七所依根若無前塵所緣之法此第七識則無所生或可若無前五塵法第六識須無所生為無五塵則無六識曾無無境心也離緣無形識將何用箋云若離却七識所緣之法此識則無形狀為無所了別或可是無塵之形六識則無用為六識從七識生既從七生七自生識須不假前五塵牽心既無五塵亦無六識又汝識心與諸思量兼了別性為同為異後就根同異破文三初徵箋云又汝第八與諸思量第七兼了別性第六為同為異定其同異雖此牒七八六下破唯七同意即意云何意生次破文二初同箋云牒則第八破則第七此第七與第六同如水與水故無分別云何第七能生第六異意不同應無所識後異文二初正箋云若第七與第六異如水與火合無所識若無所識云何意生後轉文二初無箋云第六既無所識云何知從第七生識以了別為性既言生於第七又無了別云何知生處尚不知云何名識若有所識云何識意後有箋云汝若生於第七又異於第七又有所識便破云何識意上識字是第六識下意字是第七識既生第七便無前塵可緣既無前五同緣又有所識須返緣第七何故如此若有五塵便有可緣今既生於第七不假五塵五塵既無汝第六既有所識須見緣於根本若緣根本則犯以心緣心過下雙破云唯同與異二性無成界云何立後結箋云同第七不成異第七不得界亦不能立或可若言同又難云同意即意云何意生同破若言異又難云異意不同應無所識異破第七與第六一無所成故云二性無成將何立界界義不成若因法生世間諸法不離五塵後塵文五初總分成別箋云又執法塵為能生識為所生便云世間所有諸法不出此五塵一時收盡汝觀色法及諸聲法香法味法及與觸法相狀分明以對五根非意所攝二勅觀別總箋云意破云汝既執法塵生第六則不干前五塵汝觀色法等是五塵以對五根言不是第六意根攝既單執從法塵上生須不干着五塵此五塵以對五根第六唯縱法塵生故云非意所攝汝識決定依於法生汝今諦觀法法何狀箋云便定云汝識決定依於法生是法塵便破云汝今諦實而觀上法是五塵法下法是第六變起一重影象法意謂汝言第六決定生法塵不假五塵便乃無五塵既無五塵何處得法塵影象來有前五塵為本質然後方有法塵影象仗五塵為緣今既單執從法塵生便不干著五塵五塵既無法塵何有法塵既無將何為識能生既無所生何得法法俱無形狀若離色空動靜通塞合離生滅越此諸相終無所得三明離五無六文二初別牒五名箋云色空眼家所緣境動靜耳家所緣境通塞鼻家所緣境離合身家所緣境生滅是識家所緣境乃法塵其中影取甜變是舌家所緣境離此六塵外第六識終無所得此斥文從前文云法法何狀既無五塵與法塵汝識當於何生生則色空諸法等生滅則色空諸法等滅後總敘生滅箋云色空是眼境等取下四境生自是色空等滅自是色空等意識則不知色空生滅何故如此為執道唯從法塵生滅既如此須不干佗五塵或可生則色空等生有五塵生亦有法塵生滅則色空等滅有五塵滅法塵亦須滅為佗前來執道六識決定生法塵既決定生佛破時將根對塵云非意所攝既非意所攝便不緣五塵既無五法塵亦無故破云法法何便結云生則色空等生意間云既有五塵生便法塵影象生法塵與五塵齊時有生滅之時六塵俱滅今既執六唯生法塵不干前五塵五塵既無法塵目何而有既也齊時滅又齊時生所因既無四責無因有識箋云法塵也因生有識箋云六識也作何形相箋云既無所因何處有識相狀不有界云何生五結破界執是故當知意法為緣生意識界三處都無後結破文二相總除三界則意與法及意界三後結文二初結妄本非因緣非自然生後雙非
