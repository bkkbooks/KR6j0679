body:
  text: 天竺沙門般剌密帝譯烏長國沙門彌伽釋迦譯語菩薩戒弟子房融筆受西京大興福寺沙門惟慤科皇宋首楞大師可度箋爾時阿難及諸大眾聞佛示誨身心泰然六觀河匪變指文二初申疑文二初阿難密釋雙源文四初承息慮箋云阿難乃舉殿人及諸祇園會上三十六人大眾聞則耳根發耳識同緣名義示乃指示佛前來指云若離前塵有分別性即真故心又云燈能顯色如是見者是眼非燈眼能顯色如是見性是心非眼誨乃誨責責云云何汝今以動為身以動為境從始洎終念念生滅遺失真性等身是五蘊妄身心是八識妄心身更不執我心更不執法雖未悟得首楞嚴性亦得水所貴故康泰安然也念無始來失却本心二念昔遺真箋云念者冥記之義失却本來真心失也不曾失祇是被煩惱所覆暫時不得顯現又何異於失若決有失諸佛起智合理之時須有箇真從外而來疏文云頭無得失之非見有忽狂之咎然諸佛菩薩起智合理內假真如熏外假師教熏亦無一法從外而得妄認緣塵分別影事箋云謂一切眾生失云本心日用中間虗妄印緣塵妄識為心八識各緣自分境眼識緣色塵耳識緣聲塵乃至第六識與五同緣分別彊盛分別色香等影乃七識執八見分為我親為影象相分事則八識合業果事今日開悟如失乳兒忽遇慈母三喻悟逢親箋云言今日之下是七月十六日蒙世尊向楞嚴會上開方便門示真實相令開通悟入阿難失却本心流浪生死如失乳今得遇世尊開悟如兒遇母性命復存阿難悟則未悟今日目因談果世尊四十五年後向楞嚴會上稱性而談說頂三昧法言我終須悟去合掌禮佛願聞如來顯出身心四請分雙性箋云明顯指出五蘊妄身八識妄心真妄虗實箋云真則實妄則虗現前生滅與不滅箋云生滅是妄不生滅是真二發明性箋云願佛為發起明白真性妄性條然各別待我棄妄修真阿難大意見佛前來責之以動為身以動為境乃疑妄外有真欲得世尊離妄指真有此問表時波斯匿王起立白佛我昔未承諸佛誨勑見迦旃延毗羅胝子咸言此身死後斷滅名為涅槃後波斯陳疑顯問真理文四初敘昔聞邪教箋云咸總也我者親義西土汎皆稱我從今本古謂之昔迦旃延應云迦羅鳩䭾迦旃延迦旃延是姓字迦羅鳩䭾六師之中是第五師執一切亦有指亦無相顛倒執著則斷見外道毗羅胝子應云刪闍夜毗羅胝子字刪闍夜母名毗羅胝是彼之子故云毗羅胝子此苦行外道陶糟飲汁拔髮灰身等六師之中是第三師執道本自然何假修證但盡此生自然得道舉喻云如高山轉縷丸縷盡丸止王言我昔未承受諸佛誨喻告勑之時見此二外道總言此四大之身死後一向斷滅不復續生不續生處得大安樂名為涅槃涅槃安樂義納得此種子在第八識中我雖值佛今猶狐疑二陳遇正猶疑箋云言我如今雖然值遇世尊猶尚狐疑狐性多疑疑則猶豫不決不知此二外道作此等說還是不云何發揮證知此心不生滅地三請簡示真途箋云揮用也地則實際理也請佛為佗發用證悟了知此心不生不滅今此大眾諸有漏者咸皆願聞四敘同機樂聽箋云簡去無漏前阿難問佛未見答因何王又請有三義和會一恐大文失落此中經義不全二王者自在義得問便問不管阿難前問三王懷得此問已久恰見阿難問與自意同便起來問圖得佛答之時亦答阿難所問佛告大王汝身現在後決示文二初簡滅文三初滅文四初問箋云佛呼王言汝身現在為中印土主有經作存字義通今復問汝汝此肉身箋云言汝此肉團之身是父精母血三十六日在母胎中生藏上熟藏下假合而成為同金剛常住不朽為復變壞箋云為同諸佛常身法身不生不滅為復遷變壞爛佛意問欲為佗說不生不滅且光問生滅促淺至深世尊我今此身終從變滅二答箋云言我今精血假合四大危脆之身一朝無常殺鬼到來終須改變壞滅佛言大王汝未曾滅云何知滅三徵箋云佛又問汝今未會滅此身猶自存在云何知得變滅耶世尊我此無常變壞之身雖未會滅我觀現前念念遷謝新新不住如火成灰漸漸銷殞殞亡不息決知此身當從滅盡四酬箋云言我此無常不得長久變壞之身即今也未曾滅我觀現前前念後念如此遷流落謝不曾停駐看前念新後念又新於前念皆被行陰所遷似一堆火漸漸成灰既成灰已被風所吹即漸銷散殞滅更不停息決定當知此身須從變滅將盡佛言如是大王汝今生齡已從衰老顏貌何如童子之時次異文二初舉老比少問箋云言汝如今生身年齡已從衰殘老耄顏容形貌何如十歲為童子之時世尊我昔孩𡦗膚腠潤澤後生華耄朽答箋云初生曰孾二歲曰孩三歲曰𡦗皮外曰膚血脉相湊處曰湊潤滑光澤年至長成血氣充滿箋云次第年至長大成立骨血氣色皆以充肥盈滿人年二十柔弱方冠髮三十壯有室而今頹齡迫於衰耄箋云而今頹落年齡似已頺山被寒暑通迫行陰所遷衰殘老耄八十曰衰九十曰耄形色枯悴精神昏昧箋云形體顏色枯槁憔悴神昏識暗昧髮白面皺逮將不久如何見比充盛之時箋云鶴髮雞皮逮猶及也將死不久意謂如今老矣不可於兒童之時佛言大王汝之形容應不頓朽後漸又二初審箋云言汝之形體顏容合不頓從歲便老朽去佛意欲王敘由漸而老王言世尊變化密移後答文三初總敘潛流箋云密謂欲密移謂改移言髮生爪長行陰所遷我誠不覺寒暑遷流漸至於此箋云日月運一寒一暑遷變流易我此四大之身漸漸童年遷至中年中年遷至老年次第而老何以故我年二十雖號年少顏貌已老初十歲時三十之年又衰二十于今六十又過于二觀五十時宛然彊壯次別陳麤易箋云我年二十弱冠之歲顏貌已老初十歲童子之時次第加上三十曰齒之年又衰老於弱冠子合六十耳順越却兩倍又過于二乃六十有二觀五一時則宛然彊壯健世尊我見密移雖此殂落後備述徵遷箋云尚書云堯篇曰殂今不取崩但取老善其間流易且限十年箋云於行陰之中遷流變易極是微細今麤而言之且限十年合十二年為一紀今舉全數為一度老若復令我微細思惟其變寧惟一紀二紀箋云不但是十二年一度老亦不是二紀二十四年亦不但是二十四年一迴老實為年變豈惟年變亦兼月化箋云實是一年一度改變又奪云非但一年一度改變亦兼一月一度改變何直月化兼又日遷箋云直但也又奪云不但一月一度改變兼又一日一度遷移沈思諦觀剎那剎那箋云沈細思惟諦實觀察時中極促不越剎那壯士一彈指間有六十剎那九百生滅念念之間不得停住故知我身終從變滅箋云前念後念不得停住故知我此肉團之身終須改變壞減佛告大王汝見變化遷改不停後示常文三初問陳知否文二初牒前悟減審自知真箋云牒王前來道豈唯身變亦兼此云子遷老年氣銷容變悟知汝滅箋云悟解知汝決定是滅牒前云故知我身終變滅亦於滅時汝知身中有不滅耶箋云亦則也則向四大變滅之時汝還知此四大身中乃有一分首楞嚴真性不可殂壞如泥涅而不緇本自不生今無滅否波斯匿王合掌白佛我實不知後稽顙虔諮述迷真性箋云王知則甚知准薩遮尼乾子經云波斯匿王過去是佛為二師不並化示國禮敘迷真謙懷請益圖得佛向下為說令一切眾生知之爾佛言我今示汝不生滅性次許對宜示文四初許示其心箋云佛言汝既不知我今示汝令汝亦知不知之性不生不滅大王汝年幾時見恒河水二舉河徵相文四初問觀河早晚箋云此河之水從阿耨達池師子口流出其河周圍四十里其中砂細如麵與水混流亦云金砂河謂此河有金砂亦云福河西天人生下子皆向此河浴言得福故去城五里南門外人眼所親佛說法多將此河為喻王言我生三歲慈母𢹂我謁耆婆天經過此流爾時即知是恒河水二酬孺歲能知箋云五母此二慈母也我生三歲之時慈母𢹂抱於我謁耆婆天華言命天即廟也西土人生下子皆來此廟求福或求壽言我當此三歲時經過便知是恒河水佛言大王如汝所說二十之時衰於十歲乃至六十日月歲時念念遷變則汝三歲見此河時至年十三其水云何三舉質徵河箋云如汝前來所說二十之年衰於十歲日月歲時豈唯年變亦兼月化何但月化亦兼日遷乃日與月更與一歲復與一時則汝三歲見此恒河且越過十年至十三時見水如何王言如三歲時宛然無異乃至于今年六十二亦無有異四答水恒無易箋云王言如三歲之時與年十二時也無別異于今六十有二此水亦無變易此約相分無遷後約見分佛言汝今自傷髮白面皺其面必定皺於童年則汝今時觀此恒河與昔童時觀河之見有童耄不三審見遷停文二初舉形遷相審性同宜箋云汝如今自家悲傷頭髮已是白面皮必定皺則汝今年六十二時與昔為童子之時此眼識現量見分還有老少不意謂童年時老年時見性無別王言不也世尊後答心常不同身易箋云答無老佛言大王汝面雖皺而此見精性未曾皺四顯心常寂又三初比文三初皺箋云汝面雖皺來妄識生滅性未曾皺指眼識現量心同如來藏性此眼識現量心是八識親相分境不分能所喚似現量但指似現量自然顯得真現量了似歸真都是一如來藏性皺者為變不皺非變次變變者受滅彼不變者元無生滅後滅云何於中受汝生死次常箋云如何問如來藏中更有新新而起曰生念念落謝曰死而猶引彼末伽棃等都言此身死後全滅後責箋云末伽棃拘賖棃子其人字末伽棃母名拘賖棃仗母稱子六師之中是第二師執道本自然何假修證如偈云誰芟荊棘畫禽獸誰鑿江河堆高山暴風忽起還自止當知諸法皆自然等取六師外道王聞是言後會旨同欣箋云波斯匿王未值佛時見此迦旃延毗邏胝子咸言此身死後名為涅槃如今聞佛指佗如來藏性云汝面雖皺而此見精性未曾皺乃至云何於中受汝生死王聞佛此言也信知身後捨生趣生與諸大眾踊躍歡喜得未曾有箋云信謂信解清心曰信信如水精珠能清濁水故知謂覺知覺知此異熟既盡復生餘異熟善因生善道惡業墮泥黎捨此四大之身趣三界九地之生踊躍歡喜則法味滋神得未會有則獲利殊勝第二見相含尅指密因文十三段初凡聖同如二大海全潮三旅亭觀月四寄遣八還五性無緣相六體無盈縮七見非一異八空花一月九破自然十破因緣十一覺眚非見十二破和合十三破非和合且初凡聖同如指者此指來意然謂阿難見世尊指波斯匿王見分不生滅阿難便問云若此見聞必不生滅云何世尊名我等輩遺失真性顛倒行事於是世尊便說垂手除名喻答阿難令知正倒之身經云即時如來垂金色臂輪手下指示阿難言汝今見我母陀羅手為正為倒阿難言世問眾生以此為倒而我不知誰正誰倒佛告阿難若世間人以此為倒即世間人將何為正阿難言如來竪臂兜羅綿手上指於空則名為正佛則竪臂問阿難言若此顛倒首尾相換諸世間人一倍瞻視於是世尊勑令阿難向第一義諦上觀凡聖二名經云隨汝諦觀汝身佛身稱顛倒者名字何處號為顛倒上敘凡聖同如指竟阿難即從座起禮佛合掌長跪白佛世尊初凡聖同如指文二初難辭文四初申諮儀箋云阿難見世尊前來就眼識現量心上指波斯匿王如來藏性有越前談所以便起來難云若此見聞必不生滅二陳見理箋云見聞是五現量識見聞覺知之性必猶定也奈自不生今亦無滅謂世尊指波斯匿王云汝面雖皺而此見精性未曾皺乃至元無生滅云何世尊名我等輩遺失真性顛倒行事三牒相違箋云如何大覺世尊前來名邈我等流輩遺失却本來真如佛性顛倒頂墮義行事不正也謂阿難前來向兜羅開合指中道我見如來手自開合非我見性有開有合又向輪光顯耀指中道我頭自動而我見性尚無有止誰為搖動是以世尊綰前都責云云何汝今以動為身以動為境從始洎終念念生滅遺失真性顛倒行事阿難既蒙世尊責之向第二卷經初請佛說生滅與不生滅二發明性要革妄修真佛未答之波斯匿王便起來問佛佛就眼識現量心上指如來藏性即妄指真要佗無真可取無妄何捨寧知旨密言含有乖前述所以阿難小乘之人不會世尊指法便起來覈難願興慈悲洗我塵垢四請通決箋云願佛世尊興猶起也慈能與樂悲能拔苦以法水洗滌我妄心坌汙自體名之曰塵染汙難去名之曰垢即時如來垂金色臂輪手下指示阿難言汝今見我母陀羅手為正為倒後通疑文二初垂金立相文五初垂手雙問箋云母陀羅手亦云吉祥手佛手結母陀羅印即決定印也手表相分正是真倒是妄真即聖妄即凡阿難言世間眾生以此為倒而我不知誰正誰倒二引世稱名箋云阿難前被佛責不敢自定乃云世間迷真背覺之人用此為倒仍我不知那箇是正邪箇是倒阿難密彰了無正倒佛告阿難若世間人以此為倒即世間人將何為正三返問正宜箋云世間之人見我垂手便喚作倒見我竪手喚作正如此虗妄分別阿難言如來竪臂兜羅綿手上指於空則名為正四兜羅上指佛即竪臂五如來隨舉告阿難言若此顛倒首尾相換後勑諦雙名文三初牒前殊見箋云若者如也此者指知為義一切迷品知見不正忽若竪臂之時眾生喚作正正則是首忽若下臂之時眾生喚作倒倒則是尾如此互相更換諸世間人一倍瞻視箋云迷却圓成實性依佗起自性是一重妄又更向依佗相上生徧計執分正分倒分真分妄此則妄上加妄也則知汝身與諸如來清淨法身比類發明次比凡聖異名箋云則知汝身即五蘊泡幻之身是倒清淨法身乃常住之身是正比並類例發起明白如來之身名正徧知箋云汝便道如來是正知是徧知正知是根本知徧知是後得智汝等之身號性顛倒箋云便道我是凡夫之身唯是性明相則根本無明隨汝諦觀汝身佛身稱顛倒者名字何處號為顛倒後勸勑雙觀邀窮異相箋云世尊便教阿難向第一義諦上起少分之智觀察汝身稱顛倒佛身是正徧知汝身是妄佛身是真說真說妄俱為顛倒所謂真如凡聖皆是夢言佛及涅槃並為增語由是凡名聖名凡相聖相了不可得第二大海全潮指箋云此指來意謂阿難不知凡聖一如之理所以與諸大眾瞪矒瞻佛目睛不瞬不知身心顛倒所在所以世尊興慈悲心發海潮音告語阿難及諸大眾云諸善男子我常說言色心諸緣及心所使諸所緣法唯心所現汝身汝心皆是妙明真精妙心中所現物責云云何汝等遺失本妙圓妙明心寶明妙性又云一迷為心決定惑為色身之內不知色身外洎山河虗空大地咸是妙明真心中物說喻云譬如澄清百千大海棄之唯認一浮漚體目為全潮上敘大海全潮指于時阿難與諸大眾瞪矒瞻佛目睛不瞬不知身心顛倒所在二大海全潮指文二初聽徒失旨箋云于時乃倐忽之間阿難與諸三十六類大眾瞪目一向觀佛更不傍視瞬者動也謂前來凡聖同如指世尊教佗向第義諦上觀凡名聖名自何而得阿難小乘之人生空智狹省不知歸真之路失其所旨故不知五蘊之身八識妄心顛倒所在是妄所起之處若知妄所起之元便乃逆流歸本返聞聞自性故也佛興慈悲哀愍阿難及諸大眾後佛愍重宣文三初明妄從真現文四初廣陳緣相箋云興起也世尊既見阿難與諸大眾瞪矒瞻佛不知身心顛倒所在慧心沈溺不能發起請問所以教主如來興起無緣之慈佛以大悲為力哀憐愍念阿難并楞嚴會上四眾發海潮音徧告同會諸善男子箋云六十四音中是警告雄音緣海潮欲來且先發起雄音待海岸之人收其胃網等然後潮水必到法上而論世尊將欲說法先發無漏音聲佛音圓頓警告在會大眾全發入道之心側耳目而奉聆音肅清塵而賞幽致我常說言色心諸緣箋云述所恒宣故色是五根色五塵色法處所攝色心是八識妄心眼識耳識等諸緣乃等取四緣一因緣二所緣緣三增上緣四等無間緣然眼識九緣生耳識唯從八色法二緣生心法四緣生及心所使箋云心所法有五十一徧行五別境五善十一根本煩惱六隨煩惱二十不定四使是十使煩惱五鈍使五利使五十一法當體便名使一切眾生被心所有法之所使如郎使奴故諸所緣法箋云重結上緣即是結前色心諸緣及心所使唯心所現箋云唯者遮簡義遮簡真心外更無一法現量心即是如來藏性如來藏性為能現諸所緣法為所現如千波萬波水體所現若是法相宗唯從八識上現八識為能現諸所緣法為所現今此首楞嚴經是法性宗則圓頓之教至極周終之談唯從真心上現華嚴云三界所有法一切唯心現起信云心不見心唯識云三界唯心萬法唯識汝身汝心皆是妙明真精妙心二綰旨雙收箋云前廣今略但舉身心二法攝一切法前唯心所現之心總是微妙圓明精妙心是本來真心也中所現物箋云妄是真中之妄如水中之波如器外無金攝器歸金器從金現因何喚作物謂無真覺照如物無異此責一切眾生迷真背覺離妄求真不知妄即真故二因之中但是依因非生因云何汝等遺失本妙圓妙明心寶明妙性三責棄真源箋云如何汝等遺失本來微妙圓而且妙真明之心此性可貴可重如實內外精明意責失本真心故認悟中迷四責收迷識箋云認者執著為義悟則是真不能認得真中真但認得真中妄迷則是妄此妄是阿賴耶第八識無始時來為內身外器虗妄根本今時眾生棄却寶明妙性但認八識妄心也晦昧為空次明相起生由文三初述生迷相箋云若不述相之由仍懷異指世尊今時說色心諸緣及心所使生起之由晦謂昏晦是第八識體謂一念違如便有性明心起來帶業轉二識為見分現識為相分此三細識和合為第一能變阿賴耶不稱真明故晦也昧謂暗昧是第七識起有八識便有七識起來內執八見分為我癡我愛我見我慢四惑俱外便帶得一重寥寥地頑空是一切眾生妄心上變起空晦暗中箋云重牒上經結暗為色箋云為厭空嫌昧擬復本明搖動風生乃至終成相分色雜妄想箋云義本無色今有色既有所緣色法便雜無色之真虗妄想相想者取象義內心起來取著前塵色法能所相參雜故想相為身箋云想因相生故曰想相身假父想母想子想納此三想為胎即是初七日羯邏藍中有若是男向母身上起想中有若是女向父身上起想聚緣內搖次敘執拘形箋云第六意識內覽五塵常馳不靜六常內審法塵影象生住異滅趣外奔逸箋云六識與五同緣起惑造業昏囂動掉向前境奔馳蕩逸昏擾擾相箋云昏謂昏暗終朝擾擾竟夜昏昏此第六識向六根門頭起惑造業輪迴三界不曾停住以為心性箋云一切眾生本有真唯識性如前文云寶明妙性此性不在處不離處但用第六識心作真心體性一迷為心決定惑為色身之內箋云一念違如果感決定不可改轉堅強封著言心秪在五蘊色身之內認此五蘊便為法身常身然此五蘊亦且不離法身如世尊向涅槃會上告示大眾五今此身即是常身法身苟執妄為真何殊認豕為祥以雞作瑞不知色身外洎山河虗空大地後責認一遺諸箋云乃責云不知五蘊色身是內四大外及山河是所變山產也靈氣發通產生萬物河謂江河虗空是所依以無礙虗常為體大謂廣大地者能戴萬物咸是妙明真心中物箋云咸總也言總是微妙圓明本真之心中物一切眾生但執此妄識居在身內不知所執身外諸法唯是一心所現無一法不從真之所生也譬如澄清百千大海後舉喻全收文三初標箋云澄謂澄湛清謂清淨百千舉其廣數言海闊百千由旬喻法性身居法性土周徧法界廣闊無涯棄之唯認一浮漚體目為全潮窮盡瀛渤次責文二初責認少遺多箋云暴風鼓擊浪沫遂成浮漚今時但認此為海瀛洲海中之山十洲之一數渤澥海之異名言棄却大海唯認浮漚體為全潮窮極要盡然喻一切眾生棄却常身法身認此五蘊虗妄之身為諸佛身似棄却大海認一浮漚為大海全潮也汝等即是迷中倍人後責存雙執箋云迷中倍人者妄中更妄也一切眾生棄却諸佛常身法身認此四大五蘊之身則依他是一重妄入向此身上起惑造業執我執法生徧計執是兩重妄如我垂手等無差別箋云覆舉前喻似前凡聖同如指垂手除名云若此顛倒首尾相換諸世間人一倍瞻觀如來說為可憐愍者後傷箋云佛以大悲為力見此等人深可哀憐愍念第三旅亭觀月指箋云謂前大海全潮指中佛興愍悲發海潮音徧告同會諸善男子我常說言色心諸緣及心所使諸所緣法唯心所現所以阿難便執佛現說法音以為真心云我雖承佛如是妙音悟妙明心元所圓滿常住心地而我悟佛現說法音現以緣心允所瞻仰徒獲此心來敢認為本元心地所以世尊問阿難云汝等尚以緣心聽法此法亦緣說喻云如人以手指月示人彼人因指當應看月若復觀指以為月體此人豈唯亡失月輪亦亡其指何以故以所標指為明月故又云譬如有客寄宿旅亭暫止便去終不常住而掌亭人都無所去名為亭主上敘旅亭觀月指竟阿難承佛悲救深誨垂泣叉手而白佛言三旅亭觀月指文二初請決緣心文三初悲陳悟旨箋云蒙佛大悲救於他深加誨責如經云汝等即是迷中倍人又云認悟中迷此乃深誨也叉手則重之義我雖承佛如是妙音箋云前來指云汝身汝心皆是妙明真精妙心中所現物又云不知色身外洎山河虗空大地咸是妙明真心中物是此妙音也悟妙明心元所圓滿常住心地箋云言我也悟此微妙圓明真心元來圓滿乃為常住心地常住者不動義不隨三世遷移地則實際理地而我悟佛現說法音次祛認緣心箋云仍我悟解世尊現在祇園會上說頂三昧法無漏音聲現以緣心允所瞻仰箋云允信也現以能緣之心信佛言音生其瞻仰將此能緣之心便為我心徒獲此心未敢認為本元心地箋云徒空也我雖空得此心我也未敢重定此心是我本元心地願佛哀愍宣示圓音從疑請決箋云圓滿法界是無漏之音也拔我疑根箋云在手曰拔願佛以無漏智力拔我阿難疑心堅固有根株根有生長義歸無上道箋云是能詮文下所詮之理言我但無能緣心便獲無上道佛告阿難汝等尚以緣心聽法此法亦緣後酬宣舉喻又二初長空指月文二初責緣聲教箋云汝指阿難等取大眾尚用此能緣妄心聽佛無漏教法佛無漏言教却成所緣境因何如此為將能緣妄心緣佛無漏言教令此無漏言教亦成緣有能便有所能所相生也非得法性箋云此不得法性但得法相若是法性其說法者無說無示其聽法者無聞無得如人以手指月示人後舉喻彰迷文三初標陳指月文二初顯標能指彼人因指當應看月後所合隨觀箋云一切眾生不悟真性佛乃能詮文上示其所詮之理然而眾生須依文悟理若復觀指以為月體次徵雙失二途文二初失文三初緣指成月箋云此人若也認手指頭便為明月之體下便斷此人豈唯亡失月輪亦亡其指次指月俱亡箋云此人不獨不識所詮理亦不識能詮文何以故以所標指為明月故後徵述謬觀箋云以能詮文為所詮理豈唯亡指亦復不識明之與暗後迷文三初彰愚不辯箋云不但亡能詮文亦不識明是月喻所詮理圓明皎潔似一切眾生心光皎潔無其瑕翳暗喻能詮文聲名句文四法為體名相昏暗何以故即以指體為明月性次徵述迷端箋云用能詮教文為所詮理體明暗二性無所了故後結迷雙理箋云既然如此理之與教俱不了爾汝亦如是後合喻斥迷令知謬過文三初斥躬彰錯箋云汝阿難執教為心亦如此若以分別我說法音為汝心者次縱法成心箋云若用第六能緣分別妄識便為心者是牒計此心自應離分別音有分別性後邀離言音全標實性箋云此心指此妄心自合離却前塵隨塵分別聲塵有一分分別靈鑒不熏之性獨存不由境發便喚作真心若乃離却聲塵外無此分別之性此則妄非真也前文云塵非常住若變滅時此心即同龜毛兔角譬如有客寄宿旅亭暫止便去終不常住後主館遊賓文三初標喻箋云如似商人朝行暮止寄泊止宿旅舍之亭或宿或食食宿事畢俶裝前途不遑安住法上此能緣妄心聽有聲時有心分別無聲之時無心分別有來有云隨塵落謝倐有忽無而掌亭人都無所去名為亭主箋云喻一切眾生真心聽法無來無去靈鑒獨存前塵落謝之時此一分真性亦存不隨前塵此亦如是次合理文二初止陳虗認文三初舉心齊喻箋云前是喻此是法合言汝阿難前來現以緣心允所瞻仰汝執此緣塵妄心亦如行客爾若真汝心即無所去次許實無移箋云若是汝真心則不隨前塵變滅也云何離聲無分別性後責亡鑒性箋云因何有塵之時有分別離却前塵又無分別之性也斯則豈唯聲分別心後舉例彰非文二初例色同聲文三杯牒前聲性箋云斯此也言此則不但是有我說法之聲便有汝能緣分別之心妄生起下文分別我容離諸色相無分別性次倒色同虗箋云分別是能分別第六識與眼識同緣我容是所分別佛三十二相阿難前來道我見如來三十二相而求出家又此指中士允所瞻仰允所是聽世尊說法之聲瞻仰是見世尊三十二相故云分別我容此心乃有色相便有分別性無色相則無分別性是知識如嬴人非杖不能行也如是乃至分別都無後顯離相緣責當邪計箋云八識俱有分別眼識分別色塵境耳識分別聲塵乃至第六分別第七第七分別第八第八分別根身器世等如今八識一時不緣自分眼離色第八離眼身器世分別之心大都落謝非色非空箋云非色不見性色之源但執心無相非空不見真空之理但執隨境能鑒性色即是妙有妙有是盡空之有真空是盡有之空乃真空妙有妙有真空也拘舍離等昧為冥諦箋云問如今既不見妙有亦不達真空此人如何答云即同拘舍離是常見外道梵語末伽黎拘舍離末伽黎是字拘舍離是母名依母稱子六師之中乃第二師執冥性諦為宗執道本自然等取六師外道冥諦即是數論師宗師冥決不知諦者實義但執第八冥然計此以為涅槃不知八識生起之處離諸法緣無分別性後離法塵隨謝箋云忽若有生住異滅法塵影象便有第六識心若無此法塵影象又無第六識心即意根離却法塵無分別性明知祇是妄心逐境亡意隨塵謝八識各有所緣之法則汝心性各有所還後示錯文二初指妄同賓箋云八還各還前境眼識還色塵境第六還法塵境第七還第八第八還根身器世等此是妄一時隨所還了云何為主後責徵真體箋云如何為汝心此是佗真心妄心既隨塵各有所還因何為具心主宰第四寄遺八還指箋云此指為前旅亭指中云若汝心性各有所還云何為主阿難所以向此中便請云若我心性各有所還乃至云何無還於是世尊遂說八般之相各有可還明還日輪乃至當欲誰還然後便指云諸可還者自然非汝不汝還者非汝而則知汝心本妙明淨上敘八還指竟阿難言若我心性各有所還則如來說妙明元心云何無還唯垂哀愍為我宣說四寄遺八還指文二初請箋云各有所還乃八還也云何無還者前來云若真汝心即無所去此請無還若是無還之真性我未會請世尊為我宣說佛告阿難且汝見我見精明元後示文四初許宣勅聽文五初指妄箋云且汝是阿難見我是佛見精明元是眼識現量心此眼識現量心是八識親變影象對境不分能所如鑑現像此見雖非妙精明心次比真箋云言此眼識現量心八識親變此見雖非妙精明心者似現量非真現量也緣謂居在因位未轉識成智念念受色塵境所熏所以道非精明心忽若到佛果位中轉五現量成成所作智便是真現量也既非妙精明心莫離却似現量外別有真不莫器外別有金不下舉喻答如第二月三舉喻箋云第二月喻眼識現量心此心是一切眾生一念違如便影帶起來如似小見揑目見有第二月在忽若轉識成智此似現量歸真現量亦似捻却手後但是一輪明月非是月影箋云謂真不離妄妄不離真真妄一體不是水中之月影象相分不實之法也汝應諦聽四勅聽今當示汝無所還地五許示箋云謂阿難請佛此許示佗無還之地無還即真心世尊且還却前塵八般之相然後示佗無還阿難此大講堂洞開東方日輪昇天則有明曜二諸相可還文四初總陳群相箋云此大講堂指世尊演妙義之舍洞達開豁東方乃眾方之首表此首楞嚴經為阿難道之初日輪從浮桑出勝天雲漢便見空中光明顯曜此光明也中夜黑月雲霧晦瞑則復昏暗箋云月半後三更之明便見黑月雲霧集晦亦瞑昧也戶牖之隙則復見通箋云隙者孔隙也牆宇之間則復觀壅箋云觀㒵壅塞之相也分別之處則復見緣箋云此是所分別即缾盂車乘象馬園林前塵緣象不是能分別也頑虗之中徧是空性𤊹之象則紆昏塵箋云無雨之時塵陰霾有𤊹之塵起乃縈也澄霽𣫍氛又觀清淨箋云雨晴曰霽斂則收斂氛則氛氳之氣開却氛氳之氣便是晴空清淨之相此是離却八相阿難汝咸看此諸變化相吾今各還本所因處二勸審諸還箋云是此八般本所因之處下便徵云何本因三徵因所屬阿難此諸變化明還日輪何以故無日不明明因屬日是故還日四各敘還因文三初還明箋云明還日輪無日即不見有明明因屬日是故還日暗還黑月通還戶牖壅還牆宇緣還分別頑虗還空𤊹還塵清明還霽次還餘七箋云暗還黑月何以故無其黑月即不有暗暗因黑月故還黑月後六般作此行相則諸世間一切所有不出斯類後總結箋云則諸世間所有諸法不出此八般相一時收盡汝見八種見精明性當欲誰還三示性無還文三初總彰離遣箋云八種是前來八種之相見精明性是眼識現量心問佗當還何等法意間比眼識現量心不還前境何以故次徵述無還文三初縱徵若還於明則不明時無復見暗次立理箋云若言還明暗相現時應不見暗曾知見性不還明也雖明暗等種種差別見無差別後簡示箋云言前境則有老殊別異此一分見性無別諸可還者自然非汝不汝還者非汝而誰後指實真淨文二初除還指實箋云誰何也諸可還者是妄指前八般境不汝還者是真現量不隨前塵所還之者不是汝阿難真心復是何此指佗無還之地也則知汝心本妙明淨後顯性常明箋云指此不還之心本來微妙圓明清淨汝自迷悶喪本受輪於生死中常被漂溺四傷迷水溺文二初責迷箋云迷則不悟悶則不入疏云迷則隨流不覺悶則不了心常喪天本心虗受輪溺於生死滿中常被深落人天沒溺三塗是故如來名可憐愍後傷歡第五性無緣相指箋云謂阿難前來八還指中世尊指現量見分為真阿難便疑云此身愛習承熏仍居漏位何得言真便請云我雖識此見性無還云何得知是我真性由是佛借威神上觀初梵便對顯科簡心境云極汝見元從日月宮是物非汝至七金山漸漸更觀雲騰鳥飛風動塵起樹木山川草芥人畜咸物非汝則諸物頹自有差殊見性無殊然後從達事見引入達理見乃云若見是物則汝亦可見吾之見此達事見也吾不見時何不見吾不見之處此達理見也又結云若見不見自然非彼不見之相等上敘性無緣相指竟阿難言我雖識此見性無還云何得知是我真性五性無緣相指文一切述前徵審箋云佛指似現量阿難是大權菩薩恐一切眾生執此為真更不修行示相懷疑有此問來或阿難意云我雖是識認得此眼識現量不還前境前來道若還於明即不明時無復見暗緣謂此似現量念念受色塵境所熏又未能轉成成所作智居在因位是有漏云何是真現量故云是我真性佛告阿難吾今問汝後密簡真源文二初顯料心境文五初總明觀量文五初初果文三初告知返問箋云出語於佗曰問今汝未得無漏清淨次彰慶喜漏存箋云阿難須陀洹人但盡見道八十八使故有修道俱生煩惱未斷若是四果阿羅漢人斷得有漏欲漏無明漏阿難居在初果故有此漏在承佛神力見於初禪得無障礙後明佛借神通得觀初梵箋云佛乃借其威神之力見於色界初禪有三天梵眾梵輔大梵而阿那律見閻浮提如觀掌中菴摩羅果二羅漢箋云閻浮樹名此土因此彰名是娑婆一佛化境菴摩羅果此果如奈子即廣州餘柑也言此尊者得半頭天眼此約阿羅漢人唯見三千大千世界諸菩薩等見百千界三菩薩箋云初地菩薩見百佛世界二地菩薩見千佛世界三地菩薩見萬佛世界四地菩薩見億佛世界乃至十地見不可說不可說佛世界也十方如來窮盡微塵清淨國土無所不矚四佛箋云諸佛世界如空中塵多是法性淨土香水海等然諸佛無心外之法見無不盡眾生洞視不過分寸五凡夫箋云洞大也言眾生縱然大視亦不過分寸蓋或障未亡見有前塵可為障礙此一片經意問雖是殊一分見性無別緣謂阿難前來既問云我雖識此見性無還云何得知是我真性所以世尊今時就見分校量阿羅漢人所見如此菩薩所見如此凡夫所見如此諸佛所見如此意明諸佛所見窮盡微塵清淨國土無所不見顯佛真見無有限量即此無限量便是如來藏性明其因果各別令一切眾生了似現量歸真現量了妄即真也阿難且吾與汝觀四天王所住宮殿次舉相同瞻箋云且之一字未盡之辭前來佛借佗神力得見初禪今簡之且約近論故從欲界問起四天王者東方治國南方增長西方廣目北方多聞所住宮殿皆七寶所成中間徧覽水陸空行雖有昏明箋云於其中間周偏觀覧昏是鐵圍山之內大鐵圍山小鐵圍山日月不到之處地獄居在其中明即須彌山七寶所成皆有光明明即日月所照之處也種種形象無非前塵分別留礙箋云前塵諸形象等是所緣分別非能緣分別謂前塵諸法無不繫留礙也汝應於此分別自佗三勑簡自佗箋云自是能緣見分佗是所緣相分今吾將汝擇於見中箋云是佛借佗威神也此文太簡應云今吾將汝向於前塵令汝簡擇見分相分誰是我體誰為物象箋云誰是我體見分誰為物象相分阿難極汝見源從日月宮是物非汝四指塵非性文三初量窮雙曜箋云窮極汝眼識現量之見源從日月宮日宮闊五十一由旬月宮闊五十由旬皆是前塵物不是汝阿難見至七金山次圓鑒金山箋云然後次第至七金山是七寶所成一持雙跡山二持軸山三羯地洛迦山四善見山五馬耳山六象鼻山七尼民達羅山周徧諦觀箋云周旋徧覽諦實而觀雖種種光亦物非汝箋云須彌山七金山與日月等皆有光明曰種種光漸漸更觀雲騰鳥飛風動塵起樹木山川草芥人畜咸物非汝後雲畜通包統收前相箋云漸漸更從下而觀雲又騰鳥又飛有水曰湖無水曰川一草一芥人之與畜總是物非汝阿難見阿難是諸近遠諸有物性雖復差殊同汝見精清淨所矚五簡心合認文二初明相殊心一箋云遠是初禪近乃四天王言至七金山等諸有物性雖復差別殊異同汝一箇眼識現量也則諸物類自有差別見性無殊後指見令收箋云物是草芥樹木等類是一切形類人畜等自有差殊見性且無殊別此精妙明誠汝見性箋云誠猶實也又指此精妙明是眼識現量實是汝之見性也若見是物後密簡如源文四初通徵現識箋云縱佗見同物為許將妄識同於所見則汝亦可見吾之見箋云我亦同汝見同於物見汝亦合見吾現量達事之見汝既見同物我亦見亦同物且縱許見同物如物分明疏云若見是物即縱許心同物相汝心既視物何不見吾之見若同見者二密引窮真文三初縱前同相勑照如源箋云言汝之見若同佛達事見者引阿難同佛緣事便得智達俗現量識名為見吾箋云阿難見與佛見一彼此是達事見便引入達理見吾不見時箋云是佛達理根本智中不作能所之見則根本智冥合真如之時理與智冥心與神會如函與蓋不分能所如鹽與水了無分別如日與空不分彼此唯真聖者內自證知不通因位何不見吾不見之處箋云言汝同何不見我達理見之處是所證之地此是佛邀佗從達事見引入達理見問佛智無漏等覺猶迷何以如來與阿難同見答佛純無漏豈合同觀然因位與果位難殊而性無殊所以如來密許若見不見次明智不能觀重袪無相箋云佛向阿難道汝若見我根本智緣理絕待之見自然非彼不見之相箋云言若入我達理不見之處覓箇不見相亦不可得此袪不見之相也若不見吾不見之地後即成真極使證佛心箋云汝若也不見我不見之地是入根本達理之後超彼不見之相地是實際理地不受一塵何處有不見之相自然非物箋云若見此之境界無前來若見是物之見也云何非汝箋云指本真性不可非汝阿難見此正是汝阿難之見性也又則汝今見物之時汝既見物物亦見汝三責心境混宜箋云物亦有見汝亦有見有情成無情無情成有情體性紛雜箋云自體性紛然與物相雜則汝與我箋云則汝是阿難與我是佛則能依并諸世間箋云是所依不成安立箋云物亦成人人亦成物將何安立有所依世間然後便有能依有情方成安立義如今有情成無情無情成有情將何安立安立是受用之義能為用是心所受用是象馬園林缾衣車乘等今既能所相雜受用義則不成此一片經為前佛縱他見同物恐他執道物亦有見人亦有見所以有此文來阿難若汝見時是汝非我四責憑他斷惑箋云若汝見時唯是汝見非我見汝見之外覓我見不可得為佛前借他威神得見初禪恐他執見是他別人故有此文來見性周徧非汝而誰箋云言見性周徧法界非汝阿難更是阿誰云何自疑汝之真性性汝不真取我求寶箋云此性是汝性云何道不真却從我求真實乃責阿難前來道我雖識此見性無還云何得知是我真性第六體無盈縮指箋云然謂前來佛借阿難威神上觀初梵今向此中佛攝威神阿難但觀簷宇便疑云此見為復縮大為小為當牆宇夾令斷絕於是世尊舉挽難縮引竇難夾而釋之又說眾器分空喻云譬如方器中見方空吾復問汝此方器中所見方空為復定方為不定方若定方者別安圓器空應不圓若不定者在方器中應無方空上敘體無盈縮指竟阿難白佛言世尊若此見性必我非餘六體無盈縮指文二初陳疑請決文三初觀塵廣狹箋云若此是佛所指之性非汝而誰之性咸物非汝之性必定是我之見非餘別人我與如來觀四天王勝藏寶殿居日月宮箋云是佛前來借他神力觀欲界四天王宮其中有殊勝寶藏寶殿七寶所成次第又見日天子月天子所居之宮此見周圓徧娑婆國箋云言我在彼中見乃周圓徧滿此娑婆國土梵語娑婆華言堪忍釋迦佛忍耐教化一切眾生退歸精舍秖見伽藍清心戶堂但瞻簷廡箋云然後退歸到祇園精舍祗見伽藍梵語僧伽藍摩華言道園清潔其心於戶牖堂室之內簷即屋之簷兩邊飛廊謂之廡世尊此見如是其體本來周徧一界次陳縮斷疑箋云前觀欲界四天王宮等此之見性周徧此一娑婆世界今在室中唯滿一室箋云令在此堂中唯觀一室簷廡等事為復此見縮大為小箋云言為復此見在日月宮便大莫是縮却前來大見在此中為小見為當牆宇夾令斷絕箋云為復此見被牆壁屋宇夾斷一半在此邊一半在那邊我今不知斯義所在願垂弘慈為我敷演後伸疑請決佛告阿難一切世間大小內外後釋妨消迷文五初責迷塵相箋云大則須彌小則塵芥內則寰宇外則太虗舉類指明諸所事業箋云所榮曰事事成曰業統述前塵各屬前塵箋云各屬前塵物象不應說言見有舒縮箋云前塵有舒有縮見則無舒無縮舒則開是大縮則合是小譬如方器中見方空吾復問汝此方器中所見方空為復定方為不定方二舉喻除疑文四初舉喻立問箋云器喻前塵空喻見此一片文因阿難說見有大小所以佛說眾器分空喻若定方者別安圓器空應不圓二難相不成箋云說定又有何過便牒若澤定在方器中成方空者別安圓槃於方器上空應不合圓似將方盤其中見有方空如羊角中名尖空空曾知不定方在方既不定方在圓亦不定圓如今又圓法上見若決定在上便大歸祇園應不合小如今又小曾知在上見亦不大在下觀簷廡見亦不小若不定者在方器中應無方空箋云如今又有方空曾知又且是方若如此在上見大在下見小有何相違汝言不知斯義所在義性如是云何為在三引疑彰實箋云阿難前請云不知斯義所在佛今答之義性如是分明不可更問所在阿難若復欲令入無方圓但除器方空體無方不應說言更除虗空方相所在四比除前相箋云但除前境大小見相無其大小不了境唯心現法界一真妄識觀塵遂成大小欲除心相達境元如境相不生心圓普寂若如汝問入室之時縮見令小仰觀日時汝豈挽見齊於日面三引難消妨文三初舉挽難縮箋云牒陀前疑便舉挽難縮汝且仰面觀日之時汝若挽得見齊於日面我便許汝縮見為小挽見齊面既不得說縮大為小義不成關云出門若挽見挽見齊日面入室許縮見縮見便成小出門挽見不齊日入空縮見不成小若築牆宇能夾見斷穿為小竇寧無續跡次引竇例夾箋云若築牆宇能夾見斷是牒前疑便引竇例夾難汝既言夾令見斷如今穿牆為箇竇穴外見亦合來接內見於竇不無相接之跡今因何又無續跡關云穿為小竇時小竇有竇跡若築牆宇時詳夾見令斷穿為小竇時小竇無竇跡若築牆宇時早晚夾令斷是義不然後結責箋云便責汝前來縮大為小夾令見斷是義不如此一切眾生從無始來迷己為物失於本心為物所轉四傷迷執境箋云為是也被也一切眾生普陳品迷己是物所轉然妄識無智觀照如物無殊或被前塵大相小相所轉乃遇境隨流也或善因生善道惡業墮泥犂就經取前義故於是中觀大觀小箋云迷心執境見大相小相也若能轉物立勸歸圓證箋云起根本色即是空即轉物也即同如來箋云達色之也身心圓明箋云身是法身心是真實心圓徧疑明或本來圓本來明不動道場箋云放光云法去來無動轉相於一毛端徧能含受十方國土箋云毛端是相含受國土是大了大無大相則大現大大小融明或一毛是小小亦不離一真十方國土是大大亦不離一真猶如大海了一滿是鹹大海亦然
