body:
  text: 天竺沙門般剌密帝譯烏長國沙門彌伽釋迦譯語菩薩戒弟子房融筆受西京大興福寺沙門惟慤科皇宋首楞大師可度箋爾時觀世音菩薩即從座起頂禮佛足而白佛言世尊憶念我昔無數恒河沙劫於時有佛出現於世名觀世音第二觀音述證文二初依修尅證文三初敘本師名箋云梵語阿嚩盧枳帝溼伐囉耶唐言觀自在略云觀世音天台智者云觀是能觀之智世是所觀之境音是所度之生稱名歸命應機往救故云觀世音若云觀自在者大唐三藏云觀有不住於有觀空不著於空聞名不惑於名見相不沒於相當有不破於有一切皆無不壞於無種種皆有是以心不能動境不能遷動不亂真實可謂無礙智慧也又法華云若有無量百千眾生受諸苦惱聞是觀世音一心稱名觀世音菩薩即時觀其音聲皆得解脫又此菩薩大悲經云過去名正法明如來觀音授記經云未來補彌陀名普光功德山王如來又有佛出世名觀世音者因從果號資得師名表師資互明因果交微我於彼佛發菩提心彼佛教我從聞思修入三摩地次發心承教箋云發菩提心者五菩提中發心菩提也聞則側聆正教思則決擇在心修則如理修行教是能詮文義是所詮理依能詮文下悟所詮理然後如理修行作佛去初於聞中入流亡所後依修尅證文二初依修文二初旋流滅六箋云耳根發耳識故曰聞一切眾生順流不能逆流言入流是不順流也則能緣心不順所緣境亡所者既無能緣心亦無所緣境也或入流者入於聖流亡者無也無所聞聲塵也入聖之流既不被時分所遷五濁之中超劫濁也亡所所聞聲塵不起聲是十一種色法既無聲五陰之中超色陰色者質礙言亡所則去質礙也所入既寂動靜二相了然不生箋云此三句返釋上入流亡所也所入者所入塵境入是能入之心所入能入聲境觀心二俱寂靜則無動靜可生若有聲塵則有動靜已上是滅六也如是漸增聞所聞盡後七八俱袪箋云漸則由漸增則加增既滅六猶有七八二識今漸漸加增彼七八聞則能聞是第六識所聞是聲境此二俱滅也亦不住滅六之心若住滅六即有滅六之見今不住滅六之見五濁之中超見濁若有滅六之心即有領納之義今既不住滅六之心五陰之中超受陰盡聞不住箋云所聞能聞二心俱滅亦不作滅能所之住故云不住不住能聞所聞已滅之解若有住不住滅六之住則有可取可住則為煩惱今既不住滅六之住五濁之中超煩惱濁若有滅六之住則成取像今滅六之住亦不住則無取像行相五陰之中出想陰覺所覺空箋云上覺則第八識下所覺則第七識起八覺第七第八為能第七為所此所覺七識乃空雖亡第七猶有能覺第八在或覺則能覺是第七識所覺則第六已滅若有七在則執八見分與四惑俱則流落諸趣便有眾生今所覺第六不住滅六之心第七能覺亦空五濁之中超眾生濁若第七在帶彼第八成染有遷流造作之行相今第七既滅五陰之中超行陰空覺極圓箋云空則起能空之智覺則第八起智來空此八識能覺之心故至極圓也或能覺則第八覺滅彼七今七既滅八為能覺為所空二俱滅盡故云極圓若有第八在則有持不斷之功能執持有情故今第八能覺既滅則連持之功能五濁之中超命濁若有第八則三界總報住識強智強生了別今能覺既空則智強識劣五陰之中超識陰空所空滅箋云上空則能空之智所空則第八識起智空其所空此能空之智亦無有也為能空智對著八識八識亦為所此則遣能三之智或能空是智所空則八識今能空智與所空識雖去亦無能空所空之解生滅既滅寂滅現前忽然超越世出世間十方圓明獲二殊勝後尅證文二初總標生滅箋云生則三能變滅則起智今起智生滅彼滅了此智亦滅故云既滅殊簡平常勝簡於劣一者上合十方諸佛本妙覺心與佛如來同一慈力後別列文二初上合佛心箋云上合則起始覺智合本覺心則本覺理也謂自心與佛心無別自智與佛智無殊慈能與樂故二者下合十方一切六道眾生與諸眾生同一悲仰後通凡性箋云謂如無二如眾生亦如也佛有同體大悲故世尊由我供養觀音如來蒙彼如來授我如幻聞熏聞修金剛三昧後妙應群心文二初圓慈廣應文三初推師授證箋云言蒙彼如來教授於我如幻似有不有如空不空聞熏則耳根熏習聞修是三慧影取思聞則聞外教思則思內義修則內外俱收金剛則智起智來斷自成煩惱三昧唐言正受不受諸受故云正受也與佛如來同慈力故令我身成三十二應入諸國土箋云佛有同體大悲三十二應者乃無身中現身無形中現形也入則能入諸國土是所入世尊若諸菩薩入三摩地進修無漏勝解現圓次廣列隨求文二初求出世文四初佛身箋云入則能入三摩地是所入進修者增進修行勝解則起始覺智合本覺理或勝解者於決定境印持為性不可引轉為業現圓者為此菩薩欲得勝解顯現圓滿我現佛身而為說法令其解脫箋云若是資糧加行位菩薩乃現小化身以生空草為座現丈六相說生滅四諦若是地前菩薩現大化身千尺相若入地已去初地現百由旬坐百華蓮華說百法名門三地現萬四地現億至法身地現不可說不可說由旬身若諸有學寂靜妙明勝妙現圓我於彼前現獨覺身而為說法令其解脫二獨覺身箋云寂靜妙明此是麟覺喻獨覺是利根者無佛之世出生作佛燈後𦦨身唯善寂意翫清虗或寂靜妙明則生空智勝妙現圓則生空涅槃若諸有學斷十二緣三緣覺身箋云斷十二緣過去二因無明行現在五果識名色六入觸受現在三因愛取有未來二果生老死緣斷勝性勝妙現圓我於彼前現緣覺身而為說法令其解脫箋云緣斷勝性是生空智勝妙現圓是生空涅槃此唯部類而行出有佛世是鈍根者所說十二因緣法若諸有學得四諦空修道入滅勝性現圓我於彼前現聲聞身而為說法令其解脫四聲聞身箋云修道諦智證滅諦理故云入滅勝性現圓是生空智說四諦法若諸眾生欲心明悟不犯欲塵欲身清淨後願世間文三初步天勝樂文七初超塵業眾箋云欲心明悟者言不與欲境相交失念受樂分明悟解也影下欲界為苦欣上界為淨為樂我於彼前現梵王身而為說法令其解脫箋云梵淨王往也色界諸天之所歸往初禪三天二禪三天三禪三天四禪九天二九一十八天乃梵王所管多說布施持戒等法解脫者出離欲界苦求上色界樂經中前三乘皆解脫今梵王亦言解脫者秪是離不欲塵名解脫非同三乘出苦解脫向下即言成就若諸眾生欲為天主統領諸天我於彼前現帝釋身而為說法令其成就次樂欲居尊箋云欲為天主者欲為欲界六天之主帝釋者正梵云釋迦提婆因達羅廣言能天帝釋迦是姓提婆是天因達羅是帝言帝釋唐梵雙舉文略也向下說法如前行相若諸眾生欲身自在遊行十方我於彼前現自在天身而為說法令其成就三目佗隨心箋云自在天今疏主意指樂變化天則欲界第五天受欲樂於目境上變之慈恩云夜摩覩史二天自在得異熟果隨意所念勝下二天上二天如果依樹而得今隨欲得名自在天自在者離縛義若諸眾生欲身自在飛行虗空我於彼前現大自在天身而為說法令其成就四佗崇己翫箋云疏主意云是佗化自在天於佗人浮塵化赴受用也慈恩云樂變化天佗化自在天名大自在天不樂異熟果樂自樂佗變為樂具而受之是名大自在天若諸眾生愛統鬼神救護國土我於彼前現天大將軍身而為說法令其成就五營統思若諸眾生愛統世界保護眾生我於彼前現四天王身而為說法令其成就六四埵稜威箋云則東方持國天王南方增長西方醜目北方多聞居妙高山半第四層級若諸眾生愛生天宮驅使鬼神我於彼前現四天王國太子身而為說法令其成就七驅驟百靈箋云太子統領四天下鬼神若諸眾生樂為人主我於彼前現人王身而為說法令其成就次願處人榮文八初願垂衣化物箋云堯舜垂衣裳而天下治上衣下裳法諸天地若諸眾生愛主族姓世間推讓我於彼前現長者身而為說法令其成就二求混俗怡神文二初長者箋云是長之者名曰長者氏族姓字若諸眾生愛談名言清淨自居我於彼前現居士身而為說法令其成就後居士箋云好談名雅之言居家內治之士雖處三界不混欲塵常修梵行若諸眾生愛治國土剖斷邑我於彼前現宰官身而為說法令其成就三則製錦褰帷箋云製錦者孔子云未能操刀而使製錦有美錦何不使人學製焉喻縣令為政褰舉也在傍曰帷又自障也後漢賈琮冀州刺史傳車乘帷裳升車襄帷曰刺史當遠視廣聽糺察善惡何乃反垂帷裳以自掩塞乎百城聞之震慄則諸侯為邑則縣令治色剖猶剖判斷猶聆斷若諸眾生愛諸數術攝衛自居我於彼前現婆羅門身而為說法令其成就四乃玄通異術箋云數術者則名數法術也攝衛者則收攝術護其用也梵婆羅門唐言淨胤西天第二姓也年七歲若學就四圍陀則為國師四圍陀者一醫方二祭祀三卜相音樂戰法四既術也若有男子好學出家持諸戒律我於彼前現比丘身而為說法令其成就三桑門毒律文二初僧箋云桑門或云沙門那唐言勤息勤求道業息諸惡念若有女人好學出家持諸禁戒我於彼前現比丘尼身而為說法令其成就後尼箋云禁戒五八也五戒不殺不盜不邪婬不妄語不飲酒食肉八戒者添六不得帶珮瓔珞香油塗身熏香作服七不得歌舞作唱及故觀聽八不得上高大床然尼有三百四十八戒若有男子樂持五戒我於彼前現優婆塞身而為說法令其成就六守禮居家文二初優婆塞箋云唐言近事淨若有女子五戒自居我於彼前現優婆夷身而為說法令其成就後優婆夷箋云唐言近事女五戒自居者言但自居家持其五戒如前釋若有女人內政立身以修家國我於彼前現女主身及國夫人命婦大家而為說法令其成就七雅訓形門箋云修家國者言修家治國也女主女天子也或云公主國夫人則王后也命婦則有命之婦九嬪已下大家則守賢之女如曹大家年十九製八篇誡諸女子之事若有眾生不壞男根我於彼前現童男身而為說法令其成就八孤貞內室文二初童男若有處女愛樂處身不求侵暴我於彼前現童女身而為說法令其成就後童女箋云處在室間曰處女侵則侵於欲境暴則卒暴之心言欲盛如今已無若有諸天樂出天倫我現天身而為說法令其成就後意脫邪倫文九初志超情醉箋云為諸天者樂如醉酒人問前言梵天及自在等何故此又言諸天答此言樂出天倫是生厭彼言樂為天主是生忻也若有諸龍樂出龍倫我現龍身而為說法令其成就二厭處興雲若有藥叉樂度本倫我於彼前現藥叉身而為說法令其成就三樂離飛精箋云藥叉唐言勇健或云暴惡飛行空中食噉亦攝地行若乾闥婆樂脫其倫我於彼前現乾闥婆身而為說法令其成就四意除音伎箋云新云健闥嚩唐言尋香行諸作樂神中有斯等輩由此西方呼諸散樂名乾闥縛不作生業秖尋香氣作樂求乞若阿修羅樂脫其倫我於彼前現阿修羅身而為說法令其成就五憍尸罷戰箋云憍尸迦唐言繭兒則帝釋異名常與修羅戰舊云阿修羅新云阿素洛阿之言非素洛言天多行諂誑無彼天行故云非天若緊陀羅樂脫其倫我於彼前現緊陀羅身而為說法令其成就六息和梁塵箋云息和則宋玉有歌者郢中和者不過數人唱彌高而和彌寡陽春白雪之曲也梁塵者善歌有虞云發聲動梁塵緊陀羅或云緊那羅新云緊捺洛唐言歌神初歌四諦次歌十二因緣次歌六度萬行後歌一乘如世樂音歌君之德若摩呼羅伽樂脫其倫我於彼前現摩呼羅伽身而為說法令其成就七異術停操箋云操則操持此類為前生好操異術故招此報舊云摩睺羅經云摩呼羅正云莫呼落迦唐言大腹則田中蝦䗫蟒虵之類也若諸眾生樂人修人我現人身而為說法令其成就八寰中悅志若諸非人有形無形有想無想樂度其倫我於彼前皆現其身而為說法令其成就九總袪形累箋云非人則思也有形有形質者無形無色天有想則有想天無想則無想天是名妙淨三十二應入國土身皆以三昧聞熏聞修無作妙力自在成就後彰呈妙力箋云三昧則理聞熏則慧無作妙力乃無為無造作微妙之力力者難屈伏義世尊我復以此聞熏聞修金剛三昧無作妙力與諸十方三世六道一切眾生同悲仰故後悲救群傷文二初消迷濟溺文三初總彰無畏箋云聞熏耳根熏習也聞修則三慧影取思金剛則智三昧則理悲乃傷己苦而彼苦仰則荷聖德而虔同仰觀音如來是我之師令諸眾生於我身心獲十四種無畏功德箋云一切眾生但於耳根門頭入流亡所信自身與佛身無別自心與佛心無殊與觀音一同故得與我身心獲十四種無畏功德功為功能德乃德業或身是現千首萬首千臂萬臂之身心是大悲之心一者由我不自觀音次廣護群災文四初彰救護文二初觀聲總救箋云一切眾生乃順聲塵而觀音不順聲塵以觀觀者箋云上則能觀之智下則所觀之理乃返聞聞自性故或以觀則能觀耳根觀者是所觀以能觀觀所觀聲塵無自性此則自利令彼十方苦惱眾生觀其音聲即得解脫箋云則利佗前約根本後約後得觀其音聲者或聞觀音名或聞觀音所說之法即得解脫則離其三苦五苦惱亂一切眾生二者知見旋復後約別扶危文七初炎颷不爇箋云眼識現量妄知妄見之心旋還復歸真源令諸眾生設入大火火不能燒箋云一切眾生向違情境上生嗔順情境上生貪此則愛心如今既盡則無欲火所燒逼然眼見色眼識今既入流自然不被色塵所牽三者觀聽旋復令諸眾生大水所漂水不能溺二偃履洪波箋云偃息也則耳識旋復真聞不被生死欲浪之所漂沒四者斷滅妄想三鬼國無復箋云則第六識虗妄想相心無殺害令諸眾生入諸鬼國鬼不能害箋云為此妄心傷殘一切物命鬼不能害者鬼有害心今其無矣五者熏聞成聞四刀鋒寸壞箋云耳根成真聞性大根銷復箋云此六知根悉皆銷滅旋復真聞之性同於聲聽箋云一根發識徧緣諸境能令眾生臨當被害刀段段壞使其兵戈猶如割水亦如吹光性無搖動箋云性無搖動則法身也六者聞熏精明五叉剎不視箋云聞熏則耳根精明乃真性精明明徧法界則諸幽暗性不能全箋云言此真聞之性圓明周徧法界幽暗則七識頑空之性然真明之性現前乃明來暗謝智起惑亡故明性全暗性不全能令眾生藥叉羅剎鳩槃茶鬼及毗舍遮富單那等雖近其傍目不能視箋云鬼神之輩幽暗雖近其傍同不能視邪不干正七者音性圓銷觀聽返入離諸塵妄能令眾生禁繫枷鏁所不能著六杻械離身箋云一切音聲之性悉皆圓銷無其聲塵觀聽返入者則返聞聞自性既乃返聞真性此之真性無形無相無枷鏁等事八者滅音圓聞七劫賊停傷箋云滅音則滅聲塵也圓聞乃圓通真聞徧生慈力能令眾生經過險路賊不能劫箋云言此圓聞之性周徧法界生其慈力故慈能與樂九者熏聞離塵二滅俱生文三初染愛全除箋云熏聞則聞思修三慧離塵乃離諸色塵色所不劫能令一切多婬眾生遠離貪欲箋云一切眾生不了色即是空乃被色所侵奪今既返聞聞自性了色即空故則諸色塵不能劫奪其慧命十者純音無塵次嗔怨息種箋云言純是圓聞之音無其聲塵根境圓融箋云根之與境悉皆無相無對所對能令一切忿恨眾生離諸嗔恚箋云無能對心所對境也十一者銷塵旋明後皆昧潛銷箋云銷諸妄塵旋歸真明之性法界身心猶如琉璃朗徹無礙箋云身是法界身量等虗空心是法界心絕諸分別琉璃則分喻之若是法身不可為喻能令一切昏鈍性障箋云則第七識帶起頑空乃空神影取無色界四蘊成身諸阿顛迦箋云唐言無種性人設使勤求但向人天求少安樂不能通趣無上菩提此人無大乘種斷滅善根永離癡暗箋云為起智斷妄言癡暗乃根本無明不了理事當體昏暗十二者融形復聞三表願隨文二初男文二初上應佛心箋云言融銷其身形復歸其聞性也不動道場箋云法無去來無動轉故涉入世間箋云身土交參故不壞世界箋云存器世也能徧十方供養微塵諸佛如來各各佛邊為法王子箋云言現身現土教化眾生能令法界無子眾生欲求男者誕生福德智慧之男後下隨人願十三者六根圓通後女文二初上應佛心箋云言六根圓徧通達明照無二箋云乃即體之智圓明洞徹無二則一根徧緣諸境各得互用也含十方界箋云含一方方無外唯一真體立大圓鏡箋云轉八識成大圓鏡智空如來藏箋云一空真如理目顯德乃涅槃也承順十方微塵如來祕密法門受領無失箋云則不空如來藏是菩提則四智菩提種子是生德祕密法門則等流教法也能令法界無子眾生欽求女者誕生端正福德柔順眾人愛敬有相之女後下隨人願十四者此三千大千世界百億日月現住世間諸法王子有六十二恒河沙數修法垂範教化眾生隨順眾生方便智慧各各不同四彰名福益文四初彰群智劣箋云三千大千百億日月則娑婆一佛化境其中諸法王子紹隆佛日者有六十二殑伽沙各各修其教法垂彼儀範化度眾生隨順其根機以智慧方法巧便固非一致由我所得圓通本根發妙耳門然後身心微妙含容徧周法界二顯己巧圓箋云圓通本根則耳根發起真聞之性微妙向其耳門之中含裹包容法界是依報自身是正報依正二報身土交參乃法身能令眾生持我名號與彼共持六十二恒河沙諸法王子二人福德正等無異三校福齊諸箋云六十二億諸佛俱不出此圓通法門乃佛佛道同故世尊我一號名與彼眾多名號無異由我修習得真圓通四歎名圓敵是名十四施無畏力福備眾生後通前總結箋云此福備覆一切眾生世尊我又獲是圓通修證無上道故後顯德呈奇文三初略標圓德箋云修則能修是智證是所證是理言此耳根圓通門更無過上道即智也又能善獲四不思議無作妙德箋云此四種不可心思口議無為無造作微妙功德一者由我初獲妙妙聞心次廣演呈奇文四初現形宣呪文二初總陳觀證文二初述證箋云初獲者則初於聞中入流亡所上妙則離前聲塵境下妙乃圓聞自性心則貞實真心心精遺聞箋云此心精明遺却聲境見聞覺知不能分隔箋云則一根發識徧緣諸境成一圓融清淨寶覺箋云真覺可貴可重故我能現眾多妙容後述能箋云離能應所應無功用道現前故曰妙容也能說無邊祕密神呪箋云補陀羅山紫黑旃檀沈水香剎大陀羅尼等具四義其中或現一首三首五首七首九首十一首如是乃至一百八首千首萬首八萬四千爍迦囉首後能現奇形文三初現首箋云一百八首表一百八煩惱八萬四千表八萬四千塵勞業惑門爍迦囉唐言輪然帝釋有之外國有不賓者此輪掉空而去碾之自然賓伏喻法身能摧一切煩惱此則輪奇也後二表法亦然二臂四臂六臂八臂十臂十二臂十四十六十八二十至二十四如是乃至一百八臂千臂萬臂八萬四千母陀羅臂次現臂箋云母陀羅則印則手中結此吉祥印二目三目四目九目如是乃至一百八目千目萬目八萬四千清淨寶目或慈或威或定或慧救護眾生得大自在後現目箋云清淨寶目者言法眼清淨二者由我聞思二像法遐聞箋云則三慧或云是耳根發識思則第六識脫出六塵箋云無六塵境如聲度垣不能為礙故我妙能現一一形誦一一呪其形其呪能以無畏施諸眾生是故十方微塵國土皆名我為施無畏者箋云如聲度垣喻真聞之性無有所礙三者由我修習本妙圓通清淨本根所遊世界皆令眾生捨身珍寶求我哀愍三感施珍財箋云捨身珍寶者令離貪也四者我得佛心證於究竟四隨求普獻文三初顯標全證能以珍寶種種供養十方如來次普供無遺箋云表自離貪也傍及法界六道眾生求妻得妻求子得子求三昧得三昧求長壽得長壽如是乃至求大涅槃得大涅槃後旋願隨求箋云涅槃者則佛二轉依果含取菩提佛問圓通我從耳門圓照三昧後總伸圓證文三初敘根圓證箋云圓照智也三昧理也理智冥合理則體智則用攝智用歸涅槃之體緣心自在箋云因入流亡所能緣之心乃自在不被聲塵所覆因入流相得三摩提成就菩提斯為第一箋云因入流相者入流亡所返聞聞自性也世尊彼佛如來歎我善得圓通法門於大會中授記我為觀世音號次述記承師箋云觀音乃師菩薩乃資資連師號表因果合轍師資互顯由我觀聽十方圓明故觀音名徧十方界後顯隨名證爾時世尊於師子座後別簡圓修文四初垂光密證文八初釋迦騰耀箋云爾時者當二十五聖敘述圓通了畢之時師子表其無畏是體向北體上有住著之義名座是用先體後用師子即座持業釋又師子表佛是人中師子如王即勝座是無記木頭無畏則無怛懼義即劣先勝後劣依主釋從其五體同放寶光遠灌十方微塵如來及法王子諸菩薩頂箋云若灌十方佛頂表此首楞嚴三昧唯佛親證若灌諸菩薩及法王子表此頂三昧誰人無分彼諸如來亦於五體同放寶光從微塵方來灌佛頂并灌會中諸大菩薩及阿羅漢二塵佛舒光箋云八地稱大菩薩表佛佛道同生生體一林木池沼皆演法音交光相羅如寶絲網三化演交輝箋云此表有情無情齊成佛道純一法性淨土如華嚴經云剎說眾生說三世一切說大曰池小曰沼此乃唯識相但了相歸性情與非情同一體無心外法也彼佛此佛二光相交羅籠如帝釋宮因陀羅網羅籠同結重重相涉是諸大眾得未曾有一切普獲金剛三昧四聽徒同證箋云金剛三昧則首楞嚴三昧名異體同金剛則智三昧則理也即時天雨百寶蓮華青黃赤白間錯紛糅十方虗空成七寶色五天華颺彩此娑婆界大地山河俱時不現六河岳冥潛箋云丘陵坑坎皆當隱閉唯見十方微塵國土合成一界七界合塵沙箋云一時化成法性淨土表除分劑之心梵唄詠歌自然敷奉八妙音同奏箋云梵唄之聲調詠歌頌自然空中敷揚演奏於是如來告文殊師利法王子汝今觀此二十五無學諸大菩薩及阿羅漢各說最初成道方便皆言修習得真圓通二勑簡圓通文三初告審羣因箋云久應正覺跡履因位紹隆灌頂佛之太子由此稱法王子鴦崛摩羅經云文殊是此方常喜世界歡喜藏摩尼寶積佛又云過去為龍種上尊王佛又寶積經云授記於南方名普現色身如來又佛名經云為過去未來現在一切祖師又華嚴經云與諸眷屬住清涼山文殊表智智以決斷轉染得淨故用簡之彼等修行實無優劣前後差別次覆彰平等箋云此二十五人各各得圓徧通達法門實無長短我今欲令阿難開悟二十五行誰當其根兼我滅後此界眾生入菩薩乘求無上道何方便門得易成就後勑詳當要箋云意謂堪忍世界以音聲為佛事此告時有二意一我今欲令阿難悟二十五行問當阿難根機者是何門益現在二兼我滅後此界眾生入菩薩乘何方便門易得成就是益未來
