body:
  text: 天竺沙門般剌密帝譯烏長國沙門彌伽釋迦譯語菩薩戒弟子房融筆受西京大興福寺沙門惟慤科皇宋首楞大師可度箋阿難白佛言世尊若此見精必我妙性今此妙性現在我前七見非一異指文二初舉違生難文六初定其前執箋云此指謂因前性無緣相指云見性周徧非汝而誰今向此中阿難便疑云若此見精必我妙性今此妙性現在我前世尊便難云若實汝前汝實見者即此見精既有方所非無指示汝今於我師子座前舉手指陳陰者是林明者是日礙者是壁通者是空乃至何者是見若空是見既以成見何者是空若物是見既以是見何者為物又問汝可微細披剝萬象扸出精明精妙見元指陳示我阿難又不能於萬象中指得是見佛言如是如是又問何者非見所以阿難復不能指得非見世尊又云如是如是乃至若樹非見云何見樹若樹即見復云何樹等所以阿難不知所指為當是見是非見不是等事上敘見非一異指竟若此見精則眼識現量必我妙性是牒前性無緣相指云見性周徧非汝面誰又前云此精妙明誠汝見性今此妙性現在我前如緣可對阿難懷得影象之見然阿難是大權菩薩無此影象之見為見資糧加行二位作扸色明空觀義空觀名義自性觀名義差別觀出觀來便認心頭凝然底空為所證之理此是影象之見未忘所以化佛說偈呵云現前立少物為是唯識性以有所得故非實住唯識阿難今來舉疑欲得佛破之所以如此執也是必我真次責棄能緣箋云若有見性在我前必定是我真性我今身心復是何物箋云既有一箇見性在於我前我身與心又成甚物須成無情去而今身心分別有實三述鑒有無箋云言我今又有分別是實彼見無別分別我身箋云彼如緣可對之見在我眼前又無分辯我身惟我分別若實我心令我今見四述迷收棄箋云言彼妙見若實是我真心令我今見如緣可對見性實我而身非我箋云眼前見性若實是我心而我自家身又不是我須成別人何殊如來先所難言物能見我五引前來問箋云引前來性無緣相指責心境混宜云又則汝今見物之時汝既見物物亦見汝惟垂大慈開發未悟六請決雙心佛告阿難令汝所言見在汝前是義非實後重詰強疑文四初邀分性象文五初責緣文二初責緣虗影箋云牒他阿難疑言此義亦非是實若實汝前汝實見者則此見精既有方所非無指示後縱實邀呈箋云若實汝前汝實見者是牒既言如緣可對當在汝前亦有箇方道處所便有所著不無箇指出顯示向我且今與汝坐祇陀林偏觀林渠及與殿堂上至日月前對恒河二舉相文二初綰明前相箋云且我即今共汝阿難坐祇陀林周徧觀察林木渠流并與殿堂上至日月面前又對恒河汝今於我師子座前舉手指陳是種種相陰者是林明者是日礙者是壁通者是空後對指前緣文二初麤箋云師子座表無畏說舉起手指出陳說是前塵等法見陰森者是林木光明者是日頭阻礙者是牆壁虗通者是虗空如是乃至草樹纖毫大小雖殊但可有形無不指著後細箋云或草或樹纖細毫末大則須彌小則芥子是前塵諸物象等各別但可有箇形狀無不指著若必其見現在汝前汝應以手確實指陳何者是見三徵箋云確田也言的實指出陳說前塵物象何者是汝見阿難當知若空是見既已成見何者是空四詰文二初空箋云若所依太虗是汝見性既已成見無情便成有情何者是空空義不成若物是見既已是見何者為物後有汝可微細披剝萬象五邀文三初邀搜萬象箋云汝可微細披開剝露萬象之中扸出精明清妙見元指陳示我二抑剖心靈箋云向其中剖扸指出精真凝明清淨微妙見元是眼識現量指陳示我同彼諸物分明無惑三比象同瞻箋云扸出示我同彼面前物分明無使惑亂阿難言我今於此重閣講堂遠洎恒河上觀日月舉手所指縱目所觀指皆是物二述不能離文三初述可緣成相文二初明相理箋云洎及也祇桓精舍有重門樓閣屋上之屋日閣講堂是演妙義之舍舉起一手所指縱眼目所觀指示皆是前塵物等無是見者後述無心箋云無物是我之見世尊如佛所說次引說難分文二初謙劣學箋云如佛所說教我於萬象之中剖出精見況我有漏初學聲聞箋云分別煩惱雖無俱生猶在二空之中秖得人空未得法空二死之中秖得分段未得變易故有三漏存在又是初果之人乃至菩薩亦不能於萬物象前剖出精見離一切物別有自性後引上乘箋云十地菩薩見性猶如隔羅縠看月未得分明菩薩之人猶有一障二愚在不能於前塵之中剖出精見離却一切物外別有自性佛言如是如是後如來印可箋云佛見他阿難不能指出密解雙空雙空則見分相分乃印之佛復告阿難如汝所言無有精見離一切物別有自性三就相徵心文四初牒前非離箋云無有精見是眼識現量心言我也不能於前塵萬物之中別剖出箇精見則汝所指是物之中無是見者二指相非心箋云則汝前來所指是物之中無是汝見者重躡前語今復告汝汝與如來坐祗陀林更觀林苑乃至日月種種象殊必無見精受汝所指三重審非心箋云是汝前來不能扸出精見必定是無見精受汝所指且牒他著無見汝又發明此諸物中何者非見四詰心成相箋云汝更向前塵之中指出那箇不是汝見阿難言我實徧見此祗陀林不知是中何者非見四酬非一異文四初舉相成心箋云我也不知是中何者是非見非見亦不可得何以故若樹非見云何見樹若樹即見復云何樹如是乃至若空非見云何見空若空即見復云何空二徵陳一異箋云自徵有何以之故若面前樹不是見云何又見樹分明若樹即是我能緣見分云何又喚作樹須奪却樹名空亦如是我又思惟是萬象中微細發明無非見者三審相成心箋云我又思惟是萬象之中覓箇非見又無佛言如是如是四如來即理於是大眾非無學者聞佛此言茫然不知是義終始一時惶悚失其所守八空華一月指文四初聽徒亡指箋云第八空花一月指空花表妄一月是真此指因其大眾茫然不知是義終始一時惶悚失其所守於是文殊菩薩愍諸四眾不知是義終始所以起來代問經云是時文殊師利法王子愍諸四眾在大眾中即從座起頂禮佛足合掌恭敬而白佛言世尊此諸大眾不悟如來發明二種精見色空是非是義世尊若此前緣色空等象若是見者應有所指若非見者應無所矚而今不知是義所歸故有驚怖於是世尊說文殊一質喻又說假月喻云知第一月誰為是月又誰非月文殊但一月真中間自無是月非月上敘空花一月指非無學者簡去無學乃有學也阿難初果之人聞佛前來令佗於萬象中指出何者是見阿難折不得佛又即云如是又教佗向萬象中剖出非見阿難又扸不得佛又即云如是又不知是見非見非非見是是見所以茫然失其所守不了見相為復始一終二為堂本來元一一時與大眾惶怖驚悚失其歸真之路守者止也如來知其魂慮變慴心生憐愍二佛慰驚懷文三初興慈箋云精魂念慮改變驚慴心生憐念哀愍安慰阿難及諸大眾諸善男子無上法王次告實箋云佛呼前來失其所守大眾法華云無上兩足尊法中自在曰王是真實語箋云世尊欲說法恐佗將謂戲論向此中先立誓云是真實語金剛經云如來是真語者實語者不誑語者如所如說箋云上是理如下是智如乃理智一如也不誑不妄非末伽棃箋云六師之中第二外道此人執一切自然如桃圓棘尖鶴白烏玄等四種不死矯亂論議箋云四種如常不死者不知有為之福福謝即墜佗便計為常住矯誑作亂論議佛云我是真實之語非此四種汝諦思惟無忝哀慕後勸審箋云忝辱也言無辱我前來指指之中皆有哀憐慕念於汝是時文殊師利法王子愍諸四眾在大眾中即從座起頂禮佛足合掌恭敬而白佛言三文殊代問文四初指迷雙理箋云紹隆佛日補處稱尊曰法王子此菩薩過去是七佛祖師名龍種上尊王如來文殊大智人深達法源底聽法即坐伸問便起世尊此諸大眾二代敘疑懷箋云指前失其所守之眾不悟如來發明二種精見色空是非是義箋云二種則見相二種也精見是見分色空是相分是與非二義曰是非是義不知是義是非義非非義是是義非也世尊若此前緣色空等象若是見者應有所指箋云不無箇指出示人若非見者應無所矚箋云矚見也應不見前塵等法言無有觀矚也而今不知是義所歸故有驚怖箋云所以失其所止也非是疇昔善根輕尠三舉眾根微箋云文殊又出佗過言非是疇昔善根輕尠此乃正是疇昔善根輕尠也惟願如來大慈發明四請宣全理此諸物象與此見精元是何物箋云物象是相分見精是見分為當是甚物於其中間無是非是箋云於其中間為說出見相二分是非令佗悟無是無非佛告文殊及諸大眾十方如來四如來正演文四初總明真妄文三初明上乘無學處定疑真箋云如則如如之理來則行人起智來合一真如理是如即來名曰如來是如不來名曰眾生及大菩薩箋云八地通論七地已下未得為大然此菩薩發大心行大願而求大事是分證首楞嚴大定之人於其自住三摩地中箋云梵云三摩鉢提唐言等至等謂齊等離沈掉故至猶到也到勝定故定之異名是果位聖人所住之處不出法界大定若是果位諸佛是全證首楞嚴大定之人見與見緣次陳二分雙融花無四相箋云見是見分見緣是相分也并所想相箋云八識俱有想相因相生想故曰想相也如虗空花本無所有箋云妄法不實如似空花水月兔角毛輪有何體相此見及緣後明妄本真體不立是非箋云此見是見分及緣是相分元是菩提妙淨明體箋云佛又恐眾生執斷一向著無又云妄心無處即菩提生死涅槃本平等云何於中有是非是箋云有是是見分非是是相分妄即真故何有見分是相分非文殊吾今問汝如汝文殊更有文殊是文殊者為無文殊二舉喻消疑文二初就身明一文三初法王垂問箋云法上而論一真法界還有是法界為無是法界如是世尊我真文殊無是文殊次妙德酬真文三初總明無是箋云一真法界無是文殊覓是法界了不可得何以故若有是者則二文殊次徵述二生箋云若有是法界即成二法界然我今日非無文殊於中實無是非二相後圓成一體箋云不無文殊之體於一法界中亦無是法界非法界下佛又合云佛言此見妙明與諸空塵亦復如是後如來合理箋云此見妙明是見分與諸空塵是相分本是妙明無上菩提淨圓真心箋云本是微妙凝明無上菩提清淨圓妙真心妄為色空及與聞見箋云問既是真因何有見相二分經中答妄為色空是相分及與聞見是見分相本一真法界謂一切眾生一念違如覺勞相現便有業轉現三細識為見相二分所以元於一精明分成六和合如第二月後假月呈全文三初舉喻明妄箋云天上秪有一月因小兒揑目而成二月前如汝文殊下是顯真無妄此喻妄本無誰為是月又誰非月次明二分本無箋云第二月若是有便說是月非月第二月脫體是空說甚是月非月法上見相二分若是有便說見分是相分非見相二分脫體是空無見分是相分非也文殊但一月真中間自無是月非月後顯性一真本無雙分箋云但認天上一月是真不說第二月是月非月法上但了一真法界無自無佗亦無見分是相分是是以汝今觀見與塵三顯溺是非箋云觀見是見分與塵是相分種種發明名為妄想箋云種種發起明白此是虗妄想相不能於中出是非是箋云不能於中出見相二分是非若了見相二分脫體是空便能出是非是由是精真妙覺明性四述真出妄箋云則本真如性也故能令汝出指非指箋云出指則無見分非指則無相分明來暗謝智起惑亡阿難白佛言世尊誠如法王所說覺緣徧十方界湛然常住性非生滅九破自然文二初引難文五初牒前理箋云第九破自然然謂前空花一月指中云此見及緣元是菩提及體無盈縮指云見性周徧非汝而誰阿難示相執為自然要破外道執自然計阿難問云誠如法王所說覺緣徧十方界湛然常住性非生滅與先梵志娑毗迦羅所談冥諦及投灰等諸外道種說有真我徧滿十方有何差別所以世尊從四境破經云此見為復以明為自晴通塞等亦復如是乃至云何成見上來敘破自然誠信也此牒指意與先梵志二類邪宗箋云志事梵大名曰梵志娑毗迦羅箋云是黃頭仙則數勝二論師教主也所談冥諦箋云此外道不知八識生起因由為是冥性諦即冥然不知從冥生覺覺生我心我心生五微即色聲香味觸五微生五大即地水火風空五大生十一根五知根即眼耳鼻舌身五作業根手足口聲男女心平等都成二十四更有神識處中成二十五諦及投灰等箋云若是苦行外道在佗化自在天灰身五熱炙身淘糟飲汁等是無利勤苦諸外道種說有真我徧滿十方有何差別箋云是六師外道言有真實之我周徧十方此數勝二論師執我徧滿虗空猶如微塵佛今說云身心圓明不動道場徧能含受之性何異此外道執世尊亦曾於楞伽山為大慧等敷演斯義三引昔說箋云梵語楞伽山華言孤絕山言其山孤絕非神通者不能到此山神三首八臂請佛入彼山故世尊在彼為大慧菩薩說經敷揚演暢此理佛說從如來藏性周徧法界彼外道等常說自然箋云彼外道等常說自然周徧法界我說因緣非彼境界箋云我說因緣是說如來藏性周徧真我法界非彼外道說自然神我之境界也我今觀此覺性自然非生非滅遠離一切虗妄顛倒四述現理箋云阿難執為自然非生非滅似非因緣與彼自然箋云執云此性也似因緣看來又不是因緣與彼外道自然一般我看此性必是自然云何開示不入群邪獲真實心妙覺明性五請簡邪佛告阿難我今如是開示方便真實告汝汝猶未悟惑為自然後通疑文四初責迷強計箋云我今如是第一指第二指乃至指指俱是開通指示方法巧便真實告汝汝猶未悟却虗妄迷惑執為自然阿難若必自然自須甄明有自然體二縱立邀觀箋云若必定是自然自須甄簡辯明有箇自然之體汝且觀此妙明見中以何為自箋云汝且觀此真性之中以何法為自然後就境破境境既將亡執心乃謝此見為復以明為自以暗為自以空為自以塞為自三徵箋云此見是自然之見為復以明相為自下向四境上徵阿難若明為自應不見暗若復以空為自體者應不見塞如是乃至諸暗等相以為自者則於明時見性斷滅云何見明四難箋云若明為自見性須隨明境落謝應不見暗境以空為自到見塞之時應不合更見塞謂見性隨空落謝如今又見塞曾知不與空為自如是乃至超越中間若以暗相為自至暗根謝明境現自性便合隨暗相落謝第二明境現時不合更見明如今又分明見明曾知不以暗為自阿難言必此妙見性非自然我今發明是因緣生心猶未明諮詢如來是義云何合因緣性十破因緣執文二初陳箋云第十破因緣然謂阿難慣習無依仍懷退倚遂計為因緣執所以世尊亦於四境單破因緣經云此見為復因明有見暗通塞等所以阿難又引昔說四緣成見來難世尊所以世尊遂乃前含後尅而指之含指云汝今當知見明之時見非是明暗通塞等後尅指云見見之時見非是見見猶離見見不能及上敘破因緣性是微妙見性非自然我今發起明白決定是從因緣生因者親義緣者與力成辦義阿難雖執為因緣自亦道我未能明了諮請詢問如來是義云何得契合因緣之性或可為復合是因緣合不是因緣取前義佛言汝言因緣吾復問汝汝今因見見性現前後破文三初破文二初單破文二初立箋云且縱許聽從見性現前如緣可對分明然後便破此見為復因明有見因暗有見因空有見因塞有見後破文二初因文二初徵箋云此見為復是因明相有見為復因暗相有見向四境徵亦向四境上破明來奪暗暗來奪明阿難若因明有應不見暗如因暗有應不見明如是乃至因空因塞同於明暗後難箋云因明因暗攝取因空因塞此破因也破緣空塞攝取明暗復次阿難此見又復緣明有見緣暗有見緣空有見緣塞有見後緣文二初徵阿難若緣空有應不見塞若緣塞有應不見空如是乃至緣明緣暗同於空塞後難箋云見唯是箇眼識現量心不是明境暗境通塞亦爾當知如是精覺妙明非因非緣亦非自然後雙破文三初綰雙重拂文二初拂虗文四初雙袪箋云當知如是精真本覺微妙疑明之性外人問本覺明性莫是因緣否經答亦不是親義亦非與力成辦義又問本覺明心莫是自然否答亦非自然非不自然二重遣箋云既不是因緣自然本覺明性莫是不因緣不自然義否經答亦不是不自然攝非不因緣無非不非三拂跡箋云既不是不因緣不自然本覺明性莫是非不因緣非不自然否經答無非是無非因緣無非自然無不非是無不非因緣無不非自然此句拂上二句無是非是四俱融箋云既無非不非莫是離三非之是否答無是非是亦無前離三非之是既無離三非之是莫非無是否答非是也無離三非無是之非是纔有非便有是今是與無是俱無也離一切相即一切法後指實箋云結前是非之法雖離前是非之相又不捨是非之相既不取捨方合本真之理下文便責汝今云何於中措心以諸世間戲論名相而得分別次責妄緣名箋云汝今云何於其中間措致其心用是世間有為虗妄不實之法猶如小兒戲論之言便執自然與彼因緣下說喻如人以手撮摩虗空只益自勞虗空云何隨汝執捉後引喻明真箋云如人用手掌要攝虗空向手中摩只益自家勞倦太虗如何隨汝執捉法上手喻能緣妄心撮摩喻分別虗空喻真性將能緣妄心分別真性只益自家勞倦若是真性何處隨汝妄心分別也阿難白佛言世尊必妙覺性非因非緣次救文三初舉現旨世尊云何常與比丘宣說見性具四種緣所謂因空因明因心因眼次引昔談箋云四十五年前阿含等教中說具四種緣向下列所謂語辭也空是虗通緣明是昭了緣心是了緣眼是所依緣也是義云何後請會箋云請世尊和會前為何說因緣此為何說非因緣佛言阿難我說世間諸因緣相非第一義後重破文三初顯前權指箋云四十五年前法相宗中說世間麤淺義諸因緣相如唯識頌云眼識九緣生耳識唯從八鼻舌身三七後三五三四若脚下種子生頭上眼識現行順世間說因緣化彼小根之者非是此經第一義緣謂四十五年後說此佛頂首楞嚴經是性宗會權歸實攝相歸性非同四十五年前覆相等教是第二義非第一義也阿難吾復問汝諸世間人說我能見云何名見云何不見次再破因疑文二初徵酬世見文三初問箋云佛欲順佗且就世間人問諸世間人說我能見如何名為見如何名為不見雙問下阿難順世人答阿難言世人因於日月燈光見種種相名之為見若復無此三種光明則不能見後答箋云如世間人有日月燈三光方見無此三種光時言是無見阿難若無明時名不見者後指非因文三初破因存見文二初牒闕因無見應不見暗次責何得觀幽箋云汝如今因何又見暗若必見暗此但無明云何無見後簡無因顯觀常在箋云若必定見暗此但無明境不可無汝見性雖謝見性常存此破佗見暗時不名見阿難若在暗時不見明故名為不見今在明時不見暗相還名不見次隱見權因文二初互舉相權箋云若在暗時不見明境便言不見將暗難明今在明時不見暗相還名不見意謂既在暗名不見在明時亦須不見如是二相俱名不見後雙標總失箋云見明也不見見暗時也不見故云二俱不見𨴛云若在暗時不見明不見明故名不見今在明時不見暗不見暗故名不見見則總須見不見總不見二彼俱屬相何得一見一不見若復二相自相凌奪後顯見常存述因凌奪文二初舉因凌奪顯性真常文二初牒因箋云明暗二種相相凌奪也非汝見性於中暫無後指見箋云不是汝之見性於中暫無如是則知二俱名見後綰對二因俱成見理文二初雙成箋云見明既爾見暗亦然云何不見後總責箋云云何汝前來云明時見暗時不見也是故阿難汝今當知見明之時見非是明見暗之時見非是暗見空之時見非是空見塞之時見非是塞後重明真妄文三初含明箋云見明之時見不是明見若是明明境落謝之時應不見暗空塞亦然四義成就箋云雖見不是明暗空塞等又分明見明見暗見空見塞四義則明暗空塞也成就則圓滿義具足義此約含指後尅指汝復應知見見之時見非是見次尅簡文三初真覺妄識箋云應猶合也上見是智下見是理起根本智冥合一真如理之時理與智冥心與神會然此真見之智不是見聞妄見見猶離見見不能及次真謝妄名箋云真見既離妄見妄見不及真見謂真與妄殊也疏云妄不屆真迷不接悟下便責云何復說因緣自然及和合相後責談名相箋云責陀同內道計因緣外道計自然此未到和合文世尊欲重向下破和合汝等聲聞狹劣無識不能通達清淨實相後勑勤修證文二初彰劣慧不了真源箋云佛責阿難與諸有漏者法華云眇目矬陋無威德者二空之中秪得人空未得法空是觀空狹劣二死之中秪得分段未得變易是出死狹劣二障之中秪斷煩惱未斷所知是斷障狹劣無識則無知也無相不相是真實相是本真如理吾今誨汝當善思惟無得疲怠妙菩提路後告善思令端妙智箋云佛誠誨於佗汝當善自思惟專注一心是我前來指云見明之時見非是明乃至四義成就又云見見之時見非是見等汝不得於中生疲倦懈怠之心妙菩提是佛果位中二轉依果菩提有四此是無上菩提路則真覺之路乃三乘聖人遊履之地恐佗秪到化城而止阿難白佛言世尊如佛世尊為我等輩宣說因緣及與自然諸和合相與不和合心猶未開十一覺眚非見指文二初述迷深旨懇請重宣文四初誘淺尚疑箋云十一覺眚非見指此指來意謂前來破因緣中世尊尅指云見見之時見非是見見猶離見見不能及阿難向此中請云而今更聞見見非見重增迷悶於是乎世尊便說別眚殊觀同洲異覩以此二事進退合明方知皆妄如別眚殊觀喻云如世間人目有赤眚夜見燈光別有圓影五色重疊於意云何此若燈色則非眚人何不同見而此圓影唯眚之觀是故當知色實在燈見病為影影見俱眚見眚非病又說同洲異覩喻云阿難若復此中有一小洲秪有兩國唯一國人同感惡緣或見二日或見兩月暈適珮玦彗孛飛流負耳虹蜺種種惡相但此國見彼國眾生本所不見亦復不聞等總指云覺見即眚本覺明心覺緣非眚覺非眚中此實見見上敘覺眚非見指竟和合是欲色二界非和合是無色界無色蘊故稱不和合而今更聞見見非見重增迷悶二聞深益昧箋云迷而不悟悶而不入伏願弘慈施大慧目開示我等覺心明淨三請垂悲演箋云弘大也示我真智如眼照物不殊開通指示阿難等諸有學覺心明淨是理作是語已悲淚頂禮承受聖旨四雨淚翹承爾時世尊憐愍阿難及諸大眾後愍責多聞再揚幽旨文二初哀迷責遠備雙標文四初意垂遐演將欲敷演大陀羅尼箋云將當也欲希欲也敷即是演亦云陀隣尼具四義法句呪忍華言總持總謂包攝在心持謂冥記不忘生起向下二力加持修證分諸三摩提妙修行路箋云生起向下慧觀圓通修證分妙者離能所故離名絕相稱妙生起向下萬行圓資修證分向一念上排布六十聖位六十聖位不離一念一位具足一切位一切位不離一位告阿難言汝雖強記但益多聞於奢摩佗微密觀照心猶未了二責少定多聞箋云一心淨住曰微密照心源曰密從妄觀真曰觀從真了妄曰照汝今諦聽吾當為汝分別開示三勑聽許宣亦令將來諸有漏者獲菩提果四遠擕迷品箋云佛亦不但是為現在意為當來正是今時如父慰子病者先憂有漏簡去無漏菩提是有為果影取涅盤是無為果則佛果位中二轉依果也阿難一切眾生輪迴世間後同別分詮合明真妄文二初總標迷倒文二初統包輪轉箋云根本無明是能輪迴三塗受苦是所輪迴謂漂淪迴轉也由二顛倒分別見妄箋云由因也分別是能分別之心因第六識見則見分妄則虗妄之法是相分當處發生箋云當處則念起處也若是善念發生便生天人等道若是惡念發生便生地獄餓鬼等道當業輪轉箋云善因生善道惡業隨泥犂輪流改轉向三界受生云何二見後徵列雙名一者眾生別業妄見箋云別別造業受別報身別於諸佛也二者眾生同分妄見箋云同造惡業同感見相二分分即分類或分是同一界分之上見有不同云何名為別業妄見後別興徵詮文三初別眚殊觀文六初標箋云且先說別業阿難如世間人目有赤眚夜見燈光別有圓影五色重疊二立箋云世間人喻一切凡夫目喻真性覺照之用赤眚眼中翳也喻根本無明妄見緣一切眾生起智外求背體而現便見有根本無明夜喻生死無明長夜見喻能緣見分燈喻諸佛如來法性淨土一切眾生既無明為能變便有見分起來見諸佛如來法性淨土上有五塵色聲等法重重起來此因所變重疊者因動有聲因聲有色因色有香因香生味因味有觸五大五蘊等義亦可配之於意云何三審此夜燈明所現圓光為是燈色為當見色四徵箋云言此五塵妄法為當是本來真理上有為當是從真智而生阿難此若燈色則非眚人何不同見五詰文二初印箋云若燈上有色則眼目無翳之人何不共見法上五塵之法若從真理而有諸佛如來唯觀法界淨土因何又不見此五塵等相而此圓影唯眚之觀箋云因何妄法唯約妄心所現內心有根本無明為能變外有山河大地五塵之法為所變聖人又不見若是見色見已成色則彼眚人見圓影者名為何等箋云若言能見之心已成五塵等法見圓影者復是何物有情須成無情去復次阿難若此圓影離燈別有則合傍觀屏帳几筵有圓影出後離文二初燈箋云屏則屏風帳則絳帳几則几案筵則筵席法上五塵等妄法亦不離真體而有若此五塵等相離真而有真外有妄水外有波波離水有上合有波生離見別有應非眼矚云何眚人目見圓影後見箋云若離能緣見分上別有五塵須將耳矚如何目有翳病見五色重疊而生法上若離能見上有五塵色等法應不合又見五塵等相云何內有根本無明為能變變起五根五塵等法為所變此又不離於見是故當知色實在燈六指又二初總収前指文二初雙重指箋云此單指真性常色此真色亦不離真理亦不捨無常色獲得常色受想行識亦復如是見病為影箋云問何故成妄答見病為影此單指妄見生色為內有根本無明為能變變起一切虗妄五塵為所變見是見分影是相分影見俱眚箋云此雙収見相二分同一妄源見相二分俱約無明而生依無明為根本也見眚非病箋云見者覺也一切諸佛起智覺此妄法當體即空便無無明虗妄之法故非病也終不應言是燈是見後顯妄無憑箋云終不應言是本覺真理體上有妄法真覺智上有妄法於是中有非燈非見箋云妄且不離於真如第二月後重喻顯彰文二初喻文四初立箋云本是一月喻真第二月揑所成故喻見相二分揑喻迷真強覺也非體非影箋云非體非真體也非影第二月當體是空非水中月影喻見相二分全無體性非從真現何以故二徵第二之觀揑所成故三述箋云因小兒揑下眼睛便見有第二月法上因一切眾生一念違如覺勞相現便有根本無明然後有見相二分諸有智者不應說言此揑根元是形非形四指箋云諸有智者喻諸佛如來不應說言四字貫下離見非見是形見相二分又不是真體非形見相二分又且不離真體離見非見箋云離見見相二分又不離真智外別有非見見相二分又且不是真智此亦如是目眚所成後合文二初總此箋云合云此虗妄之法亦復如是從根本無明所成當體不實今欲名誰是燈是見後指妄箋云今欲名邈阿誰是燈言真理上有妄是見為妄當體是空說甚真智有妄何況分別非燈非見箋云何況又說妄非真體上生非真智上生去却是必落非以非句遮之是既忘非不立金剛經云法尚應捨何況非法云何名為同分妄見次同洲異覩文二初徵阿難此閻浮提除大海水中間平陸有三千洲後述文二初總明洲國文二初總彰洲數箋云閻浮提從閻浮樹已彰名爾雅云廣平曰陸沙聚曰洲正中大洲東西括量大國凡有二千三百後舉國差殊文二初一洲多國箋云包括論量也其餘小洲在諸海中其間或有三兩百國或一或二至于三十四十五十後增減不同箋云三百國兩百國也阿難若復此中有一小洲秪有兩國後別舉彰同文二初明小洲雙國唯一國人同感惡緣則彼小洲當土眾生覩諸一切不祥境界後隻土偏災文三初總彰同感或見二日或見兩月其中乃至暈適珮玦彗孛飛流負耳虹蜺種種惡相次引相殊名箋云日氣直過曰衝橫過曰貫四邊蝕氣曰暈適者纔見此不祥事或君適於臣等日氣向外曰珮向內曰玦彗乃彗星亦云長星亦云劒星亦云攙槍星孛是妖星絕跡而去曰飛光逸相連曰流負耳者氣負日邊如耳也雄者曰虹雌者曰蜺亦云螮蝀種種惡相含取惡雲惡氣等喻一切眾生向法性淨土上見有五塵色等同一界分也但此國見彼國眾生本所不見亦復不聞後異殊見箋云但此一洲見此境界喻一切眾生一念違如見有根本無明為能變然後有見分相分彼一國人不見喻如諸佛唯觀法性淨土然有人同分地獄同分此人同分也同一界分見有不同阿難吾今為汝以此二事進退合明後雙明顯理文四初許宣合指箋云進合明先說別業後說同分退合明先說同分後說別業或退或進俱是一箇妄識阿難如彼眾生別業妄見矚燈光中所現圓影二進簡雙名文三初先明別業文三初舉妄色箋云為一切眾生內有根本無明為能變然後便向法性淨土上見有五塵色聲等法雖似前境終彼見者目眚所成次明妄色源箋云雖是五塵等法從根本無明而現即相似境無實此境是妄非同真乃無境為此妄法終歸是彼患眼之者有赤眚所成彼見者喻凡夫目眚喻根本無明謂此見相二分從根本無明而有眚即見勞箋云問此眚從何而有答云云由患熱眼睛勞倦然後見有眚即無明見勞即強覺非色所造箋云非從性色上有為此性色真體無妄故也然見眚者終無見咎後簡真心箋云然猶如是之辭見者覺也為果位諸佛起智覺此妄法當體即空則無妄見之過咎例汝今日以目觀見山河國土及諸眾生二例簡真心文五初例見妄境箋云將別業類例汝今日目是見分山河國土則所依相分眾生則能依十二類生皆是無始見病所成二明妄境元箋云此之所依器世等與能依有情皆是無始已來無明虗妄見病之所成就或業轉為見分是十二類生因現識為相分是山河大地因見與見緣似現前境三明幻相箋云見是見分見緣是相分似則無境為此見相二分當體即空元我覺明四指妄元箋云元是如來真覺明心然妄元是真何故便成妄見所緣眚箋云見是見分所緣是相分因有根本無明便有見相二分或見是強覺強覺起來見性明相見便為能性明相便是所緣眚也覺見即眚五重簡真性文三初指妄標真文二初指妄箋云起強覺能緣見分即似前眚為此強覺即是無明也本覺明心覺緣非眚後標真箋云則真心也終日覺緣未甞覺緣覺所覺眚次真能覺妄文二初真覺妄箋云上覺是真起真智來覺此所覺是妄即性覺為妄本覺是真覺非眚中此實見見後別顯真箋云此真智覺非是妄上見是真智下見是真理乃起根本智宜合本真如理下便責云何復名覺聞知見後顯不同名箋云如何更執此妄法覺聞知見是六識影取六塵等法是故汝今見我及汝并諸世間十類眾生後雙彰二理文三初彰所見境箋云見我是相分及汝是見分是能見并諸世間是所依十二類生是能依十者舉其全數也皆即見眚非見眚者次指妄非真箋云此見相二分為復是真是妄皆即是妄見不是見妄之者見妄者目諸佛起智達妄是空也彼見真精後簡真非妄箋云見真性也性非眚者箋云為此真性不是妄故故不名見箋云真不名妄阿難如彼眾生同分妄見例彼妄見別業一人三退此二門文二初舉同例別俱妄所生文四初引同類別箋云此將同分是多例彼別業一人是少此單合明別業同分一病目人同彼一國二返一例多箋云一病目人是別業一人是少同彼一國是同分一國之人總見八般等相是多二般相例不出一箇妄見彼見圓影眚妄所生三双牒境箋云是別業妄見彼見則見分圓影則相分此見相二分俱是無明所變此眾同分所見不祥箋云同分妄見見八般等相同見業中瘴惡所起箋云見業則根本無明瘴惡則病氣流行喻業轉為見分現識為相分為此同分妄見別業妄見俱不離一念違如覺勞相現從業轉現三細識中變起俱是無始見妄所生四束明全妄箋云皆是無始無明虗妄見相之所生也例閻浮提三千洲中後廣類十方同縈妄疾文二初廣類文四初洲箋云例類也兼四大海二海娑婆世界三界箋云三千大千世界也并洎十方諸有漏國四十方箋云有漏簡去無漏已上總目所依及諸眾生箋云能依有情能依所依是真是妄下答同是覺明無漏妙心後想明文三初指真箋云為妄即是真故既然如此何故有妄下答見聞覺知次明妄箋云是虗妄之識目見分虗妄病緣箋云目相分皆因有見相二分便有前塵等法生和合妄生和合妄死後結成生死箋云和合是色受想等五蘊成身虗妄所生便有能生之身緣離即滅便有生死二法若能遠離諸和合緣及不和合四勸歸圓證文二初勸離妄箋云諸和合緣目欲色二界色受想等五蘊成身和合而生及不和合目無色界受想行識四蘊成身今勸離却和合并不和合是離三界意欲生起向下和合非和合文則復滅除諸生死因箋云根本無明為其因也圓滿菩提後顯歸常箋云此有為果不生不滅箋云是無為果則佛果位中二轉依果也清淨本心箋云本來真心本覺常住箋云恒常不變故常住阿難汝雖先悟本覺妙明性非因緣非自然性十二破和合執文三初彰迷合理文四初述明雙計箋云第十二破和合執然謂前來見非一異指中世尊將相作見將見作相阿難便執為和合所以不請世尊便責云汝雖先悟本覺妙明性非因緣非自然性而猶未明如是覺元非和合生及不和合問何故世尊自說不待阿難所請意是於阿答故疏主云若不自宣無由解問所以世尊便問和合義云阿難吾今復以前塵問汝亦於四境單破和云則汝今者妙淨見精為與明和為與暗和為與通和為與塞和又破合云又汝今者妙淨見精為與明合暗通塞等亦復如是結破云彼暗與通及諸羣塞亦復如是上敘破和合文竟汝雖先悟者悟則悟解本覺妙明則真心性非因緣非自然性乃前真性不執因緣等為被佛破今已知非而猶未明如是覺元二陳未曉兩和箋云而仍也猶尚也言仍尚未知如是真覺本元非和合生及不和合箋云此性是不從和合生阿難執為和合此性非是非和合生阿難執為非和合阿難吾今復以前塵問汝三許問對塵箋云且就境問佗和合之義汝今猶以一切世間妄想和合諸因緣性而自疑惑四責存餘惑箋云言汝今尚用一切世間麤淺虗妄想相責佗疑因緣為和合自然為非和合仍自猶豫不決證菩提心和合起者次見相徵和文四初立箋云證是能證菩提心是所證言此菩提之心從和合而起此是牒計則汝今者妙淨見精為與明和為與暗和為與通和為與塞和二徵箋云言此眼識現量為與明和等向四境上徵阿難云與明和又如何下牒若明和者且汝觀明當明現前何處雜見三破文三初參羅不翳瑤臺破箋云若明和者牒計汝言與明境和此明境現在汝前何處雜汝見性言和則汝見須與相相親見相可辯雜何形象箋云又有見分相分堪可辯明若言見相相雜又作何形相若非見者云何見明次摩尼能現萬象破箋云明境不與見和云何又見明相若即見者箋云若言即見是明乃有情成無情云何見見箋云若言即見是明如何又有能緣見是見分所緣見是相分必見圓滿後珠日交輝不雜破文三初顯不和箋云乃單執見若定是見分圓滿周徧何處和明箋云何處有明境可和則無明境也若明圓滿不合見和箋云又單計明若明境圓滿不合便有相與見和見必異明次明雙失箋云又轉破若見分異於相分雜則失彼性明名字箋云若見與明境相雜雜則失却性名字是見明名字是相則無見相二法雜失明性後不雜稱和箋云既言雜即失却明是相性是見和明非義箋云既天見相二法將何物和言和則非理彼暗與通及諸群塞亦復如是四結箋云但破明相暗通塞亦爾復次阿難又汝今者妙淨見精為與明合為與暗合為與通合為與塞合後雙迫破合文三初箋云明合等四境若明合者次破文三初丁公背主箋云但與明合又如何是牒至於暗時明相已滅此見即不與諸暗合箋云何故如此為見隨明境落謝應不合更見暗為決定從明境合云何見暗箋云又轉破若見暗時不與暗合與明合者次贈金異箋云汝若言見暗之時我此見性又不與暗相今但與明相合又如何是牒計應非見明箋云破云女既見暗不與暗合應不合見明然謂明與暗俱是前境既不與暗合亦須不與明合云何言與明合既不見明云何明合後鶣鶝觀明破箋云又轉破見明方與明合既不見相是不與明合明既不見會知亦不見暗明之與暗俱不識了明非暗箋云如今了明又三不是暗暗且不是明云可計明暗曾知明暗俱不識彼暗與通及諸群塞亦復如是後結阿難白佛言世尊如我思惟此妙覺元與諸緣塵及心念慮非和合耶十三波非和合又二初克申舉執箋云第十三破非和合然謂前來破因緣中世尊含明乃云見明之時見非是明等所以阿難執為和合今既被世尊破和合之義阿難方知有非和合所以便請云如我思惟此妙覺元與諸緣塵及心念慮非和合耶是以世尊便問汝今又言覺非和合吾復問女妙見精為非明和為非暗和為非通和為非塞又破合云此妙見精為非明合暗通塞等結破云彼暗與通及諸群塞亦復如是上來破非和合已竟上來一十三段十三破非和合十二破和合十一覺眚指十破因緣九破自然八空華一月指七見非一異指六體無盈縮指五性無緣相指四寄遣八還指三旅亭觀月指二大海全潮指初凡聖同如指一十三段不同總是第二見相合尅指密相已竟乃是世尊亦頓亦漸之說故也此妙覺元者真覺本元也與諸緣塵是相分八識俱有緣塵自分境如眼識緣色塵境乃至第八緣根身器世等心是緣塵念則冥記慮乃思慮約六七八識非和合那此是計佛言汝今又言覺非和合後乘問徵窮文二初破非和文三初徵標牒計文四初牒計箋云覺是真覺非和合是牒計吾復問汝二許問此妙見精非和合者三立箋云此妙見精是眼識現量心非和合者是牒計為非明和為非暗和為非通和為非塞和四徵箋云向四境上徵若非明和則見與明必有邊畔次對詰徵窮文三初彰離畔箋云非明和又如何牒云既言見不與明境和須見與境各有箇邊畔如汝之疆界不是佗之疆界汝且諦觀何處是明何處是見在見在明自何為畔次勑觀邊箋云何處是見分何處是相分此見與明自向何處為畔阿難若明際中必無見者則不相及自不知其明相所在畔云何成後双離破計箋云若明邊際決定無見者標離則明與見各不相逮入既不相及亦不知其明相處所相及方今又不知說畔義則不得彼暗與通及諸群塞亦復如是後綰類同袪又妙見精非和合者後破非合文三初牒計標徵文二初牒為非明合為非暗合為非通合為非塞合後徵若非明合則見與明性相乖角二彰離顯破文三初彰違角箋云但言非合又如何是牒破見與性是見分明與相是相分則見相二分如四角便合相對今見既與明非合則見相了不相干乖角則不正也如耳與明了不相觸次引乖喻箋云耳合聽聲眼合觀色合見相既乖角不相涉何異耳與明了又相觸見且不知明相所在云何甄明合非合理後責見無鑒箋云又轉破既不知明相所在云何又甄別明相說和合與非和合之道理或云何甄明言合是非和合道理彼暗與通及諸群塞亦復如是後舉異同袪阿難汝猶未明一切浮塵諸幻化相第三會相歸源指密因文三初總歎迷源文四初彰迷指實文三初總彰未悟箋云第三會相歸源指密因分科三段初總歎迷源二廣融群相三聖徒體悟且初總標真體經云阿難汝猶未明一切浮塵諸幻化相當處出生隨處滅盡乃至求於去來迷悟生死了無所得上來總歎迷源第二廣融群相又分五段初會蔭推迷是破五蘊法門然謂此五蔭無始時來積集一切煩惱種子令一切眾生不得解脫今者世尊一時破盡要歸真如本源故云會蔭推迷二窮根顯體是破六入法門謂窮盡六根顯現真體三交融處執是破十二處法門然謂世尊為將六根六塵牙相交破融彼十二處之情執四殄界通真是破十八界文世尊廣向此中殄滅十八界之執心要通歸真之體五苞研識相是破七大之文世尊向此中苞括研窮地水火風空覺識七大之相阿難等已無法執三聖徒申悟阿難與大眾申迷悟解之辭故經云爾時阿難及諸大眾各各自知心徧十方乃至舜若多性可銷亡爍迦囉心無動轉上敘會相歸源指密因竟汝猶未明者明則明了一切浮虗之塵目三科七大等法諸幻化相謂此浮塵當體不實故幻則幻妄化則變化然能變根本無明既無實所變三科七大性亦無實當處出生次明生滅隨流箋云即念起處也當念出生隨處起妄結業成身若起善念向人天二道出生若起惡念向三塗出生隨處滅盡箋云果極因亡二俱空寂盖生滅無性當體即空幻妄稱相其性真為妙覺明體後指妄真源箋云一切諸法皆是幻妄稱相無有實體其性指妄性此妄性真為微妙本覺凝明之體然妄即真如器不離金波不離水如是乃至五蔭六入從十二處至十八界二總舉非真箋云蔭則蔭覆真性色受想行識也六入通生識道受入愛憎眼耳鼻舌身意也處則依緣義六根六塵二六十二六根是識所依六塵是識所緣界者種族義流類義六根六塵六識三六十八成十八界因緣和合虗妄有生箋云此三科法皆是因緣地水火風四大假合而有便有此等法生因緣別離虗妄名滅箋云緣離即滅下責殊不能知生滅去來本如來藏三歎眾迷源文二初總歎迷源箋云知即悟解也去即是滅來即是生緣此二科等法俱是如來藏此乃攝相歸本也常住妙明不動周圓妙真如性後顯彰圓妙箋云無有去來故曰常住妙即微妙明即圓明不動道場徧十方界圓即徧也性乃體性性也性真常中求於去來迷悟生死了無所得四真中絕妄箋云死即是去生即是來生死迷悟俱無曰無所得實際理地不受一塵真中絕妄也阿難云何五陰本如來藏妙真如性次廣融群相文五初會陰推迷文二初總標真體箋云居情似有究理元無阿難譬如有人以清淨目觀晴明空唯一精虗迥無所有後別破迷情文五初色陰文二初舉喻顯真生妄文三初喻覺體無生箋云如人眼無病故發識明利曰清淨目空中無其雲霞等相曰晴明空精是眼精虗是晴明虗空唯是清淨目與晴明空餘外無有法上譬如有人喻一切諸佛以清淨目喻真智見晴明空喻真理言諸佛起智合理之時唯是理智一如逈無纖有其人無故不動目睛瞪以發勞則於虗空別見狂華復有一切狂亂非相次迷因勞相現箋云瞪目觀空久生勞倦於晴空中見空華發復見一切狂亂青黃赤白等相其人無故喻一切眾生一念違如不動目睛喻有性明相當情未分能所瞪以發勞喻然後便有強覺生則於虗空別見狂華喻向真空體上見色陰現復有一切狂亂非相後有受想等陰從此而生色陰當知亦復如是後舉理合喻阿難是諸狂華非從空來次立相無生處文二初空箋云空喻真空體性性本無生不生於色非從目出後目箋云目喻覺心照體覺亦無生亦不從真智上有既不從空目而生從何而有謂妄無根本意明無生如是阿難若空來者既從空來還從空入後廣破生執文二初破文二初空文二初牒華出入箋云若空來者是牒法上若色陰既從真空體上來亦須從空而入若有出入則非虗空次顯破所依箋云若有華從空中出入又何名虗空謂空無形狀法上若有色法從真空體出入何名直空空若非空自不容其華相起滅後正破能生文二初立理箋云若不是空即是有法自不容佗華相出入既空是有何處更容於有又恐阿難不會喻如阿難體不容阿難後引喻箋云既是於有便成質礙不可質礙又容質礙如阿難體是質礙不可更容於阿難也若目出者既從目出還從目入後破目生執文二初有見文二初立見理箋云若色法從真智上生有是牒色法滅時須見有色法從智而滅即此華性從目出故當合有見箋云攝所變同能變如識依根根既有見識亦有見若有見者去既華空旋合見眼後破見執箋云若有見者是牒從眼中去既是華見從空中旋歸眼中合見於眼若無見者出既翳空旋當翳眼後無見文三初往來雙翳破箋云但言無見又如何若無見者是牒無見便成質礙無情破云從眼中出去便合障翳於空從空中歸眼便合翳眼又見華時目應無翳次一翳雙分破箋云如今雖從眼中出亦不翳眼又如何破云既言出也不翳空旋也不翳眼見華之時目須無翳如今因何又有翳見空中華宛然是翳科中云一翳雙分破合將此科向下十科安上下科云無翳觀華破言既無翳便不合見空中華因何又有眼中翳見空中華此是轉破前是正破云何晴空號清明眼後無翳觀華破箋云空既有翳不名晴明空眼若有翳不名清明眼是故當知色陰虗妄後結文二初目陰全妄本非因緣非自然性後雙非二執箋云因緣既袪自然何有阿難譬如有人手足𡩷安百骸調適二受陰文四初舉喻明陰箋云四支兩手兩足宴寂安然百骸調暢適悅譬如有人喻諸佛唯用真性無有動作唯是理智一如忽如忘生性無違順箋云如似一人忽然思量前事記憶不來此時亦無違之與順法上一切眾生一念違如性明相當情未分能所其人無故以二手掌於空相摩於二手中妄生澁滑冷熱諸相受陰當知亦復如是箋云其人無端既尋思前事不得便乃以二手掌於空相摩觸乃久於二手中妄生澁滑等相法上一切眾生無故便有見相二分當情或能所當情然後便有受陰諸冷熱相既有受陰便有想陰行識等一時當情或二手喻我法二執合云受陰當知亦復如是阿難是諸幻觸不從空來二相無生處文二初空箋云冷滑諸相無有實體故云幻觸言受陰亦不從真空體上而來不從掌出後掌箋云不從真智上有如是阿難若空來者既能觸掌何不觸身三廣破生執文二初空箋云受陰若從真空體來者是牒既空中來因何秪觸汝掌何故不觸汝身為空性周徧隨處皆觸不應虗空選擇來觸箋云丁空便有選擇之心來觸汝手謂真空體上無受陰可得也若從掌出應非待合後掌文三初責掌能生觸何待合知箋云既自然從掌中出又何假待二手相摩方有冷滑法上若受陰從真智上來真智自然有受陰又何假見相二分然後方有又掌出故合則掌知離則觸入臂腕骨髓應亦覺和入時蹤跡次縱合成知離應覺入箋云且縱許汝從掌出合之時掌便知冷滑等相不合之時此冷滑等相須從兩臂兩腕骨髓中入去既合時從手中出不合之時須從手中入既從手中入亦合覺知從手中入之蹤跡必有覺心知出知入自有一物身中往來何待合知要名為觸後縱受自立責待合因箋云言必定有覺知之心知此冷滑從手中出入既知出入自是有一物在身中往來何須又待二手相摩方知冷滑要名為觸是故當知受陰虗妄四結妄雙非文二初目陰全妄本非因緣非自然性後双非二執阿難譬如有人談說酢梅口中水出思蹋懸崖足心酸澁想陰當知亦復如是三想陰文四初舉喻明陰箋云口中涎水出也既思前境足便酸心便澁合理云想陰當知亦復如是義亦與前同阿難如是酢說不從梅生二相無生處文二初不從梅生箋云此陰亦不從真空體上生非從口入後非從口入箋云亦不從真智上有如是阿難若梅生者梅合自談何待人說三廣破生執文三初破梅生箋云但從梅生又如何為此水從人想心便有汝言是梅生梅合自談說道我酸始得梅既解談說便是有情既何須又待人說醋梅口中方有水出法上此想陰若從真空體上來真空體便合自然而有何待前相然後方起想心取著前境若從口入自合口聞何須待耳次口入文二初責口成因理何待聞生箋云若此水從口中入自合口聞既從口入何須耳聞人說醋梅口中方有水出法上此想若從真智上有便合真智自然而有何須待前境牽心然後方有想若獨耳聞此水何不耳中而出後轉破耳生邀流耳出箋云但言耳聞又如何若言獨是耳聞便合秪在耳中水出何故口中有涎水出想蹋懸崖與說相類後舉類同破箋云想蹋懸崖與說酢梅可相類是崖想不從崖生非足起若崖生者崖何待心想若從足起自合足酸何須心想若獨心思此酸澁相因何不從心中而出是故當知想陰虗妄四結妄雙非文二初目陰全妄本非因緣非自然性後雙非二執阿難譬如暴流波浪相續前際後際不相踰越行陰當知亦復如是四行陰文四初舉喻明陰箋云暴流急暴之流也前波後波相續前際水波際水不相捨隔越阿難如是流性不因空生不因水有亦非水性非離空水二相無生處箋云法上此行陰亦不從真空體上生不從真智上有水性澄清暴流重濁故非水性知妄性麤不同真性雖然如此亦不離空外有暴流亦不離水外有暴流若離空有空體又不拒萬物不可離空若離水有高山須有暴流法上此行陰不離真空體外而有不離真智外而有如是阿難若因空生則諸十方無盡虗空成無盡流世界自然俱受淪溺三廣破生執文四初水空同際箋云攝能變空同所變水水既有流能變空須同水有流既成無盡流能依世界須一時沒溺去若因水有則此暴流性應非水有所有相今應現在二二相俱存箋云若言從水出此暴流須不是水如子與母如樹與一各別如何暴又是水有能有是水所有是所有之相是暴流既能所各別應須有能所二法分明各在一處如樹與子樹子各別現在分明若即水性則澄清時應非水體三簡澄非水箋云若此暴流即是水則澄清時應非水體須成暴流去因何又成澄清之水上若妄即真諸佛起智證真之須一時成妄若離空水空非有外水外無流四責離依箋云若水外有流高山上亦須有暴流法上妄又且不離真若言妄離真外須有妄妄在一邊真在一邊是故當知行陰虗妄四結妄雙非文二初目陰全妄本非因緣非自然性後雙非二執阿難譬如有人取頻伽缾塞其兩孔滿中擎空千里遠行用餉佗國識陰當知亦復如是五識陰文四初舉喻明陰箋云頻伽鳥名華云共命鳥有兩頭共一身西土人以四澄泥作此缾其形似頻伽鳥曰頻伽
