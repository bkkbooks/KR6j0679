body:
  text: 天竺沙門般剌密帝譯烏長國沙門彌伽釋迦譯語菩薩戒弟子房融筆受西京大興福寺沙門惟慤科皇宋首楞大師可度箋阿那律陀即從座起頂禮佛足而白佛言我初出家常樂睡眠如來訶我為畜生類我聞佛訶啼泣自責七日不眠失其雙目次拂迹旋根證文五初半頭迥照文三初述訶眠失目箋云阿那律佛之堂弟白王之子如來訶云咄咄胡為寐甕螺蚌蛤類一睡百千年佛出無由值睡眠則身心不自在昏沈為性障急不生然睡是眼之食既七日不眠眼則枯西圖記云阿那律被佛訶則以竹抨眼七日則失其雙目問眼者何義以照了為義也世尊示我樂見照明金剛三昧次因超明箋云愛樂觀見照了明白是智家功用金剛是智三昧是理則起智合於理我不因眼觀見十方精真洞然如觀掌果箋云精真之智洞然周遍法界二之人有三品下品見小千界中品見中千界上品見大千界即何那律也如來印我成阿羅漢佛問圓通如我所證旋見循元斯為第一後印號標因箋云旋見則眼根順其本元真見也六根向眼根作證周利槃特迦即從座起頂禮佛足而白佛言我闕誦持無多聞性二一偈凝虗文五初彰懵鈍箋云周利槃特迦者華嚴入如來智德經翻為繼道善現律翻為路邊生有一長者祇有一女與奴私通遂逃他國久而有孕垂生思婦行至路邊即生因名焉或云兄名路邊生弟名繼道言相繼道路而生也我闕誦持者言我無智慧之能也背文曰誦持謂任持最初值佛聞法出家憶持如來一句伽陀於一百日得前遺後得後遺前二闕聞持箋云然槃特鈍根如律廣明如世尊授彼掃二字或得掃忘得忘掃由是思惟掃者即是除去糞穢之義遂乃起智證果佛愍我愚教我安居調出入息三授觀修箋云數息觀行者則五停心觀中第二多思覺衆生作數息觀須具六因一數者為數息風從一至十終而復始其有三失一數減失二為一二數增失一為二三雜亂失於入為出第二隨者謂所繫心隨緣出入三止者謂隨所樂者安止其心不令分散四觀謂觀息風在身如珠中縷五轉謂移息風乃至世第一法六淨謂勝進入於見道乃至無生又要具四緣一息所依地二風道通三毛孔開四出入息地粗心現前我時觀息微細窮盡生住異滅諸行剎那四依成聖箋云問生住異滅豈非大乘細四相小乘之人焉得知之答有二義然第六識中亦有粗生住異滅或此尊者目大權聲聞示現小乘故知細四相也其心豁然箋云了息出入生滅悟不生滅理得大無礙乃至漏盡成阿羅漢住佛座下印成無學箋云真空不礙乃有發揮能隨緣而成辨或無礙空智現前無罣礙也佛問圓通如我所證返息循空斯為第一五結悟因箋云返回也言回息順歸真空之理此向鼻根作證憍梵鉢提即從座起頂禮佛足而白佛言我有口業於過去劫輕弄沙門世世生生有牛呞病三憍梵旋嘗文四初果承先業箋云憍梵鉢提或云房鉢底言今經言輕弄沙門因果經云過去因偷禾數顆墜地五百生中作牛賞他今雖得人身常作牛蹄牛呞之相如來示我一味清淨心地法門次蒙示觀門箋云觀諸味性悉皆空寂唯一味現前更無餘味清淨離煩惱所知障也心是真心地是實際理地法者軌生解門者出入自在義此但約真理説乃佛示他實際理也我得滅心入三摩地箋云滅心者滅盡定也入是能入三摩地是所入此約親證此定前理名別體同觀味之知非體非物應念得超世間諸漏三定觀超凡箋云非體和是妄識不是真非物為非舌非食然食不自知舌不自覺唯第六妄心分別內脫身心外遺世界遠離三有如鳥出籠離垢銷塵箋云脫身無依他性脫心無遍計性此心則第六識或云第八識非也然六識對六根或可內脫身心無能依見分外遺世界無所依相分言能依所依見相二分俱空也法眼清淨成阿羅漢如來親印登無學道箋云法眼是智清淨是理言起智照理也佛問圓通如我所證還味旋知斯為第一四顯標因悟箋云六根向舌根作證畢陵伽婆蹉即從座起頂禮佛足而白佛言我初發心從佛入道四畢陵銷覺文五初頻承佛教箋云唐言解習正云畢𨏦陀伐蹉唐言餘習五百生為婆羅門惡性粗言今雖得果餘習尚在如罵恆河神為婢是也數聞如來説諸世間不可樂事箋云內身外器等法一身之內大腸小腸生藏熟藏多少不淨乞食城中心思法門不覺路中毒刺傷足一刺足因思箋云以心思此不淨觀行法門舉身疼痛我念有知三因痛觀心箋云此知痛之知知此深痛箋云知此是痛之雖覺覺痛箋云雖覺是能覺覺痛之覺覺是所覺能痛之心覺清淨心箋云起智照理無痛痛覺箋云無能痛之心亦無覺痛之覺我又思惟如是一身寧有雙覺攝念未久身心忽空三七日中諸漏虗盡成阿羅漢得親印記發明無學四雙融入證佛問圓通如我所證純覺遺身斯為第一五顯標因理箋云六根向身根作證須菩提即從座起頂禮佛足而白佛言我曠劫來心得無礙自憶受生如恆河沙五善現窮空文六初宿承通智箋云得宿住通也初在母胎即知空寂二住腹知空箋云便悟真空理如是乃至十方成空三變界成無亦令衆生證得空性四令他獲益蒙如來發性覺真空五妙悟通真箋云性覺是智真空是理空性圓明箋云理智冥一得阿羅漢頓入如來寶明空海同佛知見印成無學解脫性空我為無上箋云寶明即智空海即理佛問圓通如我所證六標顯悟因諸相入非箋云非者無也破諸有相入於無相非所非盡旋法歸無斯為第一箋云上之一非是能空之心所非是所空之境二俱空寂故云盡或可非所無所緣境非盡無能緣心能緣心因何言非盡謂前起能緣心非却所緣境如今非所之心亦盡也此六根之中意根作證舍利弗即從座起頂禮佛足而白佛言我曠劫來心見清淨三息澄流證文三初鶖子鑒通文五初陳心久淨箋云心見清淨則眼識現量心緣慮以𠎿心八識總名心或心見清淨則不對前境也如是受生如恆河沙二宿智遐鑒世出世間三妙慧雙通箋云言世間則內身外器三科七大等法出世間則聲聞緣覺真如涅槃無為之法種種變化箋云結世間法影取出世間法非變化也一見則通獲無障礙箋云一具遍通無見也我於路中逢迦葉波兄弟相逐四逢因悟證箋云諸經説逢馬勝今言逢迦葉波兄弟相逐則優樓頻螺迦葉伽耶迦葉那提迦葉宣説因緣悟心無際從佛出家箋云説偈云諸法從緣生緣離性即滅我師大沙門常作如是説見覺明圓得大無畏成阿羅漢箋云見覺是眼識變成智光圓滿也為佛長子從佛口生從法化生箋云諸佛皆以智為首舍利弗有大智故從佛金口宣説從所説法教化而生佛家佛問圓通如我所證五顯標知見心見發光箋云目眼識現量心發智慧光也光極知見斯為第一箋云智光窮極法界成真知見六識之中向眼識入證普賢菩薩即從座起頂禮佛足而白佛言我已曾與恆沙如來為法王子次普賢心聽文六初廣助法王箋云普賢古云遍吉普者遍也遍入塵毛國土教化衆生有大賢善又梵語曼哩囉唐言普賢普是法賢是人人法雙舉也又一切即一曰普一即一切曰賢十方如來教其弟子菩薩根者修普賢行從我立名二他名就已箋云十方如來皆以行為初心世尊我用心聞分別衆生所有知見三心聞洞見箋云心聞即是耳識現量心發明分別衆生所有知見若於他方恆沙界外有一衆生心中發明普賢行者我於爾時乘六牙象分身百千皆至其處四遠應群心箋云六牙表六根清潔白表行門瑩淨問此菩薩行門周普如是因可簡之不得圓通答此但約發普賢之行是大心者故簡之縱彼障深未得見我我與其人暗中摩頂擁護安慰令其成就五隱相慰凡箋云外人問忽有業障深重者如何經答云云佛問圓通我説本因心聞發明分別自在斯為第一六結因心見箋云此向耳識作證孫陀羅難陀即從座起頂禮佛足而白佛言我初出家從佛入道雖具戒律於三摩提心常散動未獲無漏後難陀化息文三初心多散動箋云難陀有三一名喜則牧牛人也二孫達羅難陀唐言豔喜三阿難陀是慶喜問豔是妻名喜是己號令稱己號何著妻名答此簡非二人是佛親弟長一丈五尺二寸是大勝主之子化緣出寶積經二十六卷淨王有三妃一瞿夷主二大術主亦云幻主生難陀三摩耶夫人生世尊世尊教我及俱絺羅觀鼻端白我初諦觀經三七日見鼻中氣出入如煙次觀息超塵箋云觀鼻端頭一點白令攝一聚心所使心不散亂故身心內明圓洞世界遍成虗淨猶如琉璃箋云身心內明遍成智光是此智虗明清淨也煙相漸銷鼻息成白箋云乃智體光明或白者衆色之本表智心開漏盡諸出入息化為光明照十方界成阿羅漢箋云化為光明者則智光照用也世尊記我當得菩提後獲記標因箋云法華云五百羅漢二千聲聞俱得授記恐在其數佛問圓通我以銷息箋云銷停鼻中出入氣也息久發明箋云觀行將圓則化成智發起光明明圓滅漏斯為第一箋云此向鼻識作證富樓那彌多羅尼子即從座起頂禮佛足而白佛言我曠劫來辨才無礙宣説苦空四縱辨摧邪證文三初辨才無畏箋云宣説無常苦空乃等流教法是能詮文深達實相箋云是所詮理如是乃至恆沙如來祕密法門我於衆中微妙開示得無所畏箋云祕密法門則等流教法二乘不知謂之祕凡莫能測謂之密如今富樓那為何却知然是大權聲聞內祕菩薩行也世尊知我有大辨才以音聲輪教我發揚我於佛前助佛轉輪因師子吼成阿羅漢世尊印我説法無上次助轉超凡箋云音聲如輪能摧碾一切邪魔外道或一人傳授多人如輪能回轉故然佛是正轉富樓那是助轉法華云佛告諸比丘汝等見是富樓那彌多羅尼子不我常稱其於説法人中最為第一亦常歎其種功德精勤護持助宣我法能於四衆示教利喜具足解釋佛之正云而大饒益自捨如來無能盡其言論之辨佛問圓通我以法音降伏魔怨銷滅諸漏斯為第一後顯標因辨箋云六識之中向舌識作證優波離即從座起頂禮佛足而白佛言五轡勒鉗神證文三初執超塵箋云轡是鞍轡勒為勒住鉗為鉗捉神為神識言一切衆生妄身妄心喧囂動掉猶如生馬若不以戒戒束之終乃起惑造業如馬以鉗勒勒住不令散動梵語優波離亦云塢波離唐言近執佛為太子時彼為親近太子執事之也我親隨佛踰城出家箋云佛為太子年登十九夜至三更空中有神報云太子出家時至佛乃向城西北角四天王捧其馬足踰城而出住雪山中親觀如來六年勤苦箋云六年苦行一麻一麥要伏苦行外道五載修禪十一年斷盡結使向菩提樹下三四心成等正覺親見如來降伏諸魔制諸外道解脫世間貪欲諸漏箋云佛成道後欲界頂有諸魔王作境順境中庸境惱亂世尊入慈心三昧放月愛慈光爍之諸魔王等悉皆退散承佛教戒如是乃至三千威儀箋云沙門有二百五十戒每戒具十二共三千也或就三根本每根本具一千之根本具三千八萬微細箋云將前三千威儀向七支上配身三殺盜染口四妄言綺語兩舌惡口每支上具三千三七二十一都成二萬一千更向貪嗔癡三根本上配每根戒具二萬一千四個二萬一千成八萬四千經言八萬略也性業遮業悉皆清淨身心寂滅成阿羅漢箋云性業是根本不可懺如斷多羅樹不復再生如斷人頭不復再活其餘俱約遮業防外道俗人譏嫌然二百五十條戒殺盜染大妄語等是性其餘俱是遮戒大乘戒亦喚作性戒此四重亦名性戒大乘戒是體性性此四重體性是惡名為性戒也怡山然禪師云大乘戒作是持止是犯如佛因地曾為婆羅門與五百人同共一船時有一賊在彼船中欲殺此五百人世尊知彼賊心即殺其賊貴存衆多之命也我是如來衆中綱紀親印我心持戒修身衆推無上次紀綱辟衆箋云大繩曰綱戒如其細但舉其綱衆目皆張如今但二百五十戒清淨其餘八萬四千法皆悉清淨尊者則衆中頭有持戒第一佛問圓通我以執身身得自在後標因王戒箋云執身持小乘戒唯以執身不令造惡次第執心心得通達箋云執心持大乘戒但隔壁聞敘鐺鐶釧起心分別是男是女便犯根本唯持心戒怡山然禪師云大乘戒者不必與境相交失念受樂始犯根本但是舉念才起行一步漸重前念二步三步漸重直至與境交然後身心一切通利斯為第一箋云然後身心是持二種戒六識向身識作證也大目揵連即從座起頂禮佛足而白佛言我初於路乞食逢遇優樓頻螺伽耶那提三迦葉波宣説如來因緣深義我頓發心得大通達六湧沒淩虗證文四初遇緣心悟箋云諸經皆云遇馬勝比丘此經二處皆云遇此親兄弟三人宣説因緣偈云諸法從緣生等如來惠我袈裟著身鬚髮自落我遊十方得無礙神通發明推為無上成阿羅漢二善證神通箋云智用自在曰神往來無壅曰通又陰陽不須曰神通達發明是智寧唯世尊十方如來歎我神力圓明清淨自在無畏三他佛談功箋云密迹金剛力士經云目連欲試釋迦佛音響到光明幡佛世界佛名光明王其佛身長四十里菩薩身長二十里其諸菩薩所食鉢器其高一里目連行鉢際上時諸菩薩白世尊曰唯然大聖此蟲何來披沙門服行鉢際上於時彼佛言諸族姓子慎勿發心輕慢此賢所以者何今此少年名大目連是釋迦文佛聲聞弟子中神足第一時光明王佛告大目連吾土菩薩及諸聲聞見卿身小咸發輕慢仁者當顯神足之力承釋迦文威德目連稽首足下右繞七匝却在佛前白言今欲跏趺此地容不佛言如意所樂時大目連踊在虗空億百千仞在彼寶城化作一床跏趺而坐從其床座垂衆寶珠億百千姟一一珠瑛出百千光一一光明各有蓮華一切蓮華現釋迦文身坐蓮華上其所言説如釋迦文音響清淨班宣經典等無有異目連顯神足已復住佛前時諸菩薩歎未曾有佛問圓通我以旋湛心光發宣如澄濁流久成清瑩斯為第一四標因顯悟箋云旋妄識歸湛寂真空之理心光發宣者智也煩惱已盡真性清淨如澄濁流久成清瑩向意識作證烏芻瑟摩於如來前合掌頂禮佛之雙足而白佛言我常先憶久遠劫前性多貪欲了相凝空證文五初烏芻凝文七初陳躬染習箋云梵語烏芻唐言頭瑟摩唐言火應云火頭蓋西天先所而後能有佛出世名曰空王説多淫人成猛火聚教我遍觀百骸四支諸冷暖氣二遇佛教觀箋云觀冷暖大無自性轉識成智神光內凝化多淫心成智慧火三滅習騰輝箋云智光內發也智火能燒煩惱之薪從是諸佛皆呼召我名為火頭四因我以火光三昧力故成阿羅漢五願因超證箋云火光三昧力智力也心發大願諸佛成道我為力士親伏魔怨六述願降魔佛問圓通我以諦觀身心暖觸無礙流通七結標因證箋云智火內發無繫留罣礙流遍通達諸漏既銷生火寶𦦨登無上覺斯為第一箋云寶𦦨智也則轉識成智向火大作證持地菩薩即從座起頂禮佛足而白佛言我念往昔普光如來出現於世我為比丘常於一切要路津口田地險隘有不如法妨損車馬我皆平填或作橋梁或負沙土二持地平田文三初多生密行文五初普光行行箋云持平持也地實際理地因悟心地故以為名此約理説或事説如經云云普光者五十三佛第一佛名如是勤苦經無量佛出現於世二多佛乘因或有衆生於闤闠處要人擎物我先為擎至其所詣放物即行不取其直三負物無傭箋云崔豹古今注云市垣為闤市門為闠毗舍浮佛現在世時世多飢荒我為負人無問遠近唯取一錢四逢災取直箋云毗舍浮正云毗婆部毗婆唐言遍一切部者自在言一切皆自在拘留孫拘那含牟尼迦葉釋迦又經中第三毗舍浮是過去劫佛爾雅云穀不熟曰飢果不熟曰荒我為負人言我作負物之人也或有車牛被於泥溺我有神力為其推輪拔其苦惱五推輪救畜時國大王延佛設齋我於爾時平地待佛次遇佛超登文三初治衢待聖毗舍如來摩頂謂我當平心地則世界地一切皆平次摩頂心開箋云淨名云其心淨則佛土淨欲求淨土當淨其心前平地是行今當平心地是解須以行解相應方為究竟我則心開見身微塵與造世界所有微塵等無差別箋云見身微塵是內四大四塵八法假合成身與造世界是能造世界是外四大亦四塵八法假合而成既了內外四大皆虗妄便不執內外乃無遍計性是第六識心周遍計度微塵自性不相觸摩箋云了內外皆是四塵所變無有實體乃至刀兵亦無所觸箋云身是微塵大性皆空不執身為我刀兵何可傷此約悟法界理性我於法性悟無生忍成阿羅漢箋云前平地是法相如今悟心是法性回心今入菩薩位中聞諸如來宣妙蓮華後回趣上乘箋云法華云爾時持地菩薩即從座起前白佛言世尊若有衆生聞是觀世音菩薩品當知是人功德不少此則宣妙蓮華也佛知見地我先證明而為上首箋云本唯一實假説三乘是開佛知見照唯三是名一是示亦一亦三雙照是悟非一非二是入又云色即是空是開空即是色是示亦空亦色是悟非空非色是入地者實際理地不受一塵佛問圓通我以諦觀身界二塵等無差別本如來藏後顯標因理箋云身是能依有情界者所依器世界俱是微塵故或了身界二塵無自性一時空寂然後便悟法身是正報悟法界是依報此則依正二報身交參也此約圓成實性虗妄發塵塵銷智圓成無上道斯為第一箋云虗妄發塵是四塵法所造此向地大作證月光童子即從座起頂禮佛足而白佛言我憶往昔恆河沙劫有佛出世名為水天教諸菩薩修習水精入三摩地三月運清波文四初成觀法箋云月光童子起智照理如月光明瑩淨也觀於身中水性無奪初從涕唾如是窮盡津液精血大小便利箋云唯是水周遍法界諸大不相凌奪水大外更無諸大也在鼻曰涕在口曰唾身中旋復水性一同箋云內身水是穢與諸佛香剎乳海水是淨穢淨一同俱是水大攝此時不分是淨是穢具在身旋復見水身中與世界外浮幢王剎諸香水海等無差別箋云浮浮流也幢幢相也幢者高顯義王者自在義剎是諸佛國剎是依報此諸佛國剎唯是香水乳海喻此周旋宛轉然此遍計性雖忘依他性猶在內身外器俱是水火等無差別無遍心計度內身外器我於是時初成此觀但見其水未得無身二定過違緣文六初見水存當為比丘室中安禪我有弟子窺窗觀室唯見清水遍在室中了無所見童稚無知取一瓦礫投於水內激水作聲顧而去二定中遭激箋云問化身成水此身是第八識親變相分如今入觀成水豈非第六識莫犯返緣根本過否答此第六識仗他八識親變相分為本質然後自變一重影象緣之故故不犯亦非心外取法我出定後頓覺心痛如舍利弗遭違害鬼三散心彰患箋云舍利弗入定時遭此鬼戲以一搭尊者出定後覺心微痛緣此鬼若擊須彌碎如微塵緣定力故唯微痛也問舍利弗入定定是無為鬼是有為有為何嘗于於無為答或約小乘定亦是有為也或是鬼約大乘心亦見他大乘無為定我自思惟今我已得阿羅漢道久離病緣云何今日忽生心痛將無退失爾時童子捷來我前説如上事四內省達緣箋云問阿羅漢人久離病緣因何有病答聲聞之人但能伏惑未能斷惑然身雖無病遇緣病生蓋以根本未除問月光乃得他心通因何不知童子拋於瓦礫答知則甚知意顯觀門成就我則告言汝更見水可即開門入此水中除去瓦礫五童子因告童子奉教後入定時還復見水瓦礫宛然開門除出我後出定身質如初六除如舊箋云外人問夫作觀者唯可自見何故童子亦見答天觀有二若是獨影境唯局自見若是性影境則通他見此性通漏無漏地前地上故言未得無身及童子見逢無量佛三述證標乘文三初述逢多佛如是至於山海自在通王如來方得亡身次山海融身箋云山海自在佛乃五十三佛中第四十八佛方得亡身是無依他性然依他起自性分別緣所生四大假合成身故此時方依他性合真空也與十方界諸香水海性合真空無二無別今於如來得童真名預菩薩會後釋迦登位箋云既亡其身則內外性皆合真空之理無二無別預猶也佛問圓通我以水性一味流通得無生忍圓滿菩提斯為第一四結修因法箋云此童子向水大作證琉璃光法王子即從座起頂禮佛足而白佛言我憶往昔經恆沙劫有佛出世名無量聲開示菩薩本覺妙明觀此世界及衆生身皆是妄緣風力所轉四琉璃照動文三初昔承觀法箋云起智照理內心瑩明猶如琉璃無量聲者經舉不全應云無量音聲王佛是五十三佛中之一數本覺妙明是理第四經説性覺是妄本覺是真觀此世界乃是風大所成衆生妄身亦是風大任持我於爾時觀界安立次修尅上乘文五初等觀三動箋云言觀此世界初成之時是速疾風成壞之時亦是此風梵語毗嵐唐言速疾觀世動時箋云過去世遷現在世現在世遷未來世觀身動止箋云或出或處或默或語觀心動念箋云此心是六識妄心念念攀緣逐境起惑造業諸動無二等無差別箋云言觀此皆風大所攝我時了覺此群動性來無所從去無所至十方微塵顛倒衆生同一虗妄二了動知虗箋云來無所從無生相去無所至無滅相同一虗妄同一風大也如是乃至三千大千一世界內所有衆生如一器中貯百蚊蚋啾啾亂鳴於分寸中鼓發狂丙三比喻群箋云了風是妄自悟其心周遍法界乃觀見器世間是一佛化境三千大千國土究極邊際猶如一分一寸不得廣大其中衆生如一器中云云鼓發狂丙者為音聲語言俱為風大所攝逢佛未幾得無生忍四尅無生忍箋云逢佛未經幾時也爾時心開乃見東方不動佛國為法王子事十方佛身心發光洞徹無礙五心通助化箋云東方四萬之上萬物發明之初日輪初升之處皆表起始覺淨智入法界理梵語阿閦唐言不動表法寂寂無所轉故乃見東方不動佛國此約根本智為法王子至洞徹無礙約後得智身心發光者發起也佛問圓通我以觀察風力無依悟菩提心入三摩地令十方佛傳一妙心斯為第一後顯標因證箋云風無形故無依也傳一妙心法華云十方世界中唯有一乘法乃一乘中道理虗空藏菩薩即從座起頂禮佛足而白佛言我與如來定光佛所得無邊身五虗空妙用文四初定光證箋云虗空者取無礙周遍之義藏者包含義虗空中現藏名虗空藏定光佛是釋迦與然燈同遇此久遠劫前佛釋迦見然燈曾與然燈遇也爾時手執四大寶珠照明十方微塵佛剎化成虗空二運化奇通文四初持珠發耀照剎同虗箋云手執是定力確觀四大可貴可重如珠一般照察明了是惠從定發惠然後觀內身外界俱是一真空又於自心現大圓鏡二心鏡騰輝光流空際箋云轉八識大圓鏡智內放十種微妙寶光箋云十表圓之義微而且妙寶者可貴可重光乃智光流灌十方盡虗空際箋云起智照理虗空際則真空之理諸幢王剎來入鏡內涉入我身身同虗空不相妨礙三躬含佛土箋云諸幢王剎則所依依報來入鏡內則能依五報依正二報身上交參因果兩門互相涉入身同虗空同空理也不相妨礙互相涉入得其自在身能善入微塵國土廣行佛事得大隨順四質入塵方箋云身能善入微塵國土者乃後得智也前身土交參則根本智證真此則後得智達俗廣行佛事作其四事化衆此大神力由我諦觀三述證無生四大無依箋云依他已亡妄想生滅箋云遍計常存虗空無二箋云了此二性俱是一真空理無二無別或內身空與外界空無二無別乃圓成實性佛國本同箋云一切衆生同一真性是起如覺智合本覺理於同發明箋云言於本同之理發起後得智即認前本同之理得無生忍箋云無生亦無本同之理忍者印認之佛問圓通我以觀察虗空無邊入三摩地妙力圓明斯為第一四標因顯悟箋云向空大作證彌勒菩薩即從座起頂禮佛足而白佛言八一心唯識證文初心重浮名箋云梵語彌勒或云梅呾利曳那此翻為慈氏母性不理因懷兒後性乃慈善相師乃與立名慈氏慈則性慈氏則氏族我憶往昔經微塵劫有佛出世名日月燈明我從彼佛而得出家心重世名好遊族姓箋云法華云是妙光法師時有一弟二心常懷懈怠貪著於名利求名利無厭多遊族姓家號之為求名則彌勒因地也爾時世尊教我修習唯心識定入三摩地歷劫已來以此三昧事恆沙佛二定門遊歇箋云唯遮外境識簡心定經云心生故種種法生以滅故種種法滅此三昧是唯識定也求世名心歇滅無有箋云則遍計心亡此俱約識相至然燈佛出現於世我乃得成無上妙圓識心三昧三然燈尅證箋云則釋迦所遇佛也乃至盡空如來國土淨穢有無皆是我心變化所現四化土粗微世尊我了如是唯心識故五多佛心流箋云此識心目法身能現報化二身識性流出無量如來箋云唯心定則根本智流出無量是生得智或法身是出生義如母能出其子今得授記次補佛處六陳今補記箋云上生經云世尊往昔於毗尼中及諸經藏説阿逸多次當作佛佛問圓通我以諦觀十方唯識識心圓明入圓成實遠離依他及遍計執得無生忍斯為第一七述證標因箋云識心圓明則圓成實性遠離依他不執四大妄身及遍計執求世名心已亡唯識論云由彼遍計遍計種種物此遍計所執自性無所有依他起自性分別緣所生圓成於彼常遠離前性等此約第八識作唯心識證大勢至法王子九妙剎安證文三初述因逢佛教箋云大勢至應云得大勢至言所至之處世界振動大威神衆生遇者自然苦息獲大勝樂觀音授記經云次補觀音後作佛名善住功德寶三佛與其同倫五十二菩薩即從座起頂禮佛足而白佛言我憶往昔恆河沙劫有佛出世名無量光箋云與其同倫五十二菩薩者恐是淨名經初五十二菩薩始於等觀終至文殊十二如來相繼一劫其最後佛名超日月光箋云十二如來亦佛名經中十二如來不定也彼佛教我念佛三昧箋云至無念無念無分別智無分別智與理相乃見諸佛常現在前譬如有人一專為憶一人專忘如是二人若逢不逢或見非見次喻顯教門文二初母子相逢喻文二初立文二初彰憶忘不相逢不定箋云如張人憶王人王人又忘張人此二人相逢似不相逢不相逢相見相見法上如諸佛念其衆生衆生不念諸佛從生至生逢佛如其不逢見佛如其不見二人相憶二憶念深如是乃至從生至生同於形影不相乖異後顯二人同念歷劫相隨箋云如張人亦憶王人王人亦憶張人二人從生至生不相捨離法上諸佛又念衆生衆生又念諸佛當來必定見佛十方如來憐念衆生如母憶子若子逃逝雖憶何為後合喻文初合文二初顯佛心常衆生忘背箋云是合前第一一人專憶一人專忘若子逃逝雖憶何為言若衆生不念佛佛雖憶衆生又何為若子憶母如母憶時母子歷生不相違遠後比子同母憶現蒙光箋云法上衆生念佛如佛念衆生佛與衆生歷劫不相遠此合第二二人齊憶形影不乖若衆生心憶佛念佛現前當來必定見佛去佛不遠不假方便自得心開後勸如染香人身有香氣此則名曰香光莊嚴後染香熏證喻我本因地以念佛心入無生忍後述證標因文三初指因今於此界攝念佛人歸於淨土次現行同因佛問圓通我無選擇都攝六根淨念相繼得三摩提斯為第一後標因淨
