body:
  text: 天竺沙門般剌密帝譯烏長國沙門彌伽釋迦譯語菩薩戒弟子房融筆受西京大興福寺沙門惟慤科皇宋首楞大師可度箋阿難彼善男子修三摩提四行陰文三初總標文三初明想盡文二初明念寂恆明箋云是能修三摩提修想陰盡者箋云想者取義過去已出想陰想秉想怨想中庸想中庸則怨親平等也是人平常夢想銷滅箋云平常尋常也夢是人之神遊想是明了意識七入俱有自分想此方俱是第六識銷滅者已出想陰寤寐恆一覺明虗靜箋云寤則明了意識寐則夢中意識言既出想陰無取象寤寐乃恆常是一真覺凝明虗通寂靜想陰盡後悟理也猶如晴空無復粗重前塵影事後喻晴空皎靜箋云晴空則晴明之空無復粗重煙雲等法上晴空如出想陰無取象悟其凝明一理粗重則無想陰重濁前塵影事觀諸世間大地山河次敘行存文三初鏡無塵迹箋云在行陰中觀其想陰世間是所地山河是所變如鏡鑒明箋云既無取象但如鏡鑒照分明無有分別來無所黏箋云來亦無所從無生相黏猶著也過無蹤迹箋云無滅相謂覺生滅二相俱不可得虗受照應次了行生基箋云虗是虗無受則領受照應乃加行智了罔陳習箋云謂在行陰中以加行智了無想陰之中陳列其習氣唯一精真箋云唯是一精明真實生滅根元箋云是行陰從此披露箋云從此披露行陰見諸十方箋云東西南北等所依國土十二類生箋云胎卵濕化等能依有情畢殫其類箋云畢備殫盡也言備盡其類知其十二類生生滅因由雖未通其咎命由緒見同生基箋云咎過咎也命則識陰之中連持不斷之功言雖未通其識陰過咎連持之功因由頭緒乃見此十二類生同一行陰基此猶如野馬熠熠清擾後指標迷字箋云野馬則原壟頭陽𦦨非是隙塵熠熠熾盛貌如火之熠熠熾盛清簡想濁擾動是行陰為浮根塵究竟樞穴此則名為行陰區宇箋云此行陰為浮根四塵或五根五塵樞機窟穴如狐之穴也若此清擾熠熠元性性入元澄一澄元習後彰行盡文三初澄瀾目盡箋云是識陰無行陰根元習來也如波瀾滅箋云是滅行陰化為澄水名行陰盡箋云是識陰今出行陰在識陰如澄是人則能超衆生濁次顯用彰超箋云為有造作遷流則是衆生之解若出行陰則超衆生濁觀其所由幽隱妄想以為其本後結標生本箋云為行陰沈細幽則潛細難知隱乃陀那藏伏阿難當知是得正知奢摩他中諸善男子次別釋文十初四二無因文三初雙標箋云過去已出想陰陰既出無邪心取象凝明正心箋云凝湛圓明真正之心出想陰悟理十類天魔不得其便方得精研窮生類本於本類中生元露者箋云方得精巧研尋窮究十二類生之根本此行陰是十二類之根本觀彼幽清常擾動元箋云清簡想濁擾動元是行陰遷流造作此行陰攝法極寬五十三法五十二法遷流思之一法造作於圓元中箋云於圓遍擾動之元中起計度者是人墜入二無因論箋云過去無因未來無因無因乃是計自然外道論義一者是人見本無因次別釋文二初計本無因文四初單標妄計箋云本是過去想陰已是無因何以故是人既得生機全破次觀窮箋云出陰生滅之機已是全破或生機即行陰機者動之微如今見盡此行陰根元故云全破乘于眼根八百功德箋云便計道乘于眼根八百功德前方全明後方全暗左右傍觀三分之二見八萬劫箋云向一百上計一萬八百為八萬劫所有衆生業流灣還箋云業者招感為義若造善業流於人天二道若造惡業流落三塗死此生彼箋云此方死又生彼方祗見衆生輪回其處八萬劫外冥無所觀箋云祇見衆生輪回在八萬劫內離却八萬劫外冥然又不見衆生生死便作是解此等世間十方衆生八萬劫來無因自有三界計心興箋云計此八萬劫內衆生是無因自然而有為觀之不及便道無因由此計度亡正遍知墮落外道惑菩提性四顯趨邪徑箋云正知是根本遍知是後得惑亂四智菩提種子二者是人見未無因後未來迷實文四初單標未計箋云計未來無因也有本云末末亦未也何以故是人於生既見其根次徵述因形箋云是人於十二類生見其根元計此十二根元是行陰知人生人悟鳥生鳥箋云執道人決定生人更不鳥畜鳥決定生鳥更為人不知因中若造善業生人天道若造惡業流落三塗為畜生類外道不知計為自然烏從來黑鵠從來白箋云由所習故因果分明正是因緣非自然也人天本竪畜生本橫白非洗成黑非染造從八萬劫無復改移箋云計人天身本竪畜生身本橫不知一切衆生直想身則竪若遍想身則橫從八萬劫無復改移言白決定白黑決定黑也今盡此形亦復如是箋云今盡此人身來生又生人身亦爾而我本來不見菩提云何更有成菩提事當知今日一切物象皆本無因三異計心興箋云撥無因果外道所執皆是自然由此計度亡正遍知墮落外道惑菩提性四顯趨邪徑是則名為第一外道立無因論後總結可了且觀成宿智何得舉眼窮微烏鵠雙儀言窮不了又六根功德何位圓階此且異生若為通會非金文不可引證指論決惑障猶存冀在後賢善依經理箋云且觀成宿智疏主疑云言觀八萬劫事此乃是宿住智通何得舉眼窮微眼根秪得八百功德然此外道向行陰中秪得世俗智通妄生計度也烏鵠雙儀下然前經中説是不了義此中何故説是外道執為自然與前別也又疑云六根功德何位圓階言此是何位人圓滿階降便得如此功德疏主又云此文未能定言若不是經亦不可引來證此義指論決惑障猶存言若指論來證論是菩薩造十地菩薩見性猶如隔羅縠看月一障二愚未盡惑障尚存餘習未盡證亦不得然此計只計過去未來俱無因皆是自然何不計現在為現在是行陰中興起向行陰中計兩頭也阿難是三摩中諸善男子凝明正心魔不得便窮生類本觀彼幽清常擾動元於圓常中次四遍常文三初總標箋云於圓滿恆常擾動之中是行動也起計度者箋云起妄計卜度者則五蘊假者乃興計度之人是人墜入四遍常論箋云是人墜入四種周遍計度執為恆常一者是人窮心境性二處無因次別釋文四初觀心境箋云計心亦無因境亦無因修習能知二萬劫中箋云便向此心境上修習興計能知二萬劫向心上計一萬境上計一萬十方衆生箋云是能依有情所有生滅箋云蘊起名生蘊滅名死咸皆循環箋云如蟻之循環生了又滅滅了又生不曾散失計以為常箋云便計為常住此正是生滅他為不生滅二者是人窮四大元次觀四大箋云是人向四大相上窮其根元根元則行陰也四性常住箋云計此四性常住修習能知四萬劫中箋云向一大上一萬四大計四萬十方衆生所有生滅咸皆體恆不曾散失計以為常箋云咸皆體恆便計為不生滅三者是人窮盡六根三觀八識箋云是含六識末那執受箋云末那是第七執受是第八心意識中箋云是牒心是第八識意是第七識本元由處箋云計此行陰第八元由之處為根本性常恆故修習能知八萬劫中一切衆生循環不失本來常住窮不失性計以為常箋云修習能知八萬劫中向八識上一識計一萬八識成八萬四者是人既盡想元四計想心箋云出想陰生理更無流止運轉箋云想陰中生滅如今已無流則動止則住或運或轉此是想陰取象生滅想心今已永滅箋云想陰取象有生有滅如今已無理中自然成不生滅因心所度計以為常箋云此是行陰見此行陰沈細他計道不生不滅不知此行剎那生滅念念不停行人心粗計為不生不滅由此計度亡正遍知墮落外道惑菩提性是則名為第二外道立圓常論後雙結箋云執圓遍恆常外道之人作此論議又三摩中諸善男子堅凝正心三四一分常文三初總標箋云堅固凝明正心也魔不得便窮生類本觀彼幽清常擾動元箋云觀則能觀彼幽清則所觀於自他中起計度者是人墜入四顛倒見一分無常一分常論箋云自是常他是無常或自則行陰他則一切衆生四顛倒見則四種不正見一者是人觀妙明心遍十方界次別釋文四初計心凝遍寂箋云在行陰中入定觀此妙明之理然此行陰微細執為微妙凝明湛然以為究竟神我箋云將此妙明執為神我我者主宰之義從是則計我遍十方凝明不動箋云從是則計此我性周遍一切衆生於我心中自生自死則我心性名之為常彼生滅者真無常性箋云彼一切衆生在我心中自生自死真箇是無常無常則斷見二者是人不觀其心遍觀十方恆沙國土見劫壞處名為究竟無常種性次觀劫壞及成箋云不觀其心向器世間上觀水災至初禪火災至二禪風災至三禪是劫壞處名為無常是斷劫不壞處名究竟常箋云捨念清淨地此是四禪無想天外道計為涅槃不死蓋三災不到之處計為常三者是人別觀我心精細微密猶如微塵三計身易心恆箋云即行陰精純微細微而復密流轉十方性無移改箋云計此性雖流轉十方性無移改則行陰常身能令此身即生即滅箋云此目四大身依行陰生滅他外道執為無常其不壞性名我性常箋云則行陰也一切死生從我流出名無常性箋云是四大身從我行中流出四者是人知想陰盡見行陰流行陰常流計為常性四四存三盡箋云計行陰念念生滅連環不斷計為常科云三盡是色受想四存是行色受想等今已滅盡名為無常箋云色受想等過去已是出了計為無常由此計度一分無常一分常故墮落外道惑菩提性是則名為第三外道一分常論後雙結箋云一分常論影取一分無常又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於分位中生計度者四四有邊文三初總標箋云即行陰分位之中是人墜入四有邊論箋云四有邊影取四無邊墜亦墜也有邊即常見無邊即斷見一者是人心計生死次別釋文四初計三處有無箋云行陰生滅根元流用不息箋云遷流動用不停計過未者名為有邊箋云計過去已出想陰等未來未入識陰將此為有邊是常見有邊則有邊際計過去未來是邊計相續心名為無邊箋云見此行陰念念相續生了又滅滅了又生微細難知計為無返無邊則無邊際也二者是人觀八萬劫則見衆生二計聞無聞異箋云則見八萬劫內衆生八萬劫前寂無聞見無聞見處名為無邊有衆生處名為有邊箋云八萬劫外又無聞見執此無聞見處名冥性諦冥則冥然不知無聞見處名無邊有衆生處名有邊三者是人計我遍知得無邊性三計自無他有箋云計此神我之性周遍神我則行陰而知得無邊性彼一切人現我知中箋云則行陰之中我曾不知彼之知性箋云言我未入行陰已前不知彼衆生之知性與我性同名彼不得無邊之心但有邊性箋云言一切衆生不得此無邊之心但是有邊我今在行陰中方得彼知性與我性同四者是人窮行陰空四計一性雙分箋云以能緣心窮究行陰要空以其所見箋云以能緣心見行陰境界心路籌度箋云則能緣心向所緣境上籌量卜度一切衆生一身之中計其咸皆半生半滅明其世界一切所有一半有邊一半無邊箋云計行陰空愛成一體然後計一半屬生一半屬滅由此計度有邊無邊墮落外道惑菩提性是則名為第四外道立有邊論後雙結箋云外道三乘教外別別修行有邊影無邊則斷常二見又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於知見中生計度者五四顛倒文三初總標箋云於知見中行陰中也是人墜入四種顛倒箋云則四不正見不死矯亂遍計虗論箋云此外道計無想天為不死世尊斷之此乃是矯誑作亂第六識心周遍計度虗妄之論議也一者是人觀變化元見遷流處名之為變次別釋文四初總由都計文三初總陳都計箋云變化元則行陰變則改變生滅不同也見相續處名之為恆箋云行陰連環不間念念生起之處計之為恆常見所見處名之為生箋云見則能見所見則行陰生處計生不見見處名之為滅箋云不見則能見見處則行陰滅處計滅相續之因性不斷處名之為增箋云見此行陰前念後念相續之處計為增正相續中中所離處名之為滅箋云行陰生滅正相續中前念生不攘後念滅中所離處計此為減各各生處名之為有箋云此單計行陰各各生時有各各者蓋前念後念不同互互亡處名之為無箋云亦單計互互滅處計為無以理都觀用心別見次就總偏正箋云總牒於前皆是用心別別計度妄見也有求法人來問其義答言我今亦生亦滅亦有亦無亦增亦減三惑前咨稟箋云有人來問所宗何法答言我今亦生亦滅等於一切時皆亂其語令彼前人遺失章句箋云於一日十二時言語不定二者是人諦觀其心次計無文二初計箋云則行陰也互互無處因無得證箋云則念念滅處也有人來問唯答一字但言其無除無之餘無所言説後答箋云言有人來問所宗何法但言一切皆無除無之餘更無言説三者是人諦觀其心三計有文二初計箋云亦行陰也各各有處因有得證箋云則行陰念念生處也有人來問唯答一字但言其是除是之餘無所言説後答箋云有人來問皆言是是亦有四者是人有無俱見四雙計有無文二初計箋云有則是生無則是滅則總見行陰中生滅二法其境枝故其心亦亂箋云行陰生滅如樹枝條今向行陰上便有生滅此約全計有人來問答言亦有即是亦無亦無之中不是亦有一切矯亂無容窮詰後答箋云亦無之中不是亦有不知此念滅後念更向何處生起是不得他心通也由此計度矯亂虗無墮落外道惑菩提性是則名為第五外道四顛倒性不死矯亂遍計虗論後雙結又三摩中諸善男子堅凝正心六十六有相文三初總標箋云則堅固凝明其正心魔不得便窮生類本觀彼幽清常擾動元箋云觀是能觀彼幽清是所觀於無窮流生計度者箋云行陰遷流無盡名無盡流便向此上生其計度也是人墜入死後有想發心顛倒箋云是人墜入死後決定有此身發心則安樂向此取其安樂此則俱是顛倒妄見或自固身云色是我次別釋文三初舉色明相箋云或自堅固其身執道五根色五塵色法處所攝色俱是我如我瓔珞常隨於我或見我圓含遍國土云我有色箋云或見我圓滿含融周遍國土計云我能有五根色五塵色法處所攝色如我妻子是我有之或彼前緣隨我回復云色屬我箋云或計彼前緣只是色隨我往來云色屬我如我奴㒒或復我依行中相續云我在色箋云或復見我性依著行陰之中相續生了又滅云我常在色中色是我之室宅皆計度言死後有想箋云皆計度言死後決定有此身相如是循環有十六想次例三同上箋云如是循環來往有十六想一陰具四四四十六如受陰中云受是我我有受受屬我我在受其餘想陰亦爾從此惑計畢竟煩惱畢竟菩提後雙計真妄箋云執妄與真各別煩惱是煩惱菩提是菩提兩性並驅各不相觸箋云兩性並遺各各不相涉由此計度死後有故墮落外道惑菩提性是則名為第六外道立五陰中死後有想心顛倒論後雙結箋云五陰之中計四陰也又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於先除滅色受想中無相文三初總標箋云過去已出三陰生計度者是人墜入死後無想發心顛倒箋云便向此上生其計度發心安樂見其色滅形無所因次則釋文三初單明箋云見五根色五塵色法處所攝色已上滅此之形質更無所因依觀其想滅心無所繫箋云過去已出想陰無取象若有取象故有所形繫此想文合在受陰後恐也知其受滅無後連綴箋云已出受陰無領納故無連綴陰性銷散箋云言行陰如今次第銷散縱有生理而無受想與草木同箋云縱然有生滅之理與草木何殊如過去已無色受想三陰此行陰俱無與草木同乃無領納取象何異草木無情此向行陰計也此質現前猶不可得死後云何更有諸相箋云現前尚無此形質死後何有因之勘校死後相無箋云因此窮勘校詰死後決定無身如是循環有八無想次覆結箋云循環則往來義八無想者行陰過去是無現在未來是有未來又無想過去是有現在未來是無色受二陰亦爾皆計過去有現在未來無一陰有二無四陰成八無相此單計無從此惑計涅槃因果一切皆空徒有名字究竟斷滅後別計言涅槃則真因果則妄了心不見實相則真妄都無佛體猶無業何言有箋云從此惑計涅槃等者謂撥同斷滅墮惡趣空疏言了心不見實相此蓋了心不見無相不相是真實相故撥同斷滅佛體猶無業何言有言此妄執佛體尚撥同無妄何所有由此計度死後無故墮落外道惑菩提性是則名為第七外道立五陰中死後無想心顛倒論後雙結又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於行存中八八俱非文三初總標箋云於行存中是死已在行陰之中兼受想滅箋云過去已是出想陰受陰雙計有無箋云計行陰現在是有過去是無色受想等過去是有或見是無計現在行陰是有受想等是無自體相破箋云若言其有有又破無若言其無無又破有是人墜入死後俱非起顛倒論箋云死後俱非有無雙破色受想中見有非有次別釋文三初總明箋云此三陰者過去在此三陰則是有今已出彼三陰現在與未來則無行遷流內觀無不無箋云為今在行門中觀過去則無故言觀無現在未來念念生起故言不無如是循環窮盡陰界決單計箋云則五陰十八界八俱非想箋云色受想過去有現在無行過去是無現在是有過去既無現在豈有色受想過去是有現在是無現在既無過去豈有一陰具二非四陰乃成八俱非此計與前別前八無相但計過去未來無現在有色受想亦過去有現未無此中一時俱非隨得一緣箋云但舉一陰俱非餘亦爾皆言死後有想無想箋云雙計有無雙破則俱非又計諸行後別釋箋云則單計行陰前則都四陰性遷訛故箋云遷改更訛心發通悟箋云向此行陰中悟解有無俱非箋云雖則單計行塗亦有無俱非如行陰過去是無現在是有則有無雙破虗實失措箋云虗則無實則有如今俱非故失其措致也由此計度死後俱非後雙結文二初結前虗計箋云皆言死後俱非更無後身後際昏瞢箋云後際後念也又不能起智達理昏暗瞢昧無可道故墮落外道惑菩提性箋云無菩提可為依止或通亦理言於理際無可依止定執空非無是妙有不知妙有真空真空妙有是則名為第八外道立五陰中死後俱非心顛倒論後顯落邪宗又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於後後無生計度者九七斷滅文三初總標箋云言於此身死後後去更無身是人墜入七斷滅論箋云計此七種斷滅上為涅槃取其安樂則撥無因果墮惡趣空或計身滅次別釋文二初約次單明箋云計此五蘊身斷滅後不復更生或欲盡滅箋云是欲界更不向欲界受身此下欠或憂盡滅是初禪諸教説初禪離憂或苦盡滅箋云是二禪出二禪苦或極樂滅箋云三禪離苦純樂或極捨滅箋云四禪是捨念清淨地無苦樂二受此下欠無色滅問經中唯説五何以加其二疏答準理搜尋理無乖錯如是循環窮盡七際現前銷滅滅已無復箋云言此身滅後不復更生由此計度死後斷滅墮落外道惑菩提性後通收總數是則名為第九外道立五陰中死後斷滅心顛倒論後雙結又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於後後有生計度者十五涅槃文三初總標箋云於此身後更有身是人墜入五涅槃論箋云妄計五處為安樂涅槃寂滅之義或以欲界為正轉依次別釋文二初欲色單明箋云謂轉捨此身後又向欲界受生依於欲界觀見圓明生愛慕故箋云或以性明或計神我圓明取下義或以初禪性無憂故箋云初禪無憂或以二禪心無苦故箋云二禪無苦或以三禪極悅隨故箋云悅樂也謂三禪純樂或極悅則無喜悅也或以四禪苦樂二亡箋云謂四禪是捨念清淨地亡初禪苦二禪樂不受輪回箋云計此五處所依為不輪回生滅性故箋云佛地觀之皆生滅之性也迷有漏天作無為解箋云此皆迷有漏之天作無為之見解五處安隱為勝淨依箋云為殊勝清淨之所依如是循環五處究竟後通收總數箋云將此五處為究竟所依由此計度五現涅槃墮落外道惑菩提性是則名為第十外道立五陰中五現涅槃心顛倒論後結意如前總搜群見括蒂窮萌覺路真標應垂勸學箋云疏言總搜群見結前生後括蒂窮萌該括始終妄見也阿難如是十種禪那狂解後結勸文二初結文二初括前狂解箋云狂解則狂亂見解皆是行陰用心交互箋云用心交相互換言被他魔力將其魔心換行人之心故現斯悟箋云現此虗妄解悟衆生頑迷不自忖量逢此現前以迷為解自言登聖大妄語成墮無間獄後妄證招沈汝等必須將如來心於我滅後傳示末法遍令衆生覺了斯義後勸文二初遐宣像末總了真詮箋云前皆言將如來語此中何故言如來心謂從根本智流出後得智從後得智流出大悲心從大悲心流出三乘十二分教故云心無令心魔自起淨孽後辨錯歸元成真演妙箋云為行陰沈隱妄計皆是妖孽保持覆護銷息邪見教其身心開覺真義於無上道不遭枝岐箋云樹分曰枝路分曰岐喻此妄執邪魔境界勿令心祈得少為足箋云祈求也作大覺王清淨標指箋云如此説是作大覺王標指的也阿難彼善男子五識陰文二初明十異迷源文三初總標文三初包前行盡文二初標窮業性箋云是前動靜不移憶忘如一當依其中之人修三摩提行陰盡者箋云過去已出行陰者則五蘊假者諸世間性箋云則行陰遷流造作乃世間之性幽清擾動同分生機箋云則十二類生依此行陰生滅之機微同其分位倏然隳裂箋云隳亦裂也如衣之破裂已出行陰沈細綱紐箋云則行陰深沈微細綱則網中大繩細是持諸煩惱此則總目行陰折其煩惱補特伽羅箋云唐言數取趣則行陰數數取數數受生也酬業深脈箋云乃十二類生酬因答果立脈喻如人脈在則身存脈亡則身滅脈如行陰感應懸絶箋云言行陰如今已絶行陰則能感應十二類生則所感應於涅槃天箋云天喻光潔自在涅槃則理將大明悟箋云明亦悟是智況行盡悟理起始覺智合本覺理如雞後鳴瞻顧東方已有精色後喻覩真明箋云如雞後鳴比行人既出行陰到識陰若識體即真識相即妄東方衆方之上六根虗靜次敘識仍存文三初彰明靜箋云六根虗通寂靜六根皆八識所變無復馳逸箋云無復馳流蕩逸正在識陰內外湛明箋云內是識外是器世等入無所入箋云入是能入無所入識也然建立及受用皆從八識生如今攝末歸本攝相歸性故入無所入也深達十方十二種類受命元由次顯通真則了行為由箋云言行陰為十二類生元由觀由執元了生住寂箋云是行陰疏言了生住寂則了生行陰其寂諸類不召生種不集箋云更無十二類生元由可召疏言生種不集則無行陰十二類生之種性於十方界已獲其同表相同體箋云則同歸識體精色不沈心靈顯靜箋云則識陰無行陰發現幽祕見生元本顯法身自相箋云則十二類生之元是行歸本藏是識陰謂八識是如來藏性法身自相然此八識白淨無垢或但了唯識性即是法身此則名為識陰區宇後結標箋云前三科中後結標識相若於群召已獲同中後顯銷陰盡文三初明盡相箋云若於行陰出其行陰同其識陰之體銷磨六門合開成就箋云更無六根門之所關閉也眼被色塵關耳被聲塵關如今既出識陰得其互六根一時合開一根發識遍緣諸境見聞通鄰箋云見則眼聞則耳一特通近互用清淨箋云得其互用則清淨若不互用則渾濁十方世界箋云是所依器世及與身心箋云身能依如淨琉璃箋云體淨內外明徹名識陰盡箋云內外明徹是身是人則能超越命濁次述超凡箋云命是八識連持不斷功能今既出則無命濁觀其所由罔象虗元顛倒妄想以為其本後彰本箋云為出後却返觀識陰罔無也象形也迷本無形達真似妄推元本妄故曰虗元則虗妄之本元也
