body:
  text: 天竺沙門般剌密帝譯烏長國沙門彌伽釋迦譯語菩薩戒弟子房融筆受西京大興福寺沙門惟慤科皇宋首楞大師可度箋文殊師利法王子奉佛慈旨即從座起頂禮佛足承佛威神說偈對佛三奉旨料撰文二初申儀受告覺海性澄圓後頌擇羣詮文二初簡餘非當文二初總明方便文三初標真顯妄箋云覺則無漏真智海則喻智無涯緣此智與理冥時不分能所圓遍法界故性則本來自性澄則本來澄圓則圓遍法界圓澄覺元妙箋云此牒澄圓可也此圓滿澄湛性上無漏覺智元來離能所故稱為妙元明照生所箋云元則元來真性明則湛寂真明照則強生覺照之功用生所者則無明為有強覺之智照彼所照無明便生得所相當情所立照性亡箋云既有所照之相無明當情便有能緣之心能所既立是前來能照之智亦隱最初覺海性澄圓亦隱亡者無也迷妄有虗空箋云能迷是強覺所迷是真性既有能所便有七識末那帶彼昏鈍空相當情便成衆同分虗空依空立世界箋云覺勞相現翳本圓明背本心昏覩太虗相乃至四大蔚興便成世界空是所依世界是所變想澄成國土箋云想者取象義澄結也言想心凝結便成國土器世間等是想分知覺乃衆生箋云是能依有情此見分也空生大覺中箋云頑空從真生時如何下句便喻如海一漚發箋云真如性海頑空如漚為向真體上強生覺照起得此同分所依空來如海上一漚發然頑空亦不離真如漚亦不離水已上二句是生起義從漚滅空本無下是治斷義有漏微塵國皆從空所生箋云有漏簡去無漏漚滅空本無況復諸三有箋云則欲有色有無色有歸元性無二次歸證多徒箋云二十五人歸元性即無別皆悟圓通方便有多門箋云隨他根機便有多般門戶前句結答悟圓通是二十五人方便有多門生起向下觀音一門當此方根機聖性無不通後顯性通權箋云二十五人皆得圓遍通達法門順逆皆方便箋云若是順即觀音門契心若是逆則餘二十四聖人初心入三昧箋云入是能入三昧是所入唐言正受定之異名遲速不同倫箋云遲則如藥王藥上云我無始劫為世良醫又如持地於普先佛世持地至毗舍浮佛方悟圓通又如月光童子初遇水天佛教水觀未得亡身經無量佛乃至山海慧自在通王佛方悟真空速則如觀音忽然超越世出世間十方圓明獲二殊勝色想結成塵後別簡非圓文九初拂塵圓證文六初厭色添塵過箋云內心功結從大塵㭊成鄰虗鄰為鄰近虗為虗空然二十五人敘圓通時陳那在前乃衆中上座故宜先敘簡時沙諦色在前為五塵之先是色也精了不能徹箋云若是精真了別則此觀不能明徹為色即是空不假析色歸空如何不明徹箋云問起如何於是獲圓通箋云是答為於是不明徹處於是獲圓通為他㭊色要得圓通乃不得圓通也白骨微塵上作觀音聲雜語言二聲言不普過箋云音則五音宮商角徵羽聲則四聲一言為言字為語此憍陳那尊者但伊名句味箋云此等名句但因名文身義味也舌以文身為味一非含一切箋云此尊者悟明四諦緣苦集是世間因果與滅道出世間因果別也云何獲圓通箋云若是圓通根即一切此乃不得圓通香以合中知三香無離覺過箋云香嚴因鄰房燒沈水香入觀離則元無有不恆其所覺云何獲圓通箋云若是圓通無不覺照未嘗斷滅未有合時即覺離即不知也味性非本然四味性非常過箋云則藥王藥上二菩薩向舌根嘗此娑婆草木金石入圓通要以味時有箋云要因味方有性無味又無分別其覺不恆一箋云味時有覺無味又無分別故不恆一云何獲圓通箋云圓通法門其性常一觸以所觸明五觸塵無定過箋云能觸是身所觸是水無所觸不明能觸須有所方有能此跋陀婆羅無所不明觸箋云三和方能成觸為根和境和識和闕一不成故合離性非定箋云合乃觸時知非觸時又無分別此性不定云何獲圓通箋云若是圓通其性常一法稱為內塵六法分能所過箋云則飲光及柴金光比丘尼向法塵上作觀云我觀世間六塵變壞唯以空寂此法塵影象是內第六所緣之塵憑塵必有所箋云憑五塵必有法塵此法塵是第六識心所能所非遍涉箋云為能緣心所緣塵各別故云何獲圓通箋云若圓通根能所一如根塵無二見性雖洞然二拂跡旋根證文五初視境虧功過箋云謂五聖向五根上作觀則如意尊者向眼根上作觀世尊示我樂見照明金剛三昧明前不明後箋云明猶見也言但見前不見後四維虧一半箋云四維者東南西南東北西北四隅兩隅角不見秪見二隅此約功德所配此論肉眼前敘時乃天眼云何獲圓通箋云謂因果不相稱鼻息出入通二現氣無交過箋云若是出息入息則通此周利槃特迦尊者現前無交氣箋云若是出入相交則闕中間無交氣有間斷故若是圓通則無間斷支離匪涉入云何獲圓通箋云為出息不是入息入息不是息支則分義出入分各相離不能相涉入故舌非入無端三純味方生過箋云為此舌根非是入於無端倪之處可了別唯須有味乃可了此憍梵鉢提尊者因味生覺了味亡了無有云何獲圓通箋云若是圓通恆常無間身與所觸同四質量偏涯過箋云此則慢習尊者向身根作觀因入城乞食毒㓨傷足入觀身為能觸毒㓨為所觸此二俱是無記故言同各非圓覺觀箋云能觸所觸二俱無記各無真覺覺觀若是圓通根有真覺起來觀照也涯量不冥會云何獲圓通箋云為身與㓨各當涯際劑量不相冥合契會故知根雜亂思五雜想資過箋云則善現尊者於意根作觀云我曠劫來心得無礙自憶受生如恆河沙等為第七所依知根雜和第六撩亂思量湛了終無見箋云若是湛寂了別真性則不能得想念不可脫云何獲圓通箋云若是圓通絶其亂思想念識見雜三和三息澄流證文三初體含三雜過箋云則鶖子於眼識現量心上作證云我曠劫來心見清淨乃至種種變化一見則通等了別以解識八識總名識此眼識須仗眼根與色塵三法和合方能照見詰本稱非相箋云今能依之識無體根境更有何相自體先無定云何獲圓通箋云若是圓通其體恆常不變不同根塵識三無根本也心聞洞十方次初心不及過箋云普賢於耳識現量心上作觀云世尊我用心聞分別衆生所有知見心者緣慮以解心八識通名心言此心洞達覽見十方如前云若於他方恆沙界外有一衆生心中發明普賢行者我於爾時乘六牙象分身百千皆至其處生于大因力箋云普賢行門是大因有不可屈伏義名力為對菩薩大乘得大因力名初心不能入云何獲圓通箋云此門庭格高唯化上根下根即不能入若是圓通根中下俱接鼻想本權機後滯權增住過箋云𧰟喜尊者鼻識上作觀云世尊教我及俱絺羅觀鼻端白至三七日身心內明等為佛見他多貪欲令攝心秪是權宜之機秪令攝心住住成心所住云何獲圓通箋云若作能住是心所住是鼻亦未契圓通若是圓通則無能所說法弄音文四縱辨摧邪證文一有漏真過箋云音則音聲文則文也此富樓那尊者開悟先成者箋云祗可開示曉悟先未成就久修之者名句非無漏云何獲圓通箋云名句文身是不應行中行所收不得無漏持犯但束身五勒鉗神證文一形無遍過箋云近執尊者向身識作觀經云我是如來衆中綱紀乃至衆推無上為止則是持作則是犯但束其身也非身無所束箋云有身則可持無所持者無身也如無色界人無身何可束也元非遍一切箋云秪是欲色二界無色不遍故云何獲圓通箋云若是圓通無不遍神通本宿因六涌沒凌虗證文一宿念緣過箋云則採菽氏向意識上作觀為三迦葉波宣說如來因緣深義我頓發心得大通達故為神通須是夙世修習也何關法分別箋云則法性真分別終日分別未嘗分別念緣非離物云何獲圓通箋云為初習神通時想此身如飛花柳絮此能緣之心不離所緣物象也若以地性觀七了相疑空證文五初阻礙乖通過箋云相則四大也凝空空大也證者為五聖曰五相上作觀則持也菩薩往遇普光佛於一切要路口我皆平填或作橋梁乃遇毗舍浮佛教云當平心地方悟圓通堅礙非通達有為非聖性云何獲圓通箋云道路有為功用非是聖性因中是有果中是無因果不相稱也若以水性觀二作想招生過箋云月光童子於水大上作觀內身津液與外浮幢王剎等無差別想念非真實如如非覺觀云何獲圓通箋云為理如智如一如體上離能覺觀之心覺尋觀伺是六識心所法若以火性觀三起厭非真過箋云是火頭金剛言有佛出世名曰空王說多淫人成猛火聚因此神光內凝化多淫心成智慧火等厭有非真離箋云厭欲有若是真離無欣厭非初心方便云何獲圓通箋云言火大門庭高遠若以風性觀四動寂相形過箋云則琉璃光法王子風大上作觀云我過無量聲如來教我觀此世界及衆生身皆是妄緣風力所轉於是觀世動時乃至諸動無二等動寂非無對箋云則動對寂故對非無上覺云何獲圓通箋云有對待故非真也若以空性觀五凝空昏鈍過箋云則虗空藏菩薩云我與如來定光佛所得無邊身諸幢王剎涉入我身身同虗空不相妨礙昏鈍先非覺箋云為此空相不是真空之性無覺異菩提云何獲圓通箋云菩提覺義今空體無覺與菩提異若以識性觀入一心唯識證文一住識存虗過箋云則慈氏菩薩遇日月燈明佛爾時世尊教我修習唯心識定入三摩地至然燈佛出世我乃得成無上妙圓識心三昧觀識非常住箋云為起能緣觀心觀此入識非是常住故存心乃虗妄云何獲圓通箋云若存能緣觀心亦是虗妄也諸行是無常九妙剎求安證文一因生不稱過箋云則大勢至菩薩言我本因地以念佛心入無生忍今於此界攝念佛人歸於淨土等行是造作遷流故念性元生滅箋云為此念者亦行蘊收與第六識相應生滅不暫停因果今殊感云何獲圓通箋云因是生滅果是淨故我今白世尊佛出娑婆界此方真教體清淨在音聞欲取三摩地實以聞中入後擇示真圓文三初述觀音獨契文六初娑婆教體離苦得解脫二廣歎觀音箋云離三苦五苦分段生死變易生死良哉觀世音箋云良猶善也歎辭於恆沙劫中入微塵佛國得大自在力無畏施衆生箋云前來以十四種無畏施衆生也妙音觀世音箋云微妙之音離能所故不順聲塵觀是能勸之智世是所觀之境音是所度生梵音海潮音箋云梵者靜也則寂靜之音性離喧囂海潮音乃警告雄音則應化不失時也救世悉安寧箋云求男得男求女得女出世獲常住箋云求大涅槃得大涅槃我今啓如來三啓述圓通如觀音所說箋云可觀音說譬如人靜居十方俱擊鼓十處一時聞箋云文殊設喻也此則圓真實箋云則喻顯圓通目非觀障外四比餘非正箋云則眼不能見物外之事口鼻亦復然箋云口鼻舌以合中知身以合方知箋云為合觸塵方知心念紛無緒箋云第六識心念慮紛然迥無頭緒隔垣聽音響箋云垣牆也音乃種種音響則山谷應聲遐邇俱可聞箋云此約五根校量乃就耳根顯圓通五根所不齊箋云餘五不等耳根是則通真實箋云通變之義音聲性動靜五顯聲彰聖箋云若是音聲性則有動有靜如樹因風則動無風則靜或有聲曰動無聲曰靜聞中為有無箋云此聞是真聞性中此聲塵或有或無或一切衆生執聲則言有聞無聲則言無聞無聲號無聞箋云此但聲塵或有或無非實聞無性箋云聞性不隨聲塵無聲無既無滅箋云聲無是無聲塵即當滅聞性即無滅聲有亦非生箋云聲有是聲塵之時亦非生言此聞性不曾生生滅二圓離箋云生滅是聲塵二圓離是無生滅也是則常真實箋云此則性顯圓通前二約寤時縱令下約寐昧後深也縱令在夢想不為不思無六敘教當明箋云約寐時此性亦常尚不作思無豈作思有之解覺觀出思惟箋云起始覺淨智來觀達出却前妄識思有思無之解身心不能及箋云妄身妄心不能及真今此娑婆國聲論得宣明衆生迷本聞循聲故流轉箋云本聞則真聞之性循則順也順聲塵故阿難縱強記不免落邪思次誨責群徒文四初傷餘勸責箋云多聞不能滌業乾慧未免苦輪豈非隨所淪箋云豈不是阿難隨前塵聲境遭他沈淪旋流獲無妄箋云但返聞聞自性自然得無妄阿難汝諦聽我承佛威力宣說金剛王二別責阿難文二初述承威演妙箋云金剛則智能摧壞一切虗妄之法此慧觀圓通如幻不思議箋云似有不有如生不生佛母真三昧箋云母者出生義喻法身能出生報化二身約此圓通門是法身真理汝聞微塵佛後責外習迷源一切祕密門欲漏不先除畜聞成過誤箋云積畜多聞翻成過患賺誤也將聞持佛佛箋云將多聞之性任持前佛後佛無漏言教何不自聞聞箋云何不返自能聞之心合真聞之性聞非自然生箋云此能聞之心不自然而生須仗聲塵方生因聲有名字箋云因聲境牛羊男女等聲旋聞與聲脫三指觀令超文三初旋聞普脫箋云但旋妄識歸真聞聲塵自然解脫能脫欲誰名箋云尚無所緣聲塵何有能脫之名一根既返源六根成解脫見聞如幻翳箋云見聞是識但如幻如翳俱無有實三界若空花箋云欲界色界無色界如空中之花聞復翳根除箋云翳根則見分但返聞自性乃無見分妄心塵銷覺圓淨箋云塵銷是無相分真覺自然圓明清淨淨極光通達次了喻超塵箋云智也寂照含虗空箋云即體之智寂而常照含真空之體此根本智也圓覺云當知虗空覺所顯發却來觀世間猶如夢中事箋云如睡夢覺摩登伽在夢箋云先梵天呪如夢如幻無實誰能留汝形箋云誰能留汝阿難之形秪為不了前境如夢即被繫縛如世巧幻師幻作諸男女後比約圓銷文二初喻箋云此是真若是衆生是假雖見諸根動箋云如一切衆生向六根門頭動用要以一機抽箋云皆由根本無明也息機歸寂然箋云但息根本無明返聞聞自性歸寂然理體之上諸幻成無性箋云六知根無自性六根亦如是後合元依一精明箋云則性明相是根本無明分成六和合箋云六根也無明為能變六根六塵為所變一處成休復六用皆不成箋云一處乃根本無明但無根本無明六用皆不生或一處約耳門入圓通其餘六根無自性塵垢應念銷箋云應念則少念少念則無念成圓明淨妙箋云法界之體也餘塵尚諸學箋云指前二十四人明極即如來箋云明極則智也言真智窮極便是如來大衆及阿難四勸旋歸證旋汝倒聞機箋云為背體緣聲是倒今但返聞自性是旋汝顛倒聞機是根本無明返聞聞自性性成無上道箋云返復能聞之心聞他真聞去圓通實如是箋云方結答阿難請得成菩提妙奢摩他已摩禪那最初方便又結答我今猶如旅泊之人至要因門入此是微塵佛一路涅槃門後顯頓流通文三初貫通三際顯指真殊箋云文殊又恐阿難將為己證便云則是諸佛一路涅槃門更無二路唯此一門路者三乘聖人遊履之處涅槃乃佛果位有為無為二轉依果門者出入義三乘聖人皆於此門入過去諸如來斯門已成就現在諸菩薩今各入圓明未來修學人當依如是法我亦從中證非唯觀世音誠如佛世尊詢我諸方便箋云此躡佛前來令簡道誰當其根亦令未法衆生修菩薩乘絢問教我簡何方便門易得成就以救諸末劫箋云且答亦令末代一切衆生求菩薩乘求出世間人箋云求菩薩乘人或求聲聞二乘之人成就涅槃心箋云乃無上菩提觀世音為最箋云便合云無過此一門自餘諸方便皆是佛威神二愍歎同源簡餘非正箋云言二十四聖人觀門皆是承過去諸佛威神故即事捨塵勞箋云為餘習遭毒㓨賢護入俗假世間事法捨却塵勞煩惱非是長修學淺深同說法箋云言不是時長修學觀門不可初心求向階前毒㓨傷足要入道也不如觀音從聞思修入三摩提世出世間獲二殊勝頂禮如來藏無漏不思議箋云頂禮歸投義照見義如來藏者首楞嚴三昧也願加被未來後顯標圓徑請被流通於此門無惑方便易成就堪以教阿難箋云此結答前問誰當其根及末劫沉淪但以此根修圓通超餘者真實心如是於是阿難及諸大衆身心了然得大開示四聞經獲利文三初喻彰同悟文二初述箋云以五蘊身成法性身八識妄心為般若真心故了然也觀佛菩提及大涅槃猶如有人因事遠遊未得歸還明了其家所歸道路後喻箋云言我今居有學地未證法身大似遠遊未還其家今日因說圓通分明知修行取證果體之道路普會大衆天龍八部有學二乘及諸一切新發心菩薩其數凡有十恆河沙次獲淨超塵文二初同超大位箋云天是一龍是二攝六部夜叉乾闥婆等皆得本心箋云得法界大定也遠塵離垢獲法眼淨箋云離煩惱垢染也起智照理如眼見物不殊性比丘尼聞說偈已成阿羅漢後獨證小階箋云過去名本性女也無量衆生皆發無等等阿耨多羅三藐三菩提心後續發勝心箋云初言無等者諸佛比諸衆生無齊等故下一等謂此佛彼佛互相等故阿之言無耨多羅言上三言正藐言等三言正菩提言覺乃無上正等正覺阿難整衣服於大衆中合掌頂禮次二力加持修證文分三初翹咨遠備文三初悲欣述悟箋云然謂二力加持偏資末品前來慧觀圓通修證分但接上根之者阿難恐末代一切衆生境劣心微不能作證所以便請云欲攝其心入三摩提云何安立道場遠諸魔事於是世尊遂說三七日道場儀軌第一七日行道禮拜第二七日發菩提願第三七日唯誦佛頂悉怛多般怛羅無上神呪至三七日十方諸佛出鏡交光處摩頂安慰行人與觀音同證法界理故心跡圓明箋云心則真心跡乃十方同履之跡悲欣交集欲益未來諸衆生故箋云悲則悲見末代邪師欣則欣遇如來正法交集者相交而集也稽首白佛大悲世尊我今已悟成佛法門是中修行得無疑惑箋云前來道觀佛菩提及大涅槃乃至明了其家所歸道路所以此中躡前文也常聞如來說如是言自未得度先度人者次陳發大心箋云發大心乃四弘誓願菩薩發心自覺己圓箋云根本智也能覺他者箋云後得智也如來應世箋云問自覺己圓能覺他者是何人如此答云云我雖未度願度末劫一切衆生箋云阿難大權之人非是未得度但且謙稱世尊此諸衆生去佛漸遠邪師說法如恆河沙後諸建真場遙津末劫箋云正法一千年像法一千年末法一萬年正是今時也邪師自邪思惟說邪教法欲攝其心入三摩地云何令其安立道場遠諸魔事於菩提心得無退屈箋云道場則得道寂滅之場退屈者退轉抑屈也爾時世尊於大衆中稱讚阿難善哉善哉如汝所問安立道場救護衆生末劫沈溺次讚勑承詮文三初讚發悲心箋云稱揚讚嘆汝今諦聽當為汝說次許宣標勑阿難大衆唯然奉教後衆翹真旨箋云唯然吔諾之辭佛告阿難汝常聞我毗奈耶中宣說修行三決定義後遐宣助法文四初勗淨尸羅文二初總彰三學箋云毗奈耶唐言調伏乃律藏多詮戒學論藏多詮慧學經藏多詮定學調為調練三業伏是制伏過非調練通於止作制伏唯明止惡軌則不移故云決定所謂攝心為戒因戒生定因定發慧是則名為三無漏學箋云所謂戒是菩提本應當具足持淨戒又云戒如海無涯如寶求無厭然大乘持心戒小乘持身戒也因戒生定定能發慧此三學名為無漏無漏簡去有漏阿難云何攝心我名為戒後別演戒門文二初總徵垂戒若諸世界後別釋初篇文四初淫戒文二初顯彰升墜文七初奉戒超生箋云是所依六道衆生箋云是能依有情其心不淫箋云大乘菩薩人持心淫起心動念皆犯也小乘人持身戒但不與境交即持也則不隨其生死相續箋云前文云父父子子𮞏代相生此等皆以欲貪為本如今若無淫自然不隨生死相續也然大乘先以殺戒為先為大乘之人以悲為力若殺乃失大悲種大乘人以染戒為初為𮞏代相生父父子子皆由貪欲為本為小乘之人怕其生死所以先斷於染此教是大乘何故以染為初答阿難因前墮在淫室之內此順同小乘故先舉染然雖如此亦是大乘為持心戒故汝修三昧本出塵勞淫心不除塵不可出二虧持滯縛縱有多智禪定現前如不斷淫必落魔道三必遊邪徑箋云梵語魔羅唐言殺者謂能殺衆生慧命也緣魔王多行於欲下文云將諸猥媟以為傳法上品魔王四隨升三品箋云諸魔歸往曰魔王則福勝者中品魔民箋云則福中者下品魔女箋云則福劣者彼等諸魔亦有徒衆各各自謂成無上道五述邪為正我滅度後末法之中多此魔民熾盛世間廣行貪淫為善知識令諸衆生落愛見坑失菩提路六亂法傷人汝教世人修三摩提先斷心淫是名如來先佛世尊第一決定清淨明誨七勑留真教箋云先佛世尊則過去諸佛也清淨明誨者不被染之一法所縛明為分明誨為教誨是故阿難若不斷淫修禪定者如蒸砂石欲其成經百千劫秪名熱砂後再勗遵修文二初喻彰染墜無升箋云法上將淫心求無上菩提經百千劫秪名淫根何以故此非本箋云法上此淫非無上菩提本砂石成故箋云此是淫根所成故汝以淫身求佛妙果箋云妙果者乃常身法身也縱得妙悟皆是淫根根本成淫輪轉三塗必不能出如來涅槃何路修證箋云前來云菩提涅槃猶如有人因事遠遊等若是以淫心即不能求無上涅槃必使淫機身心俱斷斷性亦無於佛菩提斯可希冀後勗斷除心定標邪正箋云淫機乃心也言若如此向求佛菩提涅槃此可希望也如我此說名為佛說不如此說即波旬說箋云波旬唐言惡者魔也阿難又諸世界六道衆生其心不殺則不隨其生死相續二殺戒文二初顯彰升墜文九初奉戒超生汝修三昧本出塵勞殺心不除塵不可出二虧持滯縛縱有多智禪定現前如不斷殺必落神道三必遊邪徑上品之人為大力鬼中品則為飛行夜叉諸鬼帥等下品當為地行羅剎四三品分形箋云飛行夜叉唐言勇健地行羅剎唐言可畏帥則將帥彼諸鬼神亦有徒衆各各自謂成無上道五迷邪為正我滅度後末法之中多此鬼神熾盛世間自言食肉得菩提路六當來亂教阿難我令比丘食五淨肉此肉皆我神力化生本無命根七呵依漸化箋云五淨肉者見聞疑自死鳥殘也汝婆羅門地多蒸溼加以砂石草菜不生我以大悲神力所加因大慈悲假名為肉箋云婆羅門唐言淨胤言其地草尚不生豈況於菜汝得其味奈何如來滅度之後食衆生肉名為釋子箋云楞伽云是故修行者慈心不食肉食肉無慈悲乖背正解脫汝等當知是食肉人縱得心開似三摩地皆大羅剎報盡必沈生死苦海非佛弟子八不斷沈生箋云似三摩地者似真即不真也如是之人相殺相吞相食未已云何是人得出三界箋云已猶盡也言相食相吞如汲井輪互為高下無有窮盡汝教世人修三摩地次斷殺生是名如來先佛世尊第二決定清淨明誨九勑流真誨是故阿難若不斷殺修禪定者譬如有人自塞其耳高聲大叫求人不聞此等名為欲隱彌露後再勗遵修文六初喻彰遺戒箋云法上將殺心求無上菩提大似塞耳高叫求人不聞自家愛隱轉見露現也清淨比丘及諸菩薩於岐路行不踏生草況以手云何大悲取諸衆生血肉充食二責犯彰持若諸比丘不服東方絲綿絹帛及是此土靴履裘毳乳酪醍醐如是比丘於世真脫酬還宿債不遊三界三勗斷微緣箋云言東方者是此土也及此土乃西天也靴履者用皮為之裘者以毛為衣毳裘是也真脫則不還債何以故服其身分皆為彼緣四喻存難越箋云既食他身分須酬他命根為彼衆生所緣境也如人食其地中百穀足不離地箋云言劫初時人百穀不食乃能空中飛行自在乃至食其百穀煙火之食乃足不離地必使身心於諸衆生若身身分身心二途不服不食我說是人真解脫者五勑遵真脫箋云身心二途者心不念食身不愛著法上如人食衆生身分始終須還終不捨離也如我此說名為佛說不如此說即波旬說六顯定正邪阿難又復世界六道衆生其心不偷則不隨其生死相續三盜戒文二初顯彰升墜文九初奉戒超生汝修三昧本出塵勞偷心不除塵不可出二虧持滯縛縱有多智禪定現前如不斷偷必落邪道三心遊邪徑上品精靈中品妖魅下品邪人諸魅所著四三品分形箋云邪人則風邪之人彼等群邪亦有徒衆各各自謂成無上道五迷邪為正我滅度後末法之中多此妖邪熾盛世間潛匿姧欺稱善知識各謂自己得上人法詃惑無識恐令失心所過之處其家耗散六亂法傷人箋云詃誘也言潛藏隱匿姧詐欺誑於人也恐令失心者驚恐於人令人失心也然此經亦言誑稱善知識偷盜取受施主供養是人邪心被鬼所著我教比丘循方乞食令其捨食成菩提道諸比丘等不自熟食寄於殘生七責犯彰持箋云言不得長久在也旅泊三界箋云言諸聖人於三界但如旅泊之人一宿一食何可長乎示一往還去已無返云何賊人假我衣服裨販如來造種種業皆言佛法却非出家具戒比丘為小乘道由是疑誤無量衆生墮無間獄箋云聲聞之人示身為一往還為捨此報後更不受生也去已無返者去不更來也若我滅後其有比丘發心決定修三摩提能於如來形像之前身然一燈燒一指節及於身上爇一香炷我說是人無始宿債一時酬畢長揖世間永脫諸漏八顯超標志箋云長揖則永辭也雖未即明無上覺路是人於法已決定心箋云言此人雖未即明無上真覺之路是人於教法已有決定求無上之心若不為此捨身微因箋云言若不為此無上菩提捨身求小微劣之事或愛欽重或求名利縱成無為必還生人酬其宿債箋云若求如此小小之事此人決定宛然又著還彼食他身分之人債也除非求無上菩提故如我馬麥正等無異箋云如佛往昔因中毀僧言食馬麥後成佛猶償夙債夏三月安居猶食馬麥蓋示因果故出寶積經汝教世人修三摩地後斷偷盜是名如來先佛世尊第三決定清淨明誨九敕流真教是故阿難若不斷偷修禪定者譬如有人水灌漏巵欲求其滿縱經塵劫終無平復後再勗遵修文三初喻彰虧戒若諸比丘衣鉢之餘分寸不畜次顯教今修文八初少欲知足箋云三衣鉢盂之外乞食餘分施餓衆生二行惠施箋云凡乞食作三分分一分自食一分施餓衆生一分施鳥等於大集會合掌禮衆三行不輕行有人捶詈同於稱讚四忍辱必使身心二俱捐捨五離心形二縛箋云不食衆生身亦無貪心身肉骨血與衆生共六等觀為己箋云身與衆生同自既怖死彼亦如然不將如來不了義說回為己解以誤初學七指他真經箋云若將如來不了義教回為自己見解疑誤於人似偷一般今言不將不了義教說似初學是將了義乃真實也佛印是人得真三昧八尅證三昧如我此說名為佛說不如此說即波旬說後定標邪正阿難如是世界六道衆生雖即身心無殺盜淫三行已圓若大妄語即三摩提不得清淨成愛見魔失如來種四大妄語戒文二初顯彰升墜文四初舉犯沈生文三初彰愚犯失箋云愛見者才妄語內心便生愛失如來四智菩提種也所謂未得謂得未證言證或求世間尊勝第一謂前人言我今已得須陀洹果斯陀含果阿那含果阿羅漢道辟支佛乘十地地前諸位菩薩求彼禮懺貪其供養是一顛迦銷滅佛種次舉法過人箋云顛迦者亦云顛底迦唐言樂欲如人以刀斷多羅木佛記是人永殞善根無復知見沈三苦海不成三昧後喻顯沈生箋云多羅樹似棕有子赤色堪食三苦海則三塗也我滅度後勑諸菩薩及阿羅漢應身生彼末法之中作種種形度諸輪轉次勑傳陰付文三初勑真居世或作沙門白衣居士人王宰官童男童女如是乃至淫女寡婦姧偷屠販與其同事稱讚佛乘令其身心入三摩提二密化歸真箋云姧詐偷盜屠兒販賣之人與其同事教化也終不自言我真菩薩真阿羅漢泄佛密因輕言未學唯除命終陰有遺付後隱迹潛遺箋云陰者暗也暗有遺付也言臨命終方說云何是人惑亂衆生成大妄語三責惑凡稱異汝教世人修三摩地後復斷除諸大妄語是名如來先佛世尊第四決定清淨明誨四告傳真教是故阿難若不斷其大妄語者如刻人糞為旃檀形欲求香氣無有是處後勗真修文六初喻彰虧戒箋云旃檀唐言與樂白者治熱病赤者去風瘴我教比丘直心道場於四威儀一切行中尚無虗假云何自稱得上人法二責犯標持箋云四分戒云若比丘實無所知自稱言我得上人法言我已入聖智勝法我知是我見是後放異時若問若不問欲自清淨作是說我實不知見言知言見虗誑妄語除增上慢是比丘波羅夷不共住譬如窮人妄號帝王自取誅滅況復法王如何妄竊因地不真果招紆曲三喻妄竊求佛菩提如噬臍人欲誰成就四喻臨終脫梅箋云噬臍者喻不可及也義左傳若諸比丘心如直弦一切真實入三摩提永無魔事我印是人成就菩薩無上知覺五勗行諸行如我此說名為佛說不如此說即波旬說六標定邪正
