body:
  text: 天竺沙門般剌密帝譯烏長國沙門彌伽釋迦譯語菩薩戒弟子房融筆受西京大興福寺沙門惟慤科皇宋首楞大師可度箋阿難當知是善男子窮諸行空於識還元箋云現在識陰中已滅生滅箋云已滅前行陰生滅而於寂滅精妙未圓箋云未至唯識性能令己身根隔合開後彰通互箋云隔絶六塵合開六根不被六塵關門得其互用亦與十方諸類通覺箋云十二類生通同覺照覺知通㳷能入圓元箋云此覺知識通同㳷滅能入識體若於所歸次述於元立計文三初標立計箋云是識立真常因箋云立此識為真常體之因依也生勝解者箋云生其殊勝之解於決定境印持為性不可引轉為業是人則墮因所因執次顯墮邪因所因者因則生死諸法所因則識為生因不了性本無生不與生為生因見生起自心源遂起所因元執箋云外人問此外道因何作此計耶答見生起自心源娑毗迦羅後舉同類箋云唐言黃赤色仙是數勝論主所歸冥諦成其伴侶迷佛菩提亡失知見箋云冥諦則計從冥諦生覺性諦覺性生我心我心生五微塵五微塵生五大五大生五知根五知根生五作業根後方生心平等根神我處中不爛不壞是名第一立所得心成所歸果違遠圓通背涅槃城生外道種後結歸邪徑且心源湛寂是本歸寧不執常而本性元常強立常因因立常勿妄起迷心再發妄習還生不了真詮落斯邪徑阿難又善男子窮諸行空已滅生滅而於寂滅精妙未圓二能非能執文三初明順寂未圓箋云雖悟識相未悟識性若於所歸次述於元立計文三初標立計箋云則識也覽為自體箋云覽取也言取此識為自家本體盡虗空界箋云所依虗空十二類內箋云能依有情所有衆生皆我身中一類流出箋云皆從我身之中一類流出神我之性則第八識也生勝解者箋云然後於此上生其勝解則於決定境印持為性是人則墮能非能執次顯墮邪箋云計我為能生十二類生是我身中流出而彼不能生摩醯首羅後舉同類箋云梵語莫醯溼伐羅唐言大自在此梵訛略現無邊身成其伴侶迷佛菩提亡失知見箋云言此天執神我為性周遍國土十二類生從我身中流出為其明伴道侶是名第二立能為心後結歸邪徑箋云識也成能事果箋云執此識為能成業所證之果遣遠圓通背涅槃城箋云遣遠圓通之智背諸佛如來涅槃之城則理生大慢天箋云則大自在天此天人高舉為性故云大慢我遍圓種箋云言神我之性周遍圓滿是此之種類又善男子窮諸行空已滅生滅而於寂滅精妙未圓三常非常文三初明順寂未圓若於所歸有所歸依次述於元立計文三初標立計箋云行陰之中無歸依今到此識便執此識陰為所依之處自疑身心從彼流出箋云自家疑此身心從彼識陰中流出十方虗空咸其生起箋云所依虗空總皆於此識陰之中生起則於都起所宣流地箋云言識陰為內身外器都起之處宣布流出之地地則所依之地也作真常身無生滅解箋云真常則法身言執此生滅之心作不生滅之解在生滅中早計常住箋云世尊斷云在生滅之中旱計此識為常住之性既惑不生箋云惑生滅為不生滅之理亦迷生滅箋云既也迷真亦不識妄安住沈迷生勝解者箋云則識沈隱迷妄也是人則墮常非常執次顯墮邪箋云計識為常十方虗空從我流出則無常計自在天成其伴侶迷佛菩提亡失知見後舉同類是名第三立因依心成妄計果遣遠圓通背涅槃城生倒圓種後結歸邪徑又善男子窮諸行空已滅生滅而於寂滅精妙未圓四知無知文三初明順寂未圓若於所知次述於元立計文三初標立計箋云則識也知遍圓故箋云言此所知之識性周遍圓明因知立解箋云因知是識便立為能解十方草木皆稱有情與人無異草木為人人死還成十方草樹箋云為此行人見情與非情皆因第八識變便作如是計將有情為無情無情為有情此則才辨因果有此計無擇遍知生勝解者箋云更無選擇情與非情計一知覺是人則墮知無知執次顯墮邪婆吒霰尼後舉同類箋云唐言遍覺外道執一切覺成其伴侶迷佛菩提亡失知見箋云執有情無情俱有知覺是名第四計圓知心後結歸邪徑箋云計圓遍知覺之心成虗謬果箋云虗妄錯謬執有情為無情遣遠圓通背涅槃城生倒知種箋云顛倒知解之種性也又善男子窮諸行空已滅生滅而於寂滅精妙未圓五生無生文三初明順寂未圓箋云未了識體但了識相也若於圓融次述於元立計文三初標立計箋云是達識陰根互用中已得隨順箋云為在識陰達識唯一根雖殊而識不殊故互用也便於圓化一切發生箋云計識陰圓遍能化生一切法界為一切法所依求火光明樂水清淨愛風周流觀塵成就各各崇事以此群塵發作本因立常住解箋云群塵則四大前塵也是人則墮生無生執次舉墮邪諸迦葉波後舉同類箋云是事火龍優樓頻螺伽耶那提三迦葉波并婆羅門勤心役身事火崇水求出生死成其伴侶迷佛菩提亡失知見箋云婆羅門唐言淨胤或事水等是名第五計著崇事後結歸邪徑箋云言妄生計著崇重水大等事迷心從物立妄求因箋云立此虗妄為所求之本因求妄冀果箋云求此虗妄冀仗為果違遠圓通背涅槃城生顛化種箋云生顛倒變化之種類又善男子窮諸行空已滅生滅而於寂滅精妙未圓六歸無歸文三初明順寂未圓若於圓明計明中虗次述於示立計文三初標立計箋云計其識體圓明其中虗無非滅群化箋云則非却此識然識為群化所依也以永滅依箋云將此識為永依斷滅撥喪無餘則惡趣空也為所歸依生勝解者箋云將此永滅為所歸依之處是人則墮歸無歸執次顯墮邪箋云計識陰為所歸而著空是無歸無想天中後舉同類此天五百劫在定想心不行此中影取空處二萬劫識處四萬劫無所有處六萬劫非非想處八萬劫諸舜若多成其伴侶迷佛菩提亡失知見箋云舜若多是空神無身則伏第六現行不起如友覆火是名第六圓虗無心後結歸邪徑箋云圓虗則識無心則識空成空亡果違遠圓通背涅槃城生斷滅種箋云撥同斷滅成空亡之果一向著空又善男子窮諸行空已滅生滅而於寂滅精妙未圓七貪非貪文三初明順寂未圓若於圓常次述於元立計文三初標立計箋云則識固身常住箋云堅固此危幻之身以為常同于精圓長不傾逝生勝解者箋云精純圓常則法身將妄同真欲其長生入真常境是人則墮貪非貪執次顯墮邪箋云貪謂起貪心貪固以為堅固非貪言此身不可貪也諸阿斯陀後舉同類箋云唐言無勝求長命者成其伴侶迷佛菩提亡失知見箋云此外道求長生久視之道或聞諸佛有真身常身向色究竟天成自受用身根根塵塵廓周沙界盡未來際常受廣大法樂乃作此執是名第七執著命元立固妄因趣長勞果遣遠圓通背涅槃城生妄延種後結歸邪徑箋云唯是趣向長時勞苦之果又善男子窮諸行空已滅生滅而於寂滅精妙未圓八真無真文三初明順寂未圓觀命互通次述於元立計文三初標立計箋云觀此命元是識陰互通則六門合開也却留塵勞恐其銷盡箋云為既到識陰若盡此識則成智今既欲盡便生是念却留此塵勞恐其銷盡無所依止便於此際坐蓮華宮箋云於此際化寶蓮華華中現宮殿等廣化七珍多增寶媱縱恣其心生勝解者箋云寶媱則妙寶莊嚴之美女縱恣其心行其染法是人則墮真無真執次顯墮邪箋云言此外道執識陰是真不知本是生滅之因是非真吒枳迦羅成其伴侶迷佛菩提亡失知見後舉同類吒枳迦羅木見唐言取類或波旬異號未敢詳定是名第八發邪思因後結歸邪徑箋云發邪見思想之因立熾塵果違遠圓通背涅槃城箋云立其熾盛塵勞之果則染之一法生天魔種箋云同前想陰天魔種類又善男子窮諸行空已滅生滅而於寂滅精妙未圓後述劣乘文二初聲聞文三初明順寂未圓於命明中次述於元立計文三初證滅滯權箋云命是八識連持不斷明則圓明識體分別精粗箋云精則識體粗則識相疏決真僞箋云疏通決擇真是識體僞乃識相則八識上變根身器世等因果相酬箋云舉一二類生業果酬感之處則識唯求感應箋云十二類是能感應識是所感應背清淨道箋云是諸佛如來佛果位中三身四智悉皆圓滿清淨之理三乘聖人遊履之處曰道所謂見苦斷集箋云若是世果集是世間之因乃見苦之果斷集之因也證滅修道箋云滅理是出世間果道智是出世間因舉出世間果令攸出世間因而趣入居滅已休箋云居其生空涅槃以為休止之處更不前進生勝解者箋云更不前進趣向無上菩提是人則墮定性聲聞次顯歸定性箋云定性者則不回心入大諸無聞僧後舉增慢同類箋云明不聞大乘教者增上慢者成其伴侶迷佛菩提亡失知見箋云增上慢則法華會上五千退坐者向德上起慢是名第九圓精應心後結歸邪徑箋云圓滿精純是生空智成趣寂果箋云趣向生空涅槃為果是所證之處違遠圓通背涅槃城生纏空種箋云其生空理謂一向著空又善男子窮諸行空已滅生滅而於寂滅精妙未圓後緣覺文三初明順寂未圓若於圓融次述於元立計文三初證滅滯權箋云諸行具足曰圓體業俱亡曰融也清淨覺明箋云則生空理發研深妙箋云則加行生空智即立涅槃而不前進生勝解者箋云則生空涅槃是人則墮定性辟支次顯歸定性諸緣獨倫不回心者成其伴侶迷佛菩提亡失知見後舉增慢同類箋云諸緣則部行獨倫則麟角喻是名第十圓覺㳷心後結歸邪徑箋云圓滿覺照㳷滅其心是生空智成湛明果箋云證生空理違遠圓通背涅槃城生覺圓明不化圓種箋云為此獨覺不欣化於衆生阿難如是十種禪那中途成狂後結勸文三初遍明結勸文二初結文三初標前立計箋云出前四陰則識陰中既未出此識如人行至中途若出此識便成佛去如今正在此中生其妄計是中途成其狂亂也因依迷惑箋云因親依止也言親近依止此迷妄之惑於未足中生滿足證箋云如聲聞二乘只到生空涅槃為滿足也皆是識陰用心交互故生斯位箋云位則六十二異計之位衆生頑迷不自忖量逢此現前各以所愛先習迷心次彰迷息停功箋云如聲聞二乘趣生空理此皆是所愛先習也而自休息箋云將此為休止停息之處將為畢竟所歸寧地箋云便將此生空涅槃為所歸寧之地只到三百由旬名為化城未到寶所直至向色究竟天成自受用身佛常受廣大法樂此方為所歸寧地自言滿足無上菩提大妄語成外道邪魔所感業終墮無間獄後顯妄招沉滯箋云若是外道等大妄語成受此所感惡業之報終後乃沉地獄聲聞緣覺不成精進箋云若是聲聞等自是滿足不成精進無上菩提不入地獄也汝等存心秉如來道將此法門於我滅後傳示末世普令衆生覺了斯義無令見魔自作沉㜸保綏哀救消息邪緣令其身心入佛知見從始成就不遭岐路後勸箋云綏安也汝等存注其心無令他行人見此等魔保安哀救如是法門先過去世恆沙劫中微塵如來乘此心開得無上道次總敘超倫文三初引過佛同乘箋云外人問法門為是令佛作如是說為三世佛作如是說經答如是法門指五十種魔事先過去世有多少恆沙劫劫中有多少微塵如來此如來何得成無上道乘此心開得無上道已上亦結答阿難從摩登伽處歸請世尊云恨無始來一向多聞未全道力至最初方便識陰若盡則汝現前諸根互用次顯現依超證箋云言六根各得互換作用一根發識遍緣諸境從互用中能入菩薩金剛乾慧箋云金剛是喻此喻慧如金剛手中之杵圓明積心箋云圓滿凝明精微之心是理於中發化箋云即體之智發起變化如淨琉璃內含寶月如是乃超十信十住十行十回向四加行心箋云此是地前四十四心菩薩菩薩所行金剛十地箋云是十地初歡喜至法雲此十地菩薩地地皆是此金剛乾慧等覺圓明箋云十地後等覺位理智齊等故曰等覺一念一剎那中假立故圓滿融明入於如來妙莊嚴海箋云是妙覺位微妙莊校嚴淨居法性土如海之廣大包含性功德故圓滿菩提歸無所得箋云無所得而得此是過去先佛世尊奢摩他中毗婆舍那覺明分扸微細魔事後明依行必證文三初引過明同箋云佛又恐將為已證乃云此是過去先佛世尊真覺凝明之智分明剖扸魔境現前汝能諳識心垢洗除不落邪見以勸除邪惑箋云前言汝猶未識如今已出五陰超五濁乃言汝能諳會辨識此之境界陰魔銷滅天魔摧碎箋云陰魔心魔也內心攻起天魔附著大力鬼神褫魄逃逝魑魅魍魎無復出生箋云褫魄者言褫落其魂魄也直至菩提無諸少乏下劣增進於大涅槃心不迷悶後明直進菩提箋云不迷則不被魔亂不悶則心不妄計或迷而不悟悶則不入若諸末世愚鈍衆生後結持真句文三初懸標末品箋云則愚癡暗鈍未識禪那箋云禪那妙定不知說法箋云言無智慧或不知魔說謂是佛說樂修三昧箋云愛樂修習三昧正受也定之異名汝恐同邪一心勸令持我佛頂陀羅尼呪箋云囑阿難專注一心勸諸衆生持鳥瑟尼沙呪若未能誦寫於禪堂或帶身上次勸誦寫除魔箋云禪堂則坐禪之堂一切諸魔箋云則欲界頂上諸魔王所不能動箋云真言力故不能惱諸行人汝如沸湯彼如堅冰暖氣漸凌不日消殞汝當恭欽十方如來究竟修進最後垂範後勑欽流教箋云範猶法也世尊四十五年後說此經了即說涅槃是最後垂法或此五十重魔事在後說之故曰最後阿難即從座起聞佛示誨頂禮欽奉憶持無失後重疏五想文二初陳疑請決文五初聞持妙旨箋云重疏五想為阿難見佛說五陰皆有妄想色堅固受虗明想融通行幽隱識罔象此五皆有妄想所以便疑云如五根色五塵色是無情因何亦有妄想由此佛所以重與疏通此五想經中有三問一問色為妄想我當時未聞佛說二問五陰為頓除為漸除三問五陰至何為界分示誨教誨也如前文云此是先佛世尊等又云魔境現前識又云汝當恭欽十方如來究竟修進也於大衆中重復白佛如佛所言五陰相中五種虗妄為本想心次牒舉前文我等平常未蒙如來微細開示三未奉微宣箋云一問色為妄想我等尋常未見佛微妙子細開通指示問意只如受想行識四陰心所法從是妄想只如色陰五根色五塵色法處所攝色是無情何故亦言妄想又此五陰為併銷除為次第盡四述界邊頓漸箋云意問為第一陰既無餘五一時銷盡為復次第盡至第五如是五重詣何為界箋云界具四義因義性義流類義種族義惟願如來發宣大慈五請哀來現箋云然阿難便請開示宣發為此大衆清明心目箋云心則真心也謂理目則智也以為末世一切衆生作將來眼箋云指此教為後世照道入理之眼目佛告阿難精真妙明本覺圓淨後廣釋前疑文二初釋想名文二初總陳元相文三初總明真妄文三初明真離垢箋云此已上是真如之理非留生死及諸塵垢箋云真中無妄如澄湛水更無五陰等法塵業垢乃至虗空皆因妄想之所生起次因想生空箋云此空是第七執第八見分為我變起此一重昏鈍頑空斯元本覺妙明真精妄以發生諸器世間後究妄從真箋云言此之虗妄根元本來是真既也如是因何有妄以發生因一切衆生一念違如覺勞相現便有色受想等虗妄如澄湛水因風鼓動便成波起水體無波如真體無妄便有所依器世間等如演若多迷頭認影次喻消雙執文三初立妄喻箋云頭喻真鏡中喻妄迷失本頭認影為頭如一切衆生失本真性認妄為真妄元無因次述妄計文四初述妄立因緣箋云言虗妄之法無有因依於妄想中立因緣性箋云向虗妄相想則內道二乘之人所執迷因緣者稱為自然次述迷立目箋云迷因緣之性執為自然此則外道彼虗空性猶實幻生三舉空由幻因緣自然皆是衆生妄心計度四雙責二途阿難知妄所起說妄因緣若妄元無說妄因緣元無所有何況不知推自然者後責妄說箋云言汝若知妄所起我便許汝說為因緣若妄元不成何況不知因緣却執妄為自然是故如來與汝發明五陰本因同是妄想後顯陰同因汝體先因父母想生汝心非想則不能來想中傳命後別釋五名文五初堅固文三初述形因三想箋云則釋五名則重疏五想也為他前來疑道只如受想行識四陰是心所法且從是妄想此五根色五塵色是無情何故亦說是妄想於是世尊向此中有若是男向母身上想中有身上取想言此身是色法則不能來想中傳命謂初七羯邏藍向母身中受胎則第八識託胎時也命是八識上連持不斷之功能如我先言心想酢味口中涎生心想登高足心酸起懸崖不有酢物未來次引雙喻通倫箋云指第二經破五陰中想陰文云如人談說酢梅口中水出思踏懸崖足心酸澀此口與足皆是色法因何受此想心而生酸澀等汝體必非虗妄通倫箋云言汝體若必言不是虗妄想相通同倫流便反顯云汝體正是虗妄通倫口水如何因談酢出箋云曾知是虗妄倫流是故當知汝現色身名為堅固第一妄想後結成初目即此所說臨高想心次虗明文二初形隨酸澀箋云佛為能說臨高想心是所說能令汝形真受酸澀箋云為受以領納為義既能領納酸澀是受由因受生能動色體箋云由因領納酸澀能令色身口酸足澀或即此所說是指前文躡下妄想也汝今現前順益違損二現驅馳名為虗明第二妄想後結受虗名箋云順則益違則損此是身家所緣境受此違順二境二現驅使馳流由汝念慮使汝色身三融通文二初形隨想運箋云由心使身身非念倫汝身何因隨念所使箋云言若身不是念之倫流何因隨其妄念所使種種取象心生形取與念相應寤則想心寐為諸夢箋云種種不一也心念前境身形前取曾知是念之倫流則汝想念搖動妄情名為融通第三妄想後結號融通箋云融則萬象含心通則旁隨衆境化理不住四幽隱文三初述行陰冥遷箋云謂變化生滅無而忽有之道理則行陰念念生滅改變不停住也運運密移箋云運運則動密移為行陰隱密遷移念念不停甲長髮生氣銷容皺日夜相代曾無覺悟箋云相代則想之代謝念念生滅阿難此若非汝云何體遷次縱陳雙詰箋云言此行陰若非汝妄心生滅云何有氣銷容皺等事如必是真汝何無覺箋云若言此行陰是真何故髮生爪長不覺遷流覺則真今又不覺曾知是妄則汝諸行念念不亭名為幽隱第四妄想後結想幽名箋云幽則潛細難知隱乃陀那藏伏又汝精明五罔象文五初標責受文三初縱立體常箋云是牒彼識陰為五八二識現量對境不分能所故曰精明湛不搖處箋云則第八識生滅微細看之不見似不搖動名恆常者箋云八識惟恆無審者牒辭於身不出見聞覺知次舉識分劑箋云見是眼識聞是耳與鼻識覺是身識知是舌與意識謂此現量識是八識親變相分是舉第八分劑若實精真不容習妄後顯不容妄習箋云若實箇是真不合有氣法習慣習也何因汝等曾於昔年覩一奇物經歷年歲憶忘俱無於後忽然覆覩前物記憶宛然曾不遺失三引事含熏文二初責含遙習箋云覆再也為前納得種子落在八識之中再遇境時種子乃生起現行則此精了湛不搖中念念受熏有何籌算後指識宜熏箋云為此第八識雖是現量而非能熏但為所熏念念受前七識所熏種子落在其中不可以籌量算數阿難當知此湛非真三比水潛流文三初舉識非真如流急水望如恬靜流急不見非是無流次比流潛急箋云非無生滅生滅難見若非想元寧受想習後指習非真箋云若此八識不是妄想根元不合受一切習氣如今既受習氣曾知是妄非汝六根互用合開四指窮真妄謝文二初舉互用全真此之妄想無時得滅後顯迷銷盡箋云經問此之識陰幾時得答汝六根互用合開此之妄想無時得盡言若非汝六根門顯不被六塵關閉是汝六根無時銷滅須得六根互用到佛果位方轉八識成大圓鏡智此識轉時轉名不轉體故汝現前見聞覺知中串習幾則湛了內罔象虗元第五顛倒細微精想後結精想名罔象虗元罔無也迷本無形違真似有推源本妄故曰虗元顛倒則初起相緣微細乃明業轉精則一真冥合想乃忽慕圓明生死槃根此為枑箋云顛倒則初起相緣者則初起性明相時微細則業轉二識不言現現是八識體精則一真冥合則第八中一分淨分則第九識故冥合想乃忽慕圓明則忽性明明圓明之體是初有想起此想生死根本最微細已上結答五陰皆有妄想阿難是五受陰五妄想成後通邊際文二初述五陰邊際文二初牒五同因箋云言此五陰皆有領納之義故云受陰五妄想成第一質礙妄想乃至第五罔象妄想汝今欲知因界淺深後遐分十際文五初色空二妄箋云五陰皆有因界淺則是因深則是界此標貫下唯色與空是色邊際箋云為此色是實色空是頑空此色質礙與空虗處相反故色以空為邊際或云因果因是受想行識果是色果深因淺也唯觸及離是受邊際次觸離不言通意箋云為受以領納為義若有觸著則有領納若有離觸則無領納唯觸及離是受邊際唯記與忘是想邊際三記忘忘亦識昏同為妄攝箋云想以取象為行相若有記憶則有取象既無記憶是忘則是想之邊際外人問記也且從念念緣持是妄只如忘是無心合與真體相冥因何亦妄答妄亦識昏同為忘攝唯滅與生是行邊際四滅生生可見滅有二一永二相此滅流動相乘唯成於妄箋云為行遷流為行相既若有生則有行若滅則無行所是行邊際外人問此相滅與永滅為同為異答此滅流動相乘唯成於妄湛入合湛歸識邊際五湛入合湛上即六識合乃八元上妄可知下通真妄此言生滅集起邊論故立陰名顯彰迷習箋云上湛入則第六不與五同緣合湛則歸第八識染分上來即若有第六便與五同緣是識陰今歸八體上來是識之邊際已上結答如是五重詣何為界疏言上即六識是第六識不與五同緣唯目安山合乃八元者為第八是前識根元上妄可知者第六念念生滅可知下通真妄者第八識染分則帶相若淨分是智品外人問識通於真妄此湛入是真是妄答此言生滅集起邊論集則積集起則生起第八無始時積集生起一切漏無漏種子在中生起故云集起邊論此五陰元重疊生起後示除彰勸文二初除文三初滅二門箋云五陰根元則八識生因識有箋云為最初受生託母胎中為羯邏藍穢觸不淨而受胎滅從色除箋云若滅無時先從五根色皆歸種也理則頓悟乘悟併銷次雙通頓漸箋云若是悟理但悟一陰其餘四陰一時併除事非頓除因次第盡箋云此答第二問須次第出其色陰乃至識陰方盡我已示汝劫波巾結何所不明再此詢問後責迷再請箋云指第五經結解同體疑云阿難吾今問汝此劫波羅巾乃至佛言六根解除亦復如是亦是此義責之汝何再問上是結答為併銷除為次第盡汝應將此妄想根元心得開通後勸文三初彰自了心開傳示將來末法之中諸修行者令識虗妄後敘流通教意箋云令識五陰虗妄深厭自生知有涅槃不戀三界箋云深厭自生則生滅法不出此五陰阿難若復有人遍滿十方所有虗空盈滿七寶持以奉上微塵諸佛承事供養心無虗度四運教彌興文四初明供佛福廣文三初廓明珠珍施箋云第四運教彌興流通然教無興運法流是故世尊廣說校量傳持果經云阿難後有人遍滿十方乃至得福多𠘶阿難以少類多答言虗空無盡乃至有何邊際又云若復有人身具四事乃至靡不經歷比量前福能以一念將此法門於末劫中乃至譬喻所不能及虗空所依太虗空也七寶金銀琉璃等持賫持也供以四事飲食衣服等又向佛邊侍養心無虗度度猶過也於意云何是人以此施佛因緣得福多否次審福緣多箋云言虗空無盡珍寶無邊承事供養心無虗度之因緣審其得福多少阿獲答言虗空無盡珍寶無邊昔有衆生施佛七錢捨身猶獲轉輪王位況復現前虗空既窮佛土充滿皆施珍寶窮劫思議尚不能及是福云何更有邊際後答少感輪王況無邊際箋云施佛七錢則七枚金錢捨身則捨此一報身後得轉輪王出增劫人壽八萬四千歲七寶隨身千子圍繞四洲一化此以少類多答佛告阿難諸佛如來語無虗妄次積罪深文三初告言真實箋云世尊將欲舉一人造十惡四重然後傳經功能又變地獄苦因成安樂國恐他不信旦先誓言向他語無虗妄佛皆真語實語不誑語不異語若復有人身具四重次引犯二根𠎝箋云四重則小乘四分戒淫殺盜妄語十波羅夷箋云此云墮言若犯此罪當來墮不如意處又云棄言棄向二部清淨僧外則菩薩戒經一若自殺教人殺等二若自盜教人盜等三若自邪淫教人邪淫等四若自妄語教人妄語等五若自酤酒教人酤酒六若自說在家出家菩薩罪過比丘比丘尼過若教人說過七若自讚毀他教人讚毀他八若自慳教人慳九若自嗔教人嗔十若自謗三寶教人謗三寶瞬息則經此方他方阿鼻地獄乃至窮盡十方無間靡不經歷後明受苦迅速箋云瞬息則瞬視喘息間阿鼻唐言無間言苦苦相連無有間歇靡不經歷者言地獄無不經過遍歷也能以一念將此法門於末劫中開示未學三顯流功文六初歎一念流功箋云一念即少念少念即無念無念是無分別智與理相應將此法門是此首楞嚴經也於末法中正是今時開示未學傳持此教是人罪障應念銷滅次歡頓融長苦箋云是前來所造四重十波羅夷罪應念即應前之一念心一念即是無分別智變其所受地獄苦因成安樂國三難因成果箋云變苦成樂得福超越前之施人百倍千倍千萬億倍四歎福倍無窮箋云前之施人則前來虗空無盡佛土充滿之人百倍莫止百倍又過千倍莫止千倍千萬億倍十萬為億如是乃至算數譬喻所不能及箋云乃至算師弟子將以籌算又以譬喻其人功德俱不也阿難若有衆生能誦此經能持此明如我廣說窮劫不盡五歎持難思依我教言如教行道直成菩提無復魔業六歎依修尅證佛說此經已比丘比丘尼四法將散文十初標內衆優波塞次列居家箋云唐言近事男三歸五戒持得一分半分堪親近比丘僧學佛事優婆夷箋云唐言近事女亦可親近比丘尼學佛事此二是在家衆一切世間三總綰通居箋云一切總包象遷流間百一切衆生墮在其間天人阿修羅天者光義自在義人者多思覺義五常為人修羅如前釋及諸他方菩薩五列他方大士箋云及兼並義諸者不一義他方卜方也梵語菩提薩埵唐言覺有情二乘六標此界二乘箋云聲聞緣覺聖仙七顯神仙聖正也仙遷也言遷在山中童子八彰童子箋云童真之子不犯欲塵并初發心大力鬼神九陳神鬼箋云則發大乘之心人之魂魄所歸曰鬼陰陽不測曰神有大力故曰大力鬼神皆大歡喜作禮而去十結俱辭箋云佛說此經已乃至作禮而去已是也
