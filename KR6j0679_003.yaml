body:
  text: 天竺沙門般剌密帝譯烏長國沙門彌伽釋迦譯語菩薩戒弟子房融筆受西京大興福寺沙門惟慤科皇宋首楞大師可度箋阿難白佛言世尊我亦聞佛與文殊等諸法王子談實相時世尊亦言心不在內亦不在外六金刀𡍩腦文四初立文三初敘昔聞箋云言我曾四十五年前大乘漸教中亦曾聞佛為文殊等諸菩薩是觀音普賢諸法王子紹隆佛日補處稱尊是佛之子談猶說也說無相不相是真實相之時世尊亦言心不在外蓋要顯其真心周遍法界阿難前來被佛破却內外如今知道佛亦曾言之如我思惟內無所見外不相知次審前理箋云如我自家心思惟度內不見心肝等外又不今相知我今又且相知內無知故在內不成身心相知在外非義箋云義理也便自牒云說在內義也不成舉手徵心又有分別在外又非理合相知故箋云不合相知今合相知此牒不在外有本作今相知亦得復內無見箋云內便有見又且無見牒不在內當在中間後陳止處箋云含述心居此計落中未委計何為中決定身興處也佛言汝言中間中必不迷非無所在次破文二初總徵文二初通徵箋云汝言中間汝也必定不迷亦須有箇憑仗所在下徵今汝推中中何為在復簡問箋云今汝阿難推尋其中中何所在當在何處為復在處為當在身箋云為復在處為中處即五塵處色聲香味觸為復在汝身為中身即眼耳鼻舌身意但道在身又如何下文牒破若在身者在邊非中後別破文二初就身又二初據邊箋云東人西人身各在一邊何於中則犯邊上稱中過又轉計在身裏面為中下便破在中同內後轉內箋云若言身中即同前執內之文即犯執內為中過但道在處又如何下文牒若在處者為有所表為無所表後約處文二初雙詰有無箋云雙徵云為復有所表無所表兩處問處則渺漠無邊夫立一處所為中須箇標表但道無表又如何下文破無表同無後別破文二初無箋云若言無表又同無立中義不成夫立中須有箇標表汝既無表將何立中犯無邊不顯過但言有表又如何下牒表則無定後有文四初彰不定何以故二徵不定由如人以表表為中時東看則西南觀成北三述不定相箋云如室中心將物標表東人看之是西南人觀之成北表體既混心應雜亂四舉表箋云此所表之處既相混能表之心則雜亂或在東在西乃不定也阿難言我所說中非此二種三救文三初斥張虗歒箋云阿雜起來爭世尊云我所說中不是此二種二種則身邊處邊也如世尊言眼色為緣生於眼識次確引明談箋云佛向法相門中編列便道眼是所依緣色是牽心緣眼與色為緣是根塵相合然後生得眼識識是了別緣既有根塵便有識心三種和合方成見分眼有分別色塵無知識生其中則為心在後指中心在箋云眼有分別是眼有情色塵無知是色無情此識心生在此根塵之中乃為我心之所在下再破根境文佛言汝心若在根塵之中此之心體為復兼二為不兼二四再破文二初雙徵箋云汝心若在根塵之中此牒他前來計便徵云此之心體為復兼根兼境為復不兼根境言兼二又如何下牒若兼二者物體雜亂後別破文三初破兼箋云若兼二者定牒破云物體雜亂物是根與塵根在內何故也稱物然根是無記亦同物體是識雜亂者識與根塵相雜亂便犯體同物雜過物非體知箋云物是根塵則無知體是識乃有知便犯類物無知過成敵兩立云何為中兼二不成箋云敵對也一半屬根一半屬塵故兩立也既半在根塵即成邊中義不成兼二不得犯一體雙立過非知不知次破不兼箋云此中文少一句合云若不兼者非知不知識亦不兼根亦不兼塵既不兼根境亦不知根境故云非知則非知根不知則不知境即無體性中何為相箋云言既不知根境即無識之體性既無識目何為中即犯非兼失體過此文下亦少一句應云不兼不成是故應知當在中間無有是處後結破箋云言在根塵中間無有是處第七後徵無著若療枯骸箋云阿難前來執心在中間被世尊破盡又向此一向執死人世尊破時如扁鵲針得人再活執云無著名之為心則我無著名為心不阿難執心無著世尊破唯從境遣便徵云汝言覺了分別心性俱無在者世間虗空氷陸飛行諸所物象名為一切汝不著者為在為無雙徵阿難云有不著者不可名無破有已盡然後雙破有無云無相則無非無則相相有則在云何無著後總破則可知故疏主云前以和思破盡想念無容爰申無著之心以顯離緣之體比文是中義殘既破却中是有必落無故有此文上敘破無著竟阿難白佛言世尊我昔見佛與大目連須菩提富樓那舍利弗四大弟子共轉法輪常言覺知分別心性既不在內亦不在外不在中間俱無所在一切無著名之為心針骸補助徵文二初立箋云轉則轉邪歸正輪者不定義摧碾義常言能覺能知第六識心既不在內外中間謂阿難前被佛破却內外中了今却言不在內外中間一切無著佛說無著乃真無著之性周遍法界不著一切處不離一切處也則我無著名為心不箋云阿難執我能緣心不著前境問佛為心不為心佛告阿難汝言覺知分別心性俱無在者後破文三初牒計雙徵文三初牒計箋云此是牒計下立境破之世間虗空水陸飛行諸所物象名為一切次顯象箋云虗空則所依水通河海陸括平居飛乃飛禽行唯步類此是能依有情物是水陸等象則一切草木等名為一切是立境然後便破汝不著者為在為無後總徵箋云汝言不著前境者為有心在為無心在意間問有心言不著無心言不著無則同於龜毛兔角云何不著次有無彰核文三初核無箋云龜毛兔角五無之中是畢竟無無心將何不著有心方說無著下文彰有又破有不著者不可名無次彰有箋云分明有不著心不可名無犯隱有納無過無相則無後雙詰偏呵箋云若是實相之相如空體無非無則相箋云非始太虗之無必有實相之相相有則在箋云指實性不亡也云何無著箋云顯破無執是故應知一切無著名覺知心無有是處後結破第八黃河清濁指箋云阿難前來執心無著已被世尊破盡無餘所以與諸大衆一時作禮請云我等皆由不知真際所詣唯願世尊大慈哀慜開示我等奢摩他路於是世尊既受阿難請遂乃從其面門放光表談了義經云爾時世尊從其面門放種種光其光晃耀如百千日普佛世界六種震動乃至皆住本國合掌承聽問放光動地意是於何答故疏云夫談妙法必縱神光意顯難思並召遠方之衆所以世尊便向此中為阿難說二種根本經云阿難一者無始生死根本則汝今者與諸衆生用攀緣心為自性者此妄也二者無始菩提涅槃元清淨體則汝今者識情元明能生諸緣緣所遺者此真也乃至而不自覺枉入諸趣上敘黃河清濁指竟爾時阿難在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言八黃河清濁指文三初申迷請指文三初述恃迷源箋云爾時即聽法之時有問則從座而起右肩右膝但表順義外道袒左表逆合掌表師資合理智合身業恭敬而仍也自謂咨白陳其辭句口業恭敬其中攝取意業乃三業恭敬也我是如來最小之弟蒙佛慈愛雖今出家猶恃憍憐箋云猶尚也恃倚也佛之堂弟棠棣之花有其倫次蒙佛慈悲愛念雖今為箇僧相圓頂方袍尚自倚賴世尊憍憐憫念於我所以多聞未得無漏箋云阿難住持三世諸佛言教不遺半字如水灌瓶不漏遺滴未得無有漏等諸漏是須陀洹人雖明生空但能斷見道中八十八使分別煩惱故有修道中俱生煩惱未忘不能折伏娑毗羅呪為彼所轉溺於淫舍箋云為被也自家不能折挫制伏邪法被彼幻術所轉自不能轉於幻術飄落敗風之空如人沒溺於水幾亡性命當由不知真際所詣箋云詣到也是法界大定真實理際所到之處下文便請唯願世尊大慈哀愍開示我等奢摩他路次請開真路箋云唯願希欲義佛有無緣之慈慈能與樂哀憐憫念開通指示於我阿難等之三十六類大衆路則乘聖人遊履之處也令諸闡提隳彌戾車箋云闡提是一切闡底迦無信根者不信大乘隳破也梵語彌戾車華言惡見是無種性者設爾勤如精進但以人天有漏無大乘種是外道異名作是語已五體投地及諸大衆傾渴翹佇欽聞示誨後申儀待旨箋云兩手兩足及頂輪投于地上表清淨殷重故及諸大衆傾心渴切翹勤佇待欽奉耳聆世尊指示教誨爾時世尊從其面門放種種光次合剎騰輝丈七初則光流面戶箋云當阿難請演之時從口放光表談了義光有多般非其一種其光晃耀次陳雜色分輝箋云其者屬下之辭所放之光炳煥晃耀也如百千日三比億日齊明箋云先似百千箇日頭百千億之數乃十萬也普佛世界六種震動四述震搖群剎箋云六種則東湧西沒西湧東沒南湧北沒北湧南沒中湧邊沒邊湧中沒如是十方微塵國土一時開現五表微塵土現箋云一切衆生偏見言此土丘淩坑坎不淨諸佛世界便乃清淨有分劑之心作如是執所以世尊合十方國剎為一箇法性淨土表除分劑之心一時開通顯現表此教開顯而說不同四十五年前覆相等教佛之威神令諸世界合成一界六彰合界圓通箋云表無分劑之心令諸世界舉其多數如佛說淨名經五百長者獻五百寶蓋佛之威神合成一蓋亦是表無分劑心也其世界中所有一切諸大菩薩皆住本國合掌承聽七明遠聖端居遙聽妙音箋云皆咸也指前世界之中所有一切法界內大心有情總入地聖人非地前諸小菩薩咸住自家所居之土合掌承受聽覽我佛無漏之音表無去來義放光云法無去來無動轉故佛告阿難一切衆生從無始來種種顛倒業種自然如惡叉聚後雙標本派文二初總述迷源文四初歎妄習俱生箋云一切總指法界內迷真背覺底有情從無始無初一念違如覺勞相現已來種種者言其不一故顛倒者頂墮義惡業種子自然而然不由他教自家造惡業等然後飄沈三塗喻惡叉聚西土樹子名此方無五不翻中時體不翻五箇作一蒂生無孤立者將表心王心所及所緣法同時起故不相捨離諸修行人不能得成無上菩提次述修人謬證文四初總戲佛果箋云指一切修行行人不能得成無上菩提是有為果其中含取涅槃是無為果則果位中有為無為二轉依果涅槃是顯德似天上一輪月皎潔分明一乍被雲籠不得現但雲盡自然顯得本來月體法上一切衆生涅槃之體本來清淨被煩惱所知二障障之不得顯現如今但無煩惱所知二障自然顯得本來涅槃之體也乃至別成聲聞緣覺二述劣證二乘箋云既不能成無上菩提又如何乃至超越中間別成聲聞緣覺謂聲聞人言佛道長遠久受勤苦乃可得成我今但趣箇生空涅槃且止化城三百由旬求少安樂未到寶所法華云眇目矬陋無威德者是也及成外道三明九十五徒箋云向三乘教外修行心外取法不以聖教無繩墨不以明師作指南諸天魔王及魔眷屬四簡諸天魔眷箋云色界無色界等天無色界以四蘊成身無色蘊空欲界諸魔王并魔民魔女等梵云魔羅華言殺者殺修行行人慧命何故而成此諸類耶下答皆由不如二種根本三總指迷真箋云不知不悟也根本出生義二種者真根本妄根本也若也起始覺淨智覺此妄根本無明然後反本還源背塵合覺直至無上菩提若也不能起智合理背體外求棄本逐末流浪三界此等但入輪回際不能入佛海妄根本即癡之一法也錯亂修習箋云錯將生死妄心求佛菩提涅槃之果亂者將妄混真亦是飾妄為真修是能修習是所習下說喻猶如煮砂欲成嘉饌縱經塵劫終不能得四舉錯喻難成箋云砂非米妄非真煮砂為饌縱經塵劫秪名熱砂若以妄為真縱經塵劫但入輪回際不能入佛海故圓覺云未出輪回而辨圓覺彼圓覺性即同流轉下文云得圓明覺無生滅心然後圓成果地修證云何二種後別陳雙本文四初總徵雙體箋云前來云皆由不知二種此中徵起云何名二種阿難一者無始生死根本次先敘迷源箋云生死根本則根本無明名不覺塵沙煩惱最初因此根本無明是生死根本也則汝今者與諸衆生用攀緣心為自性者箋云汝阿難八識俱有攀緣用此攀緣虗妄之心為自家本真之性此標妄二者無始菩提涅槃三尅指真心箋云菩提是有為果轉染得淨是生德四智菩提種子所生妙觀察智等涅槃是無為果轉迷成悟元清淨體箋云清淨離垢義離煩惱障名清離所知障名淨則汝今者識精元明箋云則汝阿難今者識精約第八識此八識體不離真故元明能生諸緣箋云即所緣之境也楞伽云建立及受用皆從八識生八識為能生建立及受用為所生緣所遺者箋云言一切衆生但執能緣妄心遺失却本來真性由諸衆生遺此本明四歎遺真抂溺箋云因由法界內一切衆生遺失此本來圓明真性也雖終日行而不自覺箋云終盡也言雖盡日往來不自覺悟也抂入諸趣箋云一切衆生本來一分真性洞徹圓明不能承紹理不合入自家屈抂而入六道受生第九奪有呵迷膏肓出鬼箋云然謂阿難向此中執能推者為心是第八識所以世尊不宜遮縱使奪下云咄阿難此非汝心於是乎阿難矍然避座合掌起立白佛此非我心當名何等佛告阿難此是前塵虗妄相想惑汝真性由汝無始至于今生認賊為子失汝元常故受輪轉何故阿難便作如是執佛作如是破故疏主云且迷夫固執如育癰瘡諸佛除迷如釤贅肉上敘奪有呵迷文竟阿難汝今欲知奢摩他路願出生死今復問汝九膏肓出鬼徵文二初立文四初許箋云前來阿難請唯願大慈開示我等奢摩他路未便說且云我今有箇事問於汝意欲下舉手徵心是立境徵心也即時如來舉金色臂屈五輪指次立箋云即許阿難奢摩他路之時佛身如紫金山擡起手作純金色屈握五輪指佛手五指頭各有輪紋相也語阿難言汝今見不三問文六初告視箋云語告語也汝今見不見此立境問阿難言見次酬瞻佛言汝何所見三再覆所觀箋云見甚物阿難言我見如來舉臂屈指為光明拳耀我心目四重陳鑒相箋云我見如來屈握光明之拳照耀我心之與目佛言汝將誰見五詰能觀本箋云佛又徵之阿難言我與大衆同將眼見六對述將眸箋云我共三十六類同將能緣眼見眼是浮根四塵佛告阿難汝今答我如來屈指為光明拳耀汝心目四徵文二初簡目徵心箋云汝今對吾如來屈握指端為光明拳照汝心之與目此是牒汝目可見以何為心當我拳耀箋云便徵以何者為汝心當我拳耀阿難言如來現今徵心所在後述能推理箋云如來即今徵窮我心之所在而我以心推窮尋逐即能推者我將為心箋云而我用心推考窮究尋討推逐即此每日昭昭靈靈攀緣逐境者便是此則彰其妄本能推目第八識佛言咄阿難此非汝心後奪文四初呵呈妄本箋云佛不宜遮縱便咄呵責之此不是汝心阿難矍然避座合掌起立白佛此非我心當名何等二動失驚陳箋云矍然驚懼㒵避座則側身或退後此非我心也即甘當當名何等乞彰非目佛告阿難此是前塵虗妄相想惑汝真性三顯惑真源箋云此是前塵通指所緣虗妄相想因相生想則括其生本前所後能言此相想是第八識迷惑汝之本來真如體性犯執妄為真過由汝無始至于今生認賊為子失汝元常故受輪轉四傷留賊子箋云因由汝之無始至于今日認賊作子失却元來真常之心故受輪轉法上若認真心為心成佛有期若執能推者為心何殊認賊為子所有法財功德一時偷將然後不免輪轉生死第十披沙簡余指箋云此指來意謂阿難前來執能推者為心被世尊奪下猶執吝此心不捨乃云我心何獨供養如來乃至遍歷恆沙國土承事諸佛及善知識發大勇猛行諸一切難行法事皆用此心乃至若此發明不是心者我乃無心同諸土木是故世尊便邀阿難離却前塵認取真分別性乃云我非勑汝執為非心但汝於心微細揣摩若離前塵有分別性即真汝心上敘披沙指阿難白佛言世尊我佛寵弟心愛佛故令我出家十披沙簡金指文二初翹申懇請文十初恃佛辭榮箋云言我是如來寵惜之弟前來見佛三十二相八十種好勝妙殊絶便乃發心使令我出家圓頂方袍也我心何獨供養如來二釋迦親侍箋云獨但也供則四事養則侍養言我心不但是供養教主如來乃至遍歷恆沙國土承事諸佛及善知識三遍隨塵剎箋云言周遍遊歷國土如恆河沙多承奉伏事諸果位聖人善知識者善順如來教法知因識果知病識藥也發大勇猛行諸一切難行法事皆用此心四效履難行箋云發大勇健猛利之心捨其頭目髓腦國城妻子等皆用此箇心此標善縱令謗法永退善根亦因此心五謗法闡提箋云縱令我毀謗大乘方等教法為一闡底迦信不具者犯二根𠎝退墮無上菩提亦因我此心此標不善若此發明不是心者六總陳雙業箋云發明則每日攀緣逐境起惑造業第八識苟不是我心者我乃無心同諸土木離此覺知更無所有七類同株塊箋云土謂土塊木謂草木無情之物言離此覺知之外別更無有心云何如來說此非心八如來虗奪箋云謂佛前云此非汝心我實驚怖兼此大衆無不疑惑九明己衆同疑箋云實是驚惶恐怖非但是我兼復大衆見佛奪我此心一時猶豫不決惟垂大悲開示未悟十請垂宣悟箋云佛有同體大悲悲能苦開通指示言我也秪是未悟請佛開示於我爾時世尊開示阿難及諸大衆欲令心入無生法忍後慰簡雙心文二初述妄依源文七初明含悲密運箋云開攝悟示攝入前來云兼此大衆無不疑惑此中示告之無生是二空真如理無生亦無滅法忍是二空真如智法者執生物解義忍者印認之義謂起智印認前來二空真如理也於師子座摩阿難頂二摩頂安心箋云向師子座表無畏摩阿難心頂令其悟首楞嚴頂三之法而又安慰之而告之言如來常說諸法所生唯心所現三指萬法源箋云諸法則總一切內身外器等法唯心所現者尅簡心外無法唯識心現真體無生如珠現物類而珠性無生體常圓淨緣一切衆生自家造業果感而現然一分真性未嘗變動楞伽云建立及受用皆從八識生華嚴云三界所有法一切唯心造唯識相上生未是唯識性若悟唯識性相同體則波水同溼也一切因果世界微塵因心成體四顯生因體箋云因依也言一切有情群類善因生善道惡因墮泥犂此則內顛倒外顛倒則器界四大等如是內外皆因一真之性而有妄生皆依真心上成其體皆是唯識相上變起而無一法出於心阿難若諸世界一切所有其中乃至草葉縷結詰其根元咸有體性五就所生明性箋云一草一葉一花一果窮結其根元無非大種之源此四大為依方能長育縱令虗空亦有名㒵六指空相由彰箋云言虗空是名㒵以無礙虗常為體也何況清淨妙淨明心性一切心而自無體七顯本覺圓依箋云何況本來清淨微妙寂靜圓明之心性則真性一切心是妄然妄依真立如波依水有此但舉真不可道真心而無其體一切草木尚有體性若汝執吝分別覺觀所了知性必為心者後就塵料簡文四初立箋云必定也為作也執則守妄不移吝乃奪之潛拒分別則六覺尋觀伺所了知性通八眼識了知色塵境耳識了知聲塵等第六了知第七第七了知第八第八了知自分境根身器世等此了知唯約第八經云分別是第六謂他執吝此心不放此且縱他將此妄心定作真心向後破之此心即應離諸一切色香味觸諸塵事業二簡文二初總簡箋云即便也應合也此心指執吝之心言此心便合離諸一切色香等是五塵諸塵是第六依第七而住所營曰事事成曰業是其七八二識或事是第七識以恆審思量為事業是第八識剎那熏得善惡種子落在其間然後造得三界總別報業別有全性箋云若離却前八識分別外求一分性不隨前塵落謝便許是汝心全性乃靈鑒獨不由境發此是真故下文不由前塵引起知見若離前五塵分別外無性乃妄心此總簡且教他離塵認性如汝今者承聽我法此則因聲而有分別後別簡文二初約聲箋云且就聲塵承聽則耳根發耳識承受聽覽也縱滅一切見聞覺知後就法箋云縱滅却一切見則眼聞則耳覺則身知則舌與鼻不與五同緣內守幽間箋云雖五根不緣五塵第八識猶內緣法塵幽則幽深雖是間未得全間乃似間緣此聲聞之人伏第六識心不與五同緣雖不外緣由內緣如石壓草暫時不生長逢春必發蓋未全間也猶為法塵分別影事箋云內心緣法剎那不止若不思覽過去便乃懸度未來影事通七八但有影事此則未為真我非勑汝執為非心三審文二初不傷前執箋云敕正也謂前來奪下他心是嚴此審文云我非勑汝是慈疏云佛有誨子之慈故借慈嚴之號我非勑汝等者意謂不離妄外別有真心蓋水外無波器外無金但汝於心微細揣摩箋明細擇雙心箋云返覆觀照更無別體若離前塵有分別性即真汝心箋云教他但離却八識緣塵妄心眼識緣色塵乃至第八緣根身器界等此皆是前塵虗妄之法但離却前塵有一分靈鑒不熏之性不隨前境落謝儼爾獨存即真汝心下文云似現前境若離却前塵無此靈鑒不熏之性此則妄心非真心也科云細擇雙心者離塵有性是真心離塵無性是妄心若分別性離塵無體四非文三初指隨塵無體文二初明離塵無體箋云若分別性離却前八識即無體也斯則前塵分別影事後指現妄心箋云便斷云此則前五塵分別是第六識彊生分別影是第七執八見分為我親為影像事是第八成業果事此妄心非真心也塵非常住次明塵謝隨亡文三初標塵性無常箋云言前塵之法不得恆常久住若變滅時次明塵謝滅際箋云前塵變滅之時此心則同龜毛兔角後喻同塵永滅箋云龜毛兔角五無之中是畢竟無汝若執此前塵分別之心為心前塵變滅之時此心一時落謝畢竟無則汝法身同於斷滅後無因尅證無初正因箋云法身不說斷滅意破他執此八識緣塵妄心為真心塵謝心亡之時法身亦須成斷滅謂汝執妄心為真心真心須斷滅真心既斷滅法身則可知真心即是法身也其誰修證無生法忍後尅證無依箋云言法身既也斷滅又教阿難修行斷障證理修是能修之智法忍是所修之境上敘破妄識虗已竟後通指密因初手見相例指箋云此指來意謂前來披沙指中指阿難真性云若離前塵有分別性即真汝心阿難等不識歸真之路所以默然自失是故世尊便告云一切世間諸修學人現前雖成九次第定不得漏盡成阿羅漢皆由執此生死妄想誤為真實阿難便起請云自我從佛發心出家恃佛威神常自思惟無勞我修至開我道眼於遂舉語阿難言譬如我拳若無我手不拳若無汝眼不成汝見以汝眼根例我拳理其義均不阿難答言唯然世尊既無我眼不成我見例如來拳事義相類世尊便責云汝言相類是義不然何以故如無手人拳畢竟滅彼無眼者非見全無所以者何汝試於途詢問盲人汝何所見乃至以是義觀前塵自暗見何虧損故疏云阿難順許將契玄摸寧側聖懷招令墮負上敘手見相例指竟即時阿難與諸大衆默然自失後通指密因文六初手見相例指文六初聽徒失旨箋云謂佛前來又奪云此非汝心此中又指云我非勑汝執為非心苟認佛又奪之苟若不認佛又指之所以進退不便但得緘口自失歸真之路疏云韓獹引獸此處如獸走入穴也佛告阿難世間一切諸修學人二如來告誤文五初總舉修徒箋云總指一切修行學法之人現前雖成九次第定二明修階極次箋云編例有序從下進上有其倫次謂之次第九定者初禪二禪三禪四禪此是色界無色界空處識處無所有處非想非非想處此是八更添一箇滅盡定滅六兼盡七亦云滅受想定亦云無心定不得漏盡成阿羅漢三指不升真果箋云合云漏盡不得成阿羅漢此文似倒此簡非身證那舍秪得八定未得滅盡定若得此定便漏盡成阿羅漢身證即親證也為甚不得下文云皆由執此生死妄想誤為真實四顯誤守迷元箋云言總因執此生死妄想是第八識緣塵之心賺誤為真實之性下文便引進於他是故汝今雖得多聞不成聖果五策進阿難箋云雖得多聞任持三世諸佛言教經云將聞持佛佛何不自聞聞又云多聞增智慧是不知實相不得成四果阿羅漢也阿難聞已重復悲淚三阿難懇請文二初懇文三初他無慧己責文五初述承針感切箋云阿難前來從摩登伽室中歸一回悲泣此中又悲淚故云重也五體投地長跪合掌次五體申誠箋云長跪表安危不易合掌表師資道成而白佛言自我從佛發心出家恃佛威神三述恃佛威神箋云前來愛相出家便乃剔落鬚髮恃猶倚賴也言我倚賴世尊威神之力加被於我常自思惟無勞我修將謂如來慧我三昧四希望賜定箋云常自心思度量謂更不勞我修行世尊是我師兄亦合得箇三昧慧施於我不知身心本不相代五述斷證由躬箋云佛是法身不代我五蘊之身佛是真實心不代我八識緣塵妄心失我本心次述身不代心責文三初述恨失如源方知往錯雖身出家心不入道次責躬叨聖服不履真途箋云有身出家心不出家有心出家身不出家有身心俱出家此乃身出家心不出家不入道者蓋心不與道相應是不悟首棱嚴大定下說喻譬如窮子捨父逃逝後比窮子逃家離親遠逝箋云弃却本來真性法性身居法性土如其窮子捨父然後流浪三界何殊逃逝他國今日乃知雖有多聞若不修行與不聞等後說不代修責文二初述聞不代修箋云若不斷障證理亦與不聞一般下喻如人說食終不能飽後比談餐不飽箋云阿難任持三世諸佛言教自家不悟但似人之說食也世尊我等今者二障所纏後請文二初述現纏雙障不了真常箋云則煩惱所知二障如人被物所纏縛也煩謂煩冤惱謂惱亂一切有情常處生死百法云所知不是障是障障所知良由不知寂常心性箋云良信也由因也言信因不悟真寂圓常心是本來心性是體性性下便請惟願如來哀愍窮露後請佛哀窮令開道眼箋云哀謂哀憐愍謂愍念窮則貧窮露乃孤露父母俱喪謂之露言我如今又無智度菩薩母方便以為父何異於貧窮孤露之人發妙明心開我道眼箋云顯發微妙圓明之心眼則起智照理如眼見物不殊也即時如來從𮌎萬字湧出寶光四旋光許示文八初心光欻湧箋云佛𮌎前如卍字表萬行已圓涌出其光可貴可重謂之寶光其光晃昱有百千色次萬色呈奇箋云此光分明炳煥有百千般色表真色受用捨無常色獲得常色十方微塵普佛世界一時周遍三遍剎騰耀箋云光明無處不燭故也遍灌十方所有寶剎諸如來頂四灌諸佛頂箋云十方寶剎所依依報諸如來頂能依正報放此光遍灌所依能依表佛佛道同生生體一又表向此說頂三昧之教又表此經難思議故佛佛同知旋至阿難五旋投慶喜箋云旋轉其光又至阿難然是當機之者及諸大衆六大衆但蒙箋云三十六類表此頂三昧教誰人無分也告阿難言吾今為汝建大法幢七告建法幢箋云幢以高顯為義表此經是諸教之標表若近而論之則目此燈光顯耀一指破燈破眼指到於心是建大法幢遠而論之則總目一部五密因三修證為建大法幢大法如幢故曰法幢亦令十方一切衆生八同開佛眼箋云目法界內一切迷真背覺底有情獲妙微密性淨明心箋云獲得也妙者神用無方微者四目不能覩密者隱妄難知性是體性性本來清淨圓明之心也得清淨眼箋云目根本智此智親證真如之時如眼照物不殊阿難汝先答我見光明拳五覆徵前理文二初徵文三初問光因箋云佛覆問前黃河指後佛竪臂徵之以何為心阿難言以能推者為心佛便奪下向此中再覆前問意欲破他執眼能有見此拳光明因何所有箋云一問此拳光明因何便有此光明云何成拳二問拳相箋云二問因箇甚物便成此拳相汝將誰見後問能見箋云三問汝將誰見已上是佛垂三問向下阿難三答阿難言由佛全體閻浮檀金赩許力切光也如寶山清淨所生故有光明後答文三初答光因箋云由因也一答答前第一問閻浮樹名此樹下出金最好喻佛之身佛身如妙金臺光如寶山皮肉細滑塵土水等悉皆不住我實眼觀次答能見箋云二答前後問汝將誰見言我實用浮塵眼觀佛光明拳五輪指端屈握示人故有拳相後答拳相箋云三答答前第二問云何成拳佛手指各有五輪紋因中捨鈔珍異寶所以獲此輪紋將此五指頭屈搏握為拳故有此拳相佛告阿難如來今日實言告汝諸有智者要以譬喻而得開悟六舉例指心文七初告喻知箋云四十五年後世尊觀衆生根緣次第成熟說此一教故言今日以誠實之言告汝阿難佛真語者實語者不誑語者不異語者世尊向下欲破且先告喻令其生信語有智慧之人要以譬喻譬即喻而得開通悟解也阿難譬如我拳若無我手不成我拳一舉例問文三初舉手成拳箋云無手不拳此標拳也若無汝眼不成汝見次舉眼成見箋云無眼不見此標眼也以汝眼根例我拳理其義均不後合例標問箋云用汝眼根例我拳之道理其義均平不均平此是不均平且試問他手之與拳表境無前境似有忽無仗因託緣緣無自性當體即空眼之與見表心不無如人無眼見即在阿難言唯然世尊三答例成文三初總許箋云阿難却答言均平既無我眼不成我見次先牒眼箋云意謂須有眼方成見例如來拳事義相類後舉拳成例箋云將眼例拳其義一般是阿難所見也佛言阿難汝言相類是義不然四責不均箋云是義不如此何以故五徵含指文二初自徵不例如無手人拳畢竟滅彼無眼者非見全無後述無眼見存箋云拳畢竟滅表相分全無非見全無表見分不無謂眼根雖暗見性常存所以者何六邀就審文三初敘盲有見箋云有何所以之故汝試於途詢問盲人汝何所見二邀問盲視箋云無目曰盲言汝試於途路之上詢問箇無目之人汝何所見彼諸盲人必來答汝我今眼前唯見黑暗更無他矚後替盲答見箋云更無他矚獨覩暗境而已以是義觀前塵自暗見何虧損七結指心箋云用前義觀察前塵自暗是浮根與前塵像自明自暗此一分見性則不曾虧損此是世尊庵含指他見也第二燈光顯用指箋云此指謂前來手見相例指中佛邀阿難汝試於途詢問盲人汝何所見彼諸盲人必來答汝唯見黑暗等事是故世尊便指云以是義觀前塵自暗見何虧損所以阿難向此中疑云諸盲眼前唯覩黑暗云何成見於是世尊恐阿難執盲眼不見遂邀二人就暗室通疑上敘燈光指竟阿難言諸盲眼前唯覩黑暗云何成見二燈光顯用指文三初徵前拒指佛告阿難諸盲無眼唯觀黑暗與有眼人處於暗室二黑有別為無有別次暗室通疑文二初引明瞽同幽令分二黑箋云無眼之人唯見前黑與箇有眼人處暗室中此二人見暗為復有別為復無別令他辨如是世尊此暗中人與彼羣盲二黑校量曾無有異後答羣盲共觀兩暗無殊箋云阿難答意即無別知無眼之人亦有見不可言無見阿難若無眼人全見前黑忽得眼光還於前塵見種種色名眼見者後比心成見文三初比燈同眼抑見成燈文三初舉瞽人除膜定眼能瞻箋云佛又舉此無眼人忽有人將錍為他剔開眼睛還見前塵等物莫是眼能見意謂眼不能見且縱他彼暗中人全見前黑忽獲燈光亦於前塵見種種色應名燈見後引有目蒙燈例燈成見若燈見者燈能有見自不名燈次立燈鑒邀燈具識文二初縱燈能見且奪燈名箋云自不名燈燈義不成須成有情無情若見無義不成又則燈觀何關汝事後重許燈心責遺躬性箋云縱燈有心解見又何關汝阿難之事是故當知燈能顯色如是見者是眼非燈後雙彰顯色指見成心文二初標燈指眼箋云燈秪能顯前塵色相不解見色指到於眼眼根發識明利方具前境眼能顯色如是見性是心非眼後去目甄心箋云是知眼秪能顯色不能見色見是於心乃指心見若言眼能見死人有眼云何不見明不循根寄根明發第三去留動寂指箋云去喻煩惱似客不久住故留喻聲聞人暫伏第六識如主人更無來往動喻大乘細四相生住異滅微細難知寂喻大乘真空非生滅故此指來意然謂前來執能推者為心被世尊奪下又向燈光指中破燈破眼指到於心所以阿難未知奪指之意是以阿難與諸大衆默然故疏主出阿難意云拒之乃仰慙慈誨認之又與奪同源是以默請分詮冀明料簡上敘去留動寂指阿難雖復得聞是言與諸大衆口已默然心未開悟猶冀如來慈音宣示合掌清心佇佛悲誨三去留動寂指之三初迷徒默請箋云猶尚也冀仗也與諸三十六類大衆見佛此言疑道前來又奪云若變滅時此心即同龜毛兔角又言此心不是此中又指道燈能顯色如是見者是眼非燈眼能顯色如是見性是心非眼進之佛前來又奪下此心退之佛此中又指此心但得緘口無言身之與心未能開通悟解尚自仗佛世尊慈悲之音宣說顯未於是合掌清潔其心佇待我佛世尊慈悲誨喻爾時世尊舒兜羅綿網相光手開五輪指誨敕阿難及諸大衆次敕衆談因文二初舒金普勑箋云兜羅綿亦云都羅綿兜羅樹上出綿佛手柔軟如兜羅綿佛手有網縵之相光明開猶展舒也佛五指端各有輪紋相誨喻告勑慶喜并三十六類大衆我初成道次告演初談箋云世尊從初於菩提樹下八相成道也於鹿園中為阿若多五比丘等箋云佛昔因中時在此園中為鹿二今成道又於此園為五俱輪轉十二行法輪梵云阿若多華言解義佛初成道日且先度五俱輪梵云俱輪華言親是佛之親為其說十二行法輪說了問他五人云阿若多陳那起來云阿若多五者三人家族一阿濕波華言馬勝二跋提三摩訶男俱利二人舅氏一憍陳那二十力迦葉及汝四衆言箋云則五俱輪中自家四衆或是汝在會四衆指佛邊四衆也一切衆生不成菩提及阿羅漢箋云菩提是佛果位有為果或無上菩提皆由客塵煩惱所誤箋云煩惱從外而來污其自體似客塵一般言總因此客塵煩惱之所賺誤汝等當時因何開悟今成聖果後令宣創悟箋云汝指阿若多通取四衆當鹿園中佛設法之時因何開通悟解今成四界阿羅漢也時憍陳那起立白佛後阿若承宣文四初總述悟因箋云當佛告演之時陳姓也那是男聲如尼是女聲從座起立咨白教主我今長老於大衆中箋云是長之老德重推尊耆年宿德莊嚴經云不必髮白面皺牙齒墮落所貴修福滅罪淨修梵行名曰長老向法會之中獨得解名箋云解四諦理成阿羅漢因悟客塵二字成果箋云客影取主客是第六識心攀緣遂境念念不止喻如客來來往似猿猴得樹象馬無鉤主喻聲聞人不與五同緣伏第六識心塵影取空塵是大乘細四相生住異滅念念不止空喻大乘真空成果則成第四果阿羅漢然後便說喻世尊譬如行客投寄旅亭或宿或食食宿事畢俶裝前途不遑安住次先陳客義文四初述客忩遊箋云譬況也俶述也坐曰賈行曰遍投泊寄宿於旅店之中或可一宿或可一食食與宿事一時了又乃遠裝行途更不駐止法上一切衆生第六識心囂甚動掉起惑造業攀緣逐境無有休歇如客相似若實主人自無攸往次敘主人安住箋云攸所也若是店主何有所往喻聲聞人暫伏第六識不與五同緣之時如是思惟不住名客住名主人三重雙料簡箋云陳那又雙敘以不住者名為客義四偏結族門箋云影取以所住者名為主義此敘客了下文敘塵又如新霽清暘升天光入隙中發明空中諸有塵相塵質搖動虗空寂然三顯談塵妄文二初敘空寂塵搖箋云雨過曰霽日頭升霄之時屋室有小孔隙日影射入屋內便見野馬之塵顯現分明然此塵形質搖動不上新霽清暘喻法空無漏智現前光入隙中發明空中諸有塵相喻第八識中生住異滅細四相此四相念念不停如空中隙駒塵若是空祇寂然不動喻大乘真空之理無來無去下雙敘如是思惟澄寂名空後審甄塵理箋云是真搖動名塵箋云是妄以搖動者名為塵義箋云影取以不動者名為空義佛言如是四佛印證第四兜羅開合指箋云此指來阿難前去留動寂指中與諸大衆口已默然心未開悟於是世尊向此中開屈五輪之指引試阿難方覩塵搖之妄習即時如來於大衆中屈五輪指屈已復開開已又屈謂阿難言汝今何見阿難言我見如來百寶輪掌衆中開合佛告阿難汝見我手衆中開合為是我手有開有合為復汝見有開有合雙徵開合阿難言世尊寶手衆中開合非我見性有開有合答心無展合顯境自搖佛言誰動誰靜阿難言佛手不住而我見性尚無有靜誰為無住答雙超動靜佛言如是且泛印之此表外四大生滅也上敘兜羅開合指即時如來於大衆中屈五輪指屈已復開開已又屈謂阿難言汝今何見四兜羅開合指文五初標相問酬文二初五輪開屈試覩塵搖箋云開已又屈意表外四大山河大地諸有為法恆常生滅無有停住阿難言我見如來百寶輪掌衆中開合後酬百寶卷舒述心能見佛告阿難汝見我手衆中開合二徵答動理文二初心境雙標別徵開合箋云此牒他前言為是我手有開有合為復汝見有開有合箋云意問他為復外四大有生滅為復是汝緣塵妄心有生有滅阿難不了心境之文下便云阿難言世尊寶手衆中開合我見如來手自開合非我見性有開有合後答心無展合顯境自搖箋云阿難意外四大自生自滅我此識心不曾生滅不知外四大是無記何處有生滅生滅唯心也佛言誰動誰靜三審文箋云佛再審為復是境動心動為復是境靜心靜阿難言佛手不住而我見性尚無有靜誰為無住四認文箋云尚無有靜超靜相誰為無住超動相雙超動靜佛言如是五印文箋云佛見阿難略認得一分性無動靜且泛印之此敘外四大了下文敘內四大第五輪光顯耀指箋云然謂前來兜羅指中秪明得外四大相未明內四大元由所以世尊別縱權方連祛內執便乃左右飛光要除迷習經云如來於是從輪掌中飛一寶光在阿難右即時阿難回首右盼又放一光在阿難左阿難又則回首左盼世尊便問阿難汝頭今日何因搖動阿難言我見如來出妙寶光來我左右故左右觀頭自動搖世尊便徵阿難汝盼佛光左右動頭為汝頭動為復見動阿難言世尊我頭自動而我見性尚無有止誰為搖動答雙超動靜二境佛言如是此表內四大相生滅故疏主云頭是無記由識故搖何得印見難輪光顯耀指如來於是從輪掌中飛一寶光在阿難右五輪光顯耀指文六初飛光問首文五初輪光飛右即時阿難回首右盼三慶喜回瞻箋云阿難回頭右顧斜視曰盼又放一光在阿難左三飛左箋云左右顧盼表內四大地水火風念念生滅阿難又則回首左盼四左顧佛告阿難汝頭今日何因搖動五問動箋云因箇甚物頭乃搖動阿難言我見如來出妙寶光來我左右故左右觀二答見隨瞻文二初總述隨觀箋云他身徵妙出光可貴可重來在我左邊右邊故我向左右觀瞻頭自搖動後自甄頭動箋云言我頭自家搖動阿難汝盼佛光左右動頭三審二雙徵文二初審箋云牒他答下便雙問為汝頭動為復見動後徵箋云佛問為復是內四大生滅為復汝識心有生滅阿難不悟心境一如下便答世尊我頭自動而我見性尚無有止誰為搖動四見超雙跡箋云尚無有止超靜相誰為搖動超動相阿難意云內四大自生滅我見性無生滅疏云不知關在戲人但執木身能動不知是識性生滅四大身乃無記何有生滅佛言如是五佛印詮成箋云佛見他略認得一分性識得一分真妄且泛印如是要向下都責於是如來普告大衆若復衆生以搖動者名之為塵以不住者名之為客六如來敘責文二初敘文三初敘憍陳箋云總敘迷真背覺等輩用搖動者名之為塵是細四相用不住者名之為客是第六心來來往往似客一牒前去留動寂指汝觀阿難頭自動搖見無所動次飛光箋云牒輪光顯耀指文又汝觀我手自開合見無舒卷後開合箋云牒兜羅開合指文云何汝今以動為身後責文二初別文二初牒第三立責箋云責阿難用身解動身是無記動唯是心則輪光顯耀指以動為境後牒第二立責箋云境不解動動唯是心此責境動是兜羅開合指緣外四大是境此中責之不倫次蓋是佛責時便責不拘前後或外四大從內四大變所以先責內後方責外也從始洎終念念生滅後總文五初責不息妄箋云從始一念違如及至六道輪回前念新新而起名生後念念念落謝名滅遺失真性二責遺真體箋云遺亦失也又訓落既流浪生死便失却本來真性顛倒行事三責心外見緣箋云顛倒不正義動是心執身與境動則顛倒行事以不動言動以動言不動性心失真認物為己四責認妄為性箋云性心是妄失却真如之性認生滅妄心為自己問何故言心為物答為向真性上看來妄心亦似物也輪回是中自取流轉五責迷中受轉箋云向生死中流浪如旋火輪無有停息集諦名流苦諦名轉由集諦招三界身有漂溺之義名流苦果身於三界受生名轉第六觀河匪變指箋云觀是能緣見分河是所緣相分匪變者不變也此指然謂波斯匿王問佛云我昔未承諸佛誨勑見迦旃延毗羅胝子咸言此身死後斷滅名為涅槃我雖值佛今猶狐疑云何發揮證知此心不生滅地於是世尊便且權時就匿王現量身見分指示真性問云大王汝年幾時見恆河水答我生三歲慈母𢹂我謁耆婆天經過此流爾時即知是恆河水佛徵大王如汝所說二十之時哀於十歲乃至六十日月歲時念念遷變則汝三歲見此河時至年十三其水云何王如三歲時宛然無異乃至于今年六十二亦無異世尊便就波斯匿王顯指心常不皺變云大王汝面雖皺而此見精性未曾皺皺者為變不皺非變變者受滅彼不變者元無生滅上敘觀河指竟上來有六初手見相例指二燈光顯耀指三去留動寂指四兜羅開合指五輪光顯耀指六觀河匪變指六段不同總是通指密因竟上來有二初破妄識處後通指密因兩段不同總是第一簡妄明真指密因竟
